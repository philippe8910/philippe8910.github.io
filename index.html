<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>網站目錄 | philippe8910.github.io</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-12 px-4 text-gray-900">

    <div class="max-w-3xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-3xl md:text-4xl font-black tracking-tight">網站目錄</h1>
            <p class="mt-3 text-gray-500 text-sm">選擇要前往的頁面</p>
        </header>

        <div class="grid gap-6 md:grid-cols-2">

            <a href="./quiz/" class="block bg-white rounded-3xl shadow-lg overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all">
                <div class="h-2 bg-gradient-to-r from-gray-700 via-gray-900 to-black"></div>
                <div class="p-6">
                    <h2 class="text-xl font-black">出國發展風險評估</h2>
                    <p class="mt-2 text-sm text-gray-500 leading-relaxed">打工換宿／語言學校風險深度測驗，快速評估成長還是技能倒退。</p>
                </div>
            </a>

            <a href="./game/" class="block bg-white rounded-3xl shadow-lg overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all">
                <div class="h-2 bg-gradient-to-r from-indigo-500 via-purple-600 to-black"></div>
                <div class="p-6">
                    <h2 class="text-xl font-black">Hollow Slayer</h2>
                    <p class="mt-2 text-sm text-gray-500 leading-relaxed">Abyssal Ruins — 2D 動作平台遊戲，支援手機操作。</p>
                </div>
            </a>

            <a href="./profile/" class="block bg-white rounded-3xl shadow-lg overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all">
                <div class="h-2 bg-gradient-to-r from-emerald-500 via-teal-600 to-black"></div>
                <div class="p-6">
                    <h2 class="text-xl font-black">ZHE's Terminal</h2>
                    <p class="mt-2 text-sm text-gray-500 leading-relaxed">個人介紹頁面。</p>
                </div>
            </a>

            <a href="./csharp/" class="block bg-white rounded-3xl shadow-lg overflow-hidden hover:shadow-xl hover:-translate-y-1 transition-all">
                <div class="h-2 bg-gradient-to-r from-blue-500 via-sky-600 to-black"></div>
                <div class="p-6">
                    <h2 class="text-xl font-black">C# 面試 200 題</h2>
                    <p class="mt-2 text-sm text-gray-500 leading-relaxed">C# 面試題庫測驗，手機完美版。</p>
                </div>
            </a>

        </div>

        <footer class="mt-12 text-center text-xs text-gray-400">
            philippe8910.github.io
        </footer>
    </div>

</body>
</html>
