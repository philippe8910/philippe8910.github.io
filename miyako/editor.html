<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>宮子地圖編輯器</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #14161c; color: #d5dbe8;
               font: 13px "Microsoft JhengHei", sans-serif; }
  #bar { position: fixed; left: 0; top: 0; right: 0; height: 44px; background: #1c202a;
         display: flex; align-items: center; gap: 6px; padding: 0 10px; z-index: 5;
         border-bottom: 1px solid #2a3040; flex-wrap: nowrap; overflow-x: auto; }
  #bar button { background: #2a3245; color: #cfd8ea; border: 1px solid #3a4460; border-radius: 4px;
                padding: 5px 10px; cursor: pointer; white-space: nowrap; }
  #bar button.on { background: #3d6fd8; color: #fff; border-color: #5b8bf0; }
  #bar button.warn { background: #7a2f38; border-color: #a5495a; }
  #bar .sep { width: 1px; height: 26px; background: #333c50; margin: 0 4px; flex: none; }
  #cv { position: absolute; inset: 44px 0 0 0; cursor: grab; }
  #props { position: fixed; right: 10px; top: 54px; width: 230px; background: #1c202add;
           border: 1px solid #2a3040; border-radius: 8px; padding: 10px; display: none; z-index: 5; }
  #props h3 { margin: 0 0 8px; font-size: 14px; color: #8fb4ff; }
  #props label { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; }
  #props input, #props select { width: 120px; background: #12141a; color: #d5dbe8;
           border: 1px solid #3a4460; border-radius: 3px; padding: 3px 6px; }
  #props .del { width: 100%; margin-top: 8px; background: #7a2f38; color: #fff; border: none;
                border-radius: 4px; padding: 6px; cursor: pointer; }
  #status { position: fixed; left: 10px; bottom: 8px; color: #7f8aa3; z-index: 5;
            background: #1c202acc; padding: 3px 10px; border-radius: 4px; }
  #help { position: fixed; right: 10px; bottom: 8px; color: #6f7a92; z-index: 5;
          background: #1c202acc; padding: 3px 10px; border-radius: 4px; }
</style>
</head>

<div id="bar">

    const [sx, sy] = W2S(s.x, s.y), sw = s.w * scale, sh = s.h * scale;
    const thin = s.h <= 30;
    ctx.fillStyle = thin ? "#46be6e" : "#5f6473";
    ctx.fillRect(sx, sy, sw, Math.max(sh, 2));
    if (s === sel) { ctx.strokeStyle = "#ffd75e"; ctx.lineWidth = 2; ctx.strokeRect(sx - 2, sy - 2, sw + 4, Math.max(sh, 2) + 4); ctx.lineWidth = 1;
      ctx.fillStyle = "#ffd75e"; ctx.fillRect(sx - 5, sy - 5, 10, 10); ctx.fillRect(sx + sw - 5, sy - 5, 10, 10); }
  }
  // 電梯
  data.elevators.forEach((e, i) => {
    const [x0, y0] = W2S(e.x, e.top), [x1, y1] = W2S(e.x + e.w, e.bottom);
    ctx.strokeStyle = e === sel ? "#ffd75e" : "#e05a5a"; ctx.setLineDash([5, 6]);
    ctx.strokeRect(x0, y0, x1 - x0, y1 - y0); ctx.setLineDash([]);
    ctx.fillStyle = e === sel ? "#ffd75e" : "#e05a5a";
    ctx.beginPath(); ctx.moveTo((x0 + x1) / 2, y1 - 10); ctx.lineTo(x0 + 2, y1 - 1); ctx.lineTo(x1 - 2, y1 - 1); ctx.fill();
    ctx.fillText("E" + (i + 1), (x0 + x1) / 2 - 7, y0 - 4);
  });
  // 存檔點
  data.checkpoints.forEach((c, i) => {
    const [sx, sy] = W2S(c.x, c.y);
    ctx.strokeStyle = ctx.fillStyle = c === sel ? "#ffd75e" : "#5aaaff";
    ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy - 22); ctx.stroke(); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(sx, sy - 22); ctx.lineTo(sx + 13, sy - 17); ctx.lineTo(sx, sy - 12); ctx.fill();
    ctx.fillText("CP" + i, sx - 10, sy + 12);
  });
  // 敵人
  data.spawns.forEach((e, i) => {
    const [sx, sy] = W2S(e.x, e.y);
    const c = KC[e.kind] || "#fff";
    if (e.range) { ctx.strokeStyle = c; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.moveTo(sx - e.range * scale, sy - 2); ctx.lineTo(sx + e.range * scale, sy - 2); ctx.stroke(); ctx.globalAlpha = 1; }
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(sx, sy - 9, e === sel ? 7 : 5, 0, 7); ctx.fill();
    if (e === sel) { ctx.strokeStyle = "#ffd75e"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(sx, sy - 9, 10, 0, 7); ctx.stroke(); ctx.lineWidth = 1; }
    ctx.fillText(e.kind + i, sx - 12, sy - 20);
  });
  ctx.setTransform(1, 0, 0, 1, 0, 0);
}

function hitTest(wx, wy) {
  const tol = 12 / scale;
  for (let i = data.spawns.length - 1; i >= 0; i--) {
    const e = data.spawns[i];
    if (Math.abs(wx - e.x) < tol && Math.abs(wy - e.y + 9) < tol + 14) return { t: "spawn", o: e };
  }
  for (let i = data.checkpoints.length - 1; i >= 0; i--) {
    const c = data.checkpoints[i];
    if (Math.abs(wx - c.x) < tol && wy > c.y - 26 / scale && wy < c.y + tol) return { t: "cp", o: c };
  }
  for (let i = data.elevators.length - 1; i >= 0; i--) {
    const e = data.elevators[i];
    if (wx > e.x - tol && wx < e.x + e.w + tol && wy > e.top - tol && wy < e.bottom + tol &&
        (Math.abs(wx - e.x) < tol || Math.abs(wx - e.x - e.w) < tol || Math.abs(wy - e.bottom) < 26 / scale)) return { t: "elev", o: e };
  }
  for (let i = data.solids.length - 1; i >= 0; i--) {
    const s = data.solids[i];
    if (wx > s.x - tol / 2 && wx < s.x + s.w + tol / 2 && wy > s.y - tol / 2 && wy < s.y + Math.max(s.h, 8) + tol / 2) return { t: "solid", o: s };
  }
  return null;
}

cv.addEventListener("mousedown", ev => {
  const [wx, wy] = S2W(ev.offsetX, ev.offsetY + 44);
  if (mode !== "select") { addAt(wx, wy); return; }
  // 選取中的 solid：把手優先
  if (sel && data.solids.includes(sel)) {
    const tol = 12 / scale;
    if (Math.abs(wy - sel.y) < tol * 1.5) {
      if (Math.abs(wx - sel.x) < tol) { pushUndo(); drag = { type: "resizeL" }; return; }
      if (Math.abs(wx - sel.x - sel.w) < tol) { pushUndo(); drag = { type: "resizeR" }; return; }
    }
  }
  const hit = hitTest(wx, wy);
  if (hit) {
    sel = hit.o; showProps();
    pushUndo();
    drag = { type: "move", dx: wx - (sel.x || 0), dy: wy - (sel.y || sel.top || 0) };
  } else {
    sel = null; showProps();
    drag = { type: "pan", sx: ev.clientX, sy: ev.clientY, ox0: ox, oy0: oy };
    cv.style.cursor = "grabbing";
  }
  draw();
});
addEventListener("mousemove", ev => {
  const r = cv.getBoundingClientRect();
  const [wx, wy] = S2W(ev.clientX - r.left, ev.clientY - r.top + 44);
  hoverXY = [Math.round(wx), Math.round(wy)];
  document.getElementById("status").textContent =
    `座標 ${hoverXY[0]}, ${hoverXY[1]}　縮放 ${(scale * 100) | 0}%　跳台可跳高≈195 距≈280`;
  if (!drag) return;
  if (drag.type === "pan") { ox = drag.ox0 - (ev.clientX - drag.sx) / scale; oy = drag.oy0 - (ev.clientY - drag.sy) / scale; }
  else if (drag.type === "move" && sel) {
    if (data.spawns.includes(sel) || data.checkpoints.includes(sel)) { sel.x = snap(wx - drag.dx); sel.y = nearestFloorOrPlat(snap(wy)); }
    else if (data.elevators.includes(sel)) { sel.x = snap(wx - drag.dx); }
    else { sel.x = snap(wx - drag.dx); sel.y = snap(wy - drag.dy); }
    showProps();
  }
  else if (drag.type === "resizeL" && sel) { const r2 = sel.x + sel.w; sel.x = Math.min(snap(wx), r2 - 40); sel.w = r2 - sel.x; showProps(); }
  else if (drag.type === "resizeR" && sel) { sel.w = Math.max(40, snap(wx) - sel.x); showProps(); }
  draw();
});
addEventListener("mouseup", () => { if (drag && drag.type !== "pan") save(); drag = null; cv.style.cursor = "grab"; });
cv.addEventListener("wheel", ev => {
  ev.preventDefault();
  const [wx, wy] = S2W(ev.offsetX, ev.offsetY + 44);
  scale = Math.min(3, Math.max(0.04, scale * (ev.deltaY < 0 ? 1.15 : 1 / 1.15)));
  ox = wx - ev.offsetX / scale; oy = wy - ev.offsetY / scale;
  draw();
}, { passive: false });

// 敵人/存檔點放置時吸附到最近樓層或跳台頂
function nearestFloorOrPlat(y) {
  let best = nearestFloor(y), bd = Math.abs(best - y);
  for (const s of data.solids) if (s.h <= 30 && Math.abs(s.y - y) < bd) { best = s.y; bd = Math.abs(s.y - y); }
  return best;
}

function addAt(wx, wy) {
  pushUndo();
  const x = snap(wx), y = snap(wy);
  let o;
  if (mode === "plat") { o = { x: x - 60, y, w: 130, h: 16 }; data.solids.push(o); }
  else if (mode === "slab") { o = { x: x - 200, y: nearestFloor(y), w: 400, h: 90 }; data.solids.push(o); }
  else if (mode === "wall") { o = { x, y: y - 250, w: 40, h: 500 }; data.solids.push(o); }
  else if (mode === "elev") {
    const bot = nearestFloor(y); const ti = FLOORS.indexOf(bot);
    o = { x: x - 70, w: 140, top: FLOORS[Math.min(ti + 1, FLOORS.length - 1)], bottom: bot };
    data.elevators.push(o);
  }
  else if (mode === "cp") { o = { x, y: nearestFloorOrPlat(y) }; data.checkpoints.push(o); }
  else { o = { x, y: nearestFloorOrPlat(y), range: 90, kind: mode }; data.spawns.push(o); }
  sel = o; setMode("select"); save(); draw(); showProps();
}

function listOf(o) {
  if (data.solids.includes(o)) return ["solids", data.solids];
  if (data.elevators.includes(o)) return ["elevators", data.elevators];
  if (data.checkpoints.includes(o)) return ["checkpoints", data.checkpoints];
  return ["spawns", data.spawns];
}

function showProps() {
  const p = document.getElementById("props");
  if (!sel) { p.style.display = "none"; return; }
  const [kind, list] = listOf(sel);
  const title = { solids: sel.h <= 30 ? "跳台 P" + data.solids.filter(s => s.h <= 30).indexOf(sel) : "樓板/牆",
                  elevators: "電梯 E" + (data.elevators.indexOf(sel) + 1),
                  checkpoints: "存檔點 CP" + data.checkpoints.indexOf(sel),
                  spawns: "敵人 " + sel.kind + data.spawns.indexOf(sel) }[kind];
  let h = `<h3>${title}</h3>`;
  for (const f of Object.keys(sel)) {
    if (f === "c") continue;
    if (f === "kind") {
      h += `<label>kind <select data-f="kind">${Object.keys(KC).map(k => `<option ${k === sel.kind ? "selected" : ""}>${k}</option>`).join("")}</select></label>`;
    } else h += `<label>${f} <input type="number" step="10" data-f="${f}" value="${sel[f]}"></label>`;
  }
  h += `<button class="del">刪除 (Del)</button>`;
  p.innerHTML = h; p.style.display = "block";
  p.querySelectorAll("input,select").forEach(inp => inp.onchange = () => {
    pushUndo();
    sel[inp.dataset.f] = inp.tagName === "SELECT" ? inp.value : +inp.value;
    save(); draw();
  });
  p.querySelector(".del").onclick = del;
}

function del() {
  if (!sel) return;
  pushUndo();
  const [, list] = listOf(sel);
  list.splice(list.indexOf(sel), 1);
  sel = null; save(); draw(); showProps();
}

addEventListener("keydown", ev => {
  if (ev.target.tagName === "INPUT" || ev.target.tagName === "SELECT") return;
  if (ev.key === "Delete" || ev.key === "Backspace") del();
  if ((ev.ctrlKey && ev.key.toLowerCase() === "z") || ev.key.toLowerCase() === "z") undo();
});

function setMode(m) {
  mode = m;
  document.querySelectorAll("#bar button[data-mode]").forEach(b => b.classList.toggle("on", b.dataset.mode === m));
  cv.style.cursor = m === "select" ? "grab" : "crosshair";
}
document.querySelectorAll("#bar button[data-mode]").forEach(b => b.onclick = () => setMode(b.dataset.mode));
document.getElementById("undoB").onclick = undo;
document.getElementById("exportB").onclick = () => {
  const j = JSON.stringify(data, null, 1);
  try { navigator.clipboard.writeText(j); } catch (e) {}
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([j], { type: "application/json" }));
  a.download = "map_edit.json"; a.click();
  alert("已下載 map_edit.json（也已複製到剪貼簿）。把檔案或內容交給 Claude 套用。");
};
document.getElementById("importB").onclick = () => {
  const j = prompt("貼上 JSON：");
  if (!j) return;
  try { const d = JSON.parse(j); if (!d.solids) throw 0; pushUndo(); data = d; sel = null; save(); draw(); }
  catch (e) { alert("JSON 無效"); }
};
document.getElementById("resetB").onclick = () => {
  if (!confirm("放棄所有編輯，還原成遊戲目前配置？")) return;
  pushUndo(); data = JSON.parse(JSON.stringify(INITIAL)); sel = null; save(); draw(); showProps();
};

fitCanvas();
</script>
</body>
</html>
