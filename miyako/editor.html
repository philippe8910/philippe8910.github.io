<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>宮子地圖編輯器</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #14161c; color: #d5dbe8;
               font: 13px "Microsoft JhengHei", sans-serif; }
  #bar { position: fixed; left: 0; top: 0; right: 0; height: 44px; background: #1c202a;
         display: flex; align-items: center; gap: 6px; padding: 0 10px; z-index: 5;
         border-bottom: 1px solid #2a3040; flex-wrap: nowrap; overflow-x: auto; }
  #bar button { background: #2a3245; color: #cfd8ea; border: 1px solid #3a4460; border-radius: 4px;
                padding: 5px 10px; cursor: pointer; white-space: nowrap; }
  #bar button.on { background: #3d6fd8; color: #fff; border-color: #5b8bf0; }
  #bar button.warn { background: #7a2f38; border-color: #a5495a; }
  #bar .sep { width: 1px; height: 26px; background: #333c50; margin: 0 4px; flex: none; }
  #cv { position: absolute; inset: 44px 0 0 0; cursor: grab; }
  #props { position: fixed; right: 10px; top: 54px; width: 230px; background: #1c202add;
           border: 1px solid #2a3040; border-radius: 8px; padding: 10px; display: none; z-index: 5; }
  #props h3 { margin: 0 0 8px; font-size: 14px; color: #8fb4ff; }
  #props label { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; }
  #props input, #props select { width: 120px; background: #12141a; color: #d5dbe8;
           border: 1px solid #3a4460; border-radius: 3px; padding: 3px 6px; }
  #props .del { width: 100%; margin-top: 8px; background: #7a2f38; color: #fff; border: none;
                border-radius: 4px; padding: 6px; cursor: pointer; }
  #status { position: fixed; left: 10px; bottom: 8px; color: #7f8aa3; z-index: 5;
            background: #1c202acc; padding: 3px 10px; border-radius: 4px; }
  #help { position: fixed; right: 10px; bottom: 8px; color: #6f7a92; z-index: 5;
          background: #1c202acc; padding: 3px 10px; border-radius: 4px; }
</style>
</head>
<body>
<div id="bar">
  <button data-mode="select" class="on">選取/移動</button>
  <div class="sep"></div>
  <button data-mode="plat">＋跳台</button>
  <button data-mode="slab">＋樓板</button>
  <button data-mode="wall">＋牆</button>
  <button data-mode="elev">＋電梯</button>
  <button data-mode="cp">＋存檔點</button>
  <button data-mode="moverh">＋移動台↔</button>
  <button data-mode="moverv">＋移動台↕</button>
  <button data-mode="item">＋道具</button>
  <button data-mode="gate">＋單向門</button>
  <div class="sep"></div>
  <button data-mode="pmc">＋pmc</button>
  <button data-mode="pmc2">＋pmc2</button>
  <button data-mode="sgtrooper">＋霰彈</button>
  <button data-mode="shield">＋盾兵</button>
  <button data-mode="turret">＋砲台</button>
  <button data-mode="rocket">＋火箭</button>
  <div class="sep"></div>
  <button id="sightB" class="on">感應範圍</button>
  <button id="undoB">復原(Z)</button>
  <button id="exportB">匯出JSON</button>
  <button id="importB">匯入JSON</button>
  <button id="resetB" class="warn">還原初始</button>
</div>
<canvas id="cv"></canvas>
<div id="props"></div>
<div id="status"></div>
<div id="help">拖空白=平移｜滾輪=縮放｜拖元素=移動(吸附10px)｜選取後拉兩側把手=調寬｜Del=刪除｜Ctrl+Z=復原</div>

const undoStack = [];

function pushUndo() { undoStack.push(JSON.stringify(data)); if (undoStack.length > 120) undoStack.shift(); }
function undo() { if (undoStack.length) { data = JSON.parse(undoStack.pop()); sel = null; save(); draw(); showProps(); } }
function save() { localStorage.setItem("miyako_map_edit", JSON.stringify(data)); }
function W2S(x, y) { return [(x - ox) * scale, (y - oy) * scale + 44]; }
function S2W(px, py) { return [px / scale + ox, (py - 44) / scale + oy]; }
function snap(v) { return Math.round(v / 10) * 10; }
function nearestFloor(y) { let best = FLOORS[0]; for (const f of FLOORS) if (Math.abs(f - y) < Math.abs(best - y)) best = f; return best; }

function fitCanvas() {
  cv.width = innerWidth; cv.height = innerHeight - 44;

function draw() {
  ctx.setTransform(1, 0, 0, 1, 0, -44);
  ctx.fillStyle = "#14161c"; ctx.fillRect(0, 44, cv.width, cv.height);

    const [sx] = W2S(gx, 0);

    ctx.beginPath(); ctx.moveTo(sx, 44); ctx.lineTo(sx, cv.height + 44); ctx.stroke();
    if (gx % 1000 === 0) { ctx.fillStyle = "#5b6580"; ctx.fillText(gx, sx + 3, 58); }
  }
  for (let gy = Math.floor(wy0 / 200) * 200; gy < wy1; gy += 200) {
    const [, sy] = W2S(0, gy);
    ctx.strokeStyle = gy % 600 ? "#1b1e27" : "#242938";
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(cv.width, sy); ctx.stroke();
    if (gy % 600 === 0) { ctx.fillStyle = "#5b6580"; ctx.fillText(gy, 4, sy - 3); }
  }
  // Boss 房（參考，不可編輯）
  {
    const [x0, y0] = W2S(440, 100), [x1, y1] = W2S(2800, 600);
    ctx.strokeStyle = "#c0504f"; ctx.lineWidth = 2; ctx.strokeRect(x0, y0, x1 - x0, y1 - y0);

    ctx.lineWidth = 1;
  }
  // SOLIDS
  for (const s of data.solids) {
    const [sx, sy] = W2S(s.x, s.y), sw = s.w * scale, sh = s.h * scale;
    const thin = s.h <= 30;
    ctx.fillStyle = thin ? "#46be6e" : "#5f6473";
    ctx.fillRect(sx, sy, sw, Math.max(sh, 2));
    if (s === sel) { ctx.strokeStyle = "#ffd75e"; ctx.lineWidth = 2; ctx.strokeRect(sx - 2, sy - 2, sw + 4, Math.max(sh, 2) + 4); ctx.lineWidth = 1;
      ctx.fillStyle = "#ffd75e"; ctx.fillRect(sx - 5, sy - 5, 10, 10); ctx.fillRect(sx + sw - 5, sy - 5, 10, 10); }
  }
  // 電梯
  data.elevators.forEach((e, i) => {
    const [x0, y0] = W2S(e.x, e.top), [x1, y1] = W2S(e.x + e.w, e.bottom);
    ctx.strokeStyle = e === sel ? "#ffd75e" : "#e05a5a"; ctx.setLineDash([5, 6]);
    ctx.strokeRect(x0, y0, x1 - x0, y1 - y0); ctx.setLineDash([]);
    ctx.fillStyle = e === sel ? "#ffd75e" : "#e05a5a";
    ctx.beginPath(); ctx.moveTo((x0 + x1) / 2, y1 - 10); ctx.lineTo(x0 + 2, y1 - 1); ctx.lineTo(x1 - 2, y1 - 1); ctx.fill();
    ctx.fillText("E" + (i + 1) + (e.lock ? "🔒" + e.lock : ""), (x0 + x1) / 2 - 7, y0 - 4);
  });
  // 存檔點
  data.checkpoints.forEach((c, i) => {
    const [sx, sy] = W2S(c.x, c.y);
    ctx.strokeStyle = ctx.fillStyle = c === sel ? "#ffd75e" : "#5aaaff";
    ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy - 22); ctx.stroke(); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(sx, sy - 22); ctx.lineTo(sx + 13, sy - 17); ctx.lineTo(sx, sy - 12); ctx.fill();
    ctx.fillText("CP" + i, sx - 10, sy + 12);
  });
  // 敵人感應範圍（半透明框：水平 ±sight、垂直 ±sightV）
  if (showSight) data.spawns.forEach(e => {
    const [sh, sv] = SIGHT(e.kind);
    const [x0, y0] = W2S(e.x - sh, e.y - sv), [x1, y1] = W2S(e.x + sh, e.y + sv);
    ctx.fillStyle = KC[e.kind] || "#fff"; ctx.globalAlpha = e === sel ? 0.12 : 0.045;
    ctx.fillRect(x0, y0, x1 - x0, y1 - y0);
    if (e === sel) { ctx.globalAlpha = 0.5; ctx.strokeStyle = KC[e.kind]; ctx.strokeRect(x0, y0, x1 - x0, y1 - y0); }
    ctx.globalAlpha = 1;
  });
  // 移動平台（青色 + 來回路徑）
  data.movers.forEach((m, i) => {
    const [sx, sy] = W2S(m.x, m.y), sw = m.w * scale;
    const ex = m.axis === "x" ? m.x + m.dist : m.x, ey = m.axis === "y" ? m.y + m.dist : m.y;
    const [tx, ty] = W2S(ex, ey);
    ctx.strokeStyle = "#3ec8c8"; ctx.setLineDash([4, 5]);
    ctx.beginPath(); ctx.moveTo(sx + sw / 2, sy); ctx.lineTo(tx + sw / 2, ty); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = m === sel ? "#ffd75e" : "#3ec8c8";
    ctx.fillRect(sx, sy, sw, 5);
    ctx.fillRect(tx, ty, sw, 3);
    ctx.fillText("M" + i + (m.axis === "x" ? "↔" : "↕"), sx, sy - 5);
    if (m === sel) { ctx.strokeStyle = "#ffd75e"; ctx.strokeRect(sx - 2, sy - 2, sw + 4, 9); }
  });
  // 單向門（紫牆＋開啟側箭頭與觸發區）
  data.gates.forEach((g, i) => {
    const [sx, sy] = W2S(g.x, g.y), sw = g.w * scale, sh = g.h * scale;
    ctx.fillStyle = g === sel ? "#8a6ab5" : "#5e4a85";
    ctx.fillRect(sx, sy, sw, sh);
    const tw = 70 * scale;
    const tx = g.side === "left" ? sx - tw : sx + sw;
    ctx.fillStyle = "rgba(220,170,255,.18)";
    ctx.fillRect(tx, sy, tw, sh);
    ctx.fillStyle = "#dcaaff";
    const ax = g.side === "left" ? sx - 8 : sx + sw + 8, dir = g.side === "left" ? 1 : -1;
    const ay = sy + sh - 12;

    ctx.closePath(); ctx.fill();
    ctx.fillText("G" + i + "(" + (g.side === "left" ? "左開" : "右開") + ")", sx, sy - 5);
    if (g === sel) { ctx.strokeStyle = "#ffd75e"; ctx.lineWidth = 2; ctx.strokeRect(sx - 2, sy - 2, sw + 4, sh + 4); ctx.lineWidth = 1; }
  });
  // 道具（菱形）
  data.items.forEach((it, i) => {
    const [sx, sy0] = W2S(it.x, it.y);
    const sy = sy0 - 16;
    const c = ITEM_COL[it.type] || "#fff";
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.moveTo(sx, sy - 9); ctx.lineTo(sx + 7, sy); ctx.lineTo(sx, sy + 9); ctx.lineTo(sx - 7, sy);
    ctx.closePath(); ctx.fill();
    if (it === sel) { ctx.strokeStyle = "#ffd75e"; ctx.lineWidth = 2; ctx.stroke(); ctx.lineWidth = 1; }
    const lbl = it.type === "char" ? (CARD_NAMES[it.card] || "角色?") : it.type === "skin" ? (SKIN_NAMES[it.skin] || "造型") : "鑰匙" + (it.id || "?");
    ctx.fillText(lbl, sx - 12, sy - 13);
  });

  data.spawns.forEach((e, i) => {
    const [sx, sy] = W2S(e.x, e.y);
    const c = KC[e.kind] || "#fff";

      ctx.beginPath(); ctx.moveTo(sx - e.range * scale, sy - 2); ctx.lineTo(sx + e.range * scale, sy - 2); ctx.stroke(); ctx.globalAlpha = 1; }
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(sx, sy - 9, e === sel ? 7 : 5, 0, 7); ctx.fill();
    if (e === sel) { ctx.strokeStyle = "#ffd75e"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(sx, sy - 9, 10, 0, 7); ctx.stroke(); ctx.lineWidth = 1; }
    ctx.fillText(e.kind + i, sx - 12, sy - 20);
  });
  ctx.setTransform(1, 0, 0, 1, 0, 0);
}

function hitTest(wx, wy) {
  const tol = 12 / scale;
  for (let i = data.items.length - 1; i >= 0; i--) {
    const it = data.items[i];
    if (Math.abs(wx - it.x) < tol && Math.abs(wy - (it.y - 16 / scale)) < tol + 12 / scale) return { t: "item", o: it };
  }
  for (let i = data.gates.length - 1; i >= 0; i--) {
    const g = data.gates[i];
    if (wx > g.x - tol / 2 && wx < g.x + g.w + tol / 2 && wy > g.y - tol / 2 && wy < g.y + g.h + tol / 2) return { t: "gate", o: g };
  }
  for (let i = data.movers.length - 1; i >= 0; i--) {
    const m = data.movers[i];
    if (wx > m.x - tol / 2 && wx < m.x + m.w + tol / 2 && Math.abs(wy - m.y) < tol) return { t: "mover", o: m };
  }
  for (let i = data.spawns.length - 1; i >= 0; i--) {
    const e = data.spawns[i];
    if (Math.abs(wx - e.x) < tol && Math.abs(wy - e.y + 9) < tol + 14) return { t: "spawn", o: e };
  }
  for (let i = data.checkpoints.length - 1; i >= 0; i--) {
    const c = data.checkpoints[i];
    if (Math.abs(wx - c.x) < tol && wy > c.y - 26 / scale && wy < c.y + tol) return { t: "cp", o: c };
  }
  for (let i = data.elevators.length - 1; i >= 0; i--) {
    const e = data.elevators[i];
    if (wx > e.x - tol && wx < e.x + e.w + tol && wy > e.top - tol && wy < e.bottom + tol &&
        (Math.abs(wx - e.x) < tol || Math.abs(wx - e.x - e.w) < tol || Math.abs(wy - e.bottom) < 26 / scale)) return { t: "elev", o: e };
  }
  for (let i = data.solids.length - 1; i >= 0; i--) {
    const s = data.solids[i];
    if (wx > s.x - tol / 2 && wx < s.x + s.w + tol / 2 && wy > s.y - tol / 2 && wy < s.y + Math.max(s.h, 8) + tol / 2) return { t: "solid", o: s };
  }
  return null;
}

cv.addEventListener("mousedown", ev => {
  const [wx, wy] = S2W(ev.offsetX, ev.offsetY + 44);
  if (mode !== "select") { addAt(wx, wy); return; }
  // 選取中的 solid：把手優先
  if (sel && data.solids.includes(sel)) {
    const tol = 12 / scale;
    if (Math.abs(wy - sel.y) < tol * 1.5) {
      if (Math.abs(wx - sel.x) < tol) { pushUndo(); drag = { type: "resizeL" }; return; }
      if (Math.abs(wx - sel.x - sel.w) < tol) { pushUndo(); drag = { type: "resizeR" }; return; }
    }
  }
  const hit = hitTest(wx, wy);
  if (hit) {
    sel = hit.o; showProps();
    pushUndo();
    drag = { type: "move", dx: wx - (sel.x || 0), dy: wy - (sel.y || sel.top || 0) };
  } else {
    sel = null; showProps();
    drag = { type: "pan", sx: ev.clientX, sy: ev.clientY, ox0: ox, oy0: oy };
    cv.style.cursor = "grabbing";
  }
  draw();
});
addEventListener("mousemove", ev => {
  const r = cv.getBoundingClientRect();
  const [wx, wy] = S2W(ev.clientX - r.left, ev.clientY - r.top + 44);
  hoverXY = [Math.round(wx), Math.round(wy)];
  document.getElementById("status").textContent =
    `座標 ${hoverXY[0]}, ${hoverXY[1]}　縮放 ${(scale * 100) | 0}%　跳台可跳高≈195 距≈280`;
  if (!drag) return;
  if (drag.type === "pan") { ox = drag.ox0 - (ev.clientX - drag.sx) / scale; oy = drag.oy0 - (ev.clientY - drag.sy) / scale; }
  else if (drag.type === "move" && sel) {
    if (data.spawns.includes(sel) || data.checkpoints.includes(sel) || data.items.includes(sel)) { sel.x = snap(wx - drag.dx); sel.y = nearestFloorOrPlat(snap(wy)); }
    else if (data.elevators.includes(sel)) { sel.x = snap(wx - drag.dx); }
    else { sel.x = snap(wx - drag.dx); sel.y = snap(wy - drag.dy); }
    showProps();
  }
  else if (drag.type === "resizeL" && sel) { const r2 = sel.x + sel.w; sel.x = Math.min(snap(wx), r2 - 40); sel.w = r2 - sel.x; showProps(); }
  else if (drag.type === "resizeR" && sel) { sel.w = Math.max(40, snap(wx) - sel.x); showProps(); }
  draw();
});
addEventListener("mouseup", () => { if (drag && drag.type !== "pan") save(); drag = null; cv.style.cursor = "grab"; });
cv.addEventListener("wheel", ev => {
  ev.preventDefault();
  const [wx, wy] = S2W(ev.offsetX, ev.offsetY + 44);
  scale = Math.min(3, Math.max(0.04, scale * (ev.deltaY < 0 ? 1.15 : 1 / 1.15)));
  ox = wx - ev.offsetX / scale; oy = wy - ev.offsetY / scale;
  draw();
}, { passive: false });

// 敵人/存檔點放置時吸附到最近樓層或跳台頂
function nearestFloorOrPlat(y) {
  let best = nearestFloor(y), bd = Math.abs(best - y);
  for (const s of data.solids) if (s.h <= 30 && Math.abs(s.y - y) < bd) { best = s.y; bd = Math.abs(s.y - y); }
  return best;
}

function addAt(wx, wy) {
  pushUndo();
  const x = snap(wx), y = snap(wy);
  let o;
  if (mode === "plat") { o = { x: x - 60, y, w: 130, h: 16 }; data.solids.push(o); }
  else if (mode === "slab") { o = { x: x - 200, y: nearestFloor(y), w: 400, h: 90 }; data.solids.push(o); }
  else if (mode === "wall") { o = { x, y: y - 250, w: 40, h: 500 }; data.solids.push(o); }
  else if (mode === "elev") {
    const bot = nearestFloor(y); const ti = FLOORS.indexOf(bot);
    o = { x: x - 70, w: 140, top: FLOORS[Math.min(ti + 1, FLOORS.length - 1)], bottom: bot };
    data.elevators.push(o);
  }
  else if (mode === "cp") { o = { x, y: nearestFloorOrPlat(y) }; data.checkpoints.push(o); }
  else if (mode === "moverh") { o = { x: x - 90, y, w: 180, axis: "x", dist: 260, speed: 120 }; data.movers.push(o); }
  else if (mode === "moverv") { o = { x: x - 90, y, w: 180, axis: "y", dist: -220, speed: 110 }; data.movers.push(o); }
  else if (mode === "item") { o = { x, y: nearestFloorOrPlat(y), type: "key", id: "K1" }; data.items.push(o); }
  else if (mode === "gate") { const fy2 = nearestFloor(y); o = { x, y: fy2 - 230, w: 40, h: 230, side: "left" }; data.gates.push(o); }
  else { o = { x, y: nearestFloorOrPlat(y), range: 90, kind: mode }; data.spawns.push(o); }
  sel = o; setMode("select"); save(); draw(); showProps();
}

function listOf(o) {
  if (data.solids.includes(o)) return ["solids", data.solids];
  if (data.elevators.includes(o)) return ["elevators", data.elevators];
  if (data.checkpoints.includes(o)) return ["checkpoints", data.checkpoints];
  if (data.movers.includes(o)) return ["movers", data.movers];
  if (data.gates.includes(o)) return ["gates", data.gates];
  if (data.items.includes(o)) return ["items", data.items];
  return ["spawns", data.spawns];
}

function showProps() {
  const p = document.getElementById("props");
  if (!sel) { p.style.display = "none"; return; }
  const [kind, list] = listOf(sel);
  const title = { solids: sel.h <= 30 ? "跳台 P" + data.solids.filter(s => s.h <= 30).indexOf(sel) : "樓板/牆",
                  elevators: "電梯 E" + (data.elevators.indexOf(sel) + 1),
                  checkpoints: "存檔點 CP" + data.checkpoints.indexOf(sel),
                  movers: "移動平台 M" + data.movers.indexOf(sel),
                  gates: "單向門 G" + data.gates.indexOf(sel) + "（side=可開啟側）",
                  items: "道具｜key鑰匙→填id並在電梯lock填同編號；char角色：7日鞠 8風華 9三千留",
                  spawns: "敵人 " + sel.kind + data.spawns.indexOf(sel) }[kind];
  let h = `<h3>${title}</h3>`;
  const SELECTS = { kind: Object.keys(KC), axis: ["x", "y"], type: ["key", "char", "skin"], side: ["left", "right"],
                    card: Object.keys(CARD_NAMES), skin: Object.keys(SKIN_NAMES) };
  const OPT_LABEL = { card: v => v + " " + CARD_NAMES[v], skin: v => v + "（" + SKIN_NAMES[v] + "）" };
  let fields = Object.keys(sel).filter(f => f !== "c");
  if (kind === "elevators" && !("lock" in sel)) fields.push("lock");     // 電梯鎖（空字串=無鎖）
  if (kind === "items") {
    if (sel.type === "char" && !("card" in sel)) fields.push("card");    // 7=日鞠 8=風華 9=三千留
    if (sel.type === "skin" && !("skin" in sel)) fields.push("skin");
    if (sel.type === "key" && !("id" in sel)) fields.push("id");
  }
  for (const f of fields) {
    if (SELECTS[f]) {
      h += `<label>${f} <select data-f="${f}">${SELECTS[f].map(k => `<option value="${k}" ${String(k) === String(sel[f]) ? "selected" : ""}>${OPT_LABEL[f] ? OPT_LABEL[f](k) : k}</option>`).join("")}</select></label>`;
    } else if (typeof sel[f] === "string" || f === "lock" || f === "id" || f === "skin") {
      h += `<label>${f} <input type="text" data-f="${f}" value="${sel[f] ?? ""}"></label>`;
    } else {
      h += `<label><span class="scrub" data-f="${f}" title="左右拖曳調值">${f} ⇔</span> <input type="number" step="10" data-f="${f}" value="${sel[f] ?? 0}"></label>`;
    }
  }
  h += `<button class="del">刪除 (Del)</button>`;
  p.innerHTML = h; p.style.display = "block";
  p.querySelectorAll("input,select").forEach(inp => inp.onchange = () => {
    pushUndo();
    const v = inp.type === "number" ? +inp.value : inp.value;
    if (v === "" || (inp.dataset.f === "lock" && !v)) delete sel[inp.dataset.f];
    else sel[inp.dataset.f] = inp.dataset.f === "card" ? +v : v;
    if (inp.dataset.f === "type") {                // 道具換類型 → 清掉不相干欄位再重建
      if (v !== "char") delete sel.card;
      if (v !== "skin") delete sel.skin;
      if (v !== "key") delete sel.id;
      if (v === "char") sel.card = sel.card || 7;
      if (v === "skin") sel.skin = sel.skin || "swim";
      if (v === "key") sel.id = sel.id || "K1";
      showProps();
    }
    save(); draw();
  });
  // 拖曳調值：按住欄名左右拖（每 4px = 10）
  p.querySelectorAll(".scrub").forEach(sp => {
    sp.style.cursor = "ew-resize"; sp.style.userSelect = "none"; sp.style.color = "#8fb4ff";
    sp.onmousedown = ev => {
      ev.preventDefault();
      pushUndo();
      const f = sp.dataset.f, x0 = ev.clientX, v0 = sel[f] || 0;
      const mv = e2 => { sel[f] = v0 + Math.round((e2.clientX - x0) / 4) * 10;
        const inp = p.querySelector(`input[data-f="${f}"]`); if (inp) inp.value = sel[f]; draw(); };
      const up = () => { removeEventListener("mousemove", mv); removeEventListener("mouseup", up); save(); };
      addEventListener("mousemove", mv); addEventListener("mouseup", up);
    };
  });
  p.querySelector(".del").onclick = del;
}

function del() {
  if (!sel) return;
  pushUndo();
  const [, list] = listOf(sel);
  list.splice(list.indexOf(sel), 1);
  sel = null; save(); draw(); showProps();
}

addEventListener("keydown", ev => {
  if (ev.target.tagName === "INPUT" || ev.target.tagName === "SELECT") return;
  if (ev.key === "Delete" || ev.key === "Backspace") del();
  if ((ev.ctrlKey && ev.key.toLowerCase() === "z") || ev.key.toLowerCase() === "z") undo();
});

function setMode(m) {
  mode = m;
  document.querySelectorAll("#bar button[data-mode]").forEach(b => b.classList.toggle("on", b.dataset.mode === m));
  cv.style.cursor = m === "select" ? "grab" : "crosshair";
}
document.querySelectorAll("#bar button[data-mode]").forEach(b => b.onclick = () => setMode(b.dataset.mode));
document.getElementById("undoB").onclick = undo;
document.getElementById("sightB").onclick = function () { showSight = !showSight; this.classList.toggle("on", showSight); draw(); };
document.getElementById("exportB").onclick = () => {
  const j = JSON.stringify(data, null, 1);
  try { navigator.clipboard.writeText(j); } catch (e) {}
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([j], { type: "application/json" }));
  a.download = "map_edit.json"; a.click();
  alert("已下載 map_edit.json（也已複製到剪貼簿）。把檔案或內容交給 Claude 套用。");
};
document.getElementById("importB").onclick = () => {
  const j = prompt("貼上 JSON：");
  if (!j) return;
  try { const d = JSON.parse(j); if (!d.solids) throw 0; pushUndo(); data = d; sel = null; save(); draw(); }
  catch (e) { alert("JSON 無效"); }
};
document.getElementById("resetB").onclick = () => {
  if (!confirm("放棄所有編輯，還原成遊戲目前配置？")) return;
  pushUndo(); data = JSON.parse(JSON.stringify(INITIAL)); sel = null; save(); draw(); showProps();
};

fitCanvas();
</script>
</body>
