<style>
:root{color-scheme:dark;--bg:#0b1016;--surface:#151d26;--surface2:#202b37;--surface3:#2a3745;--border:#344658;--text:#f2f5f8;--muted:#9eb0c0;--accent:#35c58a;--accent2:#72e8b7;--focus:#ffd166;--danger:#ff6b6b;--bar-h:64px;--side-w:224px}*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font:15px/1.45 Inter,"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;letter-spacing:0}button,input,select{font:inherit;letter-spacing:0}button{min-height:36px;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;cursor:pointer;white-space:nowrap;transition:background .14s,border-color .14s,box-shadow .14s}button:hover{background:var(--surface3);border-color:#60758b}button:active{transform:translateY(1px)}button:focus-visible,input:focus-visible,select:focus-visible,canvas:focus-visible{outline:3px solid var(--focus);outline-offset:2px}button.on,button[aria-pressed=true]{color:#effff8;background:#14513e;border-color:var(--accent2);box-shadow:inset 0 0 0 1px var(--accent),0 0 16px rgb(53 197 138 / 10%)}button.warn{color:#fff;background:#632e38;border-color:#9a4858}button.warn:hover{background:#793744;border-color:var(--danger)}button:disabled{opacity:.42;cursor:not-allowed}kbd{display:inline-grid;place-items:center;min-width:22px;height:21px;padding:0 5px;color:#eaf0f6;background:#111821;border:1px solid #526478;border-bottom-width:2px;border-radius:4px;font:600 11px/1 system-ui}
#bar{position:fixed;z-index:30;inset:0 0 auto;height:var(--bar-h);display:flex;align-items:center;gap:12px;padding:0 14px;background:linear-gradient(180deg,#19232e,#141c25);border-bottom:1px solid var(--border);box-shadow:0 5px 18px rgb(0 0 0 / 20%)}.brand{flex:none;display:flex;align-items:center;gap:10px;padding-right:16px}.brand-mark{width:34px;height:34px;display:grid;place-items:center;color:#092117;background:linear-gradient(145deg,var(--accent2),var(--accent));border-radius:9px;box-shadow:0 5px 16px rgb(53 197 138 / 20%);font-weight:900}.brand-copy{display:grid;line-height:1.12;white-space:nowrap}.brand-copy strong{font-size:15px}.brand-copy small{margin-top:3px;color:var(--muted);font-size:10px;letter-spacing:.12em;text-transform:uppercase}.top-actions{min-width:0;margin-left:auto;display:flex;align-items:center;gap:7px}.top-actions button{min-height:38px}.action-divider{width:1px;height:26px;margin:0 2px;background:var(--border)}.icon-button{width:38px;min-width:38px;padding:0!important;font-size:19px}
#toolbox{position:fixed;z-index:22;left:0;top:var(--bar-h);bottom:34px;width:var(--side-w);overflow-y:auto;overscroll-behavior:contain;padding:14px 12px 20px;background:linear-gradient(90deg,#141c25,#17212b);border-right:1px solid var(--border);scrollbar-width:thin;scrollbar-color:#4b6074 transparent}.tool-group{padding:0 0 14px;margin:0 0 14px;border-bottom:1px solid var(--border)}.tool-group:last-child{margin-bottom:0;border-bottom:0}.tool-group-label{display:flex;align-items:center;gap:8px;margin:0 2px 9px;color:var(--muted);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}.tool-group-label::after{content:"";height:1px;flex:1;background:#2c3b49}.tool-buttons{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}.tool-buttons button{min-width:0;width:100%;min-height:42px;padding:7px 6px;text-align:left;overflow:hidden;text-overflow:ellipsis}.tool-buttons button[data-mode]::before{content:attr(data-icon);display:inline-block;width:20px;margin-right:3px;color:var(--accent2);font-weight:900;text-align:center}.tool-buttons button.on::before{color:#fff}.tool-buttons .wide{grid-column:1/-1;text-align:center}
#cv{position:absolute;left:var(--side-w);top:var(--bar-h);right:0;bottom:34px;cursor:grab;background:radial-gradient(circle at 50% 10%,#121b25,var(--bg) 58%)}#props{position:fixed;z-index:24;right:14px;top:calc(var(--bar-h) + 14px);width:min(310px,calc(100vw - var(--side-w) - 28px));max-height:calc(100vh - var(--bar-h) - 62px);overflow:auto;padding:15px;display:none;color:var(--text);background:rgb(21 29 38 / 97%);border:1px solid #506174;border-radius:10px;box-shadow:0 16px 46px rgb(0 0 0 / 42%);backdrop-filter:blur(10px)}#props h3{margin:0 0 12px;padding-bottom:10px;color:var(--accent2);border-bottom:1px solid var(--border);font-size:15px;line-height:1.35}#props label{display:grid;grid-template-columns:minmax(72px,.8fr) minmax(120px,1.2fr);align-items:center;gap:10px;margin:8px 0;color:var(--muted)}#props input,#props select{width:100%;min-height:36px;padding:5px 8px;color:var(--text);background:#0d141c;border:1px solid var(--border);border-radius:6px}#props .scrub{color:#7fd7b2!important;cursor:ew-resize}#props .del{width:100%;margin-top:10px;color:#fff;background:#632e38;border-color:#9a4858}
#statusbar{position:fixed;z-index:25;left:var(--side-w);right:0;bottom:0;height:34px;display:flex;align-items:center;gap:18px;padding:0 12px;color:var(--muted);background:#090e13;border-top:1px solid var(--border);font-size:12px}#status{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}#modeStatus{color:var(--accent2);font-weight:800;white-space:nowrap}#saveStatus{margin-left:auto;white-space:nowrap}#helpB{flex:none;min-height:27px;height:27px;padding:2px 8px}
.overlay{position:fixed;z-index:100;inset:0;display:none;place-items:start center;padding:min(9vh,68px) 16px 40px;background:rgb(3 7 11 / 78%);overflow:auto}.overlay.open{display:grid}.dialog{width:min(720px,100%);max-height:82vh;overflow:auto;color:var(--text);background:var(--surface);border:1px solid #526478;border-radius:10px;box-shadow:0 22px 70px rgb(0 0 0 / 55%)}.dialog-head{position:sticky;z-index:1;top:0;display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border)}.dialog-head h2{flex:1;margin:0;font-size:18px}.dialog-body{padding:14px 16px 18px}.shortcut-grid{display:grid;grid-template-columns:minmax(185px,.9fr) 1.25fr;gap:1px;background:var(--border)}.shortcut-grid>div{min-height:44px;display:flex;align-items:center;gap:5px;padding:9px 11px;background:var(--surface)}.shortcut-grid .desc{color:var(--muted)}#commandInput{width:100%;min-height:42px;padding:8px 11px;color:var(--text);background:#0d141c;border:1px solid var(--border);border-radius:7px}#commandList{margin:10px 0 0;padding:0;list-style:none}#commandList button{width:100%;display:flex;align-items:center;gap:12px;padding:9px 11px;text-align:left;background:transparent;border-color:transparent}#commandList button:hover,#commandList button.active{background:var(--surface2);border-color:var(--border)}#commandList .cmd-key{margin-left:auto;color:var(--muted);font-size:12px}#toast{position:fixed;z-index:120;left:calc(50% + var(--side-w)/2);bottom:48px;max-width:min(520px,calc(100vw - var(--side-w) - 28px));translate:-50% 10px;padding:9px 14px;color:#eafff6;background:#092219;border:1px solid var(--accent);border-radius:7px;opacity:0;pointer-events:none;transition:opacity .16s,translate .16s}#toast.show{opacity:1;translate:-50% 0}.sr-only{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}@media(max-width:980px){:root{--side-w:194px}.brand-copy small{display:none}.top-actions{gap:5px}.top-actions button{padding-inline:8px}#sightB{font-size:0}#sightB::after{content:"範圍";font-size:13px}}@media(max-width:720px){:root{--bar-h:56px;--side-w:166px}html,body{font-size:14px}.brand-copy{display:none}.brand{padding-right:2px}.tool-buttons{grid-template-columns:1fr}.tool-buttons .wide{grid-column:auto}.top-actions #exportB,.top-actions #importB,.top-actions #resetB,.action-divider{display:none}#props{width:min(280px,calc(100vw - var(--side-w) - 16px));right:8px}.shortcut-grid{grid-template-columns:1fr}.shortcut-grid .desc{min-height:36px}#saveStatus{display:none}}@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important}}

</head>
<body>
<header id="bar" aria-label="地圖編輯工具列">
<div class="brand"><span class="brand-mark">M</span><span class="brand-copy"><strong>宮子地圖編輯器</strong><small>Map Editor Pro</small></span></div>
<div class="top-actions" role="group" aria-label="檔案與檢視操作"><button id="sightB" class="on" aria-pressed="true" title="切換感應範圍 (A)">感應範圍</button><span class="action-divider" aria-hidden="true"></span><button id="undoB" class="icon-button" title="復原 (Ctrl+Z)" aria-label="復原">↶</button><button id="redoB" class="icon-button" title="重做 (Ctrl+Y)" aria-label="重做">↷</button><button id="duplicateB" title="複製選取物件 (Ctrl+D)">⧉ 複製物件</button><button id="fitB" class="icon-button" title="顯示全部 (F)" aria-label="顯示全部">⊡</button><span class="action-divider" aria-hidden="true"></span><button id="exportB" title="匯出 JSON (Ctrl+Shift+S)">匯出</button><button id="importB" title="匯入 JSON (Ctrl+O)">匯入</button><input id="importFile" class="sr-only" type="file" accept="application/json,.json"><button id="resetB" class="warn">重設</button></div>
</header>
<nav id="toolbox" aria-label="物件工具">
<section class="tool-group" role="group" aria-label="編輯"><span class="tool-group-label">編輯</span><div class="tool-buttons"><button class="wide on" data-mode="select" data-icon="↖" data-shortcut="V" title="選取與移動 (V)">選取與移動</button></div></section>
<section class="tool-group" role="group" aria-label="場景元件"><span class="tool-group-label">場景元件</span><div class="tool-buttons">
<button data-mode="plat" data-icon="━" data-shortcut="P" title="新增跳台 (P)">跳台</button><button data-mode="slab" data-icon="▰" data-shortcut="B" title="新增樓板 (B)">樓板</button><button data-mode="wall" data-icon="▮" data-shortcut="W" title="新增牆 (W)">牆</button><button data-mode="breakwall" data-icon="▧" data-shortcut="R" title="新增可破壞牆 (R)">破壞牆</button><button data-mode="ghostwall" data-icon="◫" data-shortcut="Shift+W" title="新增幽靈牆 (Shift+W)">幽靈牆</button><button data-mode="crate" data-icon="▣" data-shortcut="X" title="新增可破壞箱子 (X)">破壞箱</button><button data-mode="elev" data-icon="↕" data-shortcut="E" title="新增電梯 (E)">電梯</button><button data-mode="cp" data-icon="⚑" data-shortcut="C" title="新增存檔點 (C)">存檔點</button><button data-mode="moverh" data-icon="↔" data-shortcut="H" title="新增水平移動台 (H)">水平台</button><button data-mode="moverv" data-icon="↕" data-shortcut="Shift+H" title="新增垂直移動台 (Shift+H)">垂直台</button><button data-mode="item" data-icon="◆" data-shortcut="I" title="新增道具 (I)">道具</button><button data-mode="gate" data-icon="⇥" data-shortcut="G" title="新增單向門 (G)">單向門</button><button data-mode="keydoor" data-icon="🔒" data-shortcut="K" title="新增鑰匙門 (K)">鑰匙門</button><button data-mode="camzone" data-icon="🎥" data-shortcut="Z" title="新增攝影機框 (Z)">攝影機框</button><button data-mode="pstart" data-icon="★" data-shortcut="S" title="放置玩家起點 (S)：新遊戲出生位置，全地圖僅一個，重放即移動">玩家起點</button>
</div></section>
<section class="tool-group" role="group" aria-label="敵人"><span class="tool-group-label">敵人</span><div class="tool-buttons"><button data-mode="pmc" data-icon="●" data-shortcut="Alt+1">PMC</button><button data-mode="pmc2" data-icon="●" data-shortcut="Alt+2">PMC2</button><button data-mode="sgtrooper" data-icon="●" data-shortcut="Alt+3">霰彈</button><button data-mode="shield" data-icon="●" data-shortcut="Alt+4">盾兵</button><button data-mode="turret" data-icon="●" data-shortcut="Alt+5">砲台</button><button data-mode="rocket" data-icon="●" data-shortcut="Alt+6">火箭</button><button data-mode="grenadier" data-icon="●" data-shortcut="Alt+7" title="手雷兵：大圓形偵測，拋物線手雷">手雷兵</button></div></section>
</nav>
<canvas id="cv" tabindex="0" aria-label="地圖編輯畫布"></canvas><aside id="props" aria-label="物件屬性"></aside>
<footer id="statusbar"><span id="modeStatus">選取模式</span><span id="status">座標 0, 0　縮放 22%</span><span id="saveStatus">自動儲存已開啟</span><button id="helpB" title="快捷鍵說明 (?)">快捷鍵 <kbd>?</kbd></button></footer>
<div id="helpOverlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="helpTitle"><section class="dialog"><div class="dialog-head"><h2 id="helpTitle">快捷鍵與操作</h2><button class="icon-button close-overlay" aria-label="關閉">×</button></div><div class="dialog-body"><div class="shortcut-grid" id="shortcutGrid"></div></div></section></div>
<div id="commandOverlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="commandTitle"><section class="dialog"><div class="dialog-head"><h2 id="commandTitle">指令面板</h2><button class="icon-button close-overlay" aria-label="關閉">×</button></div><div class="dialog-body"><input id="commandInput" autocomplete="off" placeholder="搜尋工具或指令…" aria-label="搜尋指令"><ul id="commandList"></ul></div></section></div>
<div id="toast" role="status" aria-live="polite"></div>

function rectOf(o) {   // 可拖拉調整大小的物件矩形（電梯用 top/bottom；移動平台僅寬度）
  if (!o) return null;
  if (data.elevators.includes(o)) return { x: o.x, y: o.top, w: o.w, h: o.bottom - o.top, elev: true };
  if (data.movers.includes(o)) return { x: o.x, y: o.y - 7 / scale, w: o.w, h: 14 / scale, mover: true };
  if (typeof o.w === "number" && typeof o.h === "number") return { x: o.x, y: o.y, w: o.w, h: o.h };
  return null;
}
function resizeHandleAt(o, wx, wy) {
  const r = rectOf(o);
  if (!r) return null;
  const tol = 10 / scale;
  const inX = wx > r.x - tol && wx < r.x + r.w + tol;
  const inY = wy > r.y - tol && wy < r.y + r.h + tol;
  let hx = 0, hy = 0;
  if (Math.abs(wx - r.x) < tol && inY) hx = -1;
  else if (Math.abs(wx - r.x - r.w) < tol && inY) hx = 1;
  if (Math.abs(wy - r.y) < tol && inX) hy = -1;
  else if (Math.abs(wy - r.y - r.h) < tol && inX) hy = 1;
  if (r.mover) hy = 0;
  if (!hx && !hy) return null;
  return { hx, hy };
}
function drawHandles() {   // 選取物件的 8 向把手（螢幕固定 7px 方塊）
  const r = rectOf(sel);
  if (!r) return;
  const hs = 7;   // 螢幕像素（draw() 全程螢幕座標——先前誤用世界座標畫，手柄全隱形）
  const pts = r.mover
    ? [[r.x, r.y + r.h / 2], [r.x + r.w, r.y + r.h / 2]]
    : [[r.x, r.y], [r.x + r.w / 2, r.y], [r.x + r.w, r.y],
       [r.x, r.y + r.h / 2], [r.x + r.w, r.y + r.h / 2],
       [r.x, r.y + r.h], [r.x + r.w / 2, r.y + r.h], [r.x + r.w, r.y + r.h]];
  for (const [px, py] of pts) {
    const [sx, sy] = W2S(px, py);
    ctx.fillStyle = "#ffd75e";
    ctx.fillRect(sx - hs / 2, sy - hs / 2, hs, hs);
    ctx.strokeStyle = "#1a2233";
    ctx.strokeRect(sx - hs / 2, sy - hs / 2, hs, hs);
  }

function hitTest(wx, wy) {
  const tol = 12 / scale;
  for (let i = (data.camzones || []).length - 1; i >= 0; i--) {   // 攝影機框：只有邊線可選取
    const z = data.camzones[i];
    const inX = wx > z.x - tol && wx < z.x + z.w + tol, inY = wy > z.y - tol && wy < z.y + z.h + tol;
    if (((Math.abs(wx - z.x) < tol || Math.abs(wx - z.x - z.w) < tol) && inY) ||
        ((Math.abs(wy - z.y) < tol || Math.abs(wy - z.y - z.h) < tol) && inX)) return { t: "camzone", o: z };
  }
  for (let i = data.items.length - 1; i >= 0; i--) {
    const it = data.items[i];
    if (Math.abs(wx - it.x) < tol && Math.abs(wy - (it.y - 16 / scale)) < tol + 12 / scale) return { t: "item", o: it };
  }
  for (let i = data.ghosts.length - 1; i >= 0; i--) {
    const g = data.ghosts[i];
    if (wx > g.x - tol / 2 && wx < g.x + g.w + tol / 2 && wy > g.y - tol / 2 && wy < g.y + g.h + tol / 2) return { t: "ghost", o: g };
  }
  for (let i = data.breakables.length - 1; i >= 0; i--) {
    const b = data.breakables[i];
    if (wx > b.x - tol / 2 && wx < b.x + b.w + tol / 2 && wy > b.y - tol / 2 && wy < b.y + b.h + tol / 2) return { t: "breakable", o: b };
  }
  for (let i = data.gates.length - 1; i >= 0; i--) {
    const g = data.gates[i];
    if (wx > g.x - tol / 2 && wx < g.x + g.w + tol / 2 && wy > g.y - tol / 2 && wy < g.y + g.h + tol / 2) return { t: "gate", o: g };
  }
  // 已選取移動平台的終點控制把手優先
  if (sel && data.movers.includes(sel)) {
    const ex = sel.axis === "x" ? sel.x + sel.dist : sel.x;
    const ey = sel.axis === "y" ? sel.y + sel.dist : sel.y;
    if (wx > ex - tol / 2 && wx < ex + sel.w + tol / 2 && Math.abs(wy - ey) < tol * 1.4) {
      return { t: "moverEnd", o: sel };

    const m = data.movers[i];
    if (wx > m.x - tol / 2 && wx < m.x + m.w + tol / 2 && Math.abs(wy - m.y) < tol) return { t: "mover", o: m };

    const m = data.movers[i];
    const ex = m.axis === "x" ? m.x + m.dist : m.x;
    const ey = m.axis === "y" ? m.y + m.dist : m.y;
    if (wx > ex - tol / 2 && wx < ex + m.w + tol / 2 && Math.abs(wy - ey) < tol * 1.4) {

    }
  }
  for (let i = data.spawns.length - 1; i >= 0; i--) {
    const e = data.spawns[i];
    if (Math.abs(wx - e.x) < tol && Math.abs(wy - e.y + 9) < tol + 14) return { t: "spawn", o: e };
  }
  for (let i = data.checkpoints.length - 1; i >= 0; i--) {
    const c = data.checkpoints[i];
    if (Math.abs(wx - c.x) < tol && wy > c.y - 26 / scale && wy < c.y + tol) return { t: "cp", o: c };
  }
  if (data.playerStart && Math.abs(wx - data.playerStart.x) < tol &&
      wy > data.playerStart.y - 30 / scale && wy < data.playerStart.y + tol) return { t: "pstart", o: data.playerStart };
  for (let i = data.elevators.length - 1; i >= 0; i--) {
    const e = data.elevators[i];
    if (wx > e.x - tol && wx < e.x + e.w + tol && wy > e.top - tol && wy < e.bottom + tol &&
        (Math.abs(wx - e.x) < tol || Math.abs(wx - e.x - e.w) < tol || Math.abs(wy - e.bottom) < 26 / scale)) return { t: "elev", o: e };
  }
  for (let i = data.solids.length - 1; i >= 0; i--) {
    const s = data.solids[i];
    if (wx > s.x - tol / 2 && wx < s.x + s.w + tol / 2 && wy > s.y - tol / 2 && wy < s.y + Math.max(s.h, 8) + tol / 2) return { t: "solid", o: s };
  }
  return null;
}

cv.addEventListener("mousedown", ev => {
  const [wx, wy] = S2W(ev.offsetX, ev.offsetY + BAR_H());
  if (mode !== "select") { addAt(wx, wy); return; }
  // 選取中的物件：8 向手柄優先（邊/角直接拖拉調整大小）
  if (sel) {
    const h = resizeHandleAt(sel, wx, wy);
    if (h) { pushUndo(); drag = { type: "resize", hx: h.hx, hy: h.hy }; return; }
  }
  const hit = hitTest(wx, wy);
  if (hit) {
    sel = hit.o; showProps();
    pushUndo();
    if (hit.t === "moverEnd") {
      const ex = sel.axis === "x" ? sel.x + sel.dist : sel.x;
      const ey = sel.axis === "y" ? sel.y + sel.dist : sel.y;
      drag = { type: "moverEnd", offset: sel.axis === "x" ? wx - ex : wy - ey };
      cv.style.cursor = sel.axis === "x" ? "ew-resize" : "ns-resize";
    } else {
      drag = { type: "move", dx: wx - (sel.x || 0), dy: wy - (sel.y || sel.top || 0) };
    }
  } else {
    sel = null; showProps();
    drag = { type: "pan", sx: ev.clientX, sy: ev.clientY, ox0: ox, oy0: oy };
    cv.style.cursor = "grabbing";
  }
  draw();
});
addEventListener("mousemove", ev => {
  const r = cv.getBoundingClientRect();
  const [wx, wy] = S2W(ev.clientX - r.left, ev.clientY - r.top + BAR_H());
  hoverXY = [Math.round(wx), Math.round(wy)];
  document.getElementById("status").textContent =
    `座標 ${hoverXY[0]}, ${hoverXY[1]}　縮放 ${(scale * 100) | 0}%　跳台可跳高≈195 距≈280`;
  if (!drag) {
    if (mode === "select" && ev.clientX >= r.left && ev.clientX <= r.right && ev.clientY >= r.top && ev.clientY <= r.bottom) {
      let cur = null;
      if (sel) {
        const h = resizeHandleAt(sel, wx, wy);
        if (h) cur = h.hx && h.hy ? (h.hx * h.hy > 0 ? "nwse-resize" : "nesw-resize") : (h.hx ? "ew-resize" : "ns-resize");
      }
      if (!cur) {
        const hit = hitTest(wx, wy);
        cur = hit?.t === "moverEnd" ? (hit.o.axis === "x" ? "ew-resize" : "ns-resize") : "grab";
      }
      cv.style.cursor = cur;
    }
    return;
  }
  if (drag.type === "pan") { ox = drag.ox0 - (ev.clientX - drag.sx) / scale; oy = drag.oy0 - (ev.clientY - drag.sy) / scale; }
  else if (drag.type === "move" && sel) {
    if (data.spawns.includes(sel) || data.checkpoints.includes(sel) || data.items.includes(sel) || sel === data.playerStart) { sel.x = snap(wx - drag.dx); sel.y = nearestFloorOrPlat(snap(wy)); }
    else if (data.elevators.includes(sel)) { sel.x = snap(wx - drag.dx); }
    else { sel.x = snap(wx - drag.dx); sel.y = snap(wy - drag.dy); }
    showProps();
  }
  else if (drag.type === "moverEnd" && sel && data.movers.includes(sel)) {
    sel.dist = sel.axis === "x" ? snap(wx - drag.offset - sel.x) : snap(wy - drag.offset - sel.y);
    showProps();
  }
  else if (drag.type === "resize" && sel) {
    const elev = data.elevators.includes(sel);
    const minW = 20, minH = 10;
    if (drag.hx < 0) { const rr = sel.x + sel.w; sel.x = Math.min(snap(wx), rr - minW); sel.w = rr - sel.x; }
    if (drag.hx > 0) sel.w = Math.max(minW, snap(wx) - sel.x);
    if (elev) {
      if (drag.hy < 0) sel.top = Math.min(snap(wy), sel.bottom - 60);
      if (drag.hy > 0) sel.bottom = Math.max(snap(wy), sel.top + 60);
    } else if (typeof sel.h === "number") {
      if (drag.hy < 0) { const bb = sel.y + sel.h; sel.y = Math.min(snap(wy), bb - minH); sel.h = bb - sel.y; }
      if (drag.hy > 0) sel.h = Math.max(minH, snap(wy) - sel.y);
    }
    showProps();
  }
  draw();
});
addEventListener("mouseup", () => { if (drag && drag.type !== "pan") save(); drag = null; cv.style.cursor = "grab"; });
cv.addEventListener("wheel", ev => {
  ev.preventDefault();
  const [wx, wy] = S2W(ev.offsetX, ev.offsetY + BAR_H());
  scale = Math.min(3, Math.max(0.04, scale * (ev.deltaY < 0 ? 1.15 : 1 / 1.15)));

// 敵人/存檔點放置時吸附到最近樓層或跳台頂
function nearestFloorOrPlat(y) {
  let best = nearestFloor(y), bd = Math.abs(best - y);
  for (const s of data.solids) if (s.h <= 30 && Math.abs(s.y - y) < bd) { best = s.y; bd = Math.abs(s.y - y); }
  return best;
}

function addAt(wx, wy) {
  pushUndo();
  const x = snap(wx), y = snap(wy);
  let o;
  if (mode === "plat") { o = { x: x - 60, y, w: 130, h: 16 }; data.solids.push(o); }
  else if (mode === "slab") { o = { x: x - 200, y: nearestFloor(y), w: 400, h: 90 }; data.solids.push(o); }
  else if (mode === "wall") { o = { x, y: y - 250, w: 40, h: 500 }; data.solids.push(o); }
  else if (mode === "breakwall") { o = { x: x - 40, y: y - 240, w: 80, h: 240, type: "wall", hp: 6, drop: "" }; data.breakables.push(o); }
  else if (mode === "ghostwall") { o = { x: x - 40, y: y - 250, w: 80, h: 250 }; data.ghosts.push(o); }
  else if (mode === "crate") { const fy = nearestFloorOrPlat(y); o = { x: x - 70, y: fy - 110, w: 140, h: 110, type: "crate", hp: 3, drop: "" }; data.breakables.push(o); }
  else if (mode === "elev") {
    const bot = nearestFloor(y); const ti = FLOORS.indexOf(bot);
    o = { x: x - 70, w: 140, top: FLOORS[Math.min(ti + 1, FLOORS.length - 1)], bottom: bot };
    data.elevators.push(o);
  }
  else if (mode === "cp") { o = { x, y: nearestFloorOrPlat(y) }; data.checkpoints.push(o); }
  else if (mode === "moverh") { o = { x: x - 90, y, w: 180, axis: "x", dist: 260, speed: 120 }; data.movers.push(o); }
  else if (mode === "moverv") { o = { x: x - 90, y, w: 180, axis: "y", dist: -220, speed: 110 }; data.movers.push(o); }
  else if (mode === "item") { o = { x, y: nearestFloorOrPlat(y), type: "key", id: "K1" }; data.items.push(o); }
  else if (mode === "gate") { const fy2 = nearestFloor(y); o = { x, y: fy2 - 230, w: 40, h: 230, side: "left" }; data.gates.push(o); }
  else if (mode === "keydoor") { const fy2 = nearestFloor(y); o = { x, y: fy2 - 230, w: 60, h: 230, lock: "K1" }; data.gates.push(o); }
  else if (mode === "camzone") { o = { x: x - 480, y: y - 270, w: 960, h: 540 }; (data.camzones ||= []).push(o); }
  else if (mode === "pstart") { o = { x, y: nearestFloorOrPlat(y) }; data.playerStart = o; }   // 全地圖唯一：重放＝移動
  else { o = { x, y: nearestFloorOrPlat(y), range: 90, kind: mode }; data.spawns.push(o); }
  sel = o; setMode("select"); save(); draw(); showProps();
}

function listOf(o) {
  if (o === data.playerStart) return ["pstart", null];
  if (data.solids.includes(o)) return ["solids", data.solids];
  if (data.elevators.includes(o)) return ["elevators", data.elevators];
  if (data.checkpoints.includes(o)) return ["checkpoints", data.checkpoints];
  if (data.movers.includes(o)) return ["movers", data.movers];
  if (data.breakables.includes(o)) return ["breakables", data.breakables];
  if (data.ghosts.includes(o)) return ["ghosts", data.ghosts];
  if (data.gates.includes(o)) return ["gates", data.gates];
  if ((data.camzones || []).includes(o)) return ["camzones", data.camzones];
  if (data.items.includes(o)) return ["items", data.items];
  return ["spawns", data.spawns];
}

function showProps() {

  const title = { solids: sel.h <= 30 ? "跳台 P" + data.solids.filter(s => s.h <= 30).indexOf(sel) : "樓板/牆",
                  elevators: "電梯 E" + (data.elevators.indexOf(sel) + 1) + "｜speed=速度px/s(空=230) start=初始停靠端（載人駛向另一端，閒置2秒返回）",
                  checkpoints: "存檔點 CP" + data.checkpoints.indexOf(sel),

                  ghosts: "幽靈牆｜外觀與普通牆相同，無碰撞；玩家進入後淡出消失",

                  items: "道具｜key鑰匙→填id並在電梯lock填同編號；char角色：7日鞠 8風華 9三千留",
                  camzones: "攝影機框 Z" + (data.camzones || []).indexOf(sel) + "｜玩家在框內時鏡頭鉗在框內（藏隱藏地圖用），進出時鏡頭飛行過渡",
                  pstart: "玩家起點｜新遊戲（無存檔點）的出生與重生位置；未放置時預設 x120 L0 地板",
                  spawns: "敵人 " + sel.kind + data.spawns.indexOf(sel) + "｜sight=偵測水平距離 sightV=偵測垂直半高 atk=開火距離（世界像素，0/留空=兵種預設；range 超出平台會在邊緣折返不滯空）" }[kind];
  let h = `<h3>${title}</h3>`;
  const SELECTS = { kind: Object.keys(KC), axis: ["x", "y"], type: ["key", "char", "skin"], side: ["left", "right"],
                    start: ["bottom", "top"], card: Object.keys(CARD_NAMES), skin: Object.keys(SKIN_NAMES) };
  const OPT_LABEL = { card: v => v + " " + CARD_NAMES[v], skin: v => v + "（" + SKIN_NAMES[v] + "）" };
  let fields = Object.keys(sel).filter(f => f !== "c");
  if (kind === "breakables" && !("drop" in sel)) fields.push("drop");
  if (kind === "spawns") {                                               // 偵測/開火距離覆寫（0=用兵種預設）
    if (!("sight" in sel)) fields.push("sight");
    if (!("sightV" in sel)) fields.push("sightV");
    if (!("atk" in sel)) fields.push("atk");
  }
  if (kind === "elevators") {
    if (!("lock" in sel)) fields.push("lock");     // 電梯鎖（空字串=無鎖）
    if (!("speed" in sel)) fields.push("speed");   // 速度 px/s（0/留空=預設 230）
    if (!("start" in sel)) fields.push("start");   // 初始停靠端兼待機返回端（缺省 bottom）
  }
  if (kind === "camzones" && !("secret" in sel)) fields.push("secret");   // secret=1：永久不顯示在小地圖
  if (kind === "items") {
    if (sel.type === "char" && !("card" in sel)) fields.push("card");    // 7=日鞠 8=風華 9=三千留
    if (sel.type === "skin" && !("skin" in sel)) fields.push("skin");
    if (sel.type === "key" && !("id" in sel)) fields.push("id");
  }
  for (const f of fields) {
    const choices = kind === "breakables" && f === "type" ? ["wall", "crate"] : SELECTS[f];
    if (choices) {
      h += `<label>${f} <select data-f="${f}">${choices.map(k => `<option value="${k}" ${String(k) === String(sel[f]) ? "selected" : ""}>${OPT_LABEL[f] ? OPT_LABEL[f](k) : k}</option>`).join("")}</select></label>`;
    } else if (typeof sel[f] === "string" || f === "lock" || f === "id" || f === "skin") {
      h += `<label>${f} <input type="text" data-f="${f}" value="${sel[f] ?? ""}"></label>`;
    } else {

    }
  }

  p.innerHTML = h; p.style.display = "block";
  p.querySelectorAll("input,select").forEach(inp => inp.onchange = () => {
    pushUndo();
    const v = inp.type === "number" ? +inp.value : inp.value;
    if (v === "" || (inp.dataset.f === "lock" && !v) ||
        (inp.dataset.f === "speed" && kind === "elevators" && !v) ||   // 電梯 speed 0=回預設 230（movers 的 speed 不可刪）
        ((inp.dataset.f === "sight" || inp.dataset.f === "sightV" || inp.dataset.f === "atk") && !v)) delete sel[inp.dataset.f];
    else sel[inp.dataset.f] = inp.dataset.f === "card" ? +v : v;
    if (kind === "items" && inp.dataset.f === "type") { // 道具換類型 → 清掉不相干欄位再重建
      if (v !== "char") delete sel.card;
      if (v !== "skin") delete sel.skin;
      if (v !== "key") delete sel.id;
      if (v === "char") sel.card = sel.card || 7;
      if (v === "skin") sel.skin = sel.skin || "swim";
      if (v === "key") sel.id = sel.id || "K1";

    }

  });

  p.querySelectorAll(".scrub").forEach(sp => {
    sp.style.cursor = "ew-resize"; sp.style.userSelect = "none"; sp.style.color = "#8fb4ff";
    sp.onmousedown = ev => {
      ev.preventDefault();

      addEventListener("mousemove", mv); addEventListener("mouseup", up);
    };
  });

}

function del() {

function openOverlay(id){document.querySelectorAll(".overlay").forEach(o=>o.classList.remove("open"));const el=document.getElementById(id);el.classList.add("open");setTimeout(()=>el.querySelector("input,button")?.focus(),0)}
function closeOverlays(){document.querySelectorAll(".overlay.open").forEach(o=>o.classList.remove("open"));cv.focus()}
const shortcutRows=[["拖拉邊/角","選取物件後直接拖拉 8 向手柄調整大小（電梯拉上下端、移動平台拉左右端）"],["V","選取與移動"],["P / B / W","新增跳台 / 樓板 / 牆"],["R / Shift+W / X","新增可破壞牆 / 幽靈牆 / 可破壞箱"],["E / C / G / I","新增電梯 / 存檔點 / 單向門 / 道具"],["K / S","新增鑰匙門 / 放置玩家起點"],["H / Shift+H","新增水平 / 垂直移動台"],["Alt+1 … Alt+6","新增各類敵人"],["方向鍵","微調 10 px；Shift 為 50 px"],["Ctrl+D","複製選取物件"],["Delete","刪除選取物件"],["Ctrl+Z / Ctrl+Y","復原 / 重做"],["+ / − / F","放大 / 縮小 / 顯示全部"],["A","切換敵人感應範圍"],["Ctrl+S","立即儲存到瀏覽器"],["Ctrl+Shift+S / Ctrl+O","匯出 / 匯入 JSON"],["Ctrl+K","開啟指令面板"],["? / Esc","快捷鍵說明 / 取消"]];
document.getElementById("shortcutGrid").innerHTML=shortcutRows.map(([k,d])=>`<div>${k.split(" / ").map(x=>`<kbd>${x}</kbd>`).join(" ")}</div><div class="desc">${d}</div>`).join("");
const commands=[...Object.entries(MODE_NAMES).map(([id,name])=>({name,key:document.querySelector(`[data-mode="${id}"]`)?.dataset.shortcut||"",run:()=>setMode(id)})),{name:"顯示完整地圖",key:"F",run:fitView},{name:"切換感應範圍",key:"A",run:()=>document.getElementById("sightB").click()},{name:"復原",key:"Ctrl+Z",run:undo},{name:"重做",key:"Ctrl+Y",run:redo},{name:"複製選取物件",key:"Ctrl+D",run:duplicateSelected},{name:"匯出 JSON",key:"Ctrl+Shift+S",run:exportMap},{name:"匯入 JSON",key:"Ctrl+O",run:()=>document.getElementById("importFile").click()},{name:"還原初始配置",key:"",run:()=>document.getElementById("resetB").click()}];
let commandIndex=0;
function renderCommands(q=""){q=q.trim().toLowerCase();const list=commands.filter(c=>c.name.toLowerCase().includes(q));commandIndex=Math.min(commandIndex,Math.max(0,list.length-1));const el=document.getElementById("commandList");el.innerHTML=list.map((c,i)=>`<li><button class="${i===commandIndex?"active":""}" data-i="${commands.indexOf(c)}">${c.name}<span class="cmd-key">${c.key}</span></button></li>`).join("")||"<li>找不到相符指令</li>";el.querySelectorAll("button").forEach(b=>b.onclick=()=>{closeOverlays();commands[+b.dataset.i].run()})}
function openCommands(){commandIndex=0;document.getElementById("commandInput").value="";renderCommands();openOverlay("commandOverlay")}
document.getElementById("commandInput").oninput=e=>{commandIndex=0;renderCommands(e.target.value)};document.getElementById("commandInput").onkeydown=e=>{const bs=[...document.querySelectorAll("#commandList button")];if((e.key==="ArrowDown"||e.key==="ArrowUp")&&bs.length){e.preventDefault();commandIndex=(commandIndex+(e.key==="ArrowDown"?1:-1)+bs.length)%bs.length;renderCommands(e.target.value)}if(e.key==="Enter"){e.preventDefault();document.querySelector("#commandList button.active")?.click()}};
document.getElementById("helpB").onclick=()=>openOverlay("helpOverlay");document.querySelectorAll(".close-overlay").forEach(b=>b.onclick=closeOverlays);document.querySelectorAll(".overlay").forEach(o=>o.onmousedown=e=>{if(e.target===o)closeOverlays()});
document.addEventListener("keydown",e=>{const typing=/^(INPUT|SELECT|TEXTAREA)$/.test(e.target.tagName),k=e.key.toLowerCase(),mod=e.ctrlKey||e.metaKey;if(k==="escape"){e.preventDefault();if(document.querySelector(".overlay.open"))closeOverlays();else{sel=null;setMode("select");showProps();draw()}return}if(mod&&k==="k"){e.preventDefault();openCommands();return}if(!typing&&(e.key==="?"||(e.shiftKey&&e.key==="/"))){e.preventDefault();openOverlay("helpOverlay");return}if(typing||document.querySelector(".overlay.open"))return;let h=true;if((mod&&e.shiftKey&&k==="z")||(mod&&k==="y"))redo();else if(mod&&k==="z")undo();else if(mod&&e.shiftKey&&k==="s")exportMap();else if(mod&&k==="s"){save();notify("地圖已儲存")}else if(mod&&k==="o")document.getElementById("importFile").click();else if(mod&&k==="d")duplicateSelected();else if(e.key==="Delete"||e.key==="Backspace"){if(sel){del();notify("已刪除選取物件")}}else if(e.altKey&&/^[1-7]$/.test(e.key))setMode(["pmc","pmc2","sgtrooper","shield","turret","rocket","grenadier"][+e.key-1]);else if(k==="v"||k==="1")setMode("select");else if(k==="p")setMode("plat");else if(k==="b")setMode("slab");else if(k==="w")setMode(e.shiftKey?"ghostwall":"wall");else if(k==="r")setMode("breakwall");else if(k==="x")setMode("crate");else if(k==="e")setMode("elev");else if(k==="c")setMode("cp");else if(k==="h")setMode(e.shiftKey?"moverv":"moverh");else if(k==="i")setMode("item");else if(k==="g")setMode("gate");else if(k==="k")setMode("keydoor");else if(k==="z"&&!mod)setMode("camzone");else if(k==="s")setMode("pstart");else if(k==="a")document.getElementById("sightB").click();else if(k==="f")fitView();else if(e.key==="+"||e.key==="=")zoomBy(1.2);else if(e.key==="-"||e.key==="_")zoomBy(1/1.2);else if(e.key.startsWith("Arrow")){const n=e.shiftKey?50:10;nudgeSelected(e.key==="ArrowLeft"?-n:e.key==="ArrowRight"?n:0,e.key==="ArrowUp"?-n:e.key==="ArrowDown"?n:0)}else h=false;if(h){e.preventDefault();e.stopImmediatePropagation()}},true);
updateHistoryButtons();updateModeStatus();
fitCanvas();
</script>
</body>
</html>
