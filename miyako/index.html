function castCard(i, wx, wy) {
  const c = CARDS[i];
  if (cost < cardCost(c) || player.deathT > 0) return false;
  if (c.skill === "heal") {          // 粉髮：附近隨機位置生成血包（觸碰回復 1/3 最大生命）
    cost -= cardCost(c); c.flashT = 0.3;
    const hx = Math.max(40, Math.min(WORLD.w - 40, player.x + (Math.random() * 240 - 120)));
    healPacks.push({ x: hx, y: player.y - 40, vy: 0, t: 20 });
    return true;
  }
  if (c.skill === "buff") {          // 修女：1/2 生命護盾（30 秒）+ 霸體
    cost -= cardCost(c); c.flashT = 0.3;
    player.shieldHp = player.maxHp / 2;
    player.buffT = 30; player.shieldT = 30;
    for (let k = 0; k < 8; k++) {
      impacts.push({ x: player.x + (Math.random() - .5) * 50, y: player.y - Math.random() * 110, t: 0.15 + Math.random() * 0.1 });
    }
    return true;
  }
  if (c.skill === "fullheal") {      // 風華：主廚饗宴（恢復完整血量）
    cost -= cardCost(c); c.flashT = 0.3;
    player.hp = player.maxHp;
    costPops.push({ x: player.x, y: player.y - 145, t: 0.9, text: "全恢復!", color: "#3ecf6f" });
    for (let k = 0; k < 8; k++) {
      impacts.push({ x: player.x + (Math.random() - .5) * 50, y: player.y - Math.random() * 110, t: 0.15 + Math.random() * 0.1 });
    }
    return true;
  }
  if (c.skill === "heal25") {        // 三千留：優雅茶會（恢復 1/4 血量）
    cost -= cardCost(c); c.flashT = 0.3;
    player.hp = Math.min(player.maxHp, player.hp + player.maxHp / 4);
    costPops.push({ x: player.x, y: player.y - 145, t: 0.9, text: "+HP", color: "#3ecf6f" });
    return true;
  }
  if (c.skill === "atk") {           // 日鞠：火力支援（30 秒攻擊力 +20%）
    cost -= cardCost(c); c.flashT = 0.3;
    atkBuffT = 30;
    costPops.push({ x: player.x, y: player.y - 145, t: 0.9, text: "攻擊UP", color: "#e8544a" });
    return true;
  }
  if (c.skill === "crit") {          // 亞子：爆擊指令（10 秒內爆擊率+30%、爆傷+50%）
    cost -= cardCost(c); c.flashT = 0.3;
    akoBuffT = 10;
    for (let k = 0; k < 8; k++) {
      impacts.push({ x: player.x + (Math.random() - .5) * 50, y: player.y - Math.random() * 110, t: 0.15 + Math.random() * 0.1 });
    }
    costPops.push({ x: player.x, y: player.y - 145, t: 0.9, text: "爆擊UP", color: "#ff8a2b" });
    return true;
  }
  if (c.skill === "area") {          // 鋼盔：畫面外拋出閃光彈，旋轉飛行 → 落地才引爆（傷害 + 暈眩 2 秒）
    cost -= cardCost(c); c.flashT = 0.3;
    const sx = wx < cam.x ? cam.x + VIEW_W / 2 + 40 : cam.x - VIEW_W / 2 - 40;
    const gy = groundYAt(wx, wy);   // 落在目標點的平面（高台/跳台也砸得到），不再用玩家樓層
    const sy = Math.min(cam.y - 270 + 60, gy - 220);   // 拋出點保證高於落點
    grenades.push({
      x: sx, y: sy,
      vx: (wx - sx) / GREN_FLIGHT,
      gy,
      vy: (gy - 8 - sy - 0.5 * GREN_G * GREN_FLIGHT * GREN_FLIGHT) / GREN_FLIGHT,
      rot: 0,
    });
    return true;
  }
  if (c.skill === "fireline") {      // 眼鏡：直升機空投——飛到目標區上空才開始沿途鋪火（燃燒 20 秒、殘留 5 秒）
    cost -= cardCost(c); c.flashT = 0.3;
    const dir = Math.sign(wx - player.x) || player.facing;
    const a = player.x + dir * 20, b = player.x + dir * 380;
    helis.push({ gy: floorYAt(player.y),
      x: cam.x - VIEW_W / 2 - HELI_FX.w,    // 從畫面左緣外進場
      x0: Math.min(a, b), x1: Math.max(a, b),
      zone: null, t: 0,
    });
    return true;
  }
  if (c.skill === "stun") {          // 白髮：腳下放麻痺小車，朝滑鼠方向直行（撞牆自毀、撞敵觸發暈眩、平台邊緣會掉落）
    cost -= cardCost(c); c.flashT = 0.3;
    rovers.push({ x: player.x, y: player.y, vy: 0, dir: Math.sign(wx - player.x) || player.facing, t: 0 });
    return true;
  }
  // 狙擊：從左上角 cut-in 瞄準 → 擊發（延遲結算），第二次使用雙倍
  const t = pickTarget(wx, wy, Infinity);
  if (!t) return false;
  cost -= cardCost(c); c.flashT = 0.3;
  const dmg = snipeCharge ? 8 : 4;
  snipeCharge = !snipeCharge;
  snipeShots.push({ e: t.e, ally: t.ally, isBoss: t.isBoss, isSniper: t.isSniper, isAlly: t.isAlly, dmg, t: 0, fired: false,
                    x: t.x, y: t.y - t.h * 0.55 });
  return true;
}

function roverStun(target, isBoss) {   // 小車命中：暈眩 + 電花（克制鏈：Boss 吃 3 秒）
  if (isBoss) boss.stunT = Math.max(boss.stunT, 3); else target.stunT = 1;
  const tx = isBoss ? boss.x : target.x, ty = isBoss ? boss.y : target.y;
  const th = isBoss ? boss.hitH : target.h;
  for (let k = 0; k < 6; k++) {
    impacts.push({ x: tx + (Math.random() - .5) * 30, y: ty - Math.random() * th, t: 0.12 + Math.random() * 0.1 });
  }
}

function groundYAt(wx, wy) {   // 目標點下方最近可站表面（含薄跳台；容忍點在表面上方 40px 內）
  let best = Infinity;
  for (const s of SOLIDS) {
    if (wx < s.x || wx > s.x + s.w) continue;
    if (s.y >= wy - 40 && s.y < best) best = s.y;
  }
  return best === Infinity ? floorYAt(wy) : best;
}
function doAreaBlast(wx, gy) {       // 閃光彈落地引爆（gy = 施放樓層地面）
  const r = 90;
  gy = gy || floorYAt(player.y);
  sfxBoom();
  shakeT = Math.max(shakeT, 0.2);
  blasts.push({ x: wx, y: gy, t: 0.35 });
  for (let k = 0; k < 8; k++) {
    impacts.push({ x: wx + (Math.random() - .5) * r * 1.6, y: gy - Math.random() * 80, t: 0.15 + Math.random() * 0.12 });
  }
  for (const e of enemies) {
    if (e.state !== "death" && Math.abs(e.x - wx) < r && Math.abs(e.y - gy) < 120) { damageEnemy(e, 1); e.stunT = 2; }
  }
  if (boss.active && boss.deadT <= 0 && Math.abs(boss.x - wx) < r && Math.abs(boss.y - gy) < 140) { damageBoss(1); boss.stunT = 2; }
  for (const a of allies) {
    if (a.mode === "fight" && a.kind !== "sniper" && Math.abs(a.x - wx) < r && Math.abs(a.y - gy) < 120) {
      stunAlly(a, a.kind === "shield" ? 5 : 2);   // 克制鏈：閃光彈暈盾兵 5 秒（放盾大破窗）
      damageAlly(a, 1);
    }
  }
}

function confirmTargeting() {
  if (!targeting) return;
  const { wx, wy } = mouseWorld();
  if (useSlot(targeting.slot, wx, wy)) cancelTargeting();
}

// 快速施法：瞄準中按攻擊鍵 → 自動以最近目標（小怪/Boss/召喚隊友，否則場外狙擊手肖像）施放
function nearestTargetPos() {
  let best = null, bd = Infinity;
  for (const e of enemies) {
    if (e.state === "death" || !targetOnScreen(e.x, e.y - e.h * 0.5)) continue;
    const d = Math.abs(e.x - player.x);
    if (d < bd) { bd = d; best = { x: e.x, y: e.y - e.h * 0.5 }; }
  }
  if (boss.active && boss.deadT <= 0 && targetOnScreen(boss.x, boss.y - boss.hitH * 0.5)) {
    const d = Math.abs(boss.x - player.x);
    if (d < bd) { bd = d; best = { x: boss.x, y: boss.y - boss.hitH * 0.5 }; }
  }
  for (const a of allies) {
    if (a.kind === "sniper" || a.mode !== "fight") continue;
    if (!targetOnScreen(a.x, a.y - 60)) continue;
    const d = Math.abs(a.x - player.x);
    if (d < bd) { bd = d; best = { x: a.x, y: a.y - ALLY_KINDS[a.kind].hitH * 0.5 }; }
  }
  if (!best) {
    const sn = allies.find(a => a.kind === "sniper");
    if (sn) { const p = sniperPortraitWorld(); return { x: p.x, y: p.y }; }
  }
  return best || { x: player.x + player.facing * 220, y: player.y - 60 };   // 無目標：面向前方
}

function quickCast() {
  if (!targeting) return false;
  const t = nearestTargetPos();
  if (useSlot(targeting.slot, t.x, t.y)) cancelTargeting();
  return true;
}

// BA 式能量護罩：橢圓漸層泡 + 旋轉流光弧線；擋彈時（flash>0）增亮
function drawShieldBubble(x, yFeet, h, flash) {
  const cy = yFeet - h * 0.52;
  const R = h * 0.78;
  const a = 0.30 + 0.06 * Math.sin(uiTime * 3.1) + Math.min(0.55, flash * 3.2);
  ctx.save();
  ctx.translate(x, cy);
  const g = ctx.createRadialGradient(0, 0, R * 0.25, 0, 0, R);
  g.addColorStop(0, "rgba(90,180,255,0)");
  g.addColorStop(0.72, `rgba(90,180,255,${a * 0.30})`);
  g.addColorStop(1, `rgba(150,225,255,${a})`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(0, 0, R * 0.82, R, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.lineWidth = 2;
  for (let k = 0; k < 3; k++) {             // 旋轉流光
    const ang = uiTime * 2.3 + k * Math.PI * 2 / 3;
    ctx.strokeStyle = `rgba(160,225,255,${0.4 + 0.25 * Math.sin(uiTime * 5 + k) + Math.min(0.5, flash * 2.5)})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, R * 0.82, R, 0, ang, ang + 1.15);
    ctx.stroke();
  }
  if (flash > 0) {                          // 擋彈波紋
    ctx.strokeStyle = `rgba(220,245,255,${flash * 4})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.ellipse(0, 0, R * 0.82 * (1.05 - flash), R * (1.05 - flash), 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.lineWidth = 1;
  ctx.restore();
}

// 盾兵舉盾中（shoot 狀態且未被暈眩）＝無敵；暈眩會放下盾（變回 idle）解除無敵
function shieldUp(e) {
  return e.kind === "shield" && e.state === "shoot" && e.stunT <= 0;
}

function damageEnemy(e, dmg, crit) {
  if (e.state === "death") return;
  if (shieldUp(e)) {                 // 舉盾格擋：傷害減半（原全擋）＋護罩波紋火花
    e.blockT = 0.18;
    impacts.push({ x: e.x + (Math.random() - .5) * 20, y: e.y - e.h * 0.5 - Math.random() * 30, t: 0.1 });
    dmg *= 0.5;
  }
  pushDmgPop(e.x, e.y - e.h - 8, dmg, crit);
  e.hp -= dmg;
  e.flashT = 0.08;
  if (crit) hitstopT = Math.max(hitstopT, 0.04);
  if (e.hp <= 0) {
    e.state = "death"; e.t = 0; e.deadT = 6;
    hitstopT = Math.max(hitstopT, 0.06);
    const cr = CREDIT_VALUE[e.kind] || 10;        // 信用點數（Cost 改由命中累積）
    gainCredits(cr);
    stats.kills++;
    costPops.push({ x: e.x + 20, y: e.y - e.h - 30, t: 0.9, text: "+" + cr + "C", color: "#e8a417" });
    for (let k = 0; k < 6; k++) {
      impacts.push({ x: e.x + (Math.random() - .5) * e.w, y: e.y - Math.random() * e.h, t: 0.12 + Math.random() * 0.1 });
    }
    if (e.kind === "turret") {         // 砲台炸毀：爆風 + 震動
      blasts.push({ x: e.x, y: e.y, t: 0.35 });
      shakeT = Math.max(shakeT, 0.2);
    }
  }
}

function damageBoss(dmg, crit) {
  if (!boss.active || boss.deadT > 0) return;
  pushDmgPop(boss.x, boss.y - boss.hitH - 10, dmg, crit);
  boss.hp -= dmg;
  boss.flashT = 0.08;
  if (crit) hitstopT = Math.max(hitstopT, 0.05);
  if (boss.hp <= 0) {
    boss.deadT = 8;
    hitstopT = Math.max(hitstopT, 0.14);
    shakeT = Math.max(shakeT, 0.5);
    setGate(false);
    bossBullets.length = 0;
    if (!bossCleared) {              // Speedrun：首次通關記錄
      bossCleared = true; bossClearT = speedrunT;
      startDialogue("bossclear");
      if (SKINS.mika && !unlocks.skins.includes("mika")) {   // 未花：通關一次解鎖
        unlocks.skins.push("mika");
        pickupToasts.push({ text: "造型解鎖：未花（通關達成！存檔點可更換）", t: 4 });
        saveGame();
      }
      if (mikaUsed) {                // 用過彌香：不列入速通紀錄、不解鎖桃井
        pickupToasts.push({ text: "使用了無敵造型：本次通關不列入紀錄", t: 4 });
      } else {
        if (bestClearT === null || bossClearT < bestClearT) {
          bestClearT = bossClearT;
          try { localStorage.setItem("miyako_best", String(bestClearT)); } catch (e) {}
        }
        if (bossClearT <= 720 && SKINS.momoi && !unlocks.skins.includes("momoi")) {   // 桃井：12 分鐘內通關
          unlocks.skins.push("momoi");
          pickupToasts.push({ text: "造型解鎖：桃井（12分鐘內通關達成！存檔點可更換）", t: 4 });
          saveGame();
        }
      }
    }
    retreatAllies();   // Boss 倒下 → 隊友撤離
    allySummonT = 3; lastSummonKind = null;
    for (let k = 0; k < 12; k++) {
      impacts.push({ x: boss.x + (Math.random() - .5) * 80, y: boss.y - Math.random() * boss.hitH, t: 0.15 + Math.random() * 0.15 });
    }
  }
}

const FIRE_INTERVAL = 1 / 18;   // uniform fire rate across all shooting stances
let fireT = 0;

function gunPoint(ref) {
  const scale = DRAW_H / FRAME_H;
  const dw = FRAME_W * scale * SLIM;
  return {
    x: player.x + player.facing * (ref.fx - ANCHOR_X) * dw,
    y: player.y - (FEET_Y - ref.fy) * DRAW_H,
  };
}

function spawnShot() {
  if (player.ammo <= 0) return;
  if (!infAmmo) player.ammo--;
  stats.shots++;
  sfxGun();
  // 彩蛋：重生點之間連開 999 發解鎖優香（碰到任一存檔點歸零）
  if (!unlocks.skins.includes("yuuka")) {
    yuukaShots++;
    if (yuukaShots === 333) {
      pickupToasts.push({ text: "……你的彈藥消耗是不是有點不對勁？", t: 3.5 });
    } else if (yuukaShots === 666) {
      pickupToasts.push({ text: "住手！那些都是錢！", t: 3.5 });
    } else if (yuukaShots === 999) {
      pickupToasts.push({ text: "在你浪費到四位數之前，我來阻止你", t: 4 });
      unlocks.skins.push("yuuka");
      pickupToasts.push({ text: "造型解鎖：優香（存檔點可更換）", t: 4 });
      saveGame();
    }
  }
  const stance = player.state;
  const m = gunPoint(MUZZLE[stance]);
  bullets.push({ x: m.x, y: m.y, vx: player.facing * 1500 });
  const e = gunPoint(EJECT[stance]);
  shells.push({
    x: e.x, y: e.y,
    vx: -player.facing * (80 + Math.random() * 140),
    vy: -(260 + Math.random() * 160),
    rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 20,
    life: 1.2,
  });
  flashT = 0.07; flashSeed = Math.random();
}

function updateEffects(dt) {
  flashT = Math.max(0, flashT - dt);
  hurtFlash = Math.max(0, hurtFlash - dt);
  if (teleT > 0) {                   // 傳送黑幕進行中
    const prevTele = teleT;
    teleT -= dt;
    if (prevTele > 0.45 && teleT <= 0.45 && teleCp) {   // 全黑瞬間搬人
      player.x = teleCp.x; player.y = teleCp.y;
      player.vx = 0; player.vy = 0;
      checkpoint.x = teleCp.x; checkpoint.y = teleCp.y; checkpoint.active = true;
      cam.x = teleCp.x; cam.y = teleCp.y - 140;
      teleCp = null;
    }
  }
  checkAchievements(dt);
  autosaveT -= dt;                   // 週期自動存檔（30s；存進度與最後存檔點，不存位置）
  if (autosaveT <= 0) {
    saveGame();
    autosaveT = 30;
    autosaveFlashT = 1.4;
  }
  for (let i = dusts.length - 1; i >= 0; i--) {
    const d = dusts[i];
    d.t -= dt;
    if (d.t <= 0) { dusts.splice(i, 1); continue; }
    d.x += d.vx * dt; d.y += d.vy * dt;
    d.vx *= 0.9; d.vy *= 0.9;
    d.r += 6 * dt;                   // 塵土擴散變淡
  }
  if ((player.state === "run" || player.state === "run_shoot") && player.onGround) {
    runDustT -= dt;                  // 跑步揚塵
    if (runDustT <= 0) { spawnDust(player.x - player.facing * 14, player.y, 1, 8); runDustT = 0.22; }
  } else runDustT = 0;
  shakeT = Math.max(0, shakeT - dt);
  uiTime += dt;
  if ((cost | 0) > prevCostInt) costPopT = 0.28;   // Cost 跳格 → 數字彈跳
  prevCostInt = cost | 0;
  costPopT = Math.max(0, costPopT - dt);
  // 血包：落地 → 觸碰回復 1/3 最大生命 → 逾時消失
  for (let i = healPacks.length - 1; i >= 0; i--) {
    const p = healPacks[i];
    p.t -= dt;
    p.vy += GRAV * dt;
    const prevY = p.y;
    p.y += p.vy * dt;
    for (const s of SOLIDS) {
      if (p.x + 6 > s.x && p.x - 6 < s.x + s.w &&
          p.vy >= 0 && prevY <= s.y + 1 && p.y >= s.y) { p.y = s.y; p.vy = 0; }
    }
    let gone = p.t <= 0 || p.y > WORLD.h + 100;
    if (!gone && player.deathT <= 0 &&
        Math.abs(player.x - p.x) < 28 && Math.abs(player.y - p.y) < 60) {
      player.hp = Math.min(player.maxHp, player.hp + Math.round(player.maxHp / 3));
      for (let k = 0; k < 6; k++) {
        impacts.push({ x: p.x + (Math.random() - .5) * 30, y: p.y - Math.random() * 40, t: 0.12 + Math.random() * 0.1 });
      }
      gone = true;
    }
    if (gone) healPacks.splice(i, 1);
  }
  // 聖盾祝福計時
  if (player.buffT > 0) player.buffT = Math.max(0, player.buffT - dt);   // 霸體時效
  if (player.shieldT > 0) {
    player.shieldT -= dt;
    if (player.shieldT <= 0) { player.shieldT = 0; player.shieldHp = 0; }  // 護盾到期
  }
  akoBuffT = Math.max(0, akoBuffT - dt);
  atkBuffT = Math.max(0, atkBuffT - dt);
  playerBlockT = Math.max(0, playerBlockT - dt);
  if (!selectScreen && !bossCleared) speedrunT += dt;   // Speedrun 計時（通關即停）
  if (currentSkin === "mika" && !bossCleared) mikaUsed = true;   // 無敵造型使用標記
  for (const cp of CHECKPOINTS) {
    if (Math.abs(player.x - cp.x) < 26 && Math.abs(player.y - cp.y) < 60) yuukaShots = 0;   // 優香彩蛋：碰存檔點歸零
    if (!cp.active && player.deathT <= 0 &&
        Math.abs(player.x - cp.x) < 26 && Math.abs(player.y - cp.y) < 60) {
      cp.active = true;
      checkpoint.x = cp.x; checkpoint.y = cp.y; checkpoint.active = true;
      saveGame();                                  // 記錄開啟數與最後位置
      costPops.push({ x: cp.x, y: cp.y - 150, t: 0.9, text: "存檔完成", color: "#2ab6d9" });
      for (let k = 0; k < 6; k++) {
        impacts.push({ x: cp.x + (Math.random() - .5) * 40, y: cp.y - Math.random() * 130, t: 0.15 + Math.random() * 0.1 });
      }
    }
  }
  // 支援被動（30 秒循環；只有開局選中的支援生效）
  for (const key of ["heal", "buff", "crit"]) {
    passiveT[key] -= dt;
    if (passiveT[key] <= 0) {
      passiveT[key] = 30;
      if (!ownedSupport(key)) continue;
      if (player.deathT > 0) continue;
      if (key === "heal") {          // 芹奈：回復 1/4 最大生命
        if (player.hp < player.maxHp) {
          player.hp = Math.min(player.maxHp, player.hp + player.maxHp / 4);
          costPops.push({ x: player.x, y: player.y - 145, t: 0.9, text: "+HP", color: "#3ecf6f" });
          skillCut = { c: CARDS[{ heal: 4, buff: 5, crit: 6 }[key]], t: 0, dur: 1.2, passive: true };   // 被動演出
        }
      } else if (key === "buff") {   // 瑪麗：+1/3 護盾（30 秒）
        addPlayerShield(player.maxHp / 3, 30);
        skillCut = { c: CARDS[{ heal: 4, buff: 5, crit: 6 }[key]], t: 0, dur: 1.2, passive: true };
      } else {                       // 亞子：+1/5 護盾（15 秒）
        addPlayerShield(player.maxHp / 5, 15);
        skillCut = { c: CARDS[{ heal: 4, buff: 5, crit: 6 }[key]], t: 0, dur: 1.2, passive: true };
      }
    }
  }
  // Cost 回復 + 卡片閃光/滑入動畫衰減
  for (const c of CARDS) {
    c.flashT = Math.max(0, c.flashT - dt);
    c.dealT = Math.max(0, c.dealT - dt);
  }
  if (skillCut) {
    skillCut.t += dt;
    if (skillCut.t > skillCut.dur) skillCut = null;
  }
  // 狙擊：瞄準（追蹤目標）→ 擊發結算
  for (let i = snipeShots.length - 1; i >= 0; i--) {
    const s = snipeShots[i];
    s.t += dt;
    if (s.isSniper) {
      if (s.ally && allies.includes(s.ally)) {
        const p = sniperPortraitWorld();
        s.x = p.x; s.y = p.y;        // 肖像跟著攝影機，瞄準框跟著肖像
      }
    } else if (s.isAlly) {
      if (s.ally && allies.includes(s.ally) && s.ally.mode === "fight") {
        s.x = s.ally.x; s.y = s.ally.y - ALLY_KINDS[s.ally.kind].hitH * 0.55;
      }
    } else if (s.isBoss) {
      if (boss.active && boss.deadT <= 0) { s.x = boss.x; s.y = boss.y - boss.hitH * 0.55; }
    } else if (s.e.state !== "death") {
      s.x = s.e.x; s.y = s.e.y - s.e.h * 0.55;
    }
    if (!s.fired && s.t >= SNIPE_AIM) {
      s.fired = true;
      shakeT = SHAKE_DUR;            // 擊發震動
      if (s.isSniper) {              // 反狙擊成功：中斷場外狙擊手
        if (s.ally && allies.includes(s.ally)) allyRetreat(s.ally);
      } else if (s.isAlly) {
        if (s.ally && allies.includes(s.ally)) damageAlly(s.ally, s.dmg);
      } else if (s.isBoss) damageBoss(s.dmg); else damageEnemy(s.e, s.dmg);
      for (let k = 0; k < 6; k++) {
        impacts.push({ x: s.x + (Math.random() - .5) * 26, y: s.y + (Math.random() - .5) * 30, t: 0.12 + Math.random() * 0.1 });
      }
    }
    if (s.t > SNIPE_AIM + 0.3) snipeShots.splice(i, 1);
  }
  // 麻痺小車：沿表面直行（平台邊緣掉落續行）→ 撞實心障礙自毀（無效果）/ 撞同層敵人觸發暈眩
  for (let i = rovers.length - 1; i >= 0; i--) {
    const rv = rovers[i];
    rv.t += dt;
    rv.x += rv.dir * ROVER_SPEED * dt;
    // 重力 + 單向平台著地
    rv.vy += GRAV * dt;
    const prevY = rv.y;
    rv.y += rv.vy * dt;
    for (const s of SOLIDS) {
      if (rv.x + 8 > s.x && rv.x - 8 < s.x + s.w) {
        if (rv.vy >= 0 && prevY <= s.y + 1 && rv.y >= s.y) { rv.y = s.y; rv.vy = 0; }
      }
    }
    let gone = rv.x < WORLD.x0 - 20 || rv.x > WORLD.w + 20 || rv.y > WORLD.h + 100;
    if (!gone) {
      for (const s of SOLIDS) {              // 實心障礙側撞（薄平台不算；要同高度）
        if (s.h > 30 && rv.y > s.y + 2 && rv.y - 14 < s.y + s.h &&
            rv.x + 12 > s.x && rv.x - 12 < s.x + s.w) {
          impacts.push({ x: rv.x, y: rv.y - 10, t: 0.12 });
          gone = true;
          break;
        }
      }
    }
    if (!gone) {
      for (const e of enemies) {             // 同層才命中（腳底高度差 < 50）
        if (e.state !== "death" && Math.abs(rv.x - e.x) < e.w / 2 + 14 &&
            Math.abs(rv.y - e.y) < 50) {
          roverStun(e, false);
          gone = true;
          break;
        }
      }
      if (!gone && boss.active && boss.deadT <= 0 &&
          Math.abs(rv.x - boss.x) < boss.hitW / 2 + 14 && Math.abs(rv.y - boss.y) < 60) {
        roverStun(null, true);
        gone = true;
      }
      for (const a of allies) {
        if (gone || a.kind === "sniper" || a.mode !== "fight") continue;
        if (Math.abs(rv.x - a.x) < ALLY_KINDS[a.kind].hitW / 2 + 14 &&
            Math.abs(rv.y - a.y) < 50) {
          stunAlly(a, 1);               // 小車也能暈召喚隊友（盾兵放盾）
          for (let k = 0; k < 6; k++) {
            impacts.push({ x: a.x + (Math.random() - .5) * 30, y: a.y - Math.random() * 100, t: 0.12 + Math.random() * 0.1 });
          }
          gone = true;
        }
      }
    }
    if (gone) rovers.splice(i, 1);
  }
  // 閃光彈：拋物線旋轉飛行 → 落地引爆
  for (let i = grenades.length - 1; i >= 0; i--) {
    const g = grenades[i];
    g.vy += GREN_G * dt;
    g.x += g.vx * dt;
    g.y += g.vy * dt;
    g.rot += 11 * dt;
    if (g.vy > 0 && g.y >= (g.gy || F1_Y) - 8) {
      doAreaBlast(g.x, g.gy);
      grenades.splice(i, 1);
    }
  }
  // 空投直升機：左→右飛越，到目標區上空開始沿途鋪火
  for (let i = helis.length - 1; i >= 0; i--) {
    const h = helis[i];
    h.t += dt;
    h.x += HELI_SPEED * dt;
    if (h.drops === undefined && h.x >= h.x0) h.drops = 0;   // 進入區域：開始投彈
    if (h.drops !== undefined && h.drops < 5 &&
        h.x >= h.x0 + h.drops * (h.x1 - h.x0) / 4.001) {      // 等距 5 顆
      fireMissiles.push({
        x: h.x, y: cam.y - 270 + 80,
        vx: 70, vy: 500,
        gy: h.gy || F1_Y,
      });
      h.drops++;
    }
    if (h.x > cam.x + VIEW_W / 2 + HELI_FX.w + 60) helis.splice(i, 1);
  }
  // 燃燒飛彈：俯衝 → 觸地爆炸（傷害+點燃）＋殘留火焰區
  for (let i = fireMissiles.length - 1; i >= 0; i--) {
    const ms = fireMissiles[i];
    ms.vy += 1100 * dt;
    ms.x += ms.vx * dt;
    ms.y += ms.vy * dt;
    if (ms.y >= ms.gy - 6) {
      blasts.push({ x: ms.x, y: ms.gy, t: 0.35 });
      shakeT = Math.max(shakeT, 0.12);
      for (const e of enemies) {
        if (e.state !== "death" && Math.abs(e.x - ms.x) < 80 && Math.abs(e.y - ms.gy) < 110) { damageEnemy(e, 1.5); e.burnT = 20; }
      }
      if (boss.active && boss.deadT <= 0 && Math.abs(boss.x - ms.x) < 80 && Math.abs(boss.y - ms.gy) < 140) { damageBoss(1); boss.burnT = 20; }
      for (const a of allies) {
        if (a.kind !== "sniper" && a.mode === "fight" && Math.abs(a.x - ms.x) < 80 && Math.abs(a.y - ms.gy) < 110) { damageAlly(a, a.kind === "gunner" ? 2 : 1); a.burnT = 20; }   // 克制鏈：鋼鐵雨對妮可×2
      }
      flameZones.push({ x0: ms.x - 45, x1: ms.x + 45, t: 5, gy: ms.gy });
      fireMissiles.splice(i, 1);
    }
  }
  // 火焰殘留區：站在裡面的目標重新點燃
  for (let i = flameZones.length - 1; i >= 0; i--) {
    const z = flameZones[i];
    z.t -= dt;
    for (const e of enemies) {
      if (e.state !== "death" && e.x > z.x0 && e.x < z.x1 &&
          Math.abs(e.y - z.gy) < 100) e.burnT = 20;
    }
    if (boss.active && boss.deadT <= 0 && boss.x > z.x0 && boss.x < z.x1 &&
        Math.abs(boss.y - z.gy) < 40) boss.burnT = 20;
    for (const a of allies) {
      if (a.kind !== "sniper" && a.mode === "fight" && a.x > z.x0 && a.x < z.x1 &&
          Math.abs(a.y - z.gy) < 100) a.burnT = 20;
    }
    if (z.t <= 0) flameZones.splice(i, 1);
  }
  // 燃燒結算：每秒 3% 最大生命（舉盾中不掉血，燃燒時間照走）
  for (const e of enemies) {
    if (e.state === "death") { e.burnT = 0; continue; }
    if (e.burnT > 0) {
      e.burnT -= dt;
      if (!shieldUp(e)) {
        e.hp -= e.maxHp * 0.03 * dt;
        if (e.hp <= 0) damageEnemy(e, 0);
      }
    }
  }
  if (boss.burnT > 0 && boss.active && boss.deadT <= 0) {
    boss.burnT -= dt;
    boss.hp -= boss.maxHp * 0.03 * dt;
    if (boss.hp <= 0) damageBoss(0);
  }
  for (const a of allies) {
    if (a.burnT > 0 && a.mode === "fight") {
      a.burnT -= dt;
      if (!allyShieldUp(a)) {
        a.hp -= a.maxHp * 0.03 * dt;
        if (a.hp <= 0) allyRetreat(a);
      }
    }
  }
  for (let i = tracers.length - 1; i >= 0; i--) {
    tracers[i].t -= dt;
    if (tracers[i].t <= 0) tracers.splice(i, 1);
  }
  for (let i = blasts.length - 1; i >= 0; i--) {
    blasts[i].t -= dt;
    if (blasts[i].t <= 0) blasts.splice(i, 1);
  }
  // 血條白影：受擊後延遲追上實際血量
  if (player.hpGhost < player.hp) player.hpGhost = player.hp;
  else player.hpGhost += (player.hp - player.hpGhost) * (1 - Math.exp(-dt * 3.5));
  if (boss.hpGhost < boss.hp) boss.hpGhost = boss.hp;
  else boss.hpGhost += (boss.hp - boss.hpGhost) * (1 - Math.exp(-dt * 3.5));
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (b.x0 === undefined) b.x0 = b.x;   // 記錄出膛位置
    b.x += b.vx * dt;
    let hit = b.x < WORLD.x0 - 20 || b.x > WORLD.w + 20 ||
              Math.abs(b.x - b.x0) > BULLET_RANGE;   // 超射程消散
    // 打中小怪
    for (const e of enemies) {
      if (e.state === "death") continue;
      if (Math.abs(b.x - e.x) < e.w / 2 && b.y > e.y - e.h && b.y < e.y) {
        const r = rollPlayerDmg();
        damageEnemy(e, r.dmg, r.crit);
        gainCostOnHit();
        hit = true;
        break;
      }
    }
    // 打中 Boss（待命中無敵，開戰後才吃傷害）
    if (!hit && boss.active && boss.deadT <= 0 &&
        Math.abs(b.x - boss.x) < boss.hitW / 2 + 6 &&
        b.y > boss.y - boss.hitH && b.y < boss.y) {
      const r = rollPlayerDmg();
      damageBoss(r.dmg, r.crit);
      gainCostOnHit();
      hit = true;
    }
    // 打中召喚隊友（盾兵會整發擋下，後面的 Boss 打不到）
    if (!hit) {
      for (const a of allies) {
        if (a.kind === "sniper" || a.mode !== "fight") continue;
        if (Math.abs(b.x - a.x) < ALLY_KINDS[a.kind].hitW / 2 + 6 &&
            b.y > a.y - ALLY_KINDS[a.kind].hitH && b.y < a.y) {
          const r = rollPlayerDmg();
          damageAlly(a, r.dmg, r.crit);
          gainCostOnHit();
          hit = true;
          break;
        }
      }
    }
    if (!hit) {
      for (const s of SOLIDS) {
        if (s.h <= 30) continue;   // 單向薄平台不擋子彈
        if (b.x > s.x && b.x < s.x + s.w && b.y > s.y && b.y < s.y + s.h) {
          if (s.breakable) damageBreakable(s, 1, b.x, b.y);
          hit = true;
          break;
        }
      }
    }
    if (hit) {
      impacts.push({ x: b.x, y: b.y, t: 0.1 });
      bullets.splice(i, 1);
    }
  }
  for (let i = shells.length - 1; i >= 0; i--) {
    const s = shells[i];
    s.vy += GRAV * 0.8 * dt;
    s.x += s.vx * dt; s.y += s.vy * dt;
    s.rot += s.vr * dt;
    for (const sol of SOLIDS) {
      if (s.vy > 0 && s.x > sol.x && s.x < sol.x + sol.w &&
          s.y > sol.y && s.y - s.vy * dt <= sol.y + 2) {
        s.y = sol.y; s.vy *= -0.45; s.vx *= 0.6; s.vr *= 0.5;
        break;
      }
    }
    s.life -= dt;
    if (s.life <= 0) shells.splice(i, 1);
  }
  for (let i = impacts.length - 1; i >= 0; i--) {
    impacts[i].t -= dt;
    if (impacts[i].t <= 0) impacts.splice(i, 1);
  }
  for (let i = costPops.length - 1; i >= 0; i--) {
    costPops[i].t -= dt;
    if (costPops[i].t <= 0) costPops.splice(i, 1);
  }
  for (let i = dmgPops.length - 1; i >= 0; i--) {
    dmgPops[i].t -= dt;
    if (dmgPops[i].t <= 0) dmgPops.splice(i, 1);
  }
}

function physics(dt) {
  player.invulnT = Math.max(0, player.invulnT - dt);
  if (player.deathT > 0) {                  // 死亡流程：黑幕最深處重生
    const prev = player.deathT;
    player.deathT -= dt;
    if (prev > 0.7 && player.deathT <= 0.7) respawnPlayer();
  }
  updateElevators(dt);
  updateMovers(dt);
  updateItems(dt);
  updateGates();
  updateSpecialObjects(dt);
  const left = keys.ArrowLeft || keys.KeyA || vpad.joyDx < -0.35;
  const right = keys.ArrowRight || keys.KeyD || vpad.joyDx > 0.35;
  const jumpKey = keys.Space || keys.KeyW || keys.ArrowUp || vpad.jump;
  const crouchKey = keys.KeyS || keys.ArrowDown || vpad.joyDy > 0.5;
  const fireKey = keys.KeyJ || vpad.fire;

  if (keys.KeyH && !(player.state === "hurt" && !animDone(ANIMS.hurt, player.t))) {
    hurtPlayer(-player.facing);
  }
  const hurting = (player.state === "hurt" && !animDone(ANIMS.hurt, player.t)) || player.deathT > 0;

  // reload: R to reload manually, auto when firing on empty; blocks shooting
  if (player.reloadT > 0) {
    player.reloadT -= dt;
    if (player.reloadT <= 0) { player.reloadT = 0; player.ammo = MAG_SIZE; }
  }
  if (!hurting && player.reloadT <= 0 &&
      (((keys.KeyR || vpad.reload) && player.ammo < MAG_SIZE) || (fireKey && player.ammo <= 0))) {
    player.reloadT = RELOAD_TIME;
  }
  const reloading = player.reloadT > 0;

  player.crouching = crouchKey && player.onGround && !hurting;
  const shooting = fireKey && player.onGround && !hurting && !reloading && player.ammo > 0;
  const moveInput = left || right;

  if (player.crouching || (shooting && !moveInput)) {
    player.vx = 0;                     // planted while crouching or standing fire
    if (right && !left) player.facing = 1;
    if (left && !right) player.facing = -1;
  } else if (!hurting) {
    player.vx = (right ? MOVE : 0) - (left ? MOVE : 0);
    if (right && !left) player.facing = 1;
    if (left && !right) player.facing = -1;
  } else {
    player.vx *= Math.pow(0.02, dt);
  }

  player.jumpBuf = jumpKey ? BUFFER : Math.max(0, player.jumpBuf - dt);
  player.coyote = player.onGround ? COYOTE : Math.max(0, player.coyote - dt);
  if (!hurting && !player.crouching && player.jumpBuf > 0 && player.coyote > 0) {
    player.vy = -JUMP_V;
    player.coyote = 0; player.jumpBuf = 0;
    player.onGround = false;
    setState("rise");
    spawnDust(player.x, player.y, 4, 26);
  }

  player.vy += GRAV * dt;

  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  const hw = HITBOX_W / 2;
  player.x += player.vx * dt;
  for (const s of SOLIDS) {
    if (s.h <= 30) continue;
    if (player.y > s.y && player.y - hh < s.y + s.h) {
      if (player.x + hw > s.x && player.x - hw < s.x + s.w) {
        player.x = player.vx > 0 ? s.x - hw : s.x + s.w + hw;
      }
    }
  }
  player.x = Math.max(WORLD.x0 + hw, Math.min(WORLD.w - hw, player.x));

  const prevY = player.y;
  player.y += player.vy * dt;
  const wasOnGround = player.onGround;
  player.onGround = false;
  for (const s of SOLIDS) {
    if (player.x + hw > s.x && player.x - hw < s.x + s.w) {
      if (player.vy >= 0 && prevY <= s.y + 1 && player.y >= s.y) {
        player.y = s.y; player.vy = 0; player.onGround = true;
      } else if (s.h > 30 && player.vy < 0 && prevY - hh >= s.y + s.h && player.y - hh < s.y + s.h) {
        player.y = s.y + s.h + hh; player.vy = 0;
      }
    }
  }

  // ---- state machine ----
  if (hurting) return;
  if (player.state === "hurt") setState(player.onGround ? "idle" : "fall");

  if (!player.onGround) {
    if (player.vy < 0) { if (player.state !== "rise") setState("rise"); }
    else if (player.state !== "fall") setState("fall");
  } else if (player.crouching) {
    setState(shooting ? "crouch_shoot" : "crouch_idle");
  } else if (shooting) {
    setState(moveInput ? "run_shoot" : "shoot");
  } else {
    if (!wasOnGround) { setState(moveInput ? "run" : "land"); spawnDust(player.x, player.y, 5, 30); }
    else if (player.state === "land") {
      if (moveInput) setState("run");
      else if (animDone(ANIMS.land, player.t)) setState("idle");
    }
    else setState(moveInput ? "run" : "idle");
  }
}

// 以視差係數 f 平鋪一條水平層，bottomY = 該層底邊的世界 y（f=1 時）
function drawStrip(img, f, bottomY, s) {
  const camL = cam.x - VIEW_W / 2, camT = cam.y - 270;
  const w = img.width * s, h = img.height * s;
  const y = bottomY - h - CAM_T0 * (1 - f) - camT * f;
  const phase = ((camL * f) % w + w) % w;
  for (let x = -phase - w; x < VIEW_W + w; x += w) {
    ctx.drawImage(img, Math.round(x), Math.round(y), Math.round(w), Math.round(h));
  }
}

function tileRow(img, x0, y0, wTotal, s, srcH) {
  // 沿 x 平鋪一個圖塊列（世界座標內），srcH 可截取來源上半部
  const sh = srcH || img.height;
  const w = img.width * s, h = sh * s;
  ctx.save();
  ctx.beginPath();
  ctx.rect(x0, y0, wTotal, h);
  ctx.clip();
  for (let x = x0; x < x0 + wTotal; x += w) {
    ctx.drawImage(img, 0, 0, img.width, sh, Math.round(x), Math.round(y0), Math.round(w), Math.round(h));
  }
  ctx.restore();
}

function drawGhostWalls() {
  for (const g of GHOST_WALLS) {
    if (g.alpha <= .01) continue;
    ctx.save();
    ctx.globalAlpha = g.alpha;
    ctx.beginPath(); ctx.rect(g.x, g.y, g.w, g.h); ctx.clip();
    if (ENV.wallFill.img && ENV.wallFill.img.width) {
      const tw = Math.max(20, g.w), th = Math.round(159 * tw / 155);
      for (let ty = g.y; ty < g.y + g.h; ty += th) ctx.drawImage(ENV.wallFill.img, g.x, ty, tw, th);
    } else {
      ctx.fillStyle = "#676b74";
      ctx.fillRect(g.x, g.y, g.w, g.h);
    }
    ctx.restore();
  }
}

function draw() {
  ctx.setTransform(RES, 0, 0, RES, 0, 0);   // 邏輯座標 VIEW_W×540 → 實際解析度
  ctx.clearRect(0, 0, VIEW_W, 540);
  const camL = Math.round(cam.x - VIEW_W / 2), camT = Math.round(cam.y - 270);

  ctx.fillStyle = "#141114";
  ctx.fillRect(0, 0, VIEW_W, 540);

  ctx.save();
  let jx = 0, jy = 0;
  if (shakeT > 0) {                 // 震動只作用世界層，HUD 不動
    const k = shakeT / SHAKE_DUR;
    jx = (Math.random() - .5) * 14 * k;
    jy = (Math.random() - .5) * 9 * k;
  }
  ctx.translate(-camL + jx, -camT + jy);

  // 場景背景：每層樓一條走廊帶（x 視差 0.5），其上遠景牆帶；景深＝越遠越糊（預烘焙模糊版）
  if (ENV.corridor.img && ENV.corridor.img.width) {
    const corridorImg = blurredTile(ENV.corridor.img, 2);   // 中景走廊：糊 2px
    const wallImg = ENV.bgWall.img && ENV.bgWall.img.width ? blurredTile(ENV.bgWall.img, 4) : null;   // 遠景牆：糊 4px（更遠更糊）
    const bgS = 1.7;
    const bw = Math.round(625 * bgS), bh = Math.round(170 * bgS);
    const ww2 = Math.round(625 * 1.2), wh2 = Math.round(234 * 1.2);
    const par = camL * 0.5;
    for (const fy of [L0_Y, L1_Y, L2_Y, L3_Y, L4_Y]) {
      const by = fy - bh;
      let bx = Math.floor((camL - par) / bw) * bw + Math.floor(par / bw) * bw;
      bx = camL - ((camL * 0.5) % bw) - bw;
      if (wallImg) {   // 先畫遠景牆（最深）
        const wy = by - wh2;
        let wx = camL - ((camL * 0.3) % ww2) - ww2;
        ctx.globalAlpha = 0.72;                 // 遠景大氣衰減：更淡
        for (let x = wx; x < camL + VIEW_W + ww2; x += ww2) {
          ctx.drawImage(wallImg, x, wy, ww2, wh2);
        }
        ctx.globalAlpha = 1;
      }
      ctx.globalAlpha = 0.92;                   // 中景走廊：略淡
      for (let x = bx; x < camL + VIEW_W + bw; x += bw) {
        ctx.drawImage(corridorImg, x, by, bw, bh);
      }
      ctx.globalAlpha = 1;
    }
  }
  {   // 大氣景深霧：背景之上疊淡藍霧，越往深處越濃（增強遠近層次）
    const hz = ctx.createLinearGradient(0, camT, 0, camT + 540);
    hz.addColorStop(0, "rgba(30,42,66,.28)");
    hz.addColorStop(0.55, "rgba(24,34,54,.10)");
    hz.addColorStop(1, "rgba(20,28,46,0)");
    ctx.fillStyle = hz;
    ctx.fillRect(camL, camT, VIEW_W, 540);
  }
  // 地形：素材換皮（薄平台=平台皮；厚板=牆板填充+黃線頂緣；窄牆=直鋪牆板）
  for (const s of SOLIDS) {
    if (s.deco || s.hidden || s.elevator) continue;
    if (s.breakable) {
      ctx.save();
      ctx.beginPath(); ctx.rect(s.x, s.y, s.w, s.h); ctx.clip();
      if (s.type === "crate" && ENV.crate.img && ENV.crate.img.width) {
        ctx.drawImage(ENV.crate.img, s.x, s.y, s.w, s.h);
      } else if (ENV.breakWall.img && ENV.breakWall.img.width) {
        const tw = Math.max(30, s.w), th = tw * ENV.breakWall.img.height / ENV.breakWall.img.width;
        for (let ty = s.y; ty < s.y + s.h; ty += th) ctx.drawImage(ENV.breakWall.img, s.x, ty, tw, th);
      } else {
        ctx.fillStyle = s.type === "crate" ? "#76512d" : "#67636b";
        ctx.fillRect(s.x, s.y, s.w, s.h);
      }
      ctx.restore();
      continue;
    }
    if (s === bossGate || s.gate) {
      const gd = s.gate ? GATES.find(g3 => g3.solid === s) : null;
      if (gd?.lock && ENV.keyDoor.img && ENV.keyDoor.img.width) {   // 鑰匙門：完整電子鎖門板
        ctx.drawImage(ENV.keyDoor.img, s.x - 5, s.y, s.w + 10, s.h);
        ctx.save();
        ctx.globalAlpha = .18 + .12 * Math.sin(uiTime * 4);
        ctx.fillStyle = "#ff493f";
        ctx.fillRect(s.x + s.w * .18, s.y + s.h * .38, s.w * .64, s.h * .18);
        ctx.restore();
        continue;
      }
      if (s.gate && ENV.gateSkin.img && ENV.gateSkin.img.width) {   // 單向門：能量燈柱垂直平鋪
        ctx.save();
        ctx.beginPath(); ctx.rect(s.x - 3, s.y, s.w + 6, s.h); ctx.clip();
        const gw2 = s.w + 6, gh2 = gw2 * ENV.gateSkin.img.height / ENV.gateSkin.img.width;
        for (let gy2 = s.y; gy2 < s.y + s.h; gy2 += gh2 - 4) {
          ctx.drawImage(ENV.gateSkin.img, s.x - 3, gy2, gw2, gh2);
        }
        ctx.restore();
        if (gd?.side && ENV.gateArrow.img && ENV.gateArrow.img.width) {   // 可通行方向箭頭（呼吸閃爍）
          const aw = 32, ah = aw * ENV.gateArrow.img.height / ENV.gateArrow.img.width;
          ctx.save();
          if (gd.side === "right") {
            ctx.translate(s.x + s.w / 2, 0); ctx.scale(-1, 1); ctx.translate(-(s.x + s.w / 2), 0);
          }
          ctx.globalAlpha = 0.7 + 0.3 * Math.sin(uiTime * 4);
          ctx.drawImage(ENV.gateArrow.img, s.x + s.w / 2 - aw / 2, s.y + s.h / 2 - ah / 2, aw, ah);
          ctx.restore();
          ctx.globalAlpha = 1;
        }
        continue;
      }
      ctx.fillStyle = "#b4483c";               // Boss 落閘／素材未載入退回紅牆
      ctx.fillRect(s.x, s.y, s.w, s.h);
      ctx.strokeStyle = "#3c3c42";
      ctx.strokeRect(s.x + .5, s.y + .5, s.w - 1, s.h - 1);
      continue;
    }
    const themed = ENV.platSkin.img && ENV.platSkin.img.width;
    if (!themed) {   // 素材未載入（無頭測試）：灰盒退回
      ctx.fillStyle = s.h <= 30 ? "#9a9aa4" : "#8a8a92";
      ctx.fillRect(s.x, s.y, s.w, s.h);
      continue;
    }
    if (s.h <= 30) {                       // 薄平台
      if (s.w >= 170) {
        // float_04 頂部 21/57 是欄杆：上移讓甲板面(第21列)對齊物理面，欄杆成為背景裝飾
        const dh2 = Math.max(26, s.h + 18);
        const ty = s.y - dh2 * 21 / 57;
        if (s.w <= 280) {
          ctx.drawImage(ENV.platSkin2.img, s.x - 3, ty, s.w + 6, dh2);
        } else {                           // 長平台：以素材原比例分節平鋪，接縫疊在欄杆柱上
          const tileW = 198 * dh2 / 57;
          ctx.save();
          ctx.beginPath(); ctx.rect(s.x - 3, ty, s.w + 6, dh2); ctx.clip();
          for (let tx = s.x - 3; tx < s.x + s.w + 3; tx += tileW - 10) {
            ctx.drawImage(ENV.platSkin2.img, tx, ty, tileW, dh2);
          }
          ctx.restore();
        }
      } else {
        ctx.drawImage(ENV.platSkin.img, s.x - 3, s.y - 3, s.w + 6, Math.max(26, s.h + 18));
      }
    } else if (s.w > s.h * 1.2) {          // 厚板/地板/掩體
      ctx.save();
      ctx.beginPath();
      ctx.rect(s.x, s.y, s.w, s.h);
      ctx.clip();
      if (s.h <= 130 && s.w <= 340) {      // 小型塊：磁磚縮放至塊高、貼齊左緣（避免大磁磚被裁出隨機切片）
        const th2 = s.h, tw2 = Math.max(1, Math.round(124 * s.h / 127));
        for (let tx = s.x; tx < s.x + s.w; tx += tw2) ctx.drawImage(ENV.wallFill.img, tx, s.y, tw2, th2);
        ctx.restore();
        const hs = Math.max(10, Math.min(16, s.h * 0.35));   // 黃條隨塊縮小
        ctx.drawImage(ENV.floorTop.img, s.x, s.y - Math.round(hs / 3), s.w, hs);
      } else {
        const tw = 124, th = 127;          // tile_19 155x159 縮 0.8（磁磚貼齊塊左緣）
        for (let ty = s.y; ty < s.y + s.h; ty += th) {
          for (let tx = s.x; tx < s.x + s.w; tx += tw) {
            ctx.drawImage(ENV.wallFill.img, tx, ty, tw, th);
          }
        }
        ctx.restore();
        ctx.drawImage(ENV.floorTop.img, s.x, s.y - 8, s.w, 24);   // 頂緣黃線（上移讓腳踩在亮條上）
      }
    } else {                               // 窄高牆
      ctx.save();
      ctx.beginPath();
      ctx.rect(s.x, s.y, s.w, s.h);
      ctx.clip();
      const tw = s.w, th = Math.round(159 * s.w / 155);
      for (let ty = s.y; ty < s.y + s.h; ty += th) {
        ctx.drawImage(ENV.wallFill.img, s.x, ty, tw, th);
      }
      ctx.restore();
    }
  }
  // 裝飾：存檔點旁警示燈、電梯底貨箱
  if (ENV.lamp.img && ENV.lamp.img.width) {
    for (const cp of CHECKPOINTS) {
      const lh = 74, lw = Math.round(ENV.lamp.img.width * lh / ENV.lamp.img.height) || 24;
      ctx.drawImage(ENV.lamp.img, cp.x - 66, cp.y - lh, lw, lh);
    }
    if (ENV.crate.img && ENV.crate.img.width) {
      for (const el of ELEVATORS) {
        ctx.drawImage(ENV.crate.img, el.x - 84, el.bottom - 58, 72, 58);
      }
    }
  }
  // 電梯（琥珀平台 + 紅三角 + 井道虛線）
  for (const el of ELEVATORS) {
    ctx.setLineDash([6, 8]);
    ctx.strokeStyle = "rgba(200,200,210,.35)";
    ctx.beginPath();
    ctx.moveTo(el.x + 4, el.top - 60); ctx.lineTo(el.x + 4, el.bottom);
    ctx.moveTo(el.x + el.w - 4, el.top - 60); ctx.lineTo(el.x + el.w - 4, el.bottom);
    ctx.stroke();
    ctx.setLineDash([]);
    if (ENV.elevSkin.img && ENV.elevSkin.img.width) {   // 懸浮平台素材（推進器懸在物理面下方）
      const dw2 = el.w + 10, dh3 = dw2 * ENV.elevSkin.img.height / ENV.elevSkin.img.width;
      ctx.drawImage(ENV.elevSkin.img, el.x - 5, el.y - 3, dw2, dh3);
    } else {                                            // 素材未載入退回琥珀平台
      ctx.fillStyle = "#c9a13b";
      ctx.fillRect(el.x, el.y, el.w, 14);
      ctx.strokeStyle = "#3c3c42";
      ctx.strokeRect(el.x + .5, el.y + .5, el.w - 1, 13);
    }
    ctx.fillStyle = "#e8544a";                       // 紅三角（地圖記號同款）
    ctx.beginPath();
    ctx.moveTo(el.x + el.w / 2, el.y - 22);
    ctx.lineTo(el.x + el.w / 2 - 12, el.y - 4);
    ctx.lineTo(el.x + el.w / 2 + 12, el.y - 4);
    ctx.closePath();
    ctx.fill();
    if (el.lock && !unlocks.keys.includes(el.lock)) {   // 鎖：灰罩 + 鎖頭
      ctx.fillStyle = "rgba(20,22,28,.55)";
      ctx.fillRect(el.x - 4, el.y - 26, el.w + 8, 44);
      const lx = el.x + el.w / 2, ly = el.y - 40;
      ctx.fillStyle = "#e8c04a";
      ctx.fillRect(lx - 9, ly, 18, 14);
      ctx.strokeStyle = "#e8c04a"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(lx, ly, 6, Math.PI, 0); ctx.stroke(); ctx.lineWidth = 1;
      ctx.fillStyle = "#141414";
      ctx.fillRect(lx - 1.5, ly + 4, 3, 6);
      ctx.font = `italic 900 11px ${UI_FONT}`;
      ctx.textAlign = "center";
      ctx.fillStyle = "#e8c04a";
      ctx.fillText(el.lock, lx, ly + 28);
      ctx.textAlign = "left";
    }
  }
  // 門的資訊覆蓋層（門體與單向箭頭已由地形素材層繪製）
  for (let i = 0; i < GATES.length; i++) {
    if (openedGates.includes(i)) continue;
    const g = GATES[i];
    if (g.lock) {
      const lx = g.x + g.w / 2;
      ctx.font = `italic 900 11px ${UI_FONT}`;
      ctx.textAlign = "center";
      ctx.strokeStyle = "rgba(10,12,18,.9)"; ctx.lineWidth = 3;
      ctx.strokeText(g.lock, lx, g.y - 8);
      ctx.fillStyle = "#ffb34d";
      ctx.fillText(g.lock, lx, g.y - 8);
      ctx.lineWidth = 1; ctx.textAlign = "left";
    }
  }
  // 地圖道具（漂浮菱形 + 光暈）
  for (let i = 0; i < ITEM_SPAWNS.length; i++) {
    if (collectedItems.includes(i)) continue;
    const it = ITEM_SPAWNS[i];
    const bob = Math.sin(uiTime * 3 + i) * 6;
    const ix = it.x, iy = it.y - 54 + bob;
    const col = it.type === "char" ? "#ffcf4a" : it.type === "skin" ? "#ff8ac2" : "#ffa14a";
    ctx.save();
    ctx.globalAlpha = 0.28 + 0.12 * Math.sin(uiTime * 4 + i);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(ix, iy, 26, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(ix, iy - 15); ctx.lineTo(ix + 11, iy); ctx.lineTo(ix, iy + 15); ctx.lineTo(ix - 11, iy);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.85)";
    ctx.stroke();
    ctx.font = `italic 900 11px ${UI_FONT}`;
    ctx.textAlign = "center";
    ctx.strokeStyle = "rgba(20,22,28,.8)"; ctx.lineWidth = 3;
    ctx.strokeText(itemLabel(it), ix, iy - 24);
    ctx.fillStyle = "#fff";
    ctx.fillText(itemLabel(it), ix, iy - 24);
    ctx.lineWidth = 1;
    ctx.textAlign = "left";
  }
  // 可破壞箱／牆掉落物
  for (const d of DROPPED_ITEMS) {
    const bob = Math.sin(uiTime * 5 + d.x * .02) * 5;
    const y = d.y - 18 + bob;
    const col = d.type === "key" ? "#ffa14a" : d.type === "skin" ? "#ff8ac2" :
                d.type === "card" ? "#ffcf4a" : d.type === "heal" ? "#63e28f" : "#65c8ff";
    ctx.save();
    ctx.globalAlpha = .18;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(d.x, y, 25, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(d.x, y - 13); ctx.lineTo(d.x + 10, y); ctx.lineTo(d.x, y + 13); ctx.lineTo(d.x - 10, y);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.stroke();
    ctx.font = `italic 900 11px ${UI_FONT}`; ctx.textAlign = "center";
    ctx.fillStyle = "#fff"; ctx.fillText(d.label, d.x, y - 20); ctx.textAlign = "left";
  }
  // 存檔點柱（未啟用灰 / 啟用後青色脈動）
  for (const cp of CHECKPOINTS) {
    const on = cp.active;
    ctx.fillStyle = on ? "#1d4e66" : "#55555e";
    ctx.fillRect(cp.x - 5, cp.y - 118, 10, 118);
    ctx.fillStyle = on ? "#59d5f2" : "#83838d";
    ctx.beginPath();
    ctx.arc(cp.x, cp.y - 128, on ? 9 + Math.sin(uiTime * 5) * 1.5 : 8, 0, Math.PI * 2);
    ctx.fill();
    if (on) {
      ctx.strokeStyle = `rgba(89,213,242,${0.35 + 0.25 * Math.sin(uiTime * 5)})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cp.x, cp.y - 128, 15, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 1;
    }
  }
  drawEnemies();
  drawAlly();
  drawBoss();
  drawEnemyBullets();

  const a = ANIMS[player.state];
  let fi = frameIndex(a, player.t);
  if ((player.state === "run" || player.state === "run_shoot") &&
      player.vx !== 0 && Math.sign(player.vx) !== player.facing) {
    fi = a.count - 1 - fi;               // 倒退走（面向與移動相反）：動畫倒放
  }
  const scale = DRAW_H / FRAME_H;
  const dw = FRAME_W * scale * SLIM, dh = DRAW_H;
  ctx.save();
  if (player.facing === -1) {
    ctx.translate(player.x, 0); ctx.scale(-1, 1); ctx.translate(-player.x, 0);
  }
  if (player.invulnT > 0 && player.deathT <= 0) {          // 無敵幀閃爍
    ctx.globalAlpha = ((player.invulnT * 12) | 0) % 2 ? 0.35 : 0.9;
  }
  ctx.drawImage(a.img, fi * FRAME_W, 0, FRAME_W, FRAME_H,
    player.x - ANCHOR_X * dw, player.y - FEET_Y * dh, dw, dh);
  ctx.restore();
  // 護盾能量護罩（與敵方盾兵同款泡泡）
  if (player.shieldHp > 0) drawShieldBubble(player.x, player.y, 128, playerBlockT);
  drawGhostWalls();   // 無碰撞前景牆：碰到玩家後淡出並維持消失
  // reload progress ring above the head
  if (player.reloadT > 0) {
    const frac = 1 - player.reloadT / RELOAD_TIME;
    const rx = player.x, ry = player.y - DRAW_H - 14;
    ctx.lineWidth = 4;
    ctx.strokeStyle = "rgba(255,255,255,.45)";
    ctx.beginPath();
    ctx.arc(rx, ry, 11, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = UI_YELLOW;
    ctx.beginPath();
    ctx.arc(rx, ry, 11, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }
  drawEffects();
  if (targeting) drawTargetingWorld();
  ctx.restore();   // end camera transform

  // 子彈時間：藍色暗角 + 上下黑邊
  if (targeting) {
    ctx.fillStyle = "rgba(25,50,100,.16)";
    ctx.fillRect(0, 0, VIEW_W, 540);
    ctx.fillStyle = "rgba(8,10,16,.55)";
    ctx.fillRect(0, 0, VIEW_W, 26);
    ctx.fillRect(0, 514, VIEW_W, 26);
    ctx.textAlign = "center";
    ctx.font = `bold 14px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(`${CARDS[hand[targeting.slot]].name} — 左鍵確認 · J/射擊鍵 快速施放 · 右鍵取消`, VIEW_W / 2, 532);
    ctx.textAlign = "left";
  }

  // 受傷紅閃（世界層之上、HUD 之下）
  drawForeground();
  if (hurtFlash > 0) {
    ctx.fillStyle = `rgba(255,50,40,${(hurtFlash / 0.3) * 0.25})`;
    ctx.fillRect(0, 0, VIEW_W, 540);
  }
  // 閃光盾致盲：先全白再漸退（HUD 之下，血條/卡片仍可見）
  if (blindT > 0) {
    const a = blindT > BLIND_DUR - 0.5 ? 1 : Math.min(1, blindT / (BLIND_DUR - 0.5));
    ctx.fillStyle = `rgba(255,255,255,${a * 0.96})`;
    ctx.fillRect(0, 0, VIEW_W, 540);
  }
  // 低血量警示：四邊紅色暈影脈動
  if (player.hp / player.maxHp <= 0.25 && player.deathT <= 0) {
    const pulse = 0.5 + 0.42 * Math.sin(uiTime * 6);
    const d = 72, col = a => `rgba(255,38,28,${a})`;
    let g = ctx.createLinearGradient(0, 0, 0, d);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(0, 0, VIEW_W, d);
    g = ctx.createLinearGradient(0, 540, 0, 540 - d);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(0, 540 - d, VIEW_W, d);
    g = ctx.createLinearGradient(0, 0, d, 0);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(0, 0, d, 540);
    g = ctx.createLinearGradient(VIEW_W, 0, VIEW_W - d, 0);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(VIEW_W - d, 0, d, 540);
  }
  drawHUD();
  drawSkillCut();
  if (teleT > 0) {                 // 傳送黑幕
    const a = teleT > 0.45 ? (0.9 - teleT) / 0.45 : teleT / 0.45;
    ctx.fillStyle = `rgba(8,8,12,${Math.min(1, a)})`;
    ctx.fillRect(0, 0, VIEW_W, 540);
  }
  if (autosaveFlashT > 0) {          // 自動存檔指示（右下角，不打擾）
    autosaveFlashT -= 1 / 60;
    ctx.textAlign = "right";
    ctx.font = `bold 11px ${UI_FONT}`;
    ctx.fillStyle = `rgba(120,200,255,${Math.min(0.7, autosaveFlashT)})`;
    ctx.fillText("✓ 已自動存檔", VIEW_W - 12, 528);
    ctx.textAlign = "left";
  }
  // 死亡黑幕（蓋過一切）
  if (player.deathT > 0) {
    const a = player.deathT > 0.7 ? (1.4 - player.deathT) / 0.7 : player.deathT / 0.7;
    ctx.fillStyle = `rgba(8,8,12,${Math.min(1, a)})`;
    ctx.fillRect(0, 0, VIEW_W, 540);
  }
  drawMinimap();
  drawPanel();
  drawBag();
  if (vpad.on && !selectScreen && !bagOpen) drawVpad();
  if (selectScreen) drawSelectScreen();
  if (dialogue) drawDialogue();
  if (menuScreen) drawMenu();
  dbg.textContent = `state=${player.state} frame=${fi} hp=${player.hp} ammo=${player.ammo} ground=${player.onGround} cam=${Math.round(cam.x)},${Math.round(cam.y)}`;
}

// ---- 存檔點面板繪製（強化 / 傳送）----
const CP_NAMES = ["起始平原・電梯前", "下水道中段", "中央大廳", "東塔電梯前", "Boss 門前"];
function drawPanel() {
  if (!panel.open) return;
  panel.btns = [];
  const cx = VIEW_W / 2;
  ctx.save();
  ctx.fillStyle = "rgba(16,26,44,.66)";
  ctx.fillRect(0, 0, VIEW_W, 540);
  const PW = 560, PH = 380, px = cx - PW / 2, py = 70;
  ctx.shadowColor = "rgba(20,40,80,.4)";
  ctx.shadowBlur = 14;
  slantPath(px, py, PW, PH, 14);
  ctx.fillStyle = "rgba(250,252,255,.97)";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.save();
  slantPath(px, py, PW, PH, 14);
  ctx.clip();
  ctx.fillStyle = UI_BLUE;
  ctx.fillRect(px, py, PW + 14, 4);
  ctx.restore();
  ctx.textAlign = "left";
  ctx.font = `italic 900 20px ${UI_FONT}`;
  ctx.fillStyle = UI_NAVY;
  ctx.fillText("補給站", px + 26, py + 34);
  if (CREDIT_FX.img) ctx.drawImage(CREDIT_FX.img, px + 130, py + 16, 24, 21);   // 移到標題右側（原本被匯出/匯入鈕擋住）
  ctx.font = `italic 900 17px ${UI_FONT}`;
  ctx.fillStyle = "#e8a417";
  ctx.fillText(String(credits), px + 160, py + 34);
  const tabs = ["強化", "招募", "傳送", "造型", "成就"];
  for (let i = 0; i < 5; i++) {
    const tx = px + 26 + i * 97, ty = py + 50, tw = 88, th = 28;
    slantPath(tx, ty, tw, th, 7);
    ctx.fillStyle = panel.tab === i ? UI_BLUE : "rgba(140,155,180,.35)";
    ctx.fill();
    ctx.textAlign = "center";
    ctx.font = `italic 900 15px ${UI_FONT}`;
    ctx.fillStyle = panel.tab === i ? "#fff" : UI_NAVY;
    ctx.fillText(tabs[i], tx + tw / 2, ty + 20);
    panel.btns.push({ x: tx, y: ty, w: tw, h: th, fn: (j => () => { panel.tab = j; panel.scroll = 0; })(i) });
  }
  // 內容區：滾輪捲動＋遮罩裁切（超出面板的列被 clip 掉，捲出可視範圍的按鈕不可點）
  const scy = panel.scroll || 0;
  const clipTop = py + 84, clipBottom = py + PH - 12;
  const btnsBeforeContent = panel.btns.length;
  ctx.save();
  ctx.beginPath();
  ctx.rect(px + 2, clipTop, PW - 4, clipBottom - clipTop);
  ctx.clip();
  if (panel.tab === 1) {           // ---- 招募頁（未選的支援角色，300C 加入卡池）----
    let row = 0;
    for (const idx of SUPPORT_IDS) {
      const c = CARDS[idx];
      const ownedP = purchasedSupports.includes(idx) || idx === chosenSupport;   // 已選角色視同擁有
      const mystery = idx >= 7 && !ownedP;         // 日鞠/風華/三千留：地圖道具解鎖，不販售
      const ry = py + 84 + row * 46 - scy;
      if (mystery) {
        slantPath(px + 26, ry, PW - 52, 40, 8);
        ctx.fillStyle = "rgba(90,100,120,.10)";
        ctx.fill();
        slantPath(px + 26, ry, PW - 52, 40, 8);
        ctx.strokeStyle = "rgba(120,150,190,.25)";
        ctx.stroke();
        ctx.textAlign = "left";
        ctx.font = `italic 900 13.5px ${UI_FONT}`;
        ctx.fillStyle = "rgba(43,58,85,.5)";
        ctx.fillText("？？？", px + 78, ry + 17);
        ctx.font = `bold 10.5px ${UI_FONT}`;
        ctx.fillText(T("recruitMystery"), px + 78, ry + 33);
        row++;
        continue;
      }
      slantPath(px + 26, ry, PW - 52, 40, 8);
      ctx.fillStyle = ownedP ? "rgba(62,207,111,.12)" : "rgba(53,195,240,.08)";
      ctx.fill();
      slantPath(px + 26, ry, PW - 52, 40, 8);
      ctx.strokeStyle = "rgba(120,150,190,.4)";
      ctx.stroke();
      if (c.img) {                 // 頭像（每位獨立的方形裁切，正方對正方）
        const sc = c.shopCrop;
        ctx.save();
        slantPath(px + 33, ry + 3, 34, 34, 4);
        ctx.clip();
        if (sc) ctx.drawImage(c.img, sc.sx, sc.sy, sc.s, sc.s, px + 33, ry + 3, 34, 34);
        else ctx.drawImage(c.img, c.crop.sx, c.crop.sy, c.crop.sw, c.crop.sh, px + 33, ry + 3, 34, 43);
        ctx.restore();
      }
      ctx.textAlign = "left";
      ctx.font = `italic 900 13.5px ${UI_FONT}`;
      ctx.fillStyle = UI_NAVY;
      ctx.fillText(c.name, px + 78, ry + 17);
      ctx.font = `bold 10.5px ${UI_FONT}`;
      ctx.fillStyle = "rgba(43,58,85,.6)";
      const descs = { 4: T("sup4"), 5: T("sup5"), 6: T("sup6"), 7: T("sup7"), 8: T("sup8"), 9: T("sup9") };
      ctx.fillText((idx === chosenSupport ? "〔開局選擇〕" : "") + (descs[idx] || ""), px + 78, ry + 33);
      const benched = benchedSupports.includes(idx);
      const poolFull = supportsInPool() >= SUPPORT_POOL_MAX;
      const bx = px + PW - 142, bw = 102, bh = 28, by = ry + 6;
      slantPath(bx, by, bw, bh, 8);
      ctx.fillStyle = ownedP ? (benched ? (poolFull ? "rgba(140,152,170,.9)" : UI_BLUE) : "rgba(232,84,74,.9)")
                             : credits >= SUPPORT_PRICES[idx] ? UI_BLUE : "rgba(140,152,170,.9)";
      ctx.fill();
      ctx.textAlign = "center";
      ctx.font = `italic 900 14px ${UI_FONT}`;
      ctx.fillStyle = "#fff";
      ctx.fillText(ownedP ? (benched ? (poolFull ? "卡池已滿" : "加回卡池") : "移出卡池") : `${SUPPORT_PRICES[idx]} C`, bx + bw / 2, by + 20);
      if (ownedP) panel.btns.push({ x: bx, y: by, w: bw, h: bh, fn: (ii => () => toggleSupportInPool(ii))(idx) });
      else panel.btns.push({ x: bx, y: by, w: bw, h: bh, fn: (ii => () => buySupport(ii))(idx) });

      row++;
    }
  } else if (panel.tab === 0) {    // ---- 強化頁 ----
    const keys = Object.keys(UPGRADE_DEFS);
    for (let i = 0; i < keys.length; i++) {
      const k = keys[i], d = UPGRADE_DEFS[k];
      const ry = py + 96 + i * 58 - scy;
      slantPath(px + 26, ry, PW - 52, 48, 9);
      ctx.fillStyle = "rgba(53,195,240,.08)";
      ctx.fill();
      slantPath(px + 26, ry, PW - 52, 48, 9);
      ctx.strokeStyle = "rgba(120,150,190,.4)";
      ctx.stroke();
      ctx.textAlign = "left";
      ctx.font = `italic 900 16px ${UI_FONT}`;
      ctx.fillStyle = UI_NAVY;
      ctx.fillText(`${i + 1}. ${d.name} ${d.step}`, px + 44, ry + 30);
      for (let q = 0; q < d.max; q++) {
        ctx.fillStyle = q < upgrades[k] ? UI_BLUE : "rgba(120,140,170,.3)";
        ctx.fillRect(px + 230 + q * 14, ry + 19, 10, 10);
      }
      const maxed = upgrades[k] >= d.max;
      const cost = upgradeCost(k);
      const afford = !maxed && credits >= cost;
      const bx = px + PW - 150, bw = 108, bh = 34, by = ry + 7;
      slantPath(bx, by, bw, bh, 8);
      ctx.fillStyle = maxed ? "rgba(140,152,170,.6)" : afford ? UI_BLUE : "rgba(140,152,170,.9)";
      ctx.fill();
      ctx.textAlign = "center";
      ctx.font = `italic 900 14px ${UI_FONT}`;
      ctx.fillStyle = "#fff";
      ctx.fillText(maxed ? "已滿級" : `${cost} C`, bx + bw / 2, by + 23);
      if (!maxed) panel.btns.push({ x: bx, y: by, w: bw, h: bh, fn: (kk => () => buyUpgrade(kk))(k) });
    }
  } else if (panel.tab === 2) {    // ---- 傳送頁 ----
    let row = 0;
    for (let i = 0; i < CHECKPOINTS.length; i++) {
      const cp = CHECKPOINTS[i];
      if (!cp.active) continue;
      const ry = py + 88 + row * 52 - scy;
      const here = Math.abs(player.x - cp.x) < 70 && Math.abs(player.y - cp.y) < 90;
      slantPath(px + 26, ry, PW - 52, 44, 9);
      ctx.fillStyle = here ? "rgba(53,195,240,.2)" : "rgba(53,195,240,.08)";
      ctx.fill();
      slantPath(px + 26, ry, PW - 52, 44, 9);
      ctx.strokeStyle = "rgba(120,150,190,.4)";
      ctx.stroke();
      ctx.textAlign = "left";
      ctx.font = `italic 900 15px ${UI_FONT}`;
      ctx.fillStyle = UI_NAVY;
      ctx.fillText(CP_NAMES[i] || `站點 ${i + 1}`, px + 44, ry + 28);
      if (!here) {
        const bx = px + PW - 150, bw = 108, bh = 32, by = ry + 6;
        slantPath(bx, by, bw, bh, 8);
        ctx.fillStyle = UI_BLUE;
        ctx.fill();
        ctx.textAlign = "center";
        ctx.font = `italic 900 14px ${UI_FONT}`;
        ctx.fillStyle = "#fff";
        ctx.fillText("傳送", bx + bw / 2, by + 22);
        panel.btns.push({ x: bx, y: by, w: bw, h: bh, fn: (c => () => teleportTo(c))(cp) });
      } else {
        ctx.textAlign = "right";
        ctx.font = `bold 13px ${UI_FONT}`;
        ctx.fillStyle = "rgba(43,58,85,.6)";
        ctx.fillText("目前位置", px + PW - 44, ry + 28);
      }
      row++;
    }
    if (row === 0) {
      ctx.textAlign = "center";
      ctx.font = `bold 14px ${UI_FONT}`;
      ctx.fillStyle = "rgba(43,58,85,.6)";
      ctx.fillText("尚未開啟其他傳送點", cx, py + 140);
    }
  } else if (panel.tab === 3) {    // ---- 造型頁 ----
    let row = 0;
    for (const id in SKINS) {
      const s = SKINS[id];
      if (!s.anims) continue;
      const ry = py + 96 + row * 58 - scy;
      const active = currentSkin === id;
      const lockedSkin = id !== "default" && !unlocks.skins.includes(id);
      if (lockedSkin) {
        slantPath(px + 26, ry, PW - 52, 48, 9);
        ctx.fillStyle = "rgba(90,100,120,.10)";
        ctx.fill();
        slantPath(px + 26, ry, PW - 52, 48, 9);
        ctx.strokeStyle = "rgba(120,150,190,.25)";
        ctx.stroke();
        ctx.textAlign = "left";
        ctx.font = `italic 900 16px ${UI_FONT}`;
        ctx.fillStyle = "rgba(43,58,85,.5)";
        ctx.fillText("？？？", px + 88, ry + 24);
        ctx.font = `bold 11px ${UI_FONT}`;
        ctx.fillText(s.hintFn ? s.hintFn() : T(s.hint || "hintDefault"), px + 88, ry + 40);
        row++;
        continue;
      }
      slantPath(px + 26, ry, PW - 52, 48, 9);
      ctx.fillStyle = active ? "rgba(62,207,111,.15)" : "rgba(53,195,240,.08)";
      ctx.fill();
      slantPath(px + 26, ry, PW - 52, 48, 9);
      ctx.strokeStyle = "rgba(120,150,190,.4)";
      ctx.stroke();
      if (s.anims.idle && s.anims.idle.img) {   // 預覽：idle 第 0 幀
        ctx.save();
        slantPath(px + 34, ry + 4, 40, 40, 4);
        ctx.clip();
        const ph = 40 * s.fh / s.fw * 1.6;
        ctx.drawImage(s.anims.idle.img, 0, 0, s.fw, s.fh, px + 30, ry + 4, 52, ph);
        ctx.restore();
      }
      ctx.textAlign = "left";
      ctx.font = `italic 900 16px ${UI_FONT}`;
      ctx.fillStyle = UI_NAVY;
      ctx.fillText(s.label, px + 88, ry + 30);
      const bx = px + PW - 150, bw = 108, bh = 32, by = ry + 8;
      slantPath(bx, by, bw, bh, 8);
      ctx.fillStyle = active ? "rgba(62,207,111,.85)" : UI_BLUE;
      ctx.fill();
      ctx.textAlign = "center";
      ctx.font = `italic 900 14px ${UI_FONT}`;
      ctx.fillStyle = "#fff";
      ctx.fillText(active ? "使用中" : "更換", bx + bw / 2, by + 22);
      if (!active) panel.btns.push({ x: bx, y: by, w: bw, h: bh, fn: (ii => () => { applySkin(ii); saveGame(); })(id) });
      row++;
    }
  }
  if (panel.tab === 4) {           // ---- 成就頁 ----
    let row = 0;
    for (const a of ACHIEVEMENTS) {
      const done = achUnlocked.includes(a.id);
      const ry = py + 88 + row * 48 - scy;
      slantPath(px + 26, ry, PW - 52, 42, 8);
      ctx.fillStyle = done ? "rgba(255,215,94,.14)" : "rgba(90,100,120,.10)";
      ctx.fill();
      slantPath(px + 26, ry, PW - 52, 42, 8);
      ctx.strokeStyle = done ? "rgba(232,164,23,.55)" : "rgba(120,150,190,.25)";
      ctx.stroke();
      ctx.textAlign = "center";
      ctx.font = `900 20px ${UI_FONT}`;
      ctx.fillStyle = done ? "#e8a417" : "rgba(120,140,170,.5)";
      ctx.fillText(done ? "★" : "・", px + 52, ry + 28);
      ctx.textAlign = "left";
      ctx.font = `italic 900 14px ${UI_FONT}`;
      ctx.fillStyle = done ? UI_NAVY : "rgba(43,58,85,.5)";
      ctx.fillText(a.name, px + 78, ry + 18);
      ctx.font = `bold 11px ${UI_FONT}`;
      ctx.fillStyle = done ? "rgba(43,58,85,.7)" : "rgba(43,58,85,.4)";
      ctx.fillText(a.desc, px + 78, ry + 34);
      row++;
    }
    ctx.textAlign = "right";
    ctx.font = `italic 900 13px ${UI_FONT}`;
    ctx.fillStyle = "#e8a417";
    ctx.fillText(achUnlocked.length + " / " + ACHIEVEMENTS.length, px + PW - 40, py + 88 - scy - 6);
    ctx.textAlign = "left";
  }
  ctx.restore();   // 內容區遮罩結束
  // 內容總高（未捲動座標）→ 可捲動上限；夾住目前捲動量
  let contentBottomY;
  if (panel.tab === 0) contentBottomY = py + 96 + Object.keys(UPGRADE_DEFS).length * 58;
  else if (panel.tab === 1) contentBottomY = py + 84 + SUPPORT_IDS.length * 46;
  else if (panel.tab === 2) contentBottomY = py + 88 + CHECKPOINTS.filter(c => c.active).length * 52;
  else if (panel.tab === 3) contentBottomY = py + 96 + Object.values(SKINS).filter(s => s.anims).length * 58;
  else contentBottomY = py + 88 + ACHIEVEMENTS.length * 48;
  panel.maxScroll = Math.max(0, contentBottomY + 6 - clipBottom);
  panel.scroll = Math.max(0, Math.min(scy, panel.maxScroll));
  // 捲出可視範圍的內容按鈕不可點
  panel.btns = panel.btns.slice(0, btnsBeforeContent).concat(
    panel.btns.slice(btnsBeforeContent).filter(b => b.y + b.h > clipTop + 2 && b.y < clipBottom - 2));
  if (panel.maxScroll > 0) {       // 捲軸指示
    const trackH = clipBottom - clipTop;
    const thumbH = Math.max(28, trackH * trackH / (trackH + panel.maxScroll));
    const thumbY = clipTop + (trackH - thumbH) * (panel.scroll / panel.maxScroll);
    ctx.fillStyle = "rgba(43,58,85,.12)";
    ctx.fillRect(px + PW - 12, clipTop, 4, trackH);
    ctx.fillStyle = "rgba(43,58,85,.35)";
    ctx.fillRect(px + PW - 12, thumbY, 4, thumbH);
  }
  const cbx = px + PW - 46, cby = py + 12, cbs = 30;
  if (false) {   // 「你想要無敵嗎」：彌香密語按鈕（暫時移除，改回 true 即恢復）
    const mx = cbx - 76 * 2 - 8 - 118, mw = 110;
    slantPath(mx, cby, mw, cbs, 6);
    ctx.fillStyle = "#e88fb0";
    ctx.fill();
    ctx.textAlign = "center";
    ctx.font = `italic 900 12px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText("你想要無敵嗎", mx + mw / 2, cby + 20);
    panel.btns.push({ x: mx, y: cby, w: mw, h: cbs, fn: tryMikaPassword });
  }
  // 存檔碼匯出/匯入（跨裝置備份）
  for (const [i, [label, fn]] of [["匯出檔", exportSave], ["匯入檔", importSave]].entries()) {
    const ex = cbx - 76 * (2 - i) - 8, ew = 68;
    slantPath(ex, cby, ew, cbs, 6);
    ctx.fillStyle = UI_BLUE;
    ctx.fill();
    ctx.textAlign = "center";
    ctx.font = `italic 900 13px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(label, ex + ew / 2, cby + 20);
    panel.btns.push({ x: ex, y: cby, w: ew, h: cbs, fn });
  }
  slantPath(cbx, cby, cbs, cbs, 6);
  ctx.fillStyle = UI_RED;
  ctx.fill();
  ctx.textAlign = "center";
  ctx.font = `italic 900 16px ${UI_FONT}`;
  ctx.fillStyle = "#fff";
  ctx.fillText("×", cbx + cbs / 2, cby + 21);
  panel.btns.push({ x: cbx, y: cby, w: cbs, h: cbs, fn: closePanel });
  ctx.textAlign = "left";
  ctx.restore();
}

// ---- 手機虛擬控制繪製（浮動搖桿 + 右側按鈕圈）----
function drawVpad() {
  ctx.save();
  // 搖桿：觸摸中畫在起點，否則畫半透明提示圈
  const jx = vpad.joyId !== null ? vpad.joyBaseX : 118;
  const jy = vpad.joyId !== null ? vpad.joyBaseY : 430;
  const activeJoy = vpad.joyId !== null;
  ctx.globalAlpha = activeJoy ? 0.55 : 0.22;
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#fff";
  ctx.beginPath(); ctx.arc(jx, jy, 52, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,.25)";
  ctx.beginPath(); ctx.arc(jx + vpad.joyDx * 34, jy + vpad.joyDy * 34, 26, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,.8)";
  ctx.beginPath(); ctx.arc(jx + vpad.joyDx * 34, jy + vpad.joyDy * 34, 26, 0, Math.PI * 2); ctx.stroke();
  // 按鈕圈
  for (const k in VBTN) {
    const b = VBTN[k];
    const pressed = vpad[k];
    ctx.globalAlpha = pressed ? 0.85 : 0.3;
    ctx.fillStyle = pressed ? "rgba(53,195,240,.5)" : "rgba(255,255,255,.18)";
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = pressed ? UI_BLUE : "#fff";
    ctx.lineWidth = pressed ? 3 : 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.stroke();
    ctx.textAlign = "center";
    ctx.font = `italic 900 ${b.r > 36 ? 16 : 13}px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(b.label, b.x, b.y + 5);
  }
  ctx.textAlign = "left";
  ctx.lineWidth = 1;
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ---- 開局支援選擇畫面（BA 風：白色斜切卡 + 深藍名牌）----
function drawSelectScreen() {
  ctx.save();
  ctx.fillStyle = "rgba(16,26,44,.62)";
  ctx.fillRect(0, 0, VIEW_W, 540);
  // 卡片/按鈕座標已由 layoutUI 依視寬置中，直接以絕對座標繪製
  // 標題名牌
  ctx.shadowColor = "rgba(20,40,80,.4)";
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 3;
  slantPath(VIEW_W / 2 - 150, 40, 300, 46, 12);
  ctx.fillStyle = UI_NAVY;
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  slantPath(VIEW_W / 2 - 150, 40, 300, 46, 12);
  ctx.strokeStyle = UI_BLUE;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.lineWidth = 1;
  ctx.textAlign = "center";
  ctx.font = `italic 900 22px ${UI_FONT}`;
  ctx.fillStyle = "#fff";
  ctx.fillText("選擇支援學生", VIEW_W / 2, 71);
  const DESCS = {
    heal: ["主動：血包回復 1/3 生命", "被動：每30秒回復 1/4 生命"],
    buff: ["主動：1/2 護盾+霸體(30秒)", "被動：每30秒獲得 1/3 護盾"],
    crit: ["主動：爆擊率+30% 爆傷+50%", "被動：每30秒+1/5護盾(15秒)"],
  };
  for (let i = 0; i < 3; i++) {
    const o = SELECT_OPTS[i], c = CARDS[o.card];
    const hover = mouse.sx > o.x && mouse.sx < o.x + o.w && mouse.sy > o.y && mouse.sy < o.y + o.h;
    const focus = selectFocus === i;
    const oy = o.y - (focus ? 16 : hover ? 5 : 0);   // 聚焦彈起
    ctx.shadowColor = focus ? "rgba(53,195,240,.9)" : "rgba(20,40,80,.35)";
    ctx.shadowBlur = focus ? 18 : 10;
    ctx.shadowOffsetY = focus ? 0 : 3;
    slantPath(o.x, oy, o.w, o.h, 12);
    ctx.fillStyle = "rgba(250,252,255,.96)";
    ctx.fill();
    ctx.shadowColor = "transparent";
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    slantPath(o.x, oy, o.w, o.h, 12);
    ctx.strokeStyle = focus ? (Math.sin(uiTime * 8) > 0 ? "#fff" : UI_BLUE) : hover ? UI_BLUE : "rgba(120,150,190,.4)";
    ctx.lineWidth = focus ? 4 : hover ? 3 : 1;
    ctx.stroke();
    ctx.lineWidth = 1;
    // 肖像（藍漸層底）
    ctx.save();
    slantPath(o.x + 14, oy + 14, o.w - 28, 168, 8);
    ctx.clip();
    const g = ctx.createLinearGradient(0, oy, 0, oy + 190);
    g.addColorStop(0, "#a9d5ff");
    g.addColorStop(1, "#eef6ff");
    ctx.fillStyle = g;
    ctx.fillRect(o.x, oy, o.w, 200);
    if (c.img) {
      ctx.drawImage(c.img, c.crop.sx, c.crop.sy, c.crop.sw, c.crop.sh,
        o.x + 14, oy + 8, o.w - 28, (o.w - 28) * 1.25);
    }
    ctx.restore();
    // Cost 徽章
    ctx.beginPath();
    ctx.arc(o.x + 24, oy + 24, 14, 0, Math.PI * 2);
    ctx.fillStyle = UI_NAVY;
    ctx.fill();
    ctx.strokeStyle = UI_YELLOW;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.font = `italic 900 16px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(String(c.cost), o.x + 24, oy + 30);
    // 名牌
    slantPath(o.x + 12, oy + 192, o.w - 24, 32, 8);
    ctx.fillStyle = UI_NAVY;
    ctx.fill();
    ctx.font = `italic 900 17px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(c.name, o.x + o.w / 2, oy + 215);
    // 說明
    ctx.font = `bold 12.5px ${UI_FONT}`;
    ctx.fillStyle = UI_NAVY;
    const lines = DESCS[c.skill];
    for (let li = 0; li < lines.length; li++) {
      ctx.fillText(lines[li], o.x + o.w / 2, oy + 246 + li * 20);
    }
    // 按鍵小方牌
    slantPath(o.x + o.w / 2 - 12, oy + o.h - 20, 24, 18, 4);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.strokeStyle = "rgba(43,58,85,.5)";
    ctx.stroke();
    ctx.font = `bold 12px ${UI_FONT}`;
    ctx.fillStyle = UI_NAVY;
    ctx.fillText(String(i + 1), o.x + o.w / 2, oy + o.h - 6);
  }
  // 確認按鈕（先點卡片彈起，再按此定案）
  const b = CONFIRM_BTN;
  const canConfirm = selectFocus !== null;
  const bHover = canConfirm && mouse.sx > b.x && mouse.sx < b.x + b.w && mouse.sy > b.y && mouse.sy < b.y + b.h;
  ctx.shadowColor = canConfirm ? "rgba(53,195,240,.7)" : "rgba(20,40,80,.3)";
  ctx.shadowBlur = canConfirm ? (bHover ? 16 : 10) : 5;
  ctx.shadowOffsetY = 2;
  slantPath(b.x, b.y, b.w, b.h, 9);
  ctx.fillStyle = canConfirm ? UI_BLUE : "rgba(140,152,170,.9)";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  slantPath(b.x, b.y, b.w, b.h, 9);
  ctx.strokeStyle = bHover ? "#fff" : "rgba(255,255,255,.5)";
  ctx.lineWidth = bHover ? 3 : 1.5;
  ctx.stroke();
  ctx.lineWidth = 1;
  ctx.font = `italic 900 17px ${UI_FONT}`;
  ctx.fillStyle = "#fff";
  ctx.fillText(canConfirm ? "確認選擇（Enter）" : "請先選擇一位學生", b.x + b.w / 2, b.y + 28);
  ctx.textAlign = "left";
  ctx.restore();
}

// ---- BA 風 UI：白色斜切面板 + 深藍字 + 天藍飾條 + 膠囊進度條 ----
const UI_NAVY = "#2b3a55", UI_BLUE = "#2ba7f0", UI_RED = "#e8544a", UI_YELLOW = "#ffcc37";
const UI_FONT = "'PixelCJK', 'Segoe UI', 'Noto Sans TC', sans-serif";   // 像素字體（Fusion Pixel, OFL）
try {   // 預載常用子集，避免首幀 fallback 字型閃爍
  if (typeof document !== "undefined" && document.fonts) {
    document.fonts.load("16px PixelCJK", "補給站A1");
  }
} catch (e) {}

function slantPath(x, y, w, h, s = 8) {   // 平行四邊形（右斜切）
  ctx.beginPath();
  ctx.moveTo(x + s, y);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w - s, y + h);
  ctx.lineTo(x, y + h);
  ctx.closePath();
}

function capsulePath(x, y, w, h) {        // 圓角膠囊
  const r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function capsuleBar(x, y, w, h, fills) {  // fills: [[比例, 顏色], ...] 由底到面
  capsulePath(x, y, w, h);
  ctx.fillStyle = "#dfe6ee";
  ctx.fill();
  for (const [frac, col] of fills) {
    if (frac <= 0) continue;
    capsulePath(x, y, Math.max(h, w * Math.min(1, frac)), h);
    ctx.fillStyle = col;
    ctx.fill();
  }
  capsulePath(x, y, w, h);
  ctx.strokeStyle = "rgba(110,140,180,.45)";
  ctx.stroke();
}

function uiPanel(x, y, w, h, s) {         // 白色斜切面板 + 陰影 + 天藍頂飾條
  ctx.shadowColor = "rgba(20,40,80,.25)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  slantPath(x, y, w, h, s);
  ctx.fillStyle = "rgba(250,252,255,.92)";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  slantPath(x, y, w, h, s);
  ctx.strokeStyle = "rgba(120,150,190,.35)";
  ctx.stroke();
  ctx.save();
  slantPath(x, y, w, h, s);
  ctx.clip();
  ctx.fillStyle = UI_BLUE;                // 頂緣飾條
  ctx.fillRect(x, y, w + s, 4);
  ctx.restore();
}

// 技能施放橫幅（BA 式 cut-in：頭像 + 斜切名牌，滑入 → 停留 → 滑出）
function drawSkillCut() {
  if (!skillCut) return;
  const t = skillCut.t, outT = skillCut.dur - 0.25;
  let dx = 0;
  if (t < 0.15) { const k = 1 - t / 0.15; dx = -340 * k * k; }          // ease-out 滑入
  else if (t > outT) { const k = (t - outT) / 0.25; dx = -360 * k * k; } // 加速滑出
  const x = 16 + dx, y = 96;
  ctx.save();
  ctx.shadowColor = "rgba(20,40,80,.3)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;

  ctx.shadowColor = "transparent";

  ctx.shadowOffsetY = 0;
  ctx.save();
  slantPath(x + 54, y + 12, 214, 38, 9);
  ctx.clip();
  ctx.fillStyle = "rgba(53,195,240,.25)";      // 上半淡藍帶
  ctx.fillRect(x + 54, y + 12, 224, 14);
  ctx.fillStyle = UI_BLUE;

  slantPath(x + 54, y + 12, 214, 38, 9);
  ctx.strokeStyle = "rgba(120,150,190,.45)";

    slantPath(x + 218, y + 4, 52, 18, 5);
    ctx.fillStyle = UI_YELLOW;
    ctx.fill();
    ctx.font = `italic 900 12px ${UI_FONT}`;
    ctx.fillStyle = UI_NAVY;
    ctx.textAlign = "center";
    ctx.fillText("被動", x + 244, y + 18);
    ctx.textAlign = "left";
  }
  // 頭像框（藍漸層底）
  ctx.shadowColor = "rgba(20,40,80,.3)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  slantPath(x, y, 64, 64, 7);
  ctx.fillStyle = "#fff";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  ctx.save();
  slantPath(x + 2.5, y + 2.5, 59, 59, 6);

  slantPath(x, y, 64, 64, 7);

  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.lineWidth = 1;
  ctx.restore();
}

// 瞄準預覽（世界座標層，於相機 transform 內呼叫）
function drawTargetingWorld() {
  const { wx, wy } = mouseWorld();
  const c = CARDS[hand[targeting.slot]];
  if (c.skill === "area") {                 // 區域圈
    ctx.strokeStyle = "#35c3f0";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(wx, floorYAt(player.y), 90, 18, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = "rgba(53,195,240,.18)";
    ctx.fill();
    ctx.lineWidth = 1;
  } else if (c.skill === "fireline") {      // 地面火線帶
    const dir = Math.sign(wx - player.x) || player.facing;
    const a = player.x + dir * 20, b = player.x + dir * 380;
    const x0 = Math.min(a, b), x1 = Math.max(a, b);
    ctx.fillStyle = "rgba(255,120,40,.22)";
    const _gy = floorYAt(player.y);
    ctx.fillRect(x0, _gy - 26, x1 - x0, 26);
    ctx.strokeStyle = "rgba(255,140,50,.85)";
    ctx.strokeRect(x0 + .5, _gy - 26.5, x1 - x0 - 1, 26);
  } else if (c.skill === "stun") {          // 小車：從腳下沿當前表面的行進方向箭頭
    const dir = Math.sign(wx - player.x) || player.facing;
    const gy = player.y - 10;
    ctx.strokeStyle = "#35c3f0";
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(player.x + dir * 24, gy);
    ctx.lineTo(player.x + dir * 170, gy);
    ctx.stroke();
    ctx.setLineDash([]);
    for (let q = 0; q < 3; q++) {           // 箭頭符號
      const ax = player.x + dir * (185 + q * 14);
      ctx.beginPath();
      ctx.moveTo(ax - dir * 8, gy - 8);
      ctx.lineTo(ax, gy);
      ctx.lineTo(ax - dir * 8, gy + 8);
      ctx.stroke();
    }
    ctx.lineWidth = 1;
  } else {                                  // 狙擊：目標四角框
    const t = pickTarget(wx, wy, Infinity);
    if (t) {
      const hw = 30, y0 = t.y - t.h - 8, y1 = t.y + 6, L = 10;
      ctx.strokeStyle = "#ffcc37";
      ctx.lineWidth = 3;
      for (const [cx, cy, dx, dy] of [[t.x - hw, y0, 1, 1], [t.x + hw, y0, -1, 1], [t.x - hw, y1, 1, -1], [t.x + hw, y1, -1, -1]]) {
        ctx.beginPath();
        ctx.moveTo(cx + dx * L, cy);
        ctx.lineTo(cx, cy);
        ctx.lineTo(cx, cy + dy * L);
        ctx.stroke();
      }
      ctx.lineWidth = 1;
    } else {                                // 無有效目標：灰色十字
      ctx.strokeStyle = "rgba(255,255,255,.45)";
      ctx.beginPath();
      ctx.moveTo(wx - 10, wy); ctx.lineTo(wx + 10, wy);
      ctx.moveTo(wx, wy - 10); ctx.lineTo(wx, wy + 10);
      ctx.stroke();
    }
  }
}

// ---- 存檔點互動面板（休息：回滿血+敵人重生+存檔；升級/傳送兩頁）----
const panel = { open: false, tab: 0, btns: [] };   // btns: 每幀重建的點擊區
function nearCheckpoint() {
  for (const cp of CHECKPOINTS) {
    if (cp.active && Math.abs(player.x - cp.x) < 70 && Math.abs(player.y - cp.y) < 90) return cp;
  }
  return null;
}
function openPanel() {                 // 互動＝休息：回滿血、敵人重生、存檔
  panel.open = true; panel.tab = 0; panel.scroll = 0;
  player.hp = player.maxHp;
  resetEnemies();
  bossBullets.length = 0;
  saveGame();

}
function closePanel() { panel.open = false; }
function buyUpgrade(key) {
  const c = upgradeCost(key);
  if (upgrades[key] >= UPGRADE_DEFS[key].max || credits < c) return false;
  credits -= c;
  trackSpend(c);
  upgrades[key]++;
  applyUpgrades();
  player.hp = player.maxHp;            // 升級順便回滿
  saveGame();
  return true;
}
let teleT = 0, teleCp = null;      // 傳送黑幕：前半淡入黑 → 中點搬人 → 後半淡出
function teleportTo(cp) {
  teleT = 0.9; teleCp = cp;
  player.invulnT = Math.max(player.invulnT, 1.2);

function panelClickAt(px, py) {        // 面板點擊（滑鼠/觸控共用）
  for (const b of panel.btns) {
    if (px > b.x && px < b.x + b.w && py > b.y && py < b.y + b.h) { b.fn(); return true; }
