const cam = { x: 480, y: WORLD.h - 270, lookX: 0 };
function updateCamera(dt) {
  const lookTarget = player.facing * 110 + player.vx * 0.12;   // lookahead
  cam.lookX += (lookTarget - cam.lookX) * (1 - Math.exp(-dt * 3));
  const tx = player.x + cam.lookX;
  const ty = player.y - 140;
  const dzX = 40, dzY = 60;                                    // dead zone
  let gx = cam.x, gy = cam.y;
  if (tx > cam.x + dzX) gx = tx - dzX;
  else if (tx < cam.x - dzX) gx = tx + dzX;
  if (ty > cam.y + dzY) gy = ty - dzY;
  else if (ty < cam.y - dzY) gy = ty + dzY;
  cam.x += (gx - cam.x) * (1 - Math.exp(-dt * 5));             // x damping
  cam.y += (gy - cam.y) * (1 - Math.exp(-dt * 3.2));           // y damping (softer)
  cam.x = Math.max(WORLD.x0 + VIEW_W / 2, Math.min(WORLD.w - VIEW_W / 2, cam.x));   // world bounds
  cam.y = Math.max(270, Math.min(WORLD.h - 270, cam.y));
  const cz = camZoneAt(player.x, player.y - 60);                 // 攝影機框鉗制
  if (cz !== camZone) {                                          // 換框：飛行過渡＋迷霧揭開
    camZone = cz; camFlyT = 0.9;
    const zi = CAMZONES.indexOf(cz);
    if (zi >= 0 && !visitedZones.includes(zi)) {
      visitedZones.push(zi);
      buildMinimap();
      saveGame();
    }
  }
  camFlyT = Math.max(0, camFlyT - dt);
  if (camZone) {
    const zx0 = camZone.x + VIEW_W / 2, zx1 = camZone.x + camZone.w - VIEW_W / 2;
    const zy0 = camZone.y + 270, zy1 = camZone.y + camZone.h - 270;
    const cx2 = zx1 < zx0 ? camZone.x + camZone.w / 2 : Math.max(zx0, Math.min(zx1, cam.x));
    const cy2 = zy1 < zy0 ? camZone.y + camZone.h / 2 : Math.max(zy0, Math.min(zy1, cam.y));
    if (camFlyT > 0) {
      cam.x += (cx2 - cam.x) * (1 - Math.exp(-dt * 6));
      cam.y += (cy2 - cam.y) * (1 - Math.exp(-dt * 6));
    } else { cam.x = cx2; cam.y = cy2; }
  }
  if (boss.active && boss.deadT <= 0) {                        // Boss 戰：跟隨但鉗在房內
    const lockX = Math.max(BOSS_ROOM.left + VIEW_W / 2, Math.min(BOSS_ROOM.right - VIEW_W / 2, player.x));
    cam.x += (lockX - cam.x) * (1 - Math.exp(-dt * 4));
  }
}

// ---- 存檔碼匯出/匯入（MYK2：PBKDF2-SHA256 + AES-GCM；保留 MYK1 舊碼匯入）----
const SAVE_CODE_SECRET = "ILOVEBA::MIYAKO::SAVE-CODE::2026";
const SAVE_CODE_AAD = new TextEncoder().encode("ILOVEBA|MYK2|MIYAKO");
function bytesToBase64(bytes) {
  let out = "";
  for (let i = 0; i < bytes.length; i += 0x8000) {
    out += String.fromCharCode(...bytes.subarray(i, i + 0x8000));
  }
  return btoa(out);
}
function base64ToBytes(text) {
  const raw = atob(text), bytes = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
  return bytes;
}
async function deriveSaveCodeKey(salt) {
  const material = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(SAVE_CODE_SECRET), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 120000, hash: "SHA-256" },
    material,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}
async function exportSave() {
  saveGame();
  let best = null;
  try { best = localStorage.getItem("miyako_best"); } catch (e) {}
  const data = { save: JSON.stringify(buildSaveData()), best };
  try {
    if (!crypto || !crypto.subtle) throw new Error("Web Crypto unavailable");
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveSaveCodeKey(salt);
    const plain = new TextEncoder().encode(JSON.stringify(data));
    const encrypted = new Uint8Array(await crypto.subtle.encrypt(
      { name: "AES-GCM", iv, additionalData: SAVE_CODE_AAD, tagLength: 128 },
      key,
      plain
    ));
    const packed = new Uint8Array(1 + salt.length + iv.length + encrypted.length);
    packed[0] = 2;
    packed.set(salt, 1);
    packed.set(iv, 17);
    packed.set(encrypted, 29);
    const code = "MYK2." + bytesToBase64(packed);
    try { navigator.clipboard && await navigator.clipboard.writeText(code); } catch (e) {}
    prompt("加密存檔碼（已嘗試複製到剪貼簿，也可手動全選複製保存）：", code);
  } catch (e) {
    console.error("save-code encryption failed", e);
    alert("此瀏覽器無法建立加密存檔碼");
  }
}

async function importSaveCode(s) {
  try {
    const t = s.trim();
    let data;
    if (t.startsWith("MYK2.")) {
      if (!crypto || !crypto.subtle) throw new Error("Web Crypto unavailable");
      const packed = base64ToBytes(t.slice(5));
      if (packed.length < 46 || packed[0] !== 2) throw new Error("Invalid MYK2 payload");
      const salt = packed.slice(1, 17), iv = packed.slice(17, 29), encrypted = packed.slice(29);
      const key = await deriveSaveCodeKey(salt);
      const plain = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv, additionalData: SAVE_CODE_AAD, tagLength: 128 },
        key,
        encrypted
      );
      data = JSON.parse(new TextDecoder().decode(plain));
    } else if (t.startsWith("MYK1.")) {
      data = JSON.parse(decodeURIComponent(escape(atob(t.slice(5)))));
    } else {
      throw new Error("Unknown save-code version");
    }
    JSON.parse(data.save);                       // 驗證內層格式
    localStorage.setItem("miyako_save", data.save);
    if (data.best != null) localStorage.setItem("miyako_best", data.best);
    location.hash = "#start";                    // 重載後跳過主選單直接進遊戲
    location.reload();
  } catch (e) {
    console.warn("save-code rejected", e);
    alert("存檔碼無效、密鑰不符或內容已遭修改");
  }
}

addEventListener("keydown", e => {
  keys[e.code] = true;
  if (["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code)) e.preventDefault();
  if (menuScreen) {
    if (e.code === "Escape" && menuScreen === "settings") menuScreen = "main";
    return;
  }
  if (bagOpen) {
    if (e.code === "Escape" || e.code === "KeyB") bagOpen = false;
    return;
  }
  if (dialogue) {
    if (["Space", "Enter", "KeyJ", "KeyE"].includes(e.code)) advanceDialogue();
    return;
  }
  if (e.code === "KeyF") {
    if (document.fullscreenElement) document.exitFullscreen();
    else document.documentElement.requestFullscreen().catch(() => {});
  }
  if (e.code.startsWith("Digit")) {
    const n = +e.code.slice(5);
    if (selectScreen) {                       // 開局選擇畫面：1/2/3 聚焦（彈起），Enter 確認
      if (n >= 1 && n <= 3) selectFocus = n - 1;
    } else if (n >= 1 && n <= HAND_SIZE) {
      if (targeting && targeting.slot === n - 1) cancelTargeting();   // 同鍵再按 = 取消
      else startTargeting(n - 1);
    }
  }
  if (selectScreen && (e.code === "Enter" || e.code === "Space") && selectFocus !== null) {
    chooseSupport(selectFocus);
  }
  if (e.code === "KeyE") {                            // 存檔點互動
    if (panel.open) closePanel();
    else if (!selectScreen && nearCheckpoint()) openPanel();
  }
  if (panel.open && e.code === "Tab") { panel.tab = (panel.tab + 1) % 5; panel.scroll = 0; e.preventDefault(); }
  if (panel.open && e.code.startsWith("Digit")) {     // 1-4 快速購買
    const n = +e.code.slice(5);
    if (panel.tab === 0 && n >= 1 && n <= 4) buyUpgrade(Object.keys(UPGRADE_DEFS)[n - 1]);
    return;
  }
  if (e.code === "KeyB" && !selectScreen && !panel.open) { bagOpen = true; return; }
  if (e.code === "KeyM") minimapOn = !minimapOn;      // 小地圖切換
  if (e.code === "KeyJ" && targeting) quickCast();   // 快速施法：攻擊鍵直接放
  if (e.code === "Escape") {
    if (targeting) cancelTargeting();
    else if (!selectScreen && !panel.open) { menuFrom = "game"; menuScreen = "settings"; }
  }
});
addEventListener("keyup", e => keys[e.code] = false);

// 滑鼠：瞄準游標追蹤 + 左鍵確認 / 右鍵取消 + 點卡片進入瞄準
if (cv.addEventListener) {
  cv.addEventListener("mousemove", e => {
    const r = cv.getBoundingClientRect();
    const s = Math.min(r.width / VIEW_W, r.height / 540);
    mouse.sx = (e.clientX - r.left - (r.width - VIEW_W * s) / 2) / s;
    mouse.sy = (e.clientY - r.top - (r.height - 540 * s) / 2) / s;
    if (volDrag) {                       // 音量滑桿拖曳
      const sb = menuBtns.find(b => b.volSlider);
      if (sb) setVolume((mouse.sx - sb.volSlider.x) / sb.volSlider.w);
    }
  });
  addEventListener("mouseup", () => { volDrag = false; });
  function selectClickAt(px, py) {    // 開局選擇：點卡片彈起聚焦，點確認鈕才定案
    const b = CONFIRM_BTN;
    if (selectFocus !== null && px > b.x && px < b.x + b.w && py > b.y && py < b.y + b.h) {
      chooseSupport(selectFocus);
      return;
    }
    for (let i = 0; i < SELECT_OPTS.length; i++) {
      const o = SELECT_OPTS[i];
      if (px > o.x && px < o.x + o.w && py > o.y && py < o.y + o.h) {
        selectFocus = i;
        break;
      }
    }
  }
  function cardTapAt(px, py) {        // 點卡槽 → 進入/取消瞄準；回傳是否命中卡
    const { w, h, gap, x, y } = CARD_UI;
    for (let i = 0; i < HAND_SIZE; i++) {
      const cx = x + i * (w + gap);
      if (px > cx && px < cx + w && py > y && py < y + h) {
        if (targeting && targeting.slot === i) cancelTargeting();
        else startTargeting(i);
        return true;
      }
    }
    return false;
  }
  cv.addEventListener("wheel", e => {          // 補給站面板：滾輪捲動內容
    if (panel.open) {
      panel.scroll = Math.max(0, Math.min((panel.scroll || 0) + e.deltaY * 0.6, panel.maxScroll || 0));
      e.preventDefault();
    }
  }, { passive: false });
  cv.addEventListener("mousedown", e => {
    if (e.button !== 0) return;
    if (menuScreen) { menuClickAt(mouse.sx, mouse.sy); return; }
    if (dialogue) { advanceDialogue(); return; }
    if (selectScreen) { selectClickAt(mouse.sx, mouse.sy); return; }
    if (bagOpen) {
      if (bagHit(mouse.sx, mouse.sy) || bagCloseHit(mouse.sx, mouse.sy)) bagOpen = false;
      return;
    }
    if (!panel.open && bagHit(mouse.sx, mouse.sy)) { bagOpen = true; return; }
    if (!panel.open && gearHit(mouse.sx, mouse.sy)) { menuFrom = "game"; menuScreen = "settings"; return; }
    if (panel.open) { panelClickAt(mouse.sx, mouse.sy); return; }
    if (cardTapAt(mouse.sx, mouse.sy)) return;
    if (targeting) confirmTargeting();   // 滑鼠只用於卡片瞄準（射擊改 J 鍵/虛擬按鈕）
  });
  // ---- 觸控（多點：搖桿 + 按鈕 + 卡片/瞄準）----
  function touchPos(t) {
    const r = cv.getBoundingClientRect();
    const s = Math.min(r.width / VIEW_W, r.height / 540);
    return { x: (t.clientX - r.left - (r.width - VIEW_W * s) / 2) / s,
             y: (t.clientY - r.top - (r.height - 540 * s) / 2) / s };
  }
  // 手機自動全螢幕：Android(Chrome/Brave)支援；iPhone 全系 WebKit 無此 API → 顯示加入主畫面提示
  const FS_OK = !!(document.fullscreenEnabled || document.webkitFullscreenEnabled);
  let autoFsTries = 0;
  const tryAutoFs = () => {
    if (!FS_OK || autoFsTries >= 3 || document.fullscreenElement || document.webkitFullscreenElement) return;
    autoFsTries++;
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) {
      try {
        Promise.resolve(req.call(el)).then(() => {
          try { screen.orientation && screen.orientation.lock("landscape").catch(() => {}); } catch (e2) {}
        }).catch(() => {});
      } catch (e2) {}
    }
  };
  cv.addEventListener("touchend", tryAutoFs, { passive: true });
  cv.addEventListener("click", tryAutoFs);
  cv.addEventListener("touchstart", e => {
    e.preventDefault();
    if (!vpad.on) { const h = document.getElementById("hud"); if (h) h.style.display = "none"; }
    vpad.on = true;
    for (const t of e.changedTouches) {
      const p = touchPos(t);
      mouse.sx = p.x; mouse.sy = p.y;
      if (menuScreen) { menuClickAt(p.x, p.y); continue; }
      if (dialogue) { advanceDialogue(); continue; }
      if (selectScreen) { selectClickAt(p.x, p.y); continue; }
      if (bagOpen) {
        if (bagHit(p.x, p.y) || bagCloseHit(p.x, p.y)) bagOpen = false;
        continue;
      }
      if (!panel.open && bagHit(p.x, p.y)) { bagOpen = true; continue; }
      if (!panel.open && gearHit(p.x, p.y)) { menuFrom = "game"; menuScreen = "settings"; continue; }
      if (panel.open) { panelClickAt(p.x, p.y); continue; }
      const wcx = p.x + cam.x - VIEW_W / 2, wcy = p.y + cam.y - 270;   // 點擊存檔點柱互動
      const ncp = nearCheckpoint();
      if (ncp && Math.abs(wcx - ncp.x) < 60 && Math.abs(wcy - (ncp.y - 70)) < 90) { openPanel(); continue; }
      let hitBtn = null;
      for (const k in VBTN) {
        const b = VBTN[k];
        if (Math.hypot(p.x - b.x, p.y - b.y) < b.r + 12) { hitBtn = k; break; }
      }
      if (hitBtn) {
        if (hitBtn === "fire" && targeting) { quickCast(); continue; }   // 快速施法
        vpad[hitBtn] = true; vpad.btnIds[t.identifier] = hitBtn;
        continue;
      }
      if (cardTapAt(p.x, p.y)) continue;
      if (targeting) { confirmTargeting(); continue; }
      if (p.x < VIEW_W * 0.45 && vpad.joyId === null) {   // 左半屏：浮動搖桿
        vpad.joyId = t.identifier;
        vpad.joyBaseX = p.x; vpad.joyBaseY = p.y;
        vpad.joyDx = 0; vpad.joyDy = 0;
      }
    }
  }, { passive: false });
  let panelDragY = null;   // 面板觸控拖曳捲動
  cv.addEventListener("touchmove", e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
      const p = touchPos(t);
      if (panel.open) {
        if (panelDragY !== null) {
          panel.scroll = Math.max(0, Math.min((panel.scroll || 0) + (panelDragY - p.y), panel.maxScroll || 0));
        }
        panelDragY = p.y;
        continue;
      }
      if (t.identifier === vpad.joyId) {
        vpad.joyDx = Math.max(-1, Math.min(1, (p.x - vpad.joyBaseX) / 52));
        vpad.joyDy = Math.max(-1, Math.min(1, (p.y - vpad.joyBaseY) / 52));
      } else {
        mouse.sx = p.x; mouse.sy = p.y;   // 瞄準拖曳
      }
    }
  }, { passive: false });
  function touchEnd(e) {
    e.preventDefault();
    panelDragY = null;
    for (const t of e.changedTouches) {
      if (t.identifier === vpad.joyId) {
        vpad.joyId = null; vpad.joyDx = 0; vpad.joyDy = 0;
      }
      const btn = vpad.btnIds[t.identifier];
      if (btn) { vpad[btn] = false; delete vpad.btnIds[t.identifier]; }
    }
  }
  cv.addEventListener("touchend", touchEnd, { passive: false });
  cv.addEventListener("touchcancel", touchEnd, { passive: false });
  cv.addEventListener("contextmenu", e => {
    e.preventDefault();
    cancelTargeting();
  });
}

function spawnEnemyShell(x, y, dir) {
  shells.push({
    x, y,
    vx: -dir * (80 + Math.random() * 140),
    vy: -(260 + Math.random() * 160),
    rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 20,
    life: 1.2,
  });
}

function losBlocked(x0, y0, x1, y1) {   // RAYCAST：視線是否被牆擋住（厚實心；薄平台不擋）
  const d = Math.hypot(x1 - x0, y1 - y0), n = Math.max(1, Math.ceil(d / 24));
  for (let i = 1; i < n; i++) {
    const px = x0 + (x1 - x0) * i / n, py = y0 + (y1 - y0) * i / n;
    for (const sd of SOLIDS) {
      if (sd.h <= 30) continue;
      if (px > sd.x && px < sd.x + sd.w && py > sd.y && py < sd.y + sd.h) return true;
    }
  }
  return false;
}
const EGREN_FX = { file: "assets_fx/grenade2.png" };   // 手雷兵投射物（grenade.png 是咲的閃光彈）
const eGrenades = [];
function throwEnemyGrenade(e, K) {
  if (e.state === "death") return;
  const scale = K.drawH / K.fh, dw = K.fw * scale;
  const mx = e.x + e.dir * (K.muzzle.fx - K.anchor) * dw;
  const my = e.y - (K.feet - K.muzzle.fy) * K.drawH;
  const gy = groundYAt(player.x, player.y) || floorYAt(player.y);
  const T = 0.95;                    // 飛行時間：拋物線瞄準玩家當前位置
  eGrenades.push({
    x: mx, y: my,
    vx: (player.x - mx) / T,
    vy: (gy - 8 - my - 0.5 * GREN_G * T * T) / T,
    gy, rot: 0,
  });
}

function fireEnemyShot(e, K) {
  const scale = K.drawH / K.fh, dw = K.fw * scale;
  const mx = e.x + e.dir * (K.muzzle.fx - K.anchor) * dw;
  const my = e.y - (K.feet - K.muzzle.fy) * K.drawH;
  if (K.rocket) {                  // 火箭：慢速、直擊 2 傷、落點爆風（rocketBlast）
    bossBullets.push({ x: mx, y: my, vx: e.dir * K.bulletV, vy: 0, dmg: 2, rocket: true, homeT: 3.0 });
  } else if (K.shotgun) {          // 霰彈：5 顆垂直扇形散射
    for (let k = 0; k < 5; k++) {
      bossBullets.push({
        x: mx, y: my,
        vx: e.dir * (K.bulletV + Math.random() * 80),
        vy: (k - 2) * 42 + (Math.random() - .5) * 18,
      });
    }
    spawnEnemyShell(mx - e.dir * dw * 0.3, my + 2, e.dir);
  } else {
    let vy = 0;
    if ((e.aimT || 0) > 1.2 && player.crouching) {   // 瞄準射擊：壓槍打蹲姿中心
      const dx = Math.max(60, Math.abs(player.x - mx));
      vy = ((player.y - HITBOX_H_CROUCH * 0.5) - my) / (dx / K.bulletV);
      vy = Math.max(-160, Math.min(240, vy));
    }
    bossBullets.push({ x: mx, y: my, vx: e.dir * K.bulletV, vy });
    spawnEnemyShell(mx - e.dir * dw * 0.25, my + 2, e.dir);   // 拋殼口約在槍身中段
  }
  e.flashT = 0.06;
}

function rocketBlast(x, y) {       // 火箭落點爆風：濺射 2 傷（直擊後的無敵幀天然防止重複扣血）
  sfxBoom();

  shakeT = Math.max(shakeT, 0.18);
  for (let k = 0; k < 6; k++) {
    impacts.push({ x: x + (Math.random() - .5) * 90, y: y + (Math.random() - .5) * 60, t: 0.12 + Math.random() * 0.12 });
  }
  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  if (player.invulnT <= 0 && player.deathT <= 0 &&
      Math.abs(player.x - x) < 85 && Math.abs(player.y - hh / 2 - y) < 95) {
    hurtPlayer(Math.sign(player.x - x) || 1, 2);
  }
}

function updateEnemies(dt) {
  const vulnerable = player.invulnT <= 0 && player.deathT <= 0;
  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  for (const e of enemies) {
    const K = ENEMY_KINDS[e.kind];
    if (e.state === "death") {               // 死亡動畫 → 倒數重生
      e.t += dt;
      if (animDone(K.anims.death, e.t)) {
        e.deadT = Math.max(0, e.deadT - dt);   // 屍體淡出後保持死亡（休息才重生）
      }
      continue;
    }
    if (e.stunT > 0) {                       // 暈眩：凍結動畫與 AI，不造成碰觸傷害
      if (e.state === "shoot" && K.anims.idle) {   // 盾兵：暈眩放下盾（idle），無敵解除
        e.state = "idle"; e.t = 0;
      }
      e.stunT -= dt;
      e.flashT = Math.max(0, e.flashT - dt);
      continue;
    }
    e.t += dt;
    e.flashT = Math.max(0, e.flashT - dt);
    e.blockT = Math.max(0, (e.blockT || 0) - dt);

    const dist = player.x - e.x;
    const atk = K.attack;
    const engaged = K.sightR
      ? Math.hypot(dist, player.y - e.y) < K.sightR &&
        !losBlocked(e.x, e.y - 100, player.x, player.y - 40)
      : Math.abs(dist) < (K.sight || 480) && Math.abs(player.y - e.y) < (K.sightV || 60);
    // 瞄準射擊：玩家在射線上持續蹲下 >1.2s → 直線彈敵人壓低槍口（火箭/霰彈/手雷本就反蹲，不參與）
    if (engaged && player.crouching && !K.rocket && !K.shotgun && !K.grenade) {
      e.aimT = (e.aimT || 0) + dt;
    } else {
      e.aimT = Math.max(0, (e.aimT || 0) - dt * 2);
    }
    if (K.grenade) {                          // 手雷兵：定點投擲，圓形偵測（跨樓層/高台都逃不掉）
      e.dir = Math.sign(dist) || e.dir;
      if (e.releaseT > 0) {
        e.releaseT -= dt;
        if (e.releaseT <= 0) throwEnemyGrenade(e, K);
      }
      if (e.state === "shoot" && animDone(K.anims.shoot, e.t)) { e.state = "idle"; e.t = 0; }
      if (engaged) {
        e.fireT -= dt;
        if (e.fireT <= 0) {
          e.state = "shoot"; e.t = 0;
          e.releaseT = 0.3;               // 出手幀（投擲動畫第 4 幀）
          e.fireT = atk.interval;
        }
      } else {
        e.fireT = Math.max(e.fireT, atk.first);
      }
    } else if (K.stationary) {                // 砲台：不移動，交戰時朝玩家定速射擊
      e.dir = Math.sign(dist) || e.dir;
      if (e.state !== "shoot") { e.state = "shoot"; e.t = 0; e.fireT = atk.first; }
      if (engaged) {
        e.fireT -= dt;
        if (e.fireT <= 0) {
          fireEnemyShot(e, K);
          e.fireT = atk.interval;
        }
      } else {
        e.fireT = Math.max(e.fireT, atk.first);
      }
    } else if (engaged) {
      e.dir = Math.sign(dist) || 1;
      if (atk.pushRange && Math.abs(dist) > atk.pushRange) {
        // 進逼：跑向玩家到中距離
        if (e.state !== "run") { e.state = "run"; e.t = 0; }
        e.x += e.dir * atk.pushSpeed * dt;
      } else {                                // 站定開火
        if (e.state !== "shoot") {
          e.state = "shoot"; e.t = 0;
          e.fireT = atk.first; e.burst = atk.count || 1;
        }
        e.fireT -= dt;
        if (e.fireT <= 0) {
          fireEnemyShot(e, K);
          if (atk.type === "burst") {
            e.burst--;
            if (e.burst > 0) e.fireT = atk.gap;
            else { e.fireT = atk.cooldown; e.burst = atk.count; }
          } else {
            e.fireT = atk.interval;
          }
        }
      }
    } else {                                  // 巡邏（軟折返：追擊後可走回崗位）
      if (e.state !== "run") { e.state = "run"; e.t = 0; }
      e.x += e.dir * e.speed * dt;
      if (e.x > e.home + e.range) e.dir = -1;
      if (e.x < e.home - e.range) e.dir = 1;
    }

    // 碰到玩家 → 觸發受傷
    if (vulnerable &&
        Math.abs(player.x - e.x) < (HITBOX_W + e.w) / 2 &&
        player.y > e.y - e.h && player.y - hh < e.y) {
      hurtPlayer(Math.sign(player.x - e.x) || 1);
    }
  }
}

function hurtPlayer(dir, dmg = 1) {
  if (godMode) return;
  if (player.invulnT > 0 || player.deathT > 0) return;   // 無敵幀
  if (supportEquipped(8)) dmg *= 0.7;                     // 風華被動：防禦力 +30%
  if (currentSkin === "mika") dmg *= 0.5;                 // 彌香被動：受傷減半
  if (player.shieldHp > 0) {         // 護盾先吸收（被動盾也吸；全吸收時不硬直不擊退）
    const absorbed = Math.min(player.shieldHp, dmg);
    player.shieldHp -= absorbed;
    dmg -= absorbed;
    playerBlockT = 0.18;
    if (player.shieldHp <= 0) { player.buffT = 0; player.shieldT = 0; }
    if (dmg <= 0) {
      player.invulnT = 0.5;
      hurtFlash = 0.15;
      return;
    }
  }
  player.hp = Math.max(0, player.hp - dmg);
  player.invulnT = 1.0;
  hurtFlash = 0.3;
  shakeT = Math.max(shakeT, 0.22);
  setState("hurt");
  player.vx = dir * 180;
  player.vy = player.onGround ? -250 : player.vy;
  player.onGround = false;
  player.crouching = false;
  if (player.hp <= 0) {
    player.deathT = 1.4;   // 死亡：黑幕淡入→重生→淡出
    stats.deaths++;
    cancelTargeting();
  }
}

function resetEnemies() {           // 篝火式：休息/死亡重生時全部小怪復位
  for (const e of enemies) {
    const K = ENEMY_KINDS[e.kind];
    e.hp = e.maxHp; e.x = e.home;
    e.state = K.grenade ? "idle" : K.stationary ? "shoot" : "run"; e.t = 0;
    e.stunT = 0; e.burnT = 0; e.deadT = 0; e.fireT = 0; e.flashT = 0; e.aimT = 0;
  }
}

function respawnPlayer() {
  resetEnemies();
  player.x = checkpoint.active ? checkpoint.x : 120;
  player.y = checkpoint.active ? checkpoint.y : GROUND_Y;
  player.vx = 0; player.vy = 0;
  player.hp = player.maxHp; player.hpGhost = player.maxHp;
  player.invulnT = 1.5; player.ammo = MAG_SIZE; player.reloadT = 0;
  player.shieldHp = 0; player.buffT = 0; player.shieldT = 0; akoBuffT = 0; atkBuffT = 0;
  healPacks.length = 0;
  setState("idle");
  bossBullets.length = 0;
  eGrenades.length = 0;
  if (boss.active || boss.deadT > 0) {       // Boss 戰重置回待命
    boss.active = false; boss.deadT = 0;
    boss.hp = boss.maxHp; boss.hpGhost = boss.maxHp;
    boss.x = BOSS_ROOM.homeX; boss.facing = -1; boss.vy = 0;
    boss.stunT = 0; boss.burnT = 0;
    bossSetState("shoot"); setGate(false);
    bossResetFight();
    allies.length = 0; allySummonT = 3; blindT = 0; lastSummonKind = null;
  }
}

function drawEnemies() {
  for (const e of enemies) {
    const K = ENEMY_KINDS[e.kind];
    const scale = K.drawH / K.fh;
    const dw = K.fw * scale, dh = K.drawH;
    if ((e.aimT || 0) > 0.6 && e.state !== "death" && player.crouching) {   // 瞄準射擊預警線
      const mx = e.x + e.dir * (K.muzzle.fx - K.anchor) * dw;
      const my = e.y - (K.feet - K.muzzle.fy) * K.drawH;
      const locked = e.aimT > 1.2;
      ctx.save();
      ctx.globalAlpha = locked ? 0.55 : 0.25 * ((e.aimT - 0.6) / 0.6);
      ctx.strokeStyle = "#ff4a3c";
      ctx.lineWidth = locked ? 1.5 : 1;
      if (!locked) ctx.setLineDash([5, 6]);
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(player.x, player.y - HITBOX_H_CROUCH * 0.5);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    if (e.state === "death" && animDone(K.anims.death, e.t) && e.deadT < 4.2) continue;  // 淡出完才消失
    const a = K.anims[e.state] || K.anims.shoot || K.anims.run || K.anims.idle || K.anims.death;
    if (!a) continue;
    const fi = frameIndex(a, e.t);
    ctx.save();
    if (e.dir === -1) {                     // 原生朝右 → 朝左鏡像
      ctx.translate(e.x, 0); ctx.scale(-1, 1); ctx.translate(-e.x, 0);
    }
    if (e.flashT > 0 && e.state !== "death") ctx.globalAlpha = 0.85;
    if (e.state === "death" && animDone(K.anims.death, e.t)) {   // 屍體慢慢變透明（1.2 秒淡出）
      ctx.globalAlpha = Math.max(0, Math.min(1, (e.deadT - 4.2) / 1.2));
    }
    ctx.drawImage(a.img, fi * K.fw, 0, K.fw, K.fh,
      e.x - K.anchor * dw, e.y - K.feet * dh, dw, dh);
    ctx.restore();
    ctx.globalAlpha = 1;
    if (e.burnT > 0 && e.state !== "death") {      // 燃燒特效
      ctx.globalAlpha = 0.9;
      const fs = e.h * 0.85;
      drawFire(e.burnT * 18 + e.home * 0.5, e.x - fs / 2, e.y - fs, fs);
      ctx.globalAlpha = 1;
    }
    if (e.stunT > 0 && e.state !== "death") {      // 暈眩星星
      ctx.fillStyle = "#ffd75e";
      for (let k = 0; k < 3; k++) {
        const a2 = e.stunT * 6 + k * 2.1;
        ctx.fillRect(e.x + Math.cos(a2) * 15 - 2, e.y - e.h - 12 + Math.sin(a2) * 4 - 2, 4, 4);
      }
    }
    if (shieldUp(e)) drawShieldBubble(e.x, e.y, e.h, e.blockT || 0);   // 能量護罩
    if (e.state !== "death" && e.hp < e.maxHp) {   // 血條（受損才顯示，BA 風白底紅條）
      const x0 = e.x - 24, y0 = e.y - e.h - 14;
      ctx.fillStyle = "rgba(255,255,255,.85)";
      ctx.fillRect(x0, y0, 48, 5);
      ctx.fillStyle = "#e8544a";
      ctx.fillRect(x0 + 1, y0 + 1, 46 * Math.max(0, e.hp) / e.maxHp, 3);
      ctx.strokeStyle = "rgba(43,58,85,.55)";
      ctx.strokeRect(x0 - .5, y0 - .5, 49, 6);
    }
  }
}

const ALLY_KINDS = {
  gunner: {
    anims: {
      idle:  { file: "assets_ally/idle.png",  count: 12, fps: 10, loop: true },
      shoot: { file: "assets_ally/shoot.png", count: 12, fps: 12, loop: true },
      run:   { file: "assets_ally/run.png",   count: 12, fps: 10, loop: true },
    },
    fw: 240, fh: 314, feet: 0.991, anchor: 0.433, drawH: 150,
    muzzle: { fx: 0.9809, fy: 0.3157 },
    hp: 7, hitW: 40, hitH: 130, fightAnim: "shoot",
  },
  shield: {
    anims: {
      guard: { file: "assets_ally2/guard.png", count: 12, fps: 10, loop: true },
      dizzy: { file: "assets_ally2/dizzy.png", count: 12, fps: 7,  loop: true },
      run:   { file: "assets_ally2/run.png",   count: 12, fps: 14, loop: true },
    },
    fw: 240, fh: 319, feet: 0.9905, anchor: 0.5844, drawH: 150,
    hp: 22, hitW: 64, hitH: 140, fightAnim: "guard",
  },
  sniper: {   // 場外狙擊手：不上場，只有畫面邊緣的大頭肖像；只能被玩家狙擊卡反制
    anims: {},
    hp: 1, hitW: 0, hitH: 0,
  },
};
const SNIPER_PORTRAIT = { file: "assets_ally3/portrait.png" };
let SNIPER_SX = 902;
const SNIPER_SY = 152, SNIPER_R = 34;   // 大頭肖像的螢幕座標/半徑
const SNIPER_LOCK_T = 4.2, SNIPER_FIRE_T = 5, SNIPER_MAX_SHOTS = 3;
const SNIPER_DMG = 3, SNIPER_HIT_R = 46;
const sniperBeams = [];            // 擊發光束 { x0,y0,x1,y1,t }

function sniperPortraitWorld() {   // 肖像固定在螢幕上 → 世界座標跟著攝影機
  return { x: cam.x - VIEW_W / 2 + SNIPER_SX, y: cam.y - 270 + SNIPER_SY };
}
const ALLY_SPOT_X = 900;            // gunner 固定射擊位（Boss 房左段）
const ALLY_PELLETS = 5, ALLY_FIRE_CD = 1.6;
const SHIELD_GAP = 95;             // shield 站位：Boss 正前方偏玩家側的距離
const BLIND_RANGE = 130, BLIND_DUR = 2.4, BLIND_CD = 5.5;
const ALLY_MAX_ACTIVE = 3;
const allies = [];
let allySummonT = 3;               // Boss 開戰後首次召喚倒數；撤離後重新計時
let blindT = 0;                    // 閃光盾致盲：>0 時白幕蓋住世界

function activeAllyKinds() {
  return new Set(allies.map(a => a.kind));
}

let lastSummonKind = null;         // 上一次召喚的種類：隨機抽選不連續重複
function summonAlly(kind) {
  if (allies.length >= ALLY_MAX_ACTIVE) return false;
  let available = ["gunner", "shield", "sniper"].filter(k => !activeAllyKinds().has(k));
  if (!kind) {                     // 隨機召喚：排除上一次的種類（沒得選就等下一輪）
    available = available.filter(k => k !== lastSummonKind);
  }
  if (!available.length) return false;
  const selected = kind && available.includes(kind) ? kind : available[Math.random() * available.length | 0];
  lastSummonKind = selected;
  const K = ALLY_KINDS[selected];
  const spotX = selected === "gunner"
    ? BOSS_ROOM.left + 180 + Math.random() * 1700          // 妮可：房內隨機站位
    : boss.x + (Math.sign(player.x - boss.x) || -1) * SHIELD_GAP;
  const a = {
    kind: selected, mode: "enter", spotX,
    x: spotX, y: F3_Y - 470, facing: 1,                    // 空降：站位正上方畫面外垂降
    state: "run", t: 0, hp: K.hp, maxHp: K.hp, fireT: 0, flashT: 0,
    stunT: 0, blindCd: 1, burnT: 0,
  };
  if (a.kind === "sniper") {
    a.mode = "fight";
    a.x = -9999; a.y = -9999;
    a.aimT = 0; a.shots = 0; a.locked = false;
    allies.push(a);
    return true;
  }
  allies.push(a);
  return true;
}

function removeAlly(a) {
  const i = allies.indexOf(a);
  if (i >= 0) allies.splice(i, 1);
}

function retreatAllies() {
  for (const a of [...allies]) allyRetreat(a);
}

function allyRetreat(a) {
  if (!a) return;
  if (a.kind === "sniper") {
    removeAlly(a);
    allySummonT = Math.min(allySummonT, 7);
    return;
  }
  a.mode = "retreat"; a.state = "run"; a.t = 0; a.facing = -1; a.stunT = 0; a.burnT = 0;
}

function allySpotX(a) {
  if (a.kind === "gunner") return a.spotX || ALLY_SPOT_X;
  return boss.x + (Math.sign(player.x - boss.x) || -1) * SHIELD_GAP;
}

function allyMuzzle(a) {
  const K = ALLY_KINDS.gunner;
  const dw = K.fw * (K.drawH / K.fh);
  return {
    x: a.x + a.facing * (K.muzzle.fx - K.anchor) * dw,
    y: a.y - (K.feet - K.muzzle.fy) * K.drawH,
  };
}

function allyShieldUp(a) {
  if (a) return a.kind === "shield" && a.mode === "fight" && a.stunT <= 0;
  return allies.some(x => x.kind === "shield" && x.mode === "fight" && x.stunT <= 0);
}

function damageAlly(a, dmg, crit) {
  if (!a || a.mode !== "fight" || a.kind === "sniper") return;
  if (allyShieldUp(a)) {
    a.blockT = 0.18;
    impacts.push({ x: a.x - a.facing * 20 + (Math.random() - .5) * 10,
                   y: a.y - ALLY_KINDS.shield.hitH * 0.55 - (Math.random() - .5) * 50, t: 0.1 });
    pushDmgPop(a.x, a.y - ALLY_KINDS[a.kind].hitH - 8, dmg * 0.25, crit);
    a.hp -= dmg * 0.25;
  } else {
    pushDmgPop(a.x, a.y - ALLY_KINDS[a.kind].hitH - 8, dmg, crit);
    a.hp -= dmg;
    a.flashT = 0.08;
  }
  if (a.hp <= 0) allyRetreat(a);
}

function stunAlly(a, sec) {
  if (!a || a.mode !== "fight") return;
  a.stunT = Math.max(a.stunT, sec);
}

function updateAlly(dt) {
  blindT = Math.max(0, blindT - dt);
  for (let i = sniperBeams.length - 1; i >= 0; i--) {
    sniperBeams[i].t -= dt;
    if (sniperBeams[i].t <= 0) sniperBeams.splice(i, 1);
  }
  for (const a of [...allies]) updateOneAlly(a, dt);
}

function updateOneAlly(a, dt) {
  const K = ALLY_KINDS[a.kind];
  a.t += dt;
  a.flashT = Math.max(0, a.flashT - dt);
  a.blockT = Math.max(0, (a.blockT || 0) - dt);
  if (a.kind === "sniper") {
    a.aimT += dt;
    if (!a.locked && a.aimT >= SNIPER_LOCK_T) {
      a.locked = true;
      a.lockX = player.x; a.lockY = player.y - 45;
    }
    if (a.aimT >= SNIPER_FIRE_T) {
      const p = sniperPortraitWorld();
      const dx = a.lockX - p.x, dy = a.lockY - p.y;
      const len = Math.hypot(dx, dy) || 1;
      sniperBeams.push({ x0: p.x, y0: p.y,
                         x1: a.lockX + dx / len * 900, y1: a.lockY + dy / len * 900, t: 0.28 });
      shakeT = Math.max(shakeT, 0.25);
      impacts.push({ x: a.lockX, y: a.lockY, t: 0.15 });
      if (player.invulnT <= 0 && player.deathT <= 0 &&
          Math.abs(player.x - a.lockX) < SNIPER_HIT_R &&
          Math.abs(player.y - 45 - a.lockY) < 90) {
        hurtPlayer(Math.sign(player.x - p.x) || 1, SNIPER_DMG);
      }
      a.shots++; a.locked = false; a.aimT = 0;
      if (a.shots >= SNIPER_MAX_SHOTS) allyRetreat(a);
    }
    return;
  }
  if (a.mode === "enter") {
    a.facing = Math.sign(player.x - a.x) || -1;
    a.y += 760 * dt;                       // 空降垂直落下
    if (a.y >= F3_Y) {
      a.y = F3_Y;
      a.mode = "fight"; a.state = K.fightAnim; a.t = 0; a.fireT = 0.8;
      shakeT = Math.max(shakeT, 0.15);
      for (let k = 0; k < 8; k++) {
        impacts.push({ x: a.x + (Math.random() - .5) * 70, y: F3_Y - Math.random() * 40, t: 0.12 + Math.random() * 0.12 });
      }
    }
  } else if (a.mode === "fight") {
    a.facing = Math.sign(player.x - a.x) || -1;
    if (a.stunT > 0) {
      a.stunT -= dt;
      if (a.kind === "shield") a.state = "dizzy";
    } else if (a.kind === "shield") {
      a.state = "guard";
      a.blindCd -= dt;
      if (a.blindCd <= 0 && Math.abs(player.x - a.x) < BLIND_RANGE &&
          Math.abs(player.y - a.y) < 80 && player.deathT <= 0) {
        blindT = BLIND_DUR; a.blindCd = BLIND_CD;
        shakeT = Math.max(shakeT, 0.25);
        for (let k = 0; k < 8; k++) {
          impacts.push({ x: a.x - a.facing * 25 + (Math.random() - .5) * 40,
                         y: a.y - K.hitH * 0.5 - (Math.random() - .5) * 80, t: 0.15 + Math.random() * 0.1 });
        }
      }
    } else {
      a.fireT -= dt;
      if (a.fireT <= 0) {
        const m = allyMuzzle(a);
        for (let k = 0; k < ALLY_PELLETS; k++) {
          bossBullets.push({
            x: m.x, y: m.y,
            vx: a.facing * (480 + Math.random() * 80),
            vy: (k - (ALLY_PELLETS - 1) / 2) * 42 + (Math.random() - .5) * 18,
          });
        }
        spawnEnemyShell(m.x - a.facing * K.fw * (K.drawH / K.fh) * 0.3, m.y + 2, a.facing);
        a.flashT = 0.07;
        a.fireT = ALLY_FIRE_CD;
      }
    }
  } else {
    a.facing = -1;
    a.state = "run";
    a.x -= 240 * dt;
    if (a.x < BOSS_ROOM.left - 80 || a.x < cam.x - VIEW_W / 2 - 80) removeAlly(a);   // 向左出鏡即移除
  }
  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  if (player.invulnT <= 0 && player.deathT <= 0 &&
      Math.abs(player.x - a.x) < (HITBOX_W + K.hitW) / 2 &&
      player.y > a.y - K.hitH && player.y - hh < a.y) {
    hurtPlayer(Math.sign(player.x - a.x) || 1);
  }
}

function drawSniperPortrait(a) {
  const p = sniperPortraitWorld();
  const k = Math.min(1, a.aimT / SNIPER_FIRE_T);
  const tx = a.locked ? a.lockX : player.x;
  const ty = a.locked ? a.lockY : player.y - 45;
  ctx.strokeStyle = a.locked
    ? `rgba(255,45,35,${0.6 + 0.4 * Math.sin(uiTime * 30) ** 2})`
    : `rgba(255,90,70,${0.25 + 0.35 * k})`;
  ctx.lineWidth = a.locked ? 2 : 1.2;
  ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(tx, ty); ctx.stroke();
  ctx.beginPath(); ctx.arc(tx, ty, 26 - 16 * k, 0, Math.PI * 2); ctx.stroke();
  const R = SNIPER_R;
  ctx.save();
  ctx.beginPath(); ctx.arc(p.x, p.y, R, 0, Math.PI * 2); ctx.clip();
  ctx.drawImage(SNIPER_PORTRAIT.img, p.x - R, p.y - R, R * 2, R * 2);
  ctx.restore();
  ctx.lineWidth = 4;
  ctx.strokeStyle = "rgba(20,26,40,.8)";
  ctx.beginPath(); ctx.arc(p.x, p.y, R + 3, 0, Math.PI * 2); ctx.stroke();
  const cr = Math.round(155 + 100 * k), cg = Math.round(227 - 180 * k);
  ctx.strokeStyle = a.locked && Math.sin(uiTime * 26) > 0 ? "#fff" : `rgb(${cr},${cg},60)`;
  ctx.beginPath(); ctx.arc(p.x, p.y, R + 3, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * k); ctx.stroke();
  ctx.lineWidth = 1;
}

function drawAlly() {
  for (const bm of sniperBeams) {
    const a = Math.min(1, bm.t / 0.2);
    ctx.strokeStyle = `rgba(255,240,220,${a})`;
    ctx.lineWidth = 1 + 4 * a;
    ctx.beginPath(); ctx.moveTo(bm.x0, bm.y0); ctx.lineTo(bm.x1, bm.y1); ctx.stroke();
    ctx.strokeStyle = `rgba(255,80,60,${a * 0.8})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(bm.x0, bm.y0); ctx.lineTo(bm.x1, bm.y1); ctx.stroke();
    ctx.lineWidth = 1;
  }
  for (const ally of allies) {
    if (ally.kind === "sniper") { drawSniperPortrait(ally); continue; }
    const K = ALLY_KINDS[ally.kind];
    const a = K.anims[ally.state];
    const fi = frameIndex(a, ally.t);
    const scale = K.drawH / K.fh;
    const dw = K.fw * scale, dh = K.drawH;
    ctx.save();
    if (ally.facing === -1) {
      ctx.translate(ally.x, 0); ctx.scale(-1, 1); ctx.translate(-ally.x, 0);
    }
    if (ally.flashT > 0) ctx.globalAlpha = 0.85;
    ctx.drawImage(a.img, fi * K.fw, 0, K.fw, K.fh,
      ally.x - K.anchor * dw, ally.y - K.feet * dh, dw, dh);
    ctx.restore();
    ctx.globalAlpha = 1;
    if (allyShieldUp(ally)) drawShieldBubble(ally.x, ally.y, K.hitH, ally.blockT || 0);   // 能量護罩
    if (ally.burnT > 0 && ally.mode === "fight") {      // 燃燒特效
      ctx.globalAlpha = 0.9;
      const fs = K.hitH * 0.85;
      drawFire(ally.burnT * 18 + ally.x * 0.5, ally.x - fs / 2, ally.y - fs, fs);
      ctx.globalAlpha = 1;
    }
    if (ally.mode === "fight" && ally.hp < ally.maxHp) {
      const x0 = ally.x - 24, y0 = ally.y - K.hitH - 14;
      ctx.fillStyle = "rgba(255,255,255,.85)";
      ctx.fillRect(x0, y0, 48, 5);
      ctx.fillStyle = "#e8544a";
      ctx.fillRect(x0 + 1, y0 + 1, 46 * Math.max(0, ally.hp) / ally.maxHp, 3);
      ctx.strokeStyle = "rgba(43,58,85,.55)";
      ctx.strokeRect(x0 - .5, y0 - .5, 49, 6);
    }
  }
}

function bossSetState(s) {
  if (boss.state !== s) { boss.state = s; boss.t = 0; }
}

function bossMuzzle() {
  const ref = BOSS_MUZZLE[boss.state] || BOSS_MUZZLE.shoot;
  const scale = BOSS_DRAW_H / BOSS_FH;
  const dw = BOSS_FW * scale;
  return {
    x: boss.x + boss.facing * (ref.fx - BOSS_ANCHOR) * dw,
    y: boss.y - (BOSS_FEET - ref.fy) * BOSS_DRAW_H,
  };
}

function updateBoss(dt) {
  if (boss.deadT > 0) {
    boss.deadT -= dt;
    if (boss.deadT > 6.6 && Math.random() < 0.35) {   // 死亡演出：1.4 秒連環爆
      blasts.push({ x: boss.x + (Math.random() - .5) * 90, y: boss.y - Math.random() * boss.hitH, t: 0.3 });
      impacts.push({ x: boss.x + (Math.random() - .5) * 110, y: boss.y - Math.random() * boss.hitH, t: 0.12 });
      shakeT = Math.max(shakeT, 0.12);
    }
    if (boss.deadT <= 0) {     // 重生回待命狀態，等玩家再次進房觸發
      boss.hp = boss.maxHp; boss.hpGhost = boss.maxHp;
      boss.x = BOSS_ROOM.homeX; boss.facing = -1;
      boss.stunT = 0; boss.burnT = 0;
      boss.active = false; bossSetState("shoot");
      bossResetFight();
    }
    return;
  }
  if (!boss.active) {          // 在房內待命，玩家（從右側）越過門線才開戰（落閘）
    if (player.x > BOSS_ROOM.left && player.x < BOSS_ROOM.triggerX && player.y <= F3_Y + 5) {
      boss.active = true; setGate(true); bossSetState("run");   // 需在房內（左牆以右）：西側秘密區不觸發
      shakeT = Math.max(shakeT, 0.25);                             // 落閘震撼
    }
    return;
  }
  const P = BOSS_PHASES[boss.phase];
  if (bossPhase() !== boss.phase) {  // 轉階段：短暫僵直 + 震撼 + 第三階段立即補召喚
    boss.phase = bossPhase();
    boss.phasePauseT = 0.9;
    boss.volley = 0; boss.telT = 0; boss.telKind = null; boss.dashT = 0; boss.jsPending = false;
    costPops.push({ x: boss.x, y: boss.y - boss.hitH - 34, t: 0.9, text: "!!", color: "#e8544a" });
    shakeT = Math.max(shakeT, 0.35);
    for (let k = 0; k < 8; k++) {
      impacts.push({ x: boss.x + (Math.random() - .5) * 90, y: boss.y - Math.random() * boss.hitH, t: 0.15 + Math.random() * 0.12 });
    }
    if (boss.phase === 3) { summonAlly(); allySummonT = BOSS_PHASES[3].summonCd; }
  }
  if (allies.length < ALLY_MAX_ACTIVE) {
    allySummonT -= dt;
    if (allySummonT <= 0) {
      if (summonAlly()) allySummonT = P.summonCd;
      else allySummonT = 1;
    }
  }
  const stunned = boss.stunT > 0;
  if (stunned) {
    boss.stunT -= dt;
    boss.telT = 0; boss.telKind = null; boss.dashT = 0;   // 暈眩打斷預警/衝刺
  } else boss.t += dt;               // 暈眩：凍結動畫
  boss.flashT = Math.max(0, boss.flashT - dt);
  boss.dashCd = Math.max(0, boss.dashCd - dt);
  boss.backCd = Math.max(0, boss.backCd - dt);
  const dist = player.x - boss.x;

  // 物理：重力 + 平台碰撞（單向：只從上方落下站立）
  boss.vy += GRAV * dt;
  const prevY = boss.y;
  boss.y += boss.vy * dt;
  let onGround = false;
  const bhw = boss.hitW / 2;
  for (const s of SOLIDS) {
    if (boss.x + bhw > s.x && boss.x - bhw < s.x + s.w) {
      if (boss.vy >= 0 && prevY <= s.y + 1 && boss.y >= s.y) {
        boss.y = s.y; boss.vy = 0; onGround = true;
      }
    }
  }
  if (boss.y > WORLD.h + 200) { boss.y = F3_Y; boss.vy = 0; }   // 保險

  const airborne = !onGround;
  if (airborne) {
    boss.x += boss.vx * dt;
    if (boss.vy < 0) bossSetState("rise");
    else bossSetState("fall");
    if (boss.jsPending && boss.vy > -180) {          // 跳射：近頂點朝玩家撒 3 發扇形
      boss.jsPending = false;
      const m = bossMuzzle();
      const base = Math.atan2((player.y - 60) - m.y, player.x - m.x);
      for (const off of [-0.22, 0, 0.22]) {
        bossBullets.push({ x: m.x, y: m.y, vx: Math.cos(base + off) * 640, vy: Math.sin(base + off) * 640, dmg: 2 });
      }
      boss.flashT = 0.08;
    }
  } else if (boss.state === "rise" || boss.state === "fall") {
    bossSetState("land");
    boss.vx = 0;
    boss.jsPending = false;
    spawnDust(boss.x, boss.y, 6, 44);
    shakeT = Math.max(shakeT, 0.1);
  } else if (boss.state === "land") {
    if (animDone(BOSS_ANIMS.land, boss.t)) bossSetState("run");
  } else if (stunned) {
    // 暈眩硬直：不移動不開火
  } else if (boss.phasePauseT > 0) {   // 轉階段僵直：站定蓄力
    boss.phasePauseT -= dt;
    boss.facing = Math.sign(dist) || 1;
    bossSetState("shoot");
    boss.volley = 0; boss.fireT = 1;
  } else if (boss.telT > 0) {          // 大招預警：定住 0.45s，頭上「!」
    boss.telT -= dt;
    boss.facing = Math.sign(dist) || 1;
    bossSetState("run");               // 原地踏步蓄勢
    if (boss.telT <= 0) {
      if (boss.telKind === "dash") {
        boss.dashT = 0.5;
        boss.dashDir = Math.sign(dist) || 1;
      } else if (boss.telKind === "jumpshot") {
        boss.vy = -950;
        boss.vx = (Math.sign(dist) || 1) * 140;
        boss.jsPending = true;
        boss.jumpCd = P.jumpCdMin + Math.random() * P.jumpCdRnd;
      }
      boss.telKind = null;
    }
  } else if (boss.dashT > 0) {         // 衝刺突進：高速壓向玩家，結束立刻接彈幕
    boss.dashT -= dt;
    boss.facing = boss.dashDir;
    bossSetState("run");
    boss.t += dt;                      // 跑步動畫雙倍速（衝刺感）
    boss.x += boss.dashDir * 520 * dt;
    if (boss.dashT <= 0) {
      boss.volley = P.volleyMin + (Math.random() * P.volleyRnd | 0);
      boss.fireT = 0.18;
      boss.facing = Math.sign(player.x - boss.x) || 1;
      bossSetState(player.crouching ? "crouch_shoot" : "shoot");
    }
  } else if (boss.state === "shoot" || boss.state === "crouch_shoot") {
    boss.facing = Math.sign(dist) || 1;
    boss.fireT -= dt;
    if (boss.fireT <= 0 && boss.volley > 0) {
      const m = bossMuzzle();
      bossBullets.push({ x: m.x, y: m.y, vx: boss.facing * 700, dmg: 2 });
      if (P.fan && boss.volley === 1) {            // 二階段起：最後一發帶上下扇形
        bossBullets.push({ x: m.x, y: m.y, vx: boss.facing * 660, vy: -150, dmg: 2 });
        bossBullets.push({ x: m.x, y: m.y, vx: boss.facing * 660, vy: 150, dmg: 2 });
      }
      spawnEnemyShell(m.x - boss.facing * BOSS_FW * (BOSS_DRAW_H / BOSS_FH) * 0.25, m.y + 2, boss.facing);
      boss.flashT = 0.06;
      boss.volley--;
      boss.fireT = P.fireCd;
    }
    if (boss.volley <= 0 && boss.fireT <= -0.6) bossSetState("run");
  } else if (allyShieldUp()) {   // 盾兵掩護中：躲到盾後定點射擊，不追擊不跳
    boss.facing = Math.sign(dist) || 1;
    const shield = allies.find(a => allyShieldUp(a));
    const hideX = shield.x - (Math.sign(player.x - shield.x) || 1) * 110;
    if (Math.abs(boss.x - hideX) > 12) {
      bossSetState("run");
      boss.x += Math.sign(hideX - boss.x) * 160 * dt;
    } else {
      boss.volley = P.volleyMin - 1 + (Math.random() * P.volleyRnd | 0);
      boss.fireT = 0.4;
      bossSetState(Math.random() < 0.4 ? "crouch_shoot" : "shoot");
    }
  } else {   // run：追擊
    boss.facing = Math.sign(dist) || 1;
    boss.jumpCd -= dt;
    const playerAbove = player.y < boss.y - 80 && Math.abs(dist) < 420;
    const inRange = Math.abs(dist) <= 430 && Math.abs(player.y - boss.y) < 60;
    boss.aboveT = playerAbove ? boss.aboveT + dt : 0;   // 高台蹲點計時
    if (P.dash && boss.backCd <= 0 && Math.abs(dist) < 70 && Math.abs(player.y - boss.y) < 60) {
      boss.vy = -520;                       // 貼身反跳拉開距離（二階段起）
      boss.vx = -(Math.sign(dist) || 1) * 300;
      boss.backCd = 3;
    } else if (P.dash && boss.aboveT > 2.5) {           // 高台蹲點 → 跳射反制
      boss.telT = 0.45; boss.telKind = "jumpshot"; boss.aboveT = 0;
    } else if (inRange) {                   // 同高度且進射程 → 彈幕（七成機率針對玩家姿勢選高低彈道）
      boss.volley = P.volleyMin + (Math.random() * P.volleyRnd | 0);
      boss.fireT = 0.25;
      const counter = Math.random() < 0.7 ? player.crouching : !player.crouching;
      bossSetState(counter ? "crouch_shoot" : "shoot");
    } else if (P.dash && boss.dashCd <= 0 && Math.abs(dist) > 260 && Math.abs(dist) < 680 &&
               Math.abs(player.y - boss.y) < 60 && Math.random() < 0.5) {
      boss.telT = 0.45; boss.telKind = "dash";          // 中距離 → 衝刺預警
      boss.dashCd = 5;
    } else {
      boss.x += boss.facing * P.speed * dt;
      if (playerAbove || boss.jumpCd <= 0) {   // 玩家在上方 → 跳台；或定期跳躍
        boss.vy = -950;
        boss.vx = boss.facing * (playerAbove ? 120 : 180);
        boss.jumpCd = P.jumpCdMin + Math.random() * P.jumpCdRnd;
      }
    }
  }
  boss.x = Math.max(BOSS_ROOM.left + 60, Math.min(BOSS_ROOM.right - 20, boss.x));   // 戰鬥限制在房內

  // 碰觸傷害
  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  if (player.invulnT <= 0 && player.deathT <= 0 &&
      Math.abs(player.x - boss.x) < (HITBOX_W + boss.hitW) / 2 &&
      player.y > boss.y - boss.hitH && player.y - hh < boss.y) {
    hurtPlayer(Math.sign(player.x - boss.x) || 1, 2);
  }
}

// 敵方子彈（小怪 + Boss 共用 bossBullets）：每幀無條件運算，不依賴 Boss 狀態
function updateEnemyBullets(dt) {
  for (let i = eGrenades.length - 1; i >= 0; i--) {   // 手雷：真實物理，地板彈兩下才爆（rocketBlast）
    const g = eGrenades[i];
    const prevX = g.x, prevY = g.y;
    g.vy += GREN_G * dt;
    g.x += g.vx * dt;
    g.y += g.vy * dt;
    g.rot += (Math.abs(g.vx) > 30 ? 9 : 3) * dt;
    let boom = false;
    for (const sd of SOLIDS) {
      const thin = sd.h <= 30;
      if (g.x > sd.x && g.x < sd.x + sd.w && g.y > sd.y && g.y < sd.y + (thin ? 14 : sd.h)) {
        if (g.vy > 0 && prevY <= sd.y + 1) {          // 從上方砸到地板/平台 → 反彈
          g.y = sd.y; g.vy = -g.vy * 0.45; g.vx *= 0.65;
          g.bounce = (g.bounce || 0) + 1;
          impacts.push({ x: g.x, y: g.y, t: 0.08 });
          if (g.bounce >= 2) boom = true;
        } else if (!thin && g.vy < 0 && prevY >= sd.y + sd.h - 1) {   // 撞天花板
          g.y = sd.y + sd.h; g.vy = 0;
        } else if (!thin) {                            // 撞牆：水平反彈（不穿牆）
          g.x = prevX; g.vx = -g.vx * 0.5;
        }
        break;
      }
    }
    // 飛行中直擊玩家 → 立即引爆（不用等落地彈跳）
    const ghh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
    if (player.invulnT <= 0 && player.deathT <= 0 &&
        Math.abs(g.x - player.x) < HITBOX_W / 2 + 8 &&
        g.y > player.y - ghh - 10 && g.y < player.y + 6) {
      boom = true;
    }
    g.t = (g.t || 0) + dt;
    if (boom || g.t > 5 || g.y > WORLD.h + 100) {      // 直擊/兩彈/5 秒保險引信
      rocketBlast(g.x, g.y - 10);
      eGrenades.splice(i, 1);
    }
  }
  const vulnerable = player.invulnT <= 0 && player.deathT <= 0;
  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  for (let i = bossBullets.length - 1; i >= 0; i--) {
    const b = bossBullets[i];
    if (b.homeT > 0) {                     // 火箭小追蹤：限速轉向，貼近後直飛（防繞圈）
      b.homeT -= dt;
      if (Math.abs(b.x - player.x) < 70) b.homeT = 0;
      else {
        const spd = Math.hypot(b.vx, b.vy || 0);
        const want = Math.atan2(player.y - hh / 2 - b.y, player.x - b.x);
        let cur = Math.atan2(b.vy || 0, b.vx);
        let dv = want - cur;
        while (dv > Math.PI) dv -= 2 * Math.PI;
        while (dv < -Math.PI) dv += 2 * Math.PI;
        const mt = 1.3 * dt;
        cur += Math.max(-mt, Math.min(mt, dv));
        b.vx = Math.cos(cur) * spd; b.vy = Math.sin(cur) * spd;
      }
    }
    b.x += b.vx * dt;
    b.y += (b.vy || 0) * dt;   // 霰彈散射／火箭追蹤用
    let gone = b.x < WORLD.x0 - 20 || b.x > WORLD.w + 20;
    if (!gone && vulnerable &&
        Math.abs(b.x - player.x) < HITBOX_W / 2 + 6 &&
        b.y > player.y - hh - 12 && b.y < player.y) {   // +12 頭部容差：肩射高度的槍口(105-109)仍命中站姿，蹲下(70)可閃
      hurtPlayer(Math.sign(b.vx) || 1, b.dmg || 1);
      gone = true;
    }
    if (!gone) {
      for (const s of SOLIDS) {
        if (s.h <= 30) continue;   // 單向薄平台不擋子彈
        if (b.x > s.x && b.x < s.x + s.w && b.y > s.y && b.y < s.y + s.h) { gone = true; break; }
      }
    }
    if (gone) {
      if (b.rocket && b.x > WORLD.x0 - 20 && b.x < WORLD.w + 20) rocketBlast(b.x, b.y);
      impacts.push({ x: b.x, y: b.y, t: 0.1 });
      bossBullets.splice(i, 1);
    }
  }
}

function drawBoss() {
  if (boss.deadT > 0 && boss.deadT < 6.6) return;
  if (boss.deadT > 0) ctx.globalAlpha = 0.35 + 0.35 * Math.sin(boss.deadT * 45);   // 死亡閃爍
  const a = BOSS_ANIMS[boss.state];
  const fi = frameIndex(a, boss.t);
  const scale = BOSS_DRAW_H / BOSS_FH;
  const dw = BOSS_FW * scale, dh = BOSS_DRAW_H;
  ctx.save();
  if (boss.facing === -1) {
    ctx.translate(boss.x, 0); ctx.scale(-1, 1); ctx.translate(-boss.x, 0);
  }
  if (boss.flashT > 0) ctx.globalAlpha = 0.9;
  ctx.drawImage(a.img, fi * BOSS_FW, 0, BOSS_FW, BOSS_FH,
    boss.x - BOSS_ANCHOR * dw, boss.y - BOSS_FEET * dh, dw, dh);
  ctx.restore();
  ctx.globalAlpha = 1;
  if (boss.burnT > 0) {                            // 燃燒特效
    ctx.globalAlpha = 0.9;
    const fs = boss.hitH * 0.9;
    drawFire(boss.burnT * 18, boss.x - fs / 2, boss.y - fs, fs);
    ctx.globalAlpha = 1;
  }
  if (boss.stunT > 0) {                            // 暈眩星星
    ctx.fillStyle = "#ffd75e";
    for (let k = 0; k < 3; k++) {
      const a2 = boss.stunT * 6 + k * 2.1;
      ctx.fillRect(boss.x + Math.cos(a2) * 17 - 2, boss.y - boss.hitH - 14 + Math.sin(a2) * 4 - 2, 4, 4);
    }
  }
  if (boss.telT > 0) {                             // 大招預警「!」（閃爍紅色）
    if (Math.floor(boss.telT * 12) % 2 === 0) {
      ctx.textAlign = "center";
      ctx.font = `900 30px ${UI_FONT}`;
      ctx.fillStyle = "#e8544a";
      ctx.fillText("!", boss.x, boss.y - boss.hitH - 20);
      ctx.textAlign = "left";
    }
  }
}
// 敵方子彈／手雷投射物（獨立於 drawBoss：Boss 死亡演出期間也要畫）
function drawEnemyBullets() {
  if (EGREN_FX.img && EGREN_FX.img.width) {
    for (const g of eGrenades) {
      ctx.save();
      ctx.translate(g.x, g.y);
      ctx.rotate(g.rot);
      ctx.drawImage(EGREN_FX.img, -9, -13, 18, 26);
      ctx.restore();
    }
  }
  // boss 子彈（紅色曳光）／火箭彈（橄欖彈體+尾焰）
  for (const b of bossBullets) {
    const dir = Math.sign(b.vx);
    if (b.rocket) {
      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(Math.atan2(b.vy || 0, b.vx));   // 追蹤時彈體隨飛行方向轉
      ctx.fillStyle = "#63683d";
      ctx.fillRect(-13, -3, 13, 6);
      ctx.fillStyle = "#2c2c30";
      ctx.fillRect(0, -3, 5, 6);
      ctx.fillStyle = Math.random() < 0.5 ? "#ffb35e" : "#ff7a3c";   // 尾焰閃爍
      ctx.fillRect(-(18 + Math.random() * 6), -2, 7, 4);
      ctx.restore();
      continue;
    }
    ctx.fillStyle = "#ff6a5e";
    ctx.fillRect(b.x - dir * 14, b.y - 1.5, dir * 12, 3);
    ctx.fillStyle = "#ffd0c8";
    ctx.fillRect(b.x - dir * 4, b.y - 2, dir * 4, 4);
  }
}

const BGM = { normal: null, boss: null, cur: null };

    BGM.normal = new Audio("assets_audio/bgm_normal.mp3");

function bgmPlay(which) {          // which: "normal" | "boss" | null
  if (!BGM.normal) return;
  const want = which ? BGM[which] : null;
  if (BGM.cur === want) return;

function updateBGM(dt) {           // 逐幀淡入目標軌、淡出其餘軌（目標音量＝設定音量×0.6）

  const tgt = 0.6 * volume;
  for (const [k, a] of [["normal", BGM.normal], ["boss", BGM.boss]]) {
    const goal = (BGM[k] === BGM.cur && !muted) ? tgt : 0;
    a.volume = Math.max(0, Math.min(1, a.volume + (goal - a.volume) * Math.min(1, dt * 2.2)));

  }
}
let muted = false;
function sfxGun() {                 // 槍聲：短促白噪爆衝 + 低頻踢
  if (!audioCtx || !masterGain || volume <= 0) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, 1600, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const bp = audioCtx.createBiquadFilter(); bp.type = "highpass"; bp.frequency.value = 900;
  const g = audioCtx.createGain(); g.gain.setValueAtTime(0.28, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);

// 游標選取單體目標；maxDist = 與玩家的最大距離限制；僅畫面內目標可選
function pickTarget(wx, wy, maxDist) {
  let best = null, bd = 70;
  for (const e of enemies) {
    if (e.state === "death") continue;
    if (Math.abs(e.x - player.x) > maxDist) continue;
    if (!targetOnScreen(e.x, e.y - e.h * 0.5)) continue;
    const dx = Math.abs(e.x - wx);
    if (dx < bd && wy > e.y - e.h - 40 && wy < e.y + 30) {
      best = { e, x: e.x, y: e.y, h: e.h, isBoss: false };
      bd = dx;
    }
  }
  if (boss.active && boss.deadT <= 0 && Math.abs(boss.x - player.x) <= maxDist &&
      targetOnScreen(boss.x, boss.y - boss.hitH * 0.5)) {
    const dx = Math.abs(boss.x - wx);
    if (dx < bd && wy > boss.y - boss.hitH - 40 && wy < boss.y + 30) {
      best = { x: boss.x, y: boss.y, h: boss.hitH, isBoss: true };
    }
  }
  for (const a of allies) {   // 場上隊友（槍手/盾兵）也可被鎖定
    if (a.kind === "sniper" || a.mode !== "fight") continue;
    if (Math.abs(a.x - player.x) > maxDist) continue;
    if (!targetOnScreen(a.x, a.y - 60)) continue;
    const K = ALLY_KINDS[a.kind];
    const dx = Math.abs(a.x - wx);
    if (dx < bd && wy > a.y - K.hitH - 40 && wy < a.y + 30) {
      best = { x: a.x, y: a.y, h: K.hitH, isAlly: true, ally: a };
      bd = dx;
    }
  }
  const sniperAlly = allies.find(a => a.kind === "sniper");
  if (sniperAlly) {   // 場外狙擊手：點大頭肖像反狙擊
    const p = sniperPortraitWorld();
    if (Math.hypot(wx - p.x, wy - p.y) < 60) {
      best = { x: p.x, y: p.y + 26, h: 52, isSniper: true, ally: sniperAlly };
    }
  }
  return best;
}
