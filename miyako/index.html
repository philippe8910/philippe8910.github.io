// 以視差係數 f 平鋪一條水平層，bottomY = 該層底邊的世界 y（f=1 時）
function drawStrip(img, f, bottomY, s) {
  const camL = cam.x - VIEW_W / 2, camT = cam.y - 270;
  const w = img.width * s, h = img.height * s;
  const y = bottomY - h - CAM_T0 * (1 - f) - camT * f;
  const phase = ((camL * f) % w + w) % w;
  for (let x = -phase - w; x < VIEW_W + w; x += w) {
    ctx.drawImage(img, Math.round(x), Math.round(y), Math.round(w), Math.round(h));
  }
}

function tileRow(img, x0, y0, wTotal, s, srcH) {
  // 沿 x 平鋪一個圖塊列（世界座標內），srcH 可截取來源上半部
  const sh = srcH || img.height;
  const w = img.width * s, h = sh * s;
  ctx.save();
  ctx.beginPath();
  ctx.rect(x0, y0, wTotal, h);
  ctx.clip();
  for (let x = x0; x < x0 + wTotal; x += w) {
    ctx.drawImage(img, 0, 0, img.width, sh, Math.round(x), Math.round(y0), Math.round(w), Math.round(h));
  }
  ctx.restore();
}

function drawGhostWalls() {
  for (const g of GHOST_WALLS) {
    if (g.alpha <= .01) continue;
    ctx.save();
    ctx.globalAlpha = g.alpha;
    ctx.beginPath(); ctx.rect(g.x, g.y, g.w, g.h); ctx.clip();
    if (ENV.wallFill.img && ENV.wallFill.img.width) {
      const tw = Math.max(20, g.w), th = Math.round(159 * tw / 155);
      for (let ty = g.y; ty < g.y + g.h; ty += th) ctx.drawImage(ENV.wallFill.img, g.x, ty, tw, th);
    } else {
      ctx.fillStyle = "#676b74";
      ctx.fillRect(g.x, g.y, g.w, g.h);
    }
    ctx.restore();
  }
}

function draw() {
  ctx.setTransform(RES, 0, 0, RES, 0, 0);   // 邏輯座標 VIEW_W×540 → 實際解析度
  ctx.clearRect(0, 0, VIEW_W, 540);
  const camL = Math.round(cam.x - VIEW_W / 2), camT = Math.round(cam.y - 270);

  ctx.fillStyle = "#141114";
  ctx.fillRect(0, 0, VIEW_W, 540);

  ctx.save();
  let jx = 0, jy = 0;
  if (shakeT > 0) {                 // 震動只作用世界層，HUD 不動
    const k = shakeT / SHAKE_DUR;
    jx = (Math.random() - .5) * 14 * k;
    jy = (Math.random() - .5) * 9 * k;
  }
  ctx.translate(-camL + jx, -camT + jy);

  // 場景背景：每層樓一條走廊帶（x 視差 0.5），其上遠景牆帶；景深＝越遠越糊（預烘焙模糊版）
  if (ENV.corridor.img && ENV.corridor.img.width) {
    const corridorImg = blurredTile(ENV.corridor.img, 2);   // 中景走廊：糊 2px
    const wallImg = ENV.bgWall.img && ENV.bgWall.img.width ? blurredTile(ENV.bgWall.img, 4) : null;   // 遠景牆：糊 4px（更遠更糊）
    const bgS = 1.7;
    const bw = Math.round(625 * bgS), bh = Math.round(170 * bgS);
    const ww2 = Math.round(625 * 1.2), wh2 = Math.round(234 * 1.2);
    const par = camL * 0.5;
    for (const fy of [L0_Y, L1_Y, L2_Y, L3_Y, L4_Y]) {
      const by = fy - bh;
      let bx = Math.floor((camL - par) / bw) * bw + Math.floor(par / bw) * bw;
      bx = camL - ((camL * 0.5) % bw) - bw;
      if (wallImg) {   // 先畫遠景牆（最深）
        const wy = by - wh2;
        let wx = camL - ((camL * 0.3) % ww2) - ww2;
        ctx.globalAlpha = 0.72;                 // 遠景大氣衰減：更淡
        for (let x = wx; x < camL + VIEW_W + ww2; x += ww2) {
          ctx.drawImage(wallImg, x, wy, ww2, wh2);
        }
        ctx.globalAlpha = 1;
      }
      ctx.globalAlpha = 0.92;                   // 中景走廊：略淡
      for (let x = bx; x < camL + VIEW_W + bw; x += bw) {
        ctx.drawImage(corridorImg, x, by, bw, bh);
      }
      ctx.globalAlpha = 1;
    }
  }
  {   // 大氣景深霧：背景之上疊淡藍霧，越往深處越濃（增強遠近層次）
    const hz = ctx.createLinearGradient(0, camT, 0, camT + 540);
    hz.addColorStop(0, "rgba(30,42,66,.28)");
    hz.addColorStop(0.55, "rgba(24,34,54,.10)");
    hz.addColorStop(1, "rgba(20,28,46,0)");
    ctx.fillStyle = hz;
    ctx.fillRect(camL, camT, VIEW_W, 540);
  }
  // 地形：素材換皮（薄平台=平台皮；厚板=牆板填充+黃線頂緣；窄牆=直鋪牆板）
  for (const s of SOLIDS) {
    if (s.deco || s.hidden || s.elevator) continue;
    if (s.breakable) {
      ctx.save();
      ctx.beginPath(); ctx.rect(s.x, s.y, s.w, s.h); ctx.clip();
      if (s.type === "crate" && ENV.crate.img && ENV.crate.img.width) {
        ctx.drawImage(ENV.crate.img, s.x, s.y, s.w, s.h);
      } else if (ENV.breakWall.img && ENV.breakWall.img.width) {
        const tw = Math.max(30, s.w), th = tw * ENV.breakWall.img.height / ENV.breakWall.img.width;
        for (let ty = s.y; ty < s.y + s.h; ty += th) ctx.drawImage(ENV.breakWall.img, s.x, ty, tw, th);
      } else {
        ctx.fillStyle = s.type === "crate" ? "#76512d" : "#67636b";
        ctx.fillRect(s.x, s.y, s.w, s.h);
      }
      ctx.restore();
      continue;
    }
    if (s === bossGate || s.gate) {
      const gd = s.gate ? GATES.find(g3 => g3.solid === s) : null;
      if (gd?.lock && ENV.keyDoor.img && ENV.keyDoor.img.width) {   // 鑰匙門：完整電子鎖門板
        ctx.drawImage(ENV.keyDoor.img, s.x - 5, s.y, s.w + 10, s.h);
        ctx.save();
        ctx.globalAlpha = .18 + .12 * Math.sin(uiTime * 4);
        ctx.fillStyle = "#ff493f";
        ctx.fillRect(s.x + s.w * .18, s.y + s.h * .38, s.w * .64, s.h * .18);
        ctx.restore();
        continue;
      }
      if (s.gate && ENV.gateSkin.img && ENV.gateSkin.img.width) {   // 單向門：能量燈柱垂直平鋪
        ctx.save();
        ctx.beginPath(); ctx.rect(s.x - 3, s.y, s.w + 6, s.h); ctx.clip();
        const gw2 = s.w + 6, gh2 = gw2 * ENV.gateSkin.img.height / ENV.gateSkin.img.width;
        for (let gy2 = s.y; gy2 < s.y + s.h; gy2 += gh2 - 4) {
          ctx.drawImage(ENV.gateSkin.img, s.x - 3, gy2, gw2, gh2);
        }
        ctx.restore();
        if (gd?.side && ENV.gateArrow.img && ENV.gateArrow.img.width) {   // 可通行方向箭頭（呼吸閃爍）
          const aw = 32, ah = aw * ENV.gateArrow.img.height / ENV.gateArrow.img.width;
          ctx.save();
          if (gd.side === "right") {
            ctx.translate(s.x + s.w / 2, 0); ctx.scale(-1, 1); ctx.translate(-(s.x + s.w / 2), 0);
          }
          ctx.globalAlpha = 0.7 + 0.3 * Math.sin(uiTime * 4);
          ctx.drawImage(ENV.gateArrow.img, s.x + s.w / 2 - aw / 2, s.y + s.h / 2 - ah / 2, aw, ah);
          ctx.restore();
          ctx.globalAlpha = 1;
        }
        continue;
      }
      ctx.fillStyle = "#b4483c";               // Boss 落閘／素材未載入退回紅牆
      ctx.fillRect(s.x, s.y, s.w, s.h);
      ctx.strokeStyle = "#3c3c42";
      ctx.strokeRect(s.x + .5, s.y + .5, s.w - 1, s.h - 1);
      continue;
    }
    const themed = ENV.platSkin.img && ENV.platSkin.img.width;
    if (!themed) {   // 素材未載入（無頭測試）：灰盒退回
      ctx.fillStyle = s.h <= 30 ? "#9a9aa4" : "#8a8a92";
      ctx.fillRect(s.x, s.y, s.w, s.h);
      continue;
    }
    if (s.h <= 30) {                       // 薄平台
      if (s.w >= 170) {
        // float_04 頂部 21/57 是欄杆：上移讓甲板面(第21列)對齊物理面，欄杆成為背景裝飾
        const dh2 = Math.max(26, s.h + 18);
        const ty = s.y - dh2 * 21 / 57;
        if (s.w <= 280) {
          ctx.drawImage(ENV.platSkin2.img, s.x - 3, ty, s.w + 6, dh2);
        } else {                           // 長平台：以素材原比例分節平鋪，接縫疊在欄杆柱上
          const tileW = 198 * dh2 / 57;
          ctx.save();
          ctx.beginPath(); ctx.rect(s.x - 3, ty, s.w + 6, dh2); ctx.clip();
          for (let tx = s.x - 3; tx < s.x + s.w + 3; tx += tileW - 10) {
            ctx.drawImage(ENV.platSkin2.img, tx, ty, tileW, dh2);
          }
          ctx.restore();
        }
      } else {
        ctx.drawImage(ENV.platSkin.img, s.x - 3, s.y - 3, s.w + 6, Math.max(26, s.h + 18));
      }
    } else if (s.w > s.h * 1.2) {          // 厚板/地板/掩體
      ctx.save();
      ctx.beginPath();
      ctx.rect(s.x, s.y, s.w, s.h);
      ctx.clip();
      if (s.h <= 130 && s.w <= 340) {      // 小型塊：磁磚縮放至塊高、貼齊左緣（避免大磁磚被裁出隨機切片）
        const th2 = s.h, tw2 = Math.max(1, Math.round(124 * s.h / 127));
        for (let tx = s.x; tx < s.x + s.w; tx += tw2) ctx.drawImage(ENV.wallFill.img, tx, s.y, tw2, th2);
        ctx.restore();
        const hs = Math.max(10, Math.min(16, s.h * 0.35));   // 黃條隨塊縮小
        ctx.drawImage(ENV.floorTop.img, s.x, s.y - Math.round(hs / 3), s.w, hs);
      } else {
        const tw = 124, th = 127;          // tile_19 155x159 縮 0.8（磁磚貼齊塊左緣）
        for (let ty = s.y; ty < s.y + s.h; ty += th) {
          for (let tx = s.x; tx < s.x + s.w; tx += tw) {
            ctx.drawImage(ENV.wallFill.img, tx, ty, tw, th);
          }
        }
        ctx.restore();
        ctx.drawImage(ENV.floorTop.img, s.x, s.y - 8, s.w, 24);   // 頂緣黃線（上移讓腳踩在亮條上）
      }
    } else {                               // 窄高牆
      ctx.save();
      ctx.beginPath();
      ctx.rect(s.x, s.y, s.w, s.h);
      ctx.clip();
      const tw = s.w, th = Math.round(159 * s.w / 155);
      for (let ty = s.y; ty < s.y + s.h; ty += th) {
        ctx.drawImage(ENV.wallFill.img, s.x, ty, tw, th);
      }
      ctx.restore();
    }
  }
  // 裝飾：存檔點旁警示燈、電梯底貨箱
  if (ENV.lamp.img && ENV.lamp.img.width) {
    for (const cp of CHECKPOINTS) {
      const lh = 74, lw = Math.round(ENV.lamp.img.width * lh / ENV.lamp.img.height) || 24;
      ctx.drawImage(ENV.lamp.img, cp.x - 66, cp.y - lh, lw, lh);
    }
    if (ENV.crate.img && ENV.crate.img.width) {
      for (const el of ELEVATORS) {
        ctx.drawImage(ENV.crate.img, el.x - 84, el.bottom - 58, 72, 58);
      }
    }
  }
  // 電梯（琥珀平台 + 紅三角 + 井道虛線）
  for (const el of ELEVATORS) {
    ctx.setLineDash([6, 8]);
    ctx.strokeStyle = "rgba(200,200,210,.35)";
    ctx.beginPath();
    ctx.moveTo(el.x + 4, el.top - 60); ctx.lineTo(el.x + 4, el.bottom);
    ctx.moveTo(el.x + el.w - 4, el.top - 60); ctx.lineTo(el.x + el.w - 4, el.bottom);
    ctx.stroke();
    ctx.setLineDash([]);
    if (ENV.elevSkin.img && ENV.elevSkin.img.width) {   // 懸浮平台素材（推進器懸在物理面下方）
      const dw2 = el.w + 10, dh3 = dw2 * ENV.elevSkin.img.height / ENV.elevSkin.img.width;
      ctx.drawImage(ENV.elevSkin.img, el.x - 5, el.y - 3, dw2, dh3);
    } else {                                            // 素材未載入退回琥珀平台
      ctx.fillStyle = "#c9a13b";
      ctx.fillRect(el.x, el.y, el.w, 14);
      ctx.strokeStyle = "#3c3c42";
      ctx.strokeRect(el.x + .5, el.y + .5, el.w - 1, 13);
    }
    ctx.fillStyle = "#e8544a";                       // 紅三角（地圖記號同款）
    ctx.beginPath();
    ctx.moveTo(el.x + el.w / 2, el.y - 22);
    ctx.lineTo(el.x + el.w / 2 - 12, el.y - 4);
    ctx.lineTo(el.x + el.w / 2 + 12, el.y - 4);
    ctx.closePath();
    ctx.fill();
    if (el.lock && !unlocks.keys.includes(el.lock)) {   // 鎖：灰罩 + 鎖頭
      ctx.fillStyle = "rgba(20,22,28,.55)";
      ctx.fillRect(el.x - 4, el.y - 26, el.w + 8, 44);
      const lx = el.x + el.w / 2, ly = el.y - 40;
      ctx.fillStyle = "#e8c04a";
      ctx.fillRect(lx - 9, ly, 18, 14);
      ctx.strokeStyle = "#e8c04a"; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(lx, ly, 6, Math.PI, 0); ctx.stroke(); ctx.lineWidth = 1;
      ctx.fillStyle = "#141414";
      ctx.fillRect(lx - 1.5, ly + 4, 3, 6);
      ctx.font = `italic 900 11px ${UI_FONT}`;
      ctx.textAlign = "center";
      ctx.fillStyle = "#e8c04a";
      ctx.fillText(el.lock, lx, ly + 28);
      ctx.textAlign = "left";
    }
  }
  // 門的資訊覆蓋層（門體與單向箭頭已由地形素材層繪製）
  for (let i = 0; i < GATES.length; i++) {
    if (openedGates.includes(i)) continue;
    const g = GATES[i];
    if (g.lock) {
      const lx = g.x + g.w / 2;
      ctx.font = `italic 900 11px ${UI_FONT}`;
      ctx.textAlign = "center";
      ctx.strokeStyle = "rgba(10,12,18,.9)"; ctx.lineWidth = 3;
      ctx.strokeText(g.lock, lx, g.y - 8);
      ctx.fillStyle = "#ffb34d";
      ctx.fillText(g.lock, lx, g.y - 8);
      ctx.lineWidth = 1; ctx.textAlign = "left";
    }
  }
  // 地圖道具（漂浮菱形 + 光暈）
  for (let i = 0; i < ITEM_SPAWNS.length; i++) {
    if (collectedItems.includes(i)) continue;
    const it = ITEM_SPAWNS[i];
    const bob = Math.sin(uiTime * 3 + i) * 6;
    const ix = it.x, iy = it.y - 54 + bob;
    const col = it.type === "char" ? "#ffcf4a" : it.type === "skin" ? "#ff8ac2" : "#ffa14a";
    ctx.save();
    ctx.globalAlpha = 0.28 + 0.12 * Math.sin(uiTime * 4 + i);
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(ix, iy, 26, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(ix, iy - 15); ctx.lineTo(ix + 11, iy); ctx.lineTo(ix, iy + 15); ctx.lineTo(ix - 11, iy);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.85)";
    ctx.stroke();
    ctx.font = `italic 900 11px ${UI_FONT}`;
    ctx.textAlign = "center";
    ctx.strokeStyle = "rgba(20,22,28,.8)"; ctx.lineWidth = 3;
    ctx.strokeText(itemLabel(it), ix, iy - 24);
    ctx.fillStyle = "#fff";
    ctx.fillText(itemLabel(it), ix, iy - 24);
    ctx.lineWidth = 1;
    ctx.textAlign = "left";
  }
  // 可破壞箱／牆掉落物
  for (const d of DROPPED_ITEMS) {
    const bob = Math.sin(uiTime * 5 + d.x * .02) * 5;
    const y = d.y - 18 + bob;
    const col = d.type === "key" ? "#ffa14a" : d.type === "skin" ? "#ff8ac2" :
                d.type === "card" ? "#ffcf4a" : d.type === "heal" ? "#63e28f" : "#65c8ff";
    ctx.save();
    ctx.globalAlpha = .18;
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(d.x, y, 25, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(d.x, y - 13); ctx.lineTo(d.x + 10, y); ctx.lineTo(d.x, y + 13); ctx.lineTo(d.x - 10, y);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.stroke();
    ctx.font = `italic 900 11px ${UI_FONT}`; ctx.textAlign = "center";
    ctx.fillStyle = "#fff"; ctx.fillText(d.label, d.x, y - 20); ctx.textAlign = "left";
  }
  // 存檔點柱（未啟用灰 / 啟用後青色脈動）
  for (const cp of CHECKPOINTS) {
    const on = cp.active;
    ctx.fillStyle = on ? "#1d4e66" : "#55555e";
    ctx.fillRect(cp.x - 5, cp.y - 118, 10, 118);
    ctx.fillStyle = on ? "#59d5f2" : "#83838d";
    ctx.beginPath();
    ctx.arc(cp.x, cp.y - 128, on ? 9 + Math.sin(uiTime * 5) * 1.5 : 8, 0, Math.PI * 2);
    ctx.fill();
    if (on) {
      ctx.strokeStyle = `rgba(89,213,242,${0.35 + 0.25 * Math.sin(uiTime * 5)})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cp.x, cp.y - 128, 15, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 1;
    }
    // 互動提示：玩家在範圍內＝柱頂浮動「按 E / 點擊」膠囊（觸控裝置顯示點擊版）
    if (on && !panel.open && !selectScreen && cp === nearCheckpoint()) {
      const bob = Math.sin(uiTime * 3.2) * 3;
      const py2 = cp.y - 168 + bob;
      const touch = vpad.on;
      const label = T("cpRest");
      ctx.font = `bold 13px ${UI_FONT}`;
      const tw2 = ctx.measureText(label).width;
      const bw2 = 30 + tw2 + 14, bx2 = cp.x - bw2 / 2;
      slantPath(bx2, py2 - 14, bw2, 24, 6);
      ctx.fillStyle = "rgba(250,252,255,.95)"; ctx.fill();
      slantPath(bx2, py2 - 14, bw2, 24, 6);
      ctx.strokeStyle = "rgba(89,150,199,.6)"; ctx.stroke();
      if (touch) {   // 點擊圖示：同心圓波紋
        ctx.strokeStyle = "#2f77d4"; ctx.lineWidth = 1.6;
        ctx.beginPath(); ctx.arc(bx2 + 16, py2 - 2, 4, 0, Math.PI * 2); ctx.stroke();
        ctx.beginPath(); ctx.arc(bx2 + 16, py2 - 2, 7.5, 0, Math.PI * 2); ctx.stroke();
        ctx.lineWidth = 1;
      } else {       // E 鍵帽
        ctx.fillStyle = "#2f77d4";
        slantPath(bx2 + 7, py2 - 10, 18, 16, 4); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.textAlign = "center";
        ctx.font = `900 11px ${UI_FONT}`;
        ctx.fillText("E", bx2 + 16, py2 + 2);
      }
      ctx.textAlign = "left";
      ctx.font = `bold 13px ${UI_FONT}`;
      ctx.fillStyle = "#2b3a55";
      ctx.fillText(label, bx2 + 30, py2 + 3);
    }
  }
  drawEnemies();
  drawAlly();
  drawBoss();
  drawEnemyBullets();

  // ── 沙德威斯坦衝刺拖尾：密集殘影＋沿尾漸層(近角色暖→尾端冷)，正常混合保留顏色 ──
  for (const g of afterimages) {
    const dm = DASH_META[g.skin] || DASH_META.default;
    const ds = dashSpriteFor(g.skin).img;
    if (!ds || !(ds.width || ds.img)) continue;
    const dsc = DRAW_H / dm.fh, dwid = dm.fw * dsc * SLIM, dhei = DRAW_H;
    const life = g.t / g.t0;                    // 1=剛生成 → 0=將消失（給透明度）
    // 顏色沿「拖尾空間位置」：離角色越遠越冷（不靠時間，衝刺當下整條就鋪滿漸層）
    let p = Math.abs(player.x - g.x) / (DASH_SPEED * DASH_T * 0.85);
    p = p < 0 ? 0 : p > 1 ? 1 : p;
    const pq = Math.round(p * 5) / 5;           // 量化 6 階，限制剪影快取數
    const gr = DASH_GRAD[g.skin] || DASH_GRAD.default;
    const rgb = [Math.round(gr[0][0] + (gr[1][0] - gr[0][0]) * pq),
                 Math.round(gr[0][1] + (gr[1][1] - gr[0][1]) * pq),
                 Math.round(gr[0][2] + (gr[1][2] - gr[0][2]) * pq)];
    const sil = silTile(ds, rgb);
    ctx.save();
    if (g.facing === -1) { ctx.translate(g.x, 0); ctx.scale(-1, 1); ctx.translate(-g.x, 0); }
    ctx.globalAlpha = 0.4 + 0.45 * life;
    ctx.drawImage(sil, g.fi * dm.fw, 0, dm.fw, dm.fh, g.x - dm.anchor * dwid, g.y - dm.feet * dhei, dwid, dhei);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  const dashing = player.state === "dash";
  const a = dashing ? null : ANIMS[player.state];
  let fi = a ? frameIndex(a, player.t) : 0;
  if (a && (player.state === "run" || player.state === "run_shoot") &&
      player.vx !== 0 && Math.sign(player.vx) !== player.facing) {
    fi = a.count - 1 - fi;               // 倒退走（面向與移動相反）：動畫倒放
  }
  const scale = DRAW_H / FRAME_H;
  const dw = FRAME_W * scale * SLIM, dh = DRAW_H;
  ctx.save();
  if (player.facing === -1) {
    ctx.translate(player.x, 0); ctx.scale(-1, 1); ctx.translate(-player.x, 0);
  }
  if (dashing) {                                  // 衝刺 sprite（各 skin 專屬）
    const dm = DASH_META[currentSkin] || DASH_META.default;
    const ds = dashSpriteFor(currentSkin).img;
    if (ds && (ds.width || ds.img)) {
      const dsc = DRAW_H / dm.fh, dwid = dm.fw * dsc * SLIM;
      const dfi = Math.floor(player.t * 14) % dm.count;
      ctx.drawImage(ds, dfi * dm.fw, 0, dm.fw, dm.fh, player.x - dm.anchor * dwid, player.y - dm.feet * DRAW_H, dwid, DRAW_H);
    }
  } else {
    if (player.invulnT > 0 && player.deathT <= 0 && bulletTimeT <= 0) {   // 無敵幀閃爍（子彈時間中不閃，保持角色清晰）
      ctx.globalAlpha = ((player.invulnT * 12) | 0) % 2 ? 0.35 : 0.9;
    }
    ctx.drawImage(a.img, fi * FRAME_W, 0, FRAME_W, FRAME_H,
      player.x - ANCHOR_X * dw, player.y - FEET_Y * dh, dw, dh);
  }
  ctx.restore();
  // 護盾能量護罩（與敵方盾兵同款泡泡）
  if (player.shieldHp > 0) drawShieldBubble(player.x, player.y, 128, playerBlockT);
  drawGhostWalls();   // 無碰撞前景牆：碰到玩家後淡出並維持消失
  // reload progress ring above the head
  if (player.reloadT > 0) {
    const frac = 1 - player.reloadT / RELOAD_TIME;
    const rx = player.x, ry = player.y - DRAW_H - 14;
    ctx.lineWidth = 4;
    ctx.strokeStyle = "rgba(255,255,255,.45)";
    ctx.beginPath();
    ctx.arc(rx, ry, 11, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = UI_YELLOW;
    ctx.beginPath();
    ctx.arc(rx, ry, 11, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }
  drawEffects();
  if (targeting) drawTargetingWorld();
  ctx.restore();   // end camera transform

  // 完美閃避沙德威斯坦：冷青暗角 + 掃描線 + 觸發青白閃 + 電影黑邊
  if (bulletTimeT > 0) {
    const e = bulletTimeT / BULLET_TIME_DUR;                 // 1→0
    const fade = Math.min(1, bulletTimeT / BT_EASE);         // 尾段淡出係數（與世界時間緩回同步）
    const rg = ctx.createRadialGradient(VIEW_W / 2, 264, 120, VIEW_W / 2, 264, 580);
    rg.addColorStop(0, "rgba(0,210,255,0)");
    rg.addColorStop(1, `rgba(0,170,255,${0.30 * fade})`);
    ctx.fillStyle = rg; ctx.fillRect(0, 0, VIEW_W, 540);
    ctx.fillStyle = `rgba(140,245,255,${0.045 * fade})`;    // 掃描線
    for (let y = (uiTime * 220) % 4; y < 540; y += 4) ctx.fillRect(0, y, VIEW_W, 1);
    const flash = Math.max(0, (bulletTimeT - (BULLET_TIME_DUR - 0.16)) / 0.16);  // 觸發瞬間青白閃
    if (flash > 0) { ctx.fillStyle = `rgba(190,250,255,${flash * 0.55})`; ctx.fillRect(0, 0, VIEW_W, 540); }
    ctx.fillStyle = `rgba(6,12,18,${(0.42 + 0.1 * e) * fade})`;   // 電影黑邊
    ctx.fillRect(0, 0, VIEW_W, 24); ctx.fillRect(0, 516, VIEW_W, 24);
    ctx.textAlign = "center"; ctx.font = `bold 13px ${UI_FONT}`;
    ctx.fillStyle = `rgba(180,250,255,${0.5 * e})`;
    ctx.fillText("PERFECT DODGE", VIEW_W / 2, 505);
    ctx.textAlign = "left";
  }
  // 子彈時間：藍色暗角 + 上下黑邊
  if (targeting) {
    ctx.fillStyle = "rgba(25,50,100,.16)";
    ctx.fillRect(0, 0, VIEW_W, 540);
    ctx.fillStyle = "rgba(8,10,16,.55)";
    ctx.fillRect(0, 0, VIEW_W, 26);
    ctx.fillRect(0, 514, VIEW_W, 26);
    ctx.textAlign = "center";
    ctx.font = `bold 14px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(`${CARDS[hand[targeting.slot]].name} — 左鍵確認 · J/射擊鍵 快速施放 · 右鍵取消`, VIEW_W / 2, 532);
    ctx.textAlign = "left";
  }

  // 受傷紅閃（世界層之上、HUD 之下）
  drawForeground();
  if (hurtFlash > 0) {
    ctx.fillStyle = `rgba(255,50,40,${(hurtFlash / 0.3) * 0.25})`;
    ctx.fillRect(0, 0, VIEW_W, 540);
  }
  // 閃光盾致盲：先全白再漸退（HUD 之下，血條/卡片仍可見）
  if (blindT > 0) {
    const a = blindT > BLIND_DUR - 0.5 ? 1 : Math.min(1, blindT / (BLIND_DUR - 0.5));
    ctx.fillStyle = `rgba(255,255,255,${a * 0.96})`;
    ctx.fillRect(0, 0, VIEW_W, 540);
  }
  // 低血量警示：四邊紅色暈影脈動
  if (player.hp / player.maxHp <= 0.25 && player.deathT <= 0) {
    const pulse = 0.5 + 0.42 * Math.sin(uiTime * 6);
    const d = 72, col = a => `rgba(255,38,28,${a})`;
    let g = ctx.createLinearGradient(0, 0, 0, d);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(0, 0, VIEW_W, d);
    g = ctx.createLinearGradient(0, 540, 0, 540 - d);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(0, 540 - d, VIEW_W, d);
    g = ctx.createLinearGradient(0, 0, d, 0);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(0, 0, d, 540);
    g = ctx.createLinearGradient(VIEW_W, 0, VIEW_W - d, 0);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(VIEW_W - d, 0, d, 540);
  }
  drawHUD();
  drawSkillCut();
  if (teleT > 0) {                 // 傳送黑幕
    const a = teleT > 0.45 ? (0.9 - teleT) / 0.45 : teleT / 0.45;
    ctx.fillStyle = `rgba(8,8,12,${Math.min(1, a)})`;
    ctx.fillRect(0, 0, VIEW_W, 540);
  }
  if (autosaveFlashT > 0) {          // 自動存檔指示（右下角，不打擾）
    autosaveFlashT -= 1 / 60;
    ctx.textAlign = "right";
    ctx.font = `bold 11px ${UI_FONT}`;
    ctx.fillStyle = `rgba(120,200,255,${Math.min(0.7, autosaveFlashT)})`;
    ctx.fillText("✓ 已自動存檔", VIEW_W - 12, 528);
    ctx.textAlign = "left";
  }
  // 死亡黑幕（蓋過一切）
  if (player.deathT > 0) {
    const a = player.deathT > 0.7 ? (1.4 - player.deathT) / 0.7 : player.deathT / 0.7;
    ctx.fillStyle = `rgba(8,8,12,${Math.min(1, a)})`;
    ctx.fillRect(0, 0, VIEW_W, 540);
  }
  drawMinimap();
  drawPanel();
  drawBag();
  if (vpad.on && !selectScreen && !bagOpen && !vpadEdit) drawVpad();
  if (vpadEdit) drawVpadEdit();
  if (clearPanel) drawClearPanel();
  if (selectScreen) drawSelectScreen();
  if (dialogue) drawDialogue();
  if (menuScreen) drawMenu();
  drawTutorial();
  dbg.textContent = `state=${player.state} frame=${fi} hp=${player.hp} ammo=${player.ammo} ground=${player.onGround} cam=${Math.round(cam.x)},${Math.round(cam.y)}`;
}

// ---- 存檔點面板繪製（強化 / 傳送）----
const CP_NAMES = ["起始平原・電梯前", "下水道中段", "中央大廳", "東塔電梯前", "Boss 門前"];
function drawPanel() {
  if (!panel.open) return;
  panel.btns = [];
  const cx = VIEW_W / 2;
  ctx.save();
  ctx.fillStyle = "rgba(16,26,44,.66)";
  ctx.fillRect(0, 0, VIEW_W, 540);
  const PW = 560, PH = 380, px = cx - PW / 2, py = 70;
  ctx.shadowColor = "rgba(20,40,80,.4)";
  ctx.shadowBlur = 14;
  slantPath(px, py, PW, PH, 14);
  ctx.fillStyle = "rgba(250,252,255,.97)";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.save();
  slantPath(px, py, PW, PH, 14);
  ctx.clip();
  ctx.fillStyle = UI_BLUE;
  ctx.fillRect(px, py, PW + 14, 4);
  ctx.restore();
  ctx.textAlign = "left";
  ctx.font = `italic 900 20px ${UI_FONT}`;
  ctx.fillStyle = UI_NAVY;
  ctx.fillText("補給站", px + 26, py + 34);
  if (CREDIT_FX.img) ctx.drawImage(CREDIT_FX.img, px + 130, py + 16, 24, 21);   // 移到標題右側（原本被匯出/匯入鈕擋住）
  ctx.font = `italic 900 17px ${UI_FONT}`;
  ctx.fillStyle = "#e8a417";
  ctx.fillText(String(credits), px + 160, py + 34);
  const tabs = ["強化", "招募", "傳送", "造型", "成就"];
  for (let i = 0; i < 5; i++) {
    const tx = px + 26 + i * 97, ty = py + 50, tw = 88, th = 28;
    slantPath(tx, ty, tw, th, 7);
    ctx.fillStyle = panel.tab === i ? UI_BLUE : "rgba(140,155,180,.35)";
    ctx.fill();
    ctx.textAlign = "center";
    ctx.font = `italic 900 15px ${UI_FONT}`;
    ctx.fillStyle = panel.tab === i ? "#fff" : UI_NAVY;
    ctx.fillText(tabs[i], tx + tw / 2, ty + 20);
    panel.btns.push({ x: tx, y: ty, w: tw, h: th, fn: (j => () => { panel.tab = j; panel.scroll = 0; })(i) });
  }
  // 內容區：滾輪捲動＋遮罩裁切（超出面板的列被 clip 掉，捲出可視範圍的按鈕不可點）
  const scy = panel.scroll || 0;
  const clipTop = py + 84, clipBottom = py + PH - 12;
  const btnsBeforeContent = panel.btns.length;
  ctx.save();
  ctx.beginPath();
  ctx.rect(px + 2, clipTop, PW - 4, clipBottom - clipTop);
  ctx.clip();
  if (panel.tab === 1) {           // ---- 招募頁（未選的支援角色，300C 加入卡池）----
    let row = 0;
    for (const idx of SUPPORT_IDS) {
      const c = CARDS[idx];
      const ownedP = purchasedSupports.includes(idx) || idx === chosenSupport;   // 已選角色視同擁有
      const mystery = idx >= 7 && !ownedP;         // 日鞠/風華/三千留：地圖道具解鎖，不販售
      const ry = py + 84 + row * 46 - scy;
      if (mystery) {
        slantPath(px + 26, ry, PW - 52, 40, 8);
        ctx.fillStyle = "rgba(90,100,120,.10)";
        ctx.fill();
        slantPath(px + 26, ry, PW - 52, 40, 8);
        ctx.strokeStyle = "rgba(120,150,190,.25)";
        ctx.stroke();
        ctx.textAlign = "left";
        ctx.font = `italic 900 13.5px ${UI_FONT}`;
        ctx.fillStyle = "rgba(43,58,85,.5)";
        ctx.fillText("？？？", px + 78, ry + 17);
        ctx.font = `bold 10.5px ${UI_FONT}`;
        ctx.fillText(T("recruitMystery"), px + 78, ry + 33);
        row++;
        continue;
      }
      slantPath(px + 26, ry, PW - 52, 40, 8);
      ctx.fillStyle = ownedP ? "rgba(62,207,111,.12)" : "rgba(53,195,240,.08)";
      ctx.fill();
      slantPath(px + 26, ry, PW - 52, 40, 8);
      ctx.strokeStyle = "rgba(120,150,190,.4)";
      ctx.stroke();
      if (c.img) {                 // 頭像（每位獨立的方形裁切，正方對正方）
        const sc = c.shopCrop;
        ctx.save();
        slantPath(px + 33, ry + 3, 34, 34, 4);
        ctx.clip();
        if (sc) ctx.drawImage(c.img, sc.sx, sc.sy, sc.s, sc.s, px + 33, ry + 3, 34, 34);
        else ctx.drawImage(c.img, c.crop.sx, c.crop.sy, c.crop.sw, c.crop.sh, px + 33, ry + 3, 34, 43);
        ctx.restore();
      }
      ctx.textAlign = "left";
      ctx.font = `italic 900 13.5px ${UI_FONT}`;
      ctx.fillStyle = UI_NAVY;
      ctx.fillText(c.name, px + 78, ry + 17);
      ctx.font = `bold 10.5px ${UI_FONT}`;
      ctx.fillStyle = "rgba(43,58,85,.6)";
      const descs = { 4: T("sup4"), 5: T("sup5"), 6: T("sup6"), 7: T("sup7"), 8: T("sup8"), 9: T("sup9") };
      ctx.fillText((idx === chosenSupport ? "〔開局選擇〕" : "") + (descs[idx] || ""), px + 78, ry + 33);
      const benched = benchedSupports.includes(idx);
      const poolFull = supportsInPool() >= SUPPORT_POOL_MAX;
      const bx = px + PW - 142, bw = 102, bh = 28, by = ry + 6;
      slantPath(bx, by, bw, bh, 8);
      ctx.fillStyle = ownedP ? (benched ? (poolFull ? "rgba(140,152,170,.9)" : UI_BLUE) : "rgba(232,84,74,.9)")
                             : credits >= SUPPORT_PRICES[idx] ? UI_BLUE : "rgba(140,152,170,.9)";
      ctx.fill();
      ctx.textAlign = "center";
      ctx.font = `italic 900 14px ${UI_FONT}`;
      ctx.fillStyle = "#fff";
      ctx.fillText(ownedP ? (benched ? (poolFull ? "卡池已滿" : "加回卡池") : "移出卡池") : `${SUPPORT_PRICES[idx]} C`, bx + bw / 2, by + 20);
      if (ownedP) panel.btns.push({ x: bx, y: by, w: bw, h: bh, fn: (ii => () => toggleSupportInPool(ii))(idx) });
      else panel.btns.push({ x: bx, y: by, w: bw, h: bh, fn: (ii => () => buySupport(ii))(idx) });

      row++;
    }
  } else if (panel.tab === 0) {    // ---- 強化頁 ----
    const keys = Object.keys(UPGRADE_DEFS);
    for (let i = 0; i < keys.length; i++) {
      const k = keys[i], d = UPGRADE_DEFS[k];
      const ry = py + 96 + i * 58 - scy;
      slantPath(px + 26, ry, PW - 52, 48, 9);
      ctx.fillStyle = "rgba(53,195,240,.08)";
      ctx.fill();
      slantPath(px + 26, ry, PW - 52, 48, 9);
      ctx.strokeStyle = "rgba(120,150,190,.4)";
      ctx.stroke();
      ctx.textAlign = "left";
      ctx.font = `italic 900 16px ${UI_FONT}`;
      ctx.fillStyle = UI_NAVY;
      ctx.fillText(`${i + 1}. ${d.name} ${d.step}`, px + 44, ry + 30);
      for (let q = 0; q < d.max; q++) {
        ctx.fillStyle = q < upgrades[k] ? UI_BLUE : "rgba(120,140,170,.3)";
        ctx.fillRect(px + 230 + q * 14, ry + 19, 10, 10);
      }
      const maxed = upgrades[k] >= d.max;
      const cost = upgradeCost(k);
      const afford = !maxed && credits >= cost;
      const bx = px + PW - 150, bw = 108, bh = 34, by = ry + 7;
      slantPath(bx, by, bw, bh, 8);
      ctx.fillStyle = maxed ? "rgba(140,152,170,.6)" : afford ? UI_BLUE : "rgba(140,152,170,.9)";
      ctx.fill();
      ctx.textAlign = "center";
      ctx.font = `italic 900 14px ${UI_FONT}`;
      ctx.fillStyle = "#fff";
      ctx.fillText(maxed ? "已滿級" : `${cost} C`, bx + bw / 2, by + 23);
      if (!maxed) panel.btns.push({ x: bx, y: by, w: bw, h: bh, fn: (kk => () => buyUpgrade(kk))(k) });
    }
  } else if (panel.tab === 2) {    // ---- 傳送頁 ----
    let row = 0;
    for (let i = 0; i < CHECKPOINTS.length; i++) {
      const cp = CHECKPOINTS[i];
      if (!cp.active) continue;
      const ry = py + 88 + row * 52 - scy;
      const here = Math.abs(player.x - cp.x) < 70 && Math.abs(player.y - cp.y) < 90;
      slantPath(px + 26, ry, PW - 52, 44, 9);
      ctx.fillStyle = here ? "rgba(53,195,240,.2)" : "rgba(53,195,240,.08)";
      ctx.fill();
      slantPath(px + 26, ry, PW - 52, 44, 9);
      ctx.strokeStyle = "rgba(120,150,190,.4)";
      ctx.stroke();
      ctx.textAlign = "left";
      ctx.font = `italic 900 15px ${UI_FONT}`;
      ctx.fillStyle = UI_NAVY;
      ctx.fillText(CP_NAMES[i] || `站點 ${i + 1}`, px + 44, ry + 28);
      if (!here) {
        const bx = px + PW - 150, bw = 108, bh = 32, by = ry + 6;
        slantPath(bx, by, bw, bh, 8);
        ctx.fillStyle = UI_BLUE;
        ctx.fill();
        ctx.textAlign = "center";
        ctx.font = `italic 900 14px ${UI_FONT}`;
        ctx.fillStyle = "#fff";
        ctx.fillText("傳送", bx + bw / 2, by + 22);
        panel.btns.push({ x: bx, y: by, w: bw, h: bh, fn: (c => () => teleportTo(c))(cp) });
      } else {
        ctx.textAlign = "right";
        ctx.font = `bold 13px ${UI_FONT}`;
        ctx.fillStyle = "rgba(43,58,85,.6)";
        ctx.fillText("目前位置", px + PW - 44, ry + 28);
      }
      row++;
    }
    if (row === 0) {
      ctx.textAlign = "center";
      ctx.font = `bold 14px ${UI_FONT}`;
      ctx.fillStyle = "rgba(43,58,85,.6)";
      ctx.fillText("尚未開啟其他傳送點", cx, py + 140);
    }
  } else if (panel.tab === 3) {    // ---- 造型頁 ----
    let row = 0;
    for (const id in SKINS) {
      const s = SKINS[id];
      if (!s.anims) continue;
      const ry = py + 96 + row * 58 - scy;
      const active = currentSkin === id;
      const lockedSkin = id !== "default" && !unlocks.skins.includes(id);
      if (lockedSkin) {
        slantPath(px + 26, ry, PW - 52, 48, 9);
        ctx.fillStyle = "rgba(90,100,120,.10)";
        ctx.fill();
        slantPath(px + 26, ry, PW - 52, 48, 9);
        ctx.strokeStyle = "rgba(120,150,190,.25)";
        ctx.stroke();
        ctx.textAlign = "left";
        ctx.font = `italic 900 16px ${UI_FONT}`;
        ctx.fillStyle = "rgba(43,58,85,.5)";
        ctx.fillText("？？？", px + 88, ry + 24);
        ctx.font = `bold 11px ${UI_FONT}`;
        ctx.fillText(s.hintFn ? s.hintFn() : T(s.hint || "hintDefault"), px + 88, ry + 40);
        row++;
        continue;
      }
      slantPath(px + 26, ry, PW - 52, 48, 9);
      ctx.fillStyle = active ? "rgba(62,207,111,.15)" : "rgba(53,195,240,.08)";
      ctx.fill();
      slantPath(px + 26, ry, PW - 52, 48, 9);
      ctx.strokeStyle = "rgba(120,150,190,.4)";
      ctx.stroke();
      if (s.anims.idle && s.anims.idle.img) {   // 預覽：idle 第 0 幀
        ctx.save();
        slantPath(px + 34, ry + 4, 40, 40, 4);
        ctx.clip();
        const ph = 40 * s.fh / s.fw * 1.6;
        ctx.drawImage(s.anims.idle.img, 0, 0, s.fw, s.fh, px + 30, ry + 4, 52, ph);
        ctx.restore();
      }
      ctx.textAlign = "left";
      ctx.font = `italic 900 16px ${UI_FONT}`;
      ctx.fillStyle = UI_NAVY;
      ctx.fillText(s.label, px + 88, ry + 30);
      const bx = px + PW - 150, bw = 108, bh = 32, by = ry + 8;
      slantPath(bx, by, bw, bh, 8);
      ctx.fillStyle = active ? "rgba(62,207,111,.85)" : UI_BLUE;
      ctx.fill();
      ctx.textAlign = "center";
      ctx.font = `italic 900 14px ${UI_FONT}`;
      ctx.fillStyle = "#fff";
      ctx.fillText(active ? "使用中" : "更換", bx + bw / 2, by + 22);
      if (!active) panel.btns.push({ x: bx, y: by, w: bw, h: bh, fn: (ii => () => { applySkin(ii); saveGame(); })(id) });
      row++;
    }
  }
  if (panel.tab === 4) {           // ---- 成就頁 ----
    let row = 0;
    for (const a of ACHIEVEMENTS) {
      const done = achUnlocked.includes(a.id);
      const ry = py + 88 + row * 48 - scy;
      slantPath(px + 26, ry, PW - 52, 42, 8);
      ctx.fillStyle = done ? "rgba(255,215,94,.14)" : "rgba(90,100,120,.10)";
      ctx.fill();
      slantPath(px + 26, ry, PW - 52, 42, 8);
      ctx.strokeStyle = done ? "rgba(232,164,23,.55)" : "rgba(120,150,190,.25)";
      ctx.stroke();
      ctx.textAlign = "center";
      ctx.font = `900 20px ${UI_FONT}`;
      ctx.fillStyle = done ? "#e8a417" : "rgba(120,140,170,.5)";
      ctx.fillText(done ? "★" : "・", px + 52, ry + 28);
      ctx.textAlign = "left";
      ctx.font = `italic 900 14px ${UI_FONT}`;
      ctx.fillStyle = done ? UI_NAVY : "rgba(43,58,85,.5)";
      ctx.fillText(a.name, px + 78, ry + 18);
      ctx.font = `bold 11px ${UI_FONT}`;
      ctx.fillStyle = done ? "rgba(43,58,85,.7)" : "rgba(43,58,85,.4)";
      ctx.fillText(a.desc, px + 78, ry + 34);
      row++;
    }
    ctx.textAlign = "right";
    ctx.font = `italic 900 13px ${UI_FONT}`;
    ctx.fillStyle = "#e8a417";
    ctx.fillText(achUnlocked.length + " / " + ACHIEVEMENTS.length, px + PW - 40, py + 88 - scy - 6);
    ctx.textAlign = "left";
  }
  ctx.restore();   // 內容區遮罩結束
  // 內容總高（未捲動座標）→ 可捲動上限；夾住目前捲動量
  let contentBottomY;
  if (panel.tab === 0) contentBottomY = py + 96 + Object.keys(UPGRADE_DEFS).length * 58;
  else if (panel.tab === 1) contentBottomY = py + 84 + SUPPORT_IDS.length * 46;
  else if (panel.tab === 2) contentBottomY = py + 88 + CHECKPOINTS.filter(c => c.active).length * 52;
  else if (panel.tab === 3) contentBottomY = py + 96 + Object.values(SKINS).filter(s => s.anims).length * 58;
  else contentBottomY = py + 88 + ACHIEVEMENTS.length * 48;
  panel.maxScroll = Math.max(0, contentBottomY + 6 - clipBottom);
  panel.scroll = Math.max(0, Math.min(scy, panel.maxScroll));
  // 捲出可視範圍的內容按鈕不可點
  panel.btns = panel.btns.slice(0, btnsBeforeContent).concat(
    panel.btns.slice(btnsBeforeContent).filter(b => b.y + b.h > clipTop + 2 && b.y < clipBottom - 2));
  if (panel.maxScroll > 0) {       // 捲軸指示
    const trackH = clipBottom - clipTop;
    const thumbH = Math.max(28, trackH * trackH / (trackH + panel.maxScroll));
    const thumbY = clipTop + (trackH - thumbH) * (panel.scroll / panel.maxScroll);
    ctx.fillStyle = "rgba(43,58,85,.12)";
    ctx.fillRect(px + PW - 12, clipTop, 4, trackH);
    ctx.fillStyle = "rgba(43,58,85,.35)";
    ctx.fillRect(px + PW - 12, thumbY, 4, thumbH);
  }
  const cbx = px + PW - 46, cby = py + 12, cbs = 30;
  if (false) {   // 「你想要無敵嗎」：彌香密語按鈕（暫時移除，改回 true 即恢復）
    const mx = cbx - 76 * 2 - 8 - 118, mw = 110;
    slantPath(mx, cby, mw, cbs, 6);
    ctx.fillStyle = "#e88fb0";
    ctx.fill();
    ctx.textAlign = "center";
    ctx.font = `italic 900 12px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText("你想要無敵嗎", mx + mw / 2, cby + 20);
    panel.btns.push({ x: mx, y: cby, w: mw, h: cbs, fn: tryMikaPassword });
  }
  // 存檔碼匯出/匯入（跨裝置備份）
  for (const [i, [label, fn]] of [["匯出檔", exportSave], ["匯入檔", importSave]].entries()) {
    const ex = cbx - 76 * (2 - i) - 8, ew = 68;
    slantPath(ex, cby, ew, cbs, 6);
    ctx.fillStyle = UI_BLUE;
    ctx.fill();
    ctx.textAlign = "center";
    ctx.font = `italic 900 13px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(label, ex + ew / 2, cby + 20);
    panel.btns.push({ x: ex, y: cby, w: ew, h: cbs, fn });
  }
  slantPath(cbx, cby, cbs, cbs, 6);
  ctx.fillStyle = UI_RED;
  ctx.fill();
  ctx.textAlign = "center";
  ctx.font = `italic 900 16px ${UI_FONT}`;
  ctx.fillStyle = "#fff";
  ctx.fillText("×", cbx + cbs / 2, cby + 21);
  panel.btns.push({ x: cbx, y: cby, w: cbs, h: cbs, fn: closePanel });
  ctx.textAlign = "left";
  ctx.restore();
}

function drawVpad() {
  ctx.save();
  // 搖桿：觸摸中畫在起點，否則畫半透明提示圈
  const jx = vpad.joyId !== null ? vpad.joyBaseX : 118;
  const jy = vpad.joyId !== null ? vpad.joyBaseY : 430;

  ctx.beginPath(); ctx.arc(jx, jy, 52, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,.25)";
  ctx.beginPath(); ctx.arc(jx + vpad.joyDx * 34, jy + vpad.joyDy * 34, 26, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,.8)";
  ctx.beginPath(); ctx.arc(jx + vpad.joyDx * 34, jy + vpad.joyDy * 34, 26, 0, Math.PI * 2); ctx.stroke();
  // 按鈕圈
  for (const k in VBTN) {
    const b = VBTN[k];
    const pressed = vpad[k];
    const cooling = k === "dash" && player.dashCd > 0;   // 衝刺冷卻中
    ctx.globalAlpha = pressed ? 0.85 : 0.3;
    ctx.fillStyle = pressed ? "rgba(53,195,240,.5)" : "rgba(255,255,255,.18)";
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    if (cooling) {   // 冷卻：底圈變暗，由下往上填滿的扇形代表就緒進度
      const rdy = 1 - player.dashCd / DASH_CD;
      ctx.fillStyle = "rgba(20,28,44,.55)";
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "rgba(53,195,240,.5)";
      ctx.beginPath(); ctx.moveTo(b.x, b.y);
      ctx.arc(b.x, b.y, b.r, -Math.PI / 2, -Math.PI / 2 + rdy * Math.PI * 2);
      ctx.closePath(); ctx.fill();
    }
    ctx.strokeStyle = cooling ? "rgba(255,255,255,.5)" : (pressed ? UI_BLUE : "#fff");
    ctx.lineWidth = pressed ? 3 : 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.stroke();
    ctx.textAlign = "center";
    ctx.font = `italic 900 ${b.r > 36 ? 16 : 13}px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(b.label, b.x, b.y + 5);
  }
  ctx.textAlign = "left";
  ctx.lineWidth = 1;
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ---- BA 風 UI：白色斜切面板 + 深藍字 + 天藍飾條 + 膠囊進度條 ----
const UI_NAVY = "#2b3a55", UI_BLUE = "#2ba7f0", UI_RED = "#e8544a", UI_YELLOW = "#ffcc37";
const UI_FONT = "'PixelCJK', 'Segoe UI', 'Noto Sans TC', sans-serif";   // 像素字體（Fusion Pixel, OFL）
try {   // 預載常用子集，避免首幀 fallback 字型閃爍
  if (typeof document !== "undefined" && document.fonts) {
    document.fonts.load("16px PixelCJK", "補給站A1");
  }
} catch (e) {}

function slantPath(x, y, w, h, s = 8) {   // 平行四邊形（右斜切）
  ctx.beginPath();
  ctx.moveTo(x + s, y);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w - s, y + h);
  ctx.lineTo(x, y + h);
  ctx.closePath();
}

function capsulePath(x, y, w, h) {        // 圓角膠囊
  const r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function capsuleBar(x, y, w, h, fills) {  // fills: [[比例, 顏色], ...] 由底到面
  capsulePath(x, y, w, h);
  ctx.fillStyle = "#dfe6ee";
  ctx.fill();
  for (const [frac, col] of fills) {
    if (frac <= 0) continue;
    capsulePath(x, y, Math.max(h, w * Math.min(1, frac)), h);
    ctx.fillStyle = col;
    ctx.fill();
  }
  capsulePath(x, y, w, h);
  ctx.strokeStyle = "rgba(110,140,180,.45)";
  ctx.stroke();
}

function uiPanel(x, y, w, h, s) {         // 白色斜切面板 + 陰影 + 天藍頂飾條
  ctx.shadowColor = "rgba(20,40,80,.25)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  slantPath(x, y, w, h, s);
  ctx.fillStyle = "rgba(250,252,255,.92)";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  slantPath(x, y, w, h, s);
  ctx.strokeStyle = "rgba(120,150,190,.35)";
  ctx.stroke();
  ctx.save();
  slantPath(x, y, w, h, s);
  ctx.clip();
  ctx.fillStyle = UI_BLUE;                // 頂緣飾條
  ctx.fillRect(x, y, w + s, 4);
  ctx.restore();
}

// 技能施放橫幅（BA 式 cut-in：頭像 + 斜切名牌，滑入 → 停留 → 滑出）
function drawSkillCut() {
  if (!skillCut) return;
  const t = skillCut.t, outT = skillCut.dur - 0.25;
  let dx = 0;
  if (t < 0.15) { const k = 1 - t / 0.15; dx = -340 * k * k; }          // ease-out 滑入
  else if (t > outT) { const k = (t - outT) / 0.25; dx = -360 * k * k; } // 加速滑出
  const x = 16 + dx, y = 96;
  ctx.save();
  ctx.shadowColor = "rgba(20,40,80,.3)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  // 名牌橫幅（白色斜切 + 天藍頂帶）
  slantPath(x + 54, y + 12, 214, 38, 9);
  ctx.fillStyle = "rgba(250,252,255,.96)";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  ctx.save();
  slantPath(x + 54, y + 12, 214, 38, 9);
  ctx.clip();
  ctx.fillStyle = "rgba(53,195,240,.25)";      // 上半淡藍帶
  ctx.fillRect(x + 54, y + 12, 224, 14);
  ctx.fillStyle = UI_BLUE;
  ctx.fillRect(x + 54, y + 12, 224, 3);
  ctx.restore();
  slantPath(x + 54, y + 12, 214, 38, 9);
  ctx.strokeStyle = "rgba(120,150,190,.45)";
  ctx.stroke();
  ctx.font = `italic 900 17px ${UI_FONT}`;
  ctx.fillStyle = UI_NAVY;
  ctx.fillText(skillCut.c.name, x + 84, y + 40);
  if (skillCut.passive) {            // 被動觸發：金色「被動」小徽章
    slantPath(x + 218, y + 4, 52, 18, 5);
    ctx.fillStyle = UI_YELLOW;
    ctx.fill();
    ctx.font = `italic 900 12px ${UI_FONT}`;
    ctx.fillStyle = UI_NAVY;
    ctx.textAlign = "center";
    ctx.fillText("被動", x + 244, y + 18);
    ctx.textAlign = "left";
  }
  // 頭像框（藍漸層底）
  ctx.shadowColor = "rgba(20,40,80,.3)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  slantPath(x, y, 64, 64, 7);
  ctx.fillStyle = "#fff";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  ctx.save();
  slantPath(x + 2.5, y + 2.5, 59, 59, 6);
  ctx.clip();
  const g = ctx.createLinearGradient(0, y, 0, y + 64);

  g.addColorStop(1, "#e6f3ff");

  ctx.fillRect(x - 6, y, 76, 64);

  ctx.restore();
  slantPath(x, y, 64, 64, 7);

  ctx.stroke();
  ctx.lineWidth = 1;
  ctx.restore();
}

// 瞄準預覽（世界座標層，於相機 transform 內呼叫）
function drawTargetingWorld() {
  const { wx, wy } = mouseWorld();
  const c = CARDS[hand[targeting.slot]];
  if (c.skill === "area") {                 // 區域圈
    ctx.strokeStyle = "#35c3f0";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(wx, floorYAt(player.y), 90, 18, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = "rgba(53,195,240,.18)";
    ctx.fill();
    ctx.lineWidth = 1;
  } else if (c.skill === "fireline") {      // 地面火線帶
    const dir = Math.sign(wx - player.x) || player.facing;
    const a = player.x + dir * 20, b = player.x + dir * 380;
    const x0 = Math.min(a, b), x1 = Math.max(a, b);
    ctx.fillStyle = "rgba(255,120,40,.22)";
    const _gy = floorYAt(player.y);
    ctx.fillRect(x0, _gy - 26, x1 - x0, 26);
    ctx.strokeStyle = "rgba(255,140,50,.85)";
    ctx.strokeRect(x0 + .5, _gy - 26.5, x1 - x0 - 1, 26);
  } else if (c.skill === "stun") {          // 小車：從腳下沿當前表面的行進方向箭頭
    const dir = Math.sign(wx - player.x) || player.facing;
    const gy = player.y - 10;
    ctx.strokeStyle = "#35c3f0";
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(player.x + dir * 24, gy);
    ctx.lineTo(player.x + dir * 170, gy);
    ctx.stroke();
    ctx.setLineDash([]);
    for (let q = 0; q < 3; q++) {           // 箭頭符號
      const ax = player.x + dir * (185 + q * 14);
      ctx.beginPath();
      ctx.moveTo(ax - dir * 8, gy - 8);
      ctx.lineTo(ax, gy);
      ctx.lineTo(ax - dir * 8, gy + 8);
      ctx.stroke();
    }
    ctx.lineWidth = 1;
  } else {                                  // 狙擊：目標四角框
    const t = pickTarget(wx, wy, Infinity);
    if (t) {
      const hw = 30, y0 = t.y - t.h - 8, y1 = t.y + 6, L = 10;
      ctx.strokeStyle = "#ffcc37";
      ctx.lineWidth = 3;
      for (const [cx, cy, dx, dy] of [[t.x - hw, y0, 1, 1], [t.x + hw, y0, -1, 1], [t.x - hw, y1, 1, -1], [t.x + hw, y1, -1, -1]]) {
        ctx.beginPath();
        ctx.moveTo(cx + dx * L, cy);
        ctx.lineTo(cx, cy);
        ctx.lineTo(cx, cy + dy * L);
        ctx.stroke();
      }
      ctx.lineWidth = 1;
    } else {                                // 無有效目標：灰色十字
      ctx.strokeStyle = "rgba(255,255,255,.45)";
      ctx.beginPath();
      ctx.moveTo(wx - 10, wy); ctx.lineTo(wx + 10, wy);
      ctx.moveTo(wx, wy - 10); ctx.lineTo(wx, wy + 10);
      ctx.stroke();
    }
  }
}

// ---- 存檔點互動面板（休息：回滿血+敵人重生+存檔；升級/傳送兩頁）----
const panel = { open: false, tab: 0, btns: [] };   // btns: 每幀重建的點擊區
function nearCheckpoint() {
  for (const cp of CHECKPOINTS) {
    if (cp.active && Math.abs(player.x - cp.x) < 70 && Math.abs(player.y - cp.y) < 90) return cp;
  }
  return null;
}
function openPanel() {                 // 互動＝休息：回滿血、敵人重生、存檔
  showTut("panel");
  panel.open = true; panel.tab = 0; panel.scroll = 0;
  player.hp = player.maxHp;
  resetEnemies();
  bossBullets.length = 0;
  saveGame();
  cancelTargeting();
}
function closePanel() { panel.open = false; }
function buyUpgrade(key) {
  const c = upgradeCost(key);
  if (upgrades[key] >= UPGRADE_DEFS[key].max || credits < c) return false;
  credits -= c;
  trackSpend(c);
  upgrades[key]++;
  applyUpgrades();
  player.hp = player.maxHp;            // 升級順便回滿
  saveGame();
  return true;
}
let teleT = 0, teleCp = null;      // 傳送黑幕：前半淡入黑 → 中點搬人 → 後半淡出
function teleportTo(cp) {
  teleT = 0.9; teleCp = cp;
  player.invulnT = Math.max(player.invulnT, 1.2);
  closePanel();
}
function bossContinueRun() {   // 完成面板「繼續」：開新輪（Boss 回待命+敵人重生+回滿）→ 傳回首重生點；之後不再計時
  clearPanel = null; bossRoundDone = false; timerHidden = true;
  boss.active = false; boss.deadT = 0;
  boss.hp = boss.maxHp; boss.hpGhost = boss.maxHp;

function silTile(img, rgb) {   // 染色快取：用合成操作上色（不讀像素，file:// 下也不會 tainted-canvas 失敗）
  const key = "_sil" + rgb.join("_");

    g.globalCompositeOperation = "source-atop";              // 2) 只在形狀上鋪平色（不畫方框）
    g.fillStyle = "rgb(" + (rgb[0] | 0) + "," + (rgb[1] | 0) + "," + (rgb[2] | 0) + ")";

      if (supportsInPool() < SUPPORT_POOL_MAX) deckQueue.push(c);

    }
    for (const id in SKINS) if (id !== "default" && !unlocks.skins.includes(id)) unlocks.skins.push(id);
    saveGame();
    ok("ALL CHARACTERS + SKINS");
  } else if (code === "KILL") {
    let n = 0;
    for (const e of enemies) if (e.state !== "death") { damageEnemy(e, 9999); n++; }
    ok("KILLED " + n);
  } else if (code === "CP") {

  ctx.fillText(String(cost | 0), baseX + 25, barY + 27 + cpk * 2);
  ctx.textAlign = "left";
  const segX = baseX + 56, segTotal = CW * HAND_SIZE + GAP * (HAND_SIZE - 1) - 56;
  const segW = (segTotal - 2 * 9) / 10;
  const segY = barY + 14, segH = 14;
  for (let i = 0; i < 10; i++) {
    const sx = segX + i * (segW + 2);
    const frac = Math.min(1, Math.max(0, cost - i));
    slantPath(sx, segY, segW, segH, 4);
    ctx.fillStyle = "#141c2b";
    ctx.fill();
    if (frac > 0) {
      ctx.save();
      slantPath(sx, segY, segW, segH, 4);
      ctx.clip();
      const gg = ctx.createLinearGradient(segX, 0, segX + segTotal, 0);
      gg.addColorStop(0, "#2b8fd8");
      gg.addColorStop(1, "#8ef0ff");
      ctx.fillStyle = gg;
      ctx.fillRect(sx, segY, (segW + 4) * frac, segH);
      if (frac < 1) {                     // 正在累積的格：前緣白色脈動
        ctx.fillStyle = `rgba(255,255,255,${0.35 + 0.35 * Math.sin(uiTime * 7)})`;
        ctx.fillRect(sx + (segW + 4) * frac - 3, segY, 3, segH);
      }
      ctx.restore();
    }
    slantPath(sx, segY, segW, segH, 4);
    ctx.strokeStyle = "rgba(90,130,180,.35)";
    ctx.stroke();
  }
  ctx.restore();
}

function drawEffects() {
  for (const p of dmgPops) {         // 傷害數字（BA 式）
    const k = p.t / 0.8;
    const rise = (1 - k) * 22;
    ctx.globalAlpha = Math.min(1, k * 3);
    ctx.textAlign = "center";
    if (p.crit) {                    // 爆擊：紅色尖刺星芒 + 白字，出現瞬間放大
      const pop = 1 + Math.max(0, k - 0.82) * 2.2;
      const r = 19 * pop;
      ctx.beginPath();
      for (let q = 0; q < 16; q++) {
        const ang = q * Math.PI / 8 + 0.2;
        const rr = q % 2 === 0 ? r : r * 0.6;
        if (q === 0) ctx.moveTo(p.x + Math.cos(ang) * rr, p.y - rise + Math.sin(ang) * rr * 0.82);
        else ctx.lineTo(p.x + Math.cos(ang) * rr, p.y - rise + Math.sin(ang) * rr * 0.82);
      }
      ctx.closePath();
      ctx.fillStyle = "#e8442a";
      ctx.fill();
      ctx.strokeStyle = "#8e1f12";
      ctx.stroke();
      ctx.font = `italic 900 ${Math.round(15 * pop)}px ${UI_FONT}`;
      ctx.fillStyle = "#fff";
      ctx.fillText(p.val, p.x, p.y - rise + 5);
    } else {                         // 普通：白字藍描邊
      ctx.font = `italic 900 13px ${UI_FONT}`;
      ctx.strokeStyle = UI_NAVY;
      ctx.lineWidth = 3;
      ctx.strokeText(p.val, p.x, p.y - rise);
      ctx.fillStyle = "#fff";
      ctx.fillText(p.val, p.x, p.y - rise);
      ctx.lineWidth = 1;
    }
    ctx.textAlign = "left";
    ctx.globalAlpha = 1;
  }
  for (const p of costPops) {        // 浮字（+1 Cost／爆擊／回血／護盾，上升淡出）
    const k = p.t / 0.9;
    ctx.globalAlpha = Math.min(1, k * 2.5);
    ctx.textAlign = "center";
    ctx.font = `italic 900 15px ${UI_FONT}`;
    ctx.strokeStyle = "rgba(255,255,255,.9)";
    ctx.lineWidth = 3;
    ctx.strokeText(p.text, p.x, p.y - (1 - k) * 26);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y - (1 - k) * 26);
    ctx.lineWidth = 1;
    ctx.textAlign = "left";
    ctx.globalAlpha = 1;
  }
  for (const s of shells) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.globalAlpha = Math.min(1, s.life * 3);
    ctx.fillStyle = "#c9a227";
    ctx.fillRect(-4, -1.5, 8, 3);
    ctx.fillStyle = "#8a6d1c";
    ctx.fillRect(2, -1.5, 2, 3);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  for (const b of bullets) {
    const dir = Math.sign(b.vx);
    ctx.fillStyle = "#ffd75e";
    ctx.fillRect(b.x - dir * 14, b.y - 1.5, dir * 12, 3);
    ctx.fillStyle = "#fff6c8";
    ctx.fillRect(b.x - dir * 4, b.y - 2, dir * 4, 4);
  }
  if (flashT > 0 && MUZZLE[player.state]) {
    const m = gunPoint(MUZZLE[player.state]);
    const k = flashT / 0.07;
    const r = (10 + flashSeed * 6) * (0.6 + 0.4 * k);
    ctx.save();
    ctx.translate(m.x + player.facing * 4, m.y);
    ctx.rotate(flashSeed * 0.6 - 0.3);
    for (const [col, f] of [["#ff9d2e", 1], ["#ffd75e", 0.65], ["#ffffff", 0.32]]) {
      ctx.fillStyle = col;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const ang = i * Math.PI / 4;
        const rad = (i % 2 ? 0.42 : 1) * r * f;
        ctx[i ? "lineTo" : "moveTo"](Math.cos(ang) * rad, Math.sin(ang) * rad);
      }
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
  for (const d of dusts) {
    ctx.globalAlpha = 0.5 * (d.t / d.t0);
    ctx.fillStyle = "#b9b0a4";
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const p of impacts) {
    const k = p.t / 0.1;
    ctx.fillStyle = `rgba(255, 220, 130, ${k})`;
    const r = 3 + (1 - k) * 4;
    ctx.fillRect(p.x - r, p.y - 1, r * 2, 2);
    ctx.fillRect(p.x - 1, p.y - r, 2, r * 2);
  }
  // 火焰殘留區（地面燃燒）：稀疏大朵 + 尺寸隨機錯落
  for (const z of flameZones) {
    ctx.globalAlpha = Math.min(1, z.t);   // 最後 1 秒淡出
    for (let x = z.x0 + 24; x < z.x1; x += 15) {   // 間距 < 火寬 → 相鄰略重疊，加法混合疊出亮心
      const h = Math.abs(Math.sin(x * 12.9898) * 43758.5453) % 1;       // 依位置的隨機 hash（每朵固定）
      const s = 52 + 62 * h + 7 * Math.sin((5 - z.t) * 6 + x);          // 52~114 隨機 + 呼吸起伏
      drawFire((5 - z.t) * 18 + x * 0.37, x - s / 2, z.gy - s + 8, s);
    }
    ctx.globalAlpha = 1;
  }
  // 血包（白盒紅十字，落地後微浮，快消失時閃爍）
  for (const p of healPacks) {
    if (p.t < 3 && ((p.t * 6) | 0) % 2) continue;
    const bob = p.vy === 0 ? Math.sin(uiTime * 4 + p.x) * 2 : 0;
    const py = p.y - 10 + bob;
    ctx.fillStyle = "#fff";
    ctx.fillRect(p.x - 10, py - 8, 20, 16);
    ctx.strokeStyle = "rgba(43,58,85,.7)";
    ctx.strokeRect(p.x - 10.5, py - 8.5, 21, 17);
    ctx.fillStyle = "#e8544a";
    ctx.fillRect(p.x - 2, py - 6, 4, 12);
    ctx.fillRect(p.x - 6, py - 2, 12, 4);
  }
  // 麻痺小車（貼地行駛 + 微顫）
  for (const rv of rovers) {
    const rw = 30, rh = rw * ROVER_FX.h / ROVER_FX.w;
    ctx.save();
    if (rv.dir === -1) {
      ctx.translate(rv.x, 0); ctx.scale(-1, 1); ctx.translate(-rv.x, 0);
    }
    ctx.drawImage(ROVER_FX.img, rv.x - rw / 2, rv.y - rh + Math.sin(rv.t * 40) * 0.8, rw, rh);
    ctx.restore();
  }
  // 閃光彈（旋轉飛行）
  for (const g of grenades) {
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.rot);
    ctx.drawImage(GREN_FX.img, -8, -16, 16, 16 * GREN_FX.h / GREN_FX.w);
    ctx.restore();
  }
  for (const ms of fireMissiles) {   // 燃燒飛彈：橄欖彈體 + 尾焰，沿速度方向
    ctx.save();
    ctx.translate(ms.x, ms.y);
    ctx.rotate(Math.atan2(ms.vy, ms.vx));
    ctx.fillStyle = "#63683d";
    ctx.fillRect(-14, -3, 14, 6);
    ctx.fillStyle = "#2c2c30";
    ctx.fillRect(0, -3, 5, 6);
    ctx.fillStyle = Math.random() < 0.5 ? "#ffb35e" : "#ff7a3c";
    ctx.fillRect(-(20 + Math.random() * 6), -2, 7, 4);
    ctx.restore();
  }
  // 空投直升機（貼畫面上緣、露出下方 1/4，微幅浮沉）
  for (const h of helis) {
    const hw = 700, hh = hw * HELI_FX.h / HELI_FX.w;
    const yTop = cam.y - 270 + Math.sin(h.t * 2.4) * 9 + Math.sin(h.t * 5.7) * 3;   // 慢波浮沉 + 快波微顫
    ctx.drawImage(HELI_FX.img, h.x - hw / 2, yTop - hh * 0.75, hw, hh);
  }
  // 狙擊：左上角瞄準雷射 → 擊發光束
  for (const s of snipeShots) {
    const ox = cam.x - VIEW_W / 2 + 48, oy = cam.y - 270 + 128;   // cut-in 頭像的世界座標
    if (!s.fired) {
      const k = s.t / SNIPE_AIM;
      // 紅色瞄準雷射（微幅閃爍）
      ctx.strokeStyle = `rgba(255,70,60,${0.3 + 0.4 * Math.sin(s.t * 42) ** 2})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      // 收縮鎖定準星
      const r = 30 - 20 * k;
      ctx.strokeStyle = `rgba(255,70,60,${0.5 + 0.5 * k})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.stroke();
      for (let q = 0; q < 4; q++) {                        // 旋轉刻度
        const a = s.t * 5 + q * Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(s.x + Math.cos(a) * r, s.y + Math.sin(a) * r);
        ctx.lineTo(s.x + Math.cos(a) * (r + 7), s.y + Math.sin(a) * (r + 7));
        ctx.stroke();
      }
      ctx.lineWidth = 1;
    } else {
      const k = 1 - (s.t - SNIPE_AIM) / 0.3;               // 擊發光束淡出
      ctx.strokeStyle = `rgba(160,235,255,${k * 0.9})`;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      ctx.strokeStyle = `rgba(255,255,255,${k})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.fillStyle = `rgba(210,245,255,${k})`;            // 槍口光
      ctx.beginPath();
      ctx.arc(ox, oy, 10 * k + 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // 狙擊曳光線
  for (const t of tracers) {
    const k = t.t / 0.18;
    ctx.strokeStyle = `rgba(120,220,255,${k})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(t.x1, t.y);
    ctx.lineTo(t.x2, t.y);
    ctx.stroke();
    ctx.strokeStyle = `rgba(255,255,255,${k})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(t.x1, t.y);
    ctx.lineTo(t.x2, t.y);
    ctx.stroke();
  }
  // 炮擊爆風圈
  for (const bl of blasts) {
    const k = bl.t / 0.35;
    const r = 20 + (1 - k) * 70;
    ctx.strokeStyle = `rgba(255,160,70,${k})`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(bl.x, bl.y - 20, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.fillStyle = `rgba(255,220,150,${k * 0.35})`;
    ctx.beginPath();
    ctx.arc(bl.x, bl.y - 20, r * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (const n of TILE_NAMES) TILES[n] = { file: `assets_miyako/tiles/${n}.png` };
let loaded = 0;
// 用 SKINS.default.anims 而非 ANIMS：存檔為泳裝時開機已 applySkin，ANIMS 已不指向制服
const assets = [...Object.values(SKINS).flatMap(s => s.anims ? Object.values(s.anims) : []), ...Object.values(TILES), ...Object.values(BOSS_ANIMS),
  ...Object.values(ALLY_KINDS).flatMap(k => Object.values(k.anims)), SNIPER_PORTRAIT,
  ...Object.values(ENEMY_KINDS).flatMap(k => Object.values(k.anims)), ...CARDS, FIRE_FX, HELI_FX, GREN_FX, EGREN_FX, ROVER_FX, CREDIT_FX, ...Object.values(ENV), ...Object.values(DASH_SPRITES)];
// 兩段式載入：目前造型＋核心資產優先進遊戲，其餘造型背景續載（只在圖鑑/商店/換裝用到，屆時多半已載完）
const skinFolder = "assets_miyako" + (currentSkin === "default" ? "" : "_" + currentSkin);
for (const a of assets) a.defer = /^assets_miyako_/.test(a.file) && !a.file.startsWith(skinFolder + "/");
assets.sort((x, y) => (x.defer ? 1 : 0) - (y.defer ? 1 : 0));
const totalCrit = assets.filter(a => !a.defer).length;
let started = false;
function drawLoading() {
  if (started) return;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = "#141114"; ctx.fillRect(0, 0, cv.width, cv.height);
  const w = Math.min(420, cv.width * 0.6), x = (cv.width - w) / 2, y = cv.height / 2;
  ctx.fillStyle = "rgba(255,255,255,.15)"; ctx.fillRect(x, y, w, 10);
  ctx.fillStyle = "#4da3ff"; ctx.fillRect(x, y, w * Math.min(1, loaded / totalCrit), 10);
  ctx.fillStyle = "#cfd8e6"; ctx.font = "16px sans-serif"; ctx.textAlign = "center";
  ctx.fillText(`LOADING ${Math.min(loaded, totalCrit)}/${totalCrit}`, cv.width / 2, y - 14);
}
drawLoading();
function assetDone() {
  loaded++;
  drawLoading();
  if (!started && loaded >= totalCrit) { started = true; requestAnimationFrame(loop); }
}
// 限流＋重試：一次全發 99 個請求會被 Pages CDN 重置串流（ERR_HTTP2_PROTOCOL_ERROR）
const MAX_PAR = 14;
let inFlight = 0, nextIdx = 0;
function loadOne(a, tries) {
  a.img = new Image();
  a.img.onload = () => { inFlight--; assetDone(); pump(); };
  a.img.onerror = () => {
    if (tries < 3) { setTimeout(() => loadOne(a, tries + 1), 400 * (tries + 1)); return; }
    console.warn("asset failed:", a.file);
    inFlight--; assetDone(); pump();   // 缺檔不卡死載入
  };
  a.img.src = tries ? `${a.file}?r=${tries}` : a.file;
}
function pump() {
  while (inFlight < MAX_PAR && nextIdx < assets.length) { inFlight++; loadOne(assets[nextIdx++], 0); }
}
pump();
let last = 0;
function loop(ts) {
  const rawDt = Math.min(0.033, (ts - last) / 1000 || 0.016);
  last = ts;
  if (activeTut) {                     // 一次性教學：凍結遊戲直到關閉
    uiTime += rawDt;
    updateBGM(rawDt);
    draw();
    requestAnimationFrame(loop);
    return;
  }
  if (clearPanelT > 0) {                         // 擊殺 Boss → 死亡演出倒數 → 開完成面板
    clearPanelT -= rawDt;
    if (clearPanelT <= 0) clearPanel = { t: 0 };
  }
  if (menuScreen || dialogue || bagOpen || vpadEdit || clearPanel) {       // 主選單 / 對話 / 包包 / 按鈕佈局編輯 / 完成面板：凍結遊戲
    uiTime += rawDt;
    if (dialogue) dialogue.t += rawDt;
    bgmPlay(menuScreen ? null : "normal"); updateBGM(rawDt);
    draw();
    requestAnimationFrame(loop);
    return;
  }
  if (panel.open) {                   // 存檔點面板：凍結遊戲
    uiTime += rawDt;
    updateBGM(rawDt);
    draw();
    requestAnimationFrame(loop);
    return;
  }
  if (selectScreen) {                 // 開局支援選擇：凍結遊戲，只畫畫面
    uiTime += rawDt;
    draw();
    requestAnimationFrame(loop);
    return;
  }
  if (hitstopT > 0) {                 // 打擊停頓：世界凍結一瞬（UI 照常）
    hitstopT -= rawDt;
    uiTime += rawDt;
    draw();
    requestAnimationFrame(loop);
    return;
  }
  if (bulletTimeT > 0) bulletTimeT -= rawDt;   // 子彈時間倒數（真實 1 秒，不受慢動作影響）
  const btA = bulletTimeT > 0;
  if (btA) player.invulnT = Math.max(player.invulnT, 0.2);   // 子彈時間全程無敵（維持 invulnT，各傷害判定自動生效）
  // 玩家自身時間：瞄準時 0.25；完美閃避子彈時間時 0.6（比世界快＝沙德威斯坦穿梭感）
  const dt = rawDt * (targeting ? TARGETING_TIMESCALE : (btA ? BULLET_TIME_PLAYER_SCALE : 1));
  // 世界（敵人/子彈）時間：完美閃避時慢到 0.25，尾段 BT_EASE 緩回 1
  const btFade = btA ? Math.min(1, bulletTimeT / BT_EASE) : 0;
  const wdt = rawDt * (targeting ? TARGETING_TIMESCALE : (1 - (1 - BULLET_TIME_SCALE) * btFade));
  player.t += dt;
  physics(dt);
  if (player.y > WORLD.h + 200) {           // safety respawn
    player.x = checkpoint.active ? checkpoint.x : 120;
    player.y = checkpoint.active ? checkpoint.y : GROUND_Y;
    player.vy = 0;
  }
  updateCamera(dt);
  updateEnemies(wdt);
  updateBoss(wdt);
  updateAlly(wdt);
  updateEnemyBullets(wdt);
  if (MUZZLE[player.state]) {
    fireT -= dt;
    if (fireT <= 0) { spawnShot(); fireT = FIRE_INTERVAL; }
  } else {
    fireT = 0;   // first shot fires immediately on entering a shooting state
  }
  updateEffects(dt);
  bgmPlay(boss.active && boss.deadT <= 0 ? "boss" : "normal");
  updateBGM(rawDt);
  draw();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
