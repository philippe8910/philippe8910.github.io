}

// ---- 探索小地圖（左上；M 切換；離屏預渲染地形）----
let minimapCv = null, minimapOn = true;
const MM_SC = 64;   // 1 小地圖 px = 64 世界 px
function buildMinimap() {
  if (!document.createElement) return;
  minimapCv = document.createElement("canvas");
  minimapCv.width = Math.ceil((WORLD.w - WORLD.x0) / MM_SC);
  minimapCv.height = Math.ceil(WORLD.h / MM_SC);
  const g = minimapCv.getContext("2d");
  g.fillStyle = "rgba(16,24,40,.9)";
  g.fillRect(0, 0, minimapCv.width, minimapCv.height);
  g.fillStyle = "#7f8aa0";
  for (const s of SOLIDS) {
    if (inUnvisitedZone(s.x + s.w / 2, s.y + s.h / 2)) continue;   // 迷霧：未探索區不顯示
    g.fillRect((s.x - WORLD.x0) / MM_SC, s.y / MM_SC, Math.max(1, s.w / MM_SC), Math.max(1, s.h / MM_SC));
  }
  g.fillStyle = "#c9a13b";                 // 電梯
  for (const el of ELEVATORS) {
    if (inUnvisitedZone(el.x + el.w / 2, (el.top + el.bottom) / 2)) continue;
    g.fillRect((el.x - WORLD.x0) / MM_SC - 1, el.top / MM_SC, 3, (el.bottom - el.top) / MM_SC);
  }
}
buildMinimap();

function drawMinimap() {
  if (!minimapCv || !minimapOn || selectScreen) return;
  const mw = minimapCv.width, mh = minimapCv.height;
  const x0 = VIEW_W - mw - 14, y0 = 68;   // 右上角（計時器/點數下方、狙擊肖像上方）
  ctx.globalAlpha = 0.88;
  ctx.drawImage(minimapCv, x0, y0);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = "rgba(120,150,190,.5)";
  ctx.strokeRect(x0 - .5, y0 - .5, mw + 1, mh + 1);
  for (const cp of CHECKPOINTS) {          // 存檔點（迷霧區隱藏）
    if (inUnvisitedZone(cp.x, cp.y - 30)) continue;
    ctx.fillStyle = cp.active ? "#59d5f2" : "#8a93a8";
    ctx.fillRect(x0 + (cp.x - WORLD.x0) / MM_SC - 1, y0 + cp.y / MM_SC - 2, 3, 3);
  }
  ctx.fillStyle = "#e8544a";               // Boss
  ctx.fillRect(x0 + (BOSS_ROOM.homeX - WORLD.x0) / MM_SC - 2, y0 + L4_Y / MM_SC - 3, 4, 4);
  ctx.fillStyle = "#fff";                  // 玩家（脈動）
  const pr = 1.5 + Math.sin(uiTime * 6) * 0.8;
  ctx.beginPath();
  ctx.arc(x0 + (player.x - WORLD.x0) / MM_SC, y0 + player.y / MM_SC - 1, pr, 0, Math.PI * 2);
  ctx.fill();
}

function blurredTile(img, px) {   // 景深：預烘焙模糊版（水平三連畫避免平鋪接縫出現透明邊）
  if (!document.createElement) return img;   // 無頭測試環境
  img._blur = img._blur || {};
  if (!img._blur[px]) {
    const c = document.createElement("canvas");
    c.width = img.width; c.height = img.height;
    const g = c.getContext("2d");
    g.filter = "blur(" + px + "px)";
    for (const dx of [-img.width, 0, img.width]) g.drawImage(img, dx, 0);
    img._blur[px] = c;
  }
  return img._blur[px];
}
let weaponShadow = null;
function getWeaponShadow(img) {     // 武器剪影投影（離屏一次性上色）
  if (weaponShadow) return weaponShadow;
  if (!document.createElement) return img;   // 無頭測試環境沒有 createElement
  const c = document.createElement("canvas");
  c.width = img.width; c.height = img.height;
  const g = c.getContext("2d");
  g.drawImage(img, 0, 0);
  g.globalCompositeOperation = "source-in";
  g.fillStyle = "rgba(43,58,85,.35)";
  g.fillRect(0, 0, c.width, c.height);
  weaponShadow = c;
  return c;
}

// ---- 作弊碼 ----
let godMode = false, infAmmo = false;
function applyCheat(raw) {
  const code = (raw || "").trim().toUpperCase();
  const ok = m => alert("✓ " + m);
  if (code === "BOSS") {                       // 傳送到 Boss 房門口
    player.x = 2950; player.y = 600; player.vx = 0; player.vy = 0;
    cam.x = player.x; cam.y = player.y - 140;
    if (!selectScreen) menuScreen = null;
    ok("BOSS GATE");
  } else if (code === "GOD") {
    godMode = !godMode;
    ok("GOD MODE " + (godMode ? "ON" : "OFF"));
  } else if (code === "MONEY") {
    credits += 5000; saveGame();
    ok("+5000 C");
  } else if (code === "HEAL") {
    player.hp = player.maxHp; player.shieldHp = Math.max(player.shieldHp, 3);
    ok("FULL HP + SHIELD");
  } else if (code === "COST") {
    cost = COST_MAX;
    ok("COST MAX");
  } else if (code === "AMMO") {
    infAmmo = !infAmmo; player.ammo = MAG_SIZE;
    ok("INFINITE AMMO " + (infAmmo ? "ON" : "OFF"));
  } else if (code === "KEYS") {
    const ids = new Set(unlocks.keys);
    for (const el of ELEVATORS) if (el.lock) ids.add(el.lock);
    for (const it of ITEM_SPAWNS) if (it.type === "key") ids.add(it.id);
    unlocks.keys = [...ids]; saveGame();
    ok("ALL KEYS");
  } else if (code === "UNLOCK") {
    for (const c of [7, 8, 9]) if (!purchasedSupports.includes(c)) {
      purchasedSupports.push(c);
      if (supportsInPool() < SUPPORT_POOL_MAX) deckQueue.push(c);
      else if (!benchedSupports.includes(c)) benchedSupports.push(c);
    }
    for (const id in SKINS) if (id !== "default" && !unlocks.skins.includes(id)) unlocks.skins.push(id);
    saveGame();
    ok("ALL CHARACTERS + SKINS");
  } else if (code === "KILL") {
    let n = 0;
    for (const e of enemies) if (e.state !== "death") { damageEnemy(e, 9999); n++; }
    ok("KILLED " + n);
  } else if (code === "CP") {
    for (const c of CHECKPOINTS) c.active = true;
    saveGame();
    ok("ALL CHECKPOINTS");
  } else if (code) {
    alert("?");
  }
}
const GEAR_BTN = { x: 14, y: 84, s: 30 };   // 玩家面板(14,12,262,64)正下方

function drawBagBtn() {

    ctx.lineWidth = afford ? 2.5 : 2;
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.textAlign = "center";
    ctx.font = `italic 900 14px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(String(cardCost(c)), x + 9, y + 15);
    // 按鍵提示（BA 式：卡底突出的白色小方牌）
    slantPath(x + CW / 2 - 9, y + CH - 8, 18, 14, 3);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.strokeStyle = "rgba(43,58,85,.5)";
    ctx.stroke();
    ctx.font = `italic 900 11px ${UI_FONT}`;
    ctx.fillStyle = UI_NAVY;
    ctx.fillText(String(i + 1), x + CW / 2 + 1, y + CH + 3);
    ctx.textAlign = "left";
    ctx.globalAlpha = 1;
  }
  // COST 條（BA 式：藍 COST 標籤 + 深藍數字牌 + 亮青漸層分格、空格深色、前緣脈動）
  const barY = baseY + CH + 16;
  slantPath(baseX, barY - 6, 52, 13, 5);
  ctx.fillStyle = UI_BLUE;
  ctx.fill();
  ctx.textAlign = "center";
  ctx.font = `italic 900 10px ${UI_FONT}`;
  ctx.fillStyle = "#fff";
  ctx.fillText("COST", baseX + 27, barY + 4);
  slantPath(baseX + 2, barY + 9, 44, 24, 5);
  ctx.fillStyle = UI_NAVY;
  ctx.fill();
  slantPath(baseX + 2, barY + 9, 44, 24, 5);
  ctx.strokeStyle = "rgba(140,200,255,.5)";
  ctx.stroke();
  const cpk = costPopT / 0.28;                     // 1→0
  ctx.font = `italic 900 ${Math.round(19 + 9 * cpk)}px ${UI_FONT}`;
  ctx.fillStyle = cpk > 0.01 ? "#8ef0ff" : "#fff";
  ctx.fillText(String(cost | 0), baseX + 25, barY + 27 + cpk * 2);
  ctx.textAlign = "left";
  const segX = baseX + 56, segTotal = CW * HAND_SIZE + GAP * (HAND_SIZE - 1) - 56;
  const segW = (segTotal - 2 * 9) / 10;
  const segY = barY + 14, segH = 14;
  for (let i = 0; i < 10; i++) {
    const sx = segX + i * (segW + 2);
    const frac = Math.min(1, Math.max(0, cost - i));
    slantPath(sx, segY, segW, segH, 4);
    ctx.fillStyle = "#141c2b";
    ctx.fill();
    if (frac > 0) {
      ctx.save();
      slantPath(sx, segY, segW, segH, 4);
      ctx.clip();
      const gg = ctx.createLinearGradient(segX, 0, segX + segTotal, 0);
      gg.addColorStop(0, "#2b8fd8");
      gg.addColorStop(1, "#8ef0ff");
      ctx.fillStyle = gg;
      ctx.fillRect(sx, segY, (segW + 4) * frac, segH);
      if (frac < 1) {                     // 正在累積的格：前緣白色脈動
        ctx.fillStyle = `rgba(255,255,255,${0.35 + 0.35 * Math.sin(uiTime * 7)})`;
        ctx.fillRect(sx + (segW + 4) * frac - 3, segY, 3, segH);
      }
      ctx.restore();
    }
    slantPath(sx, segY, segW, segH, 4);
    ctx.strokeStyle = "rgba(90,130,180,.35)";
    ctx.stroke();
  }
  ctx.restore();
}

function drawEffects() {
  for (const p of dmgPops) {         // 傷害數字（BA 式）
    const k = p.t / 0.8;
    const rise = (1 - k) * 22;
    ctx.globalAlpha = Math.min(1, k * 3);
    ctx.textAlign = "center";
    if (p.crit) {                    // 爆擊：紅色尖刺星芒 + 白字，出現瞬間放大
      const pop = 1 + Math.max(0, k - 0.82) * 2.2;
      const r = 19 * pop;
      ctx.beginPath();
      for (let q = 0; q < 16; q++) {
        const ang = q * Math.PI / 8 + 0.2;
        const rr = q % 2 === 0 ? r : r * 0.6;
        if (q === 0) ctx.moveTo(p.x + Math.cos(ang) * rr, p.y - rise + Math.sin(ang) * rr * 0.82);
        else ctx.lineTo(p.x + Math.cos(ang) * rr, p.y - rise + Math.sin(ang) * rr * 0.82);
      }
      ctx.closePath();
      ctx.fillStyle = "#e8442a";
      ctx.fill();
      ctx.strokeStyle = "#8e1f12";
      ctx.stroke();
      ctx.font = `italic 900 ${Math.round(15 * pop)}px ${UI_FONT}`;
      ctx.fillStyle = "#fff";
      ctx.fillText(p.val, p.x, p.y - rise + 5);
    } else {                         // 普通：白字藍描邊
      ctx.font = `italic 900 13px ${UI_FONT}`;
      ctx.strokeStyle = UI_NAVY;
      ctx.lineWidth = 3;
      ctx.strokeText(p.val, p.x, p.y - rise);
      ctx.fillStyle = "#fff";
      ctx.fillText(p.val, p.x, p.y - rise);
      ctx.lineWidth = 1;
    }
    ctx.textAlign = "left";
    ctx.globalAlpha = 1;
  }
  for (const p of costPops) {        // 浮字（+1 Cost／爆擊／回血／護盾，上升淡出）
    const k = p.t / 0.9;
    ctx.globalAlpha = Math.min(1, k * 2.5);
    ctx.textAlign = "center";
    ctx.font = `italic 900 15px ${UI_FONT}`;
    ctx.strokeStyle = "rgba(255,255,255,.9)";
    ctx.lineWidth = 3;
    ctx.strokeText(p.text, p.x, p.y - (1 - k) * 26);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y - (1 - k) * 26);
    ctx.lineWidth = 1;
    ctx.textAlign = "left";
    ctx.globalAlpha = 1;
  }
  for (const s of shells) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.globalAlpha = Math.min(1, s.life * 3);
    ctx.fillStyle = "#c9a227";
    ctx.fillRect(-4, -1.5, 8, 3);
    ctx.fillStyle = "#8a6d1c";
    ctx.fillRect(2, -1.5, 2, 3);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  for (const b of bullets) {
    const dir = Math.sign(b.vx);
    ctx.fillStyle = "#ffd75e";
    ctx.fillRect(b.x - dir * 14, b.y - 1.5, dir * 12, 3);
    ctx.fillStyle = "#fff6c8";
    ctx.fillRect(b.x - dir * 4, b.y - 2, dir * 4, 4);
  }
  if (flashT > 0 && MUZZLE[player.state]) {
    const m = gunPoint(MUZZLE[player.state]);
    const k = flashT / 0.07;
    const r = (10 + flashSeed * 6) * (0.6 + 0.4 * k);
    ctx.save();
    ctx.translate(m.x + player.facing * 4, m.y);
    ctx.rotate(flashSeed * 0.6 - 0.3);
    for (const [col, f] of [["#ff9d2e", 1], ["#ffd75e", 0.65], ["#ffffff", 0.32]]) {
      ctx.fillStyle = col;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const ang = i * Math.PI / 4;
        const rad = (i % 2 ? 0.42 : 1) * r * f;
        ctx[i ? "lineTo" : "moveTo"](Math.cos(ang) * rad, Math.sin(ang) * rad);
      }
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
  for (const d of dusts) {
    ctx.globalAlpha = 0.5 * (d.t / d.t0);
    ctx.fillStyle = "#b9b0a4";
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  for (const p of impacts) {
    const k = p.t / 0.1;
    ctx.fillStyle = `rgba(255, 220, 130, ${k})`;
    const r = 3 + (1 - k) * 4;
    ctx.fillRect(p.x - r, p.y - 1, r * 2, 2);
    ctx.fillRect(p.x - 1, p.y - r, 2, r * 2);
  }
  // 火焰殘留區（地面燃燒）：稀疏大朵 + 尺寸隨機錯落
  for (const z of flameZones) {
    ctx.globalAlpha = Math.min(1, z.t);   // 最後 1 秒淡出
    for (let x = z.x0 + 24; x < z.x1; x += 15) {   // 間距 < 火寬 → 相鄰略重疊，加法混合疊出亮心
      const h = Math.abs(Math.sin(x * 12.9898) * 43758.5453) % 1;       // 依位置的隨機 hash（每朵固定）
      const s = 52 + 62 * h + 7 * Math.sin((5 - z.t) * 6 + x);          // 52~114 隨機 + 呼吸起伏
      drawFire((5 - z.t) * 18 + x * 0.37, x - s / 2, z.gy - s + 8, s);
    }
    ctx.globalAlpha = 1;
  }
  // 血包（白盒紅十字，落地後微浮，快消失時閃爍）
  for (const p of healPacks) {
    if (p.t < 3 && ((p.t * 6) | 0) % 2) continue;
    const bob = p.vy === 0 ? Math.sin(uiTime * 4 + p.x) * 2 : 0;
    const py = p.y - 10 + bob;
    ctx.fillStyle = "#fff";
    ctx.fillRect(p.x - 10, py - 8, 20, 16);
    ctx.strokeStyle = "rgba(43,58,85,.7)";
    ctx.strokeRect(p.x - 10.5, py - 8.5, 21, 17);
    ctx.fillStyle = "#e8544a";
    ctx.fillRect(p.x - 2, py - 6, 4, 12);
    ctx.fillRect(p.x - 6, py - 2, 12, 4);
  }
  // 麻痺小車（貼地行駛 + 微顫）
  for (const rv of rovers) {
    const rw = 30, rh = rw * ROVER_FX.h / ROVER_FX.w;
    ctx.save();
    if (rv.dir === -1) {
      ctx.translate(rv.x, 0); ctx.scale(-1, 1); ctx.translate(-rv.x, 0);
    }
    ctx.drawImage(ROVER_FX.img, rv.x - rw / 2, rv.y - rh + Math.sin(rv.t * 40) * 0.8, rw, rh);
    ctx.restore();
  }
  // 閃光彈（旋轉飛行）
  for (const g of grenades) {
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.rot);
    ctx.drawImage(GREN_FX.img, -8, -16, 16, 16 * GREN_FX.h / GREN_FX.w);
    ctx.restore();
  }
  for (const ms of fireMissiles) {   // 燃燒飛彈：橄欖彈體 + 尾焰，沿速度方向
    ctx.save();
    ctx.translate(ms.x, ms.y);
    ctx.rotate(Math.atan2(ms.vy, ms.vx));
    ctx.fillStyle = "#63683d";
    ctx.fillRect(-14, -3, 14, 6);
    ctx.fillStyle = "#2c2c30";
    ctx.fillRect(0, -3, 5, 6);
    ctx.fillStyle = Math.random() < 0.5 ? "#ffb35e" : "#ff7a3c";
    ctx.fillRect(-(20 + Math.random() * 6), -2, 7, 4);
    ctx.restore();
  }
  // 空投直升機（貼畫面上緣、露出下方 1/4，微幅浮沉）
  for (const h of helis) {
    const hw = 700, hh = hw * HELI_FX.h / HELI_FX.w;
    const yTop = cam.y - 270 + Math.sin(h.t * 2.4) * 9 + Math.sin(h.t * 5.7) * 3;   // 慢波浮沉 + 快波微顫
    ctx.drawImage(HELI_FX.img, h.x - hw / 2, yTop - hh * 0.75, hw, hh);
  }
  // 狙擊：左上角瞄準雷射 → 擊發光束
  for (const s of snipeShots) {
    const ox = cam.x - VIEW_W / 2 + 48, oy = cam.y - 270 + 128;   // cut-in 頭像的世界座標
    if (!s.fired) {
      const k = s.t / SNIPE_AIM;
      // 紅色瞄準雷射（微幅閃爍）
      ctx.strokeStyle = `rgba(255,70,60,${0.3 + 0.4 * Math.sin(s.t * 42) ** 2})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      // 收縮鎖定準星
      const r = 30 - 20 * k;
      ctx.strokeStyle = `rgba(255,70,60,${0.5 + 0.5 * k})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.stroke();
      for (let q = 0; q < 4; q++) {                        // 旋轉刻度
        const a = s.t * 5 + q * Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(s.x + Math.cos(a) * r, s.y + Math.sin(a) * r);
        ctx.lineTo(s.x + Math.cos(a) * (r + 7), s.y + Math.sin(a) * (r + 7));
        ctx.stroke();
      }
      ctx.lineWidth = 1;
    } else {
      const k = 1 - (s.t - SNIPE_AIM) / 0.3;               // 擊發光束淡出
      ctx.strokeStyle = `rgba(160,235,255,${k * 0.9})`;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      ctx.strokeStyle = `rgba(255,255,255,${k})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.fillStyle = `rgba(210,245,255,${k})`;            // 槍口光
      ctx.beginPath();
      ctx.arc(ox, oy, 10 * k + 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // 狙擊曳光線
  for (const t of tracers) {
    const k = t.t / 0.18;
    ctx.strokeStyle = `rgba(120,220,255,${k})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(t.x1, t.y);
    ctx.lineTo(t.x2, t.y);
    ctx.stroke();
    ctx.strokeStyle = `rgba(255,255,255,${k})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(t.x1, t.y);
    ctx.lineTo(t.x2, t.y);
    ctx.stroke();
  }
  // 炮擊爆風圈
  for (const bl of blasts) {
    const k = bl.t / 0.35;
    const r = 20 + (1 - k) * 70;
    ctx.strokeStyle = `rgba(255,160,70,${k})`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(bl.x, bl.y - 20, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.fillStyle = `rgba(255,220,150,${k * 0.35})`;
    ctx.beginPath();
    ctx.arc(bl.x, bl.y - 20, r * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (const n of TILE_NAMES) TILES[n] = { file: `assets_miyako/tiles/${n}.png` };
let loaded = 0;
// 用 SKINS.default.anims 而非 ANIMS：存檔為泳裝時開機已 applySkin，ANIMS 已不指向制服
const assets = [...Object.values(SKINS).flatMap(s => s.anims ? Object.values(s.anims) : []), ...Object.values(TILES), ...Object.values(BOSS_ANIMS),
  ...Object.values(ALLY_KINDS).flatMap(k => Object.values(k.anims)), SNIPER_PORTRAIT,
  ...Object.values(ENEMY_KINDS).flatMap(k => Object.values(k.anims)), ...CARDS, FIRE_FX, HELI_FX, GREN_FX, EGREN_FX, ROVER_FX, CREDIT_FX, ...Object.values(ENV)];
const total = assets.length;
function drawLoading() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = "#141114"; ctx.fillRect(0, 0, cv.width, cv.height);
  const w = Math.min(420, cv.width * 0.6), x = (cv.width - w) / 2, y = cv.height / 2;
  ctx.fillStyle = "rgba(255,255,255,.15)"; ctx.fillRect(x, y, w, 10);
  ctx.fillStyle = "#4da3ff"; ctx.fillRect(x, y, w * loaded / total, 10);
  ctx.fillStyle = "#cfd8e6"; ctx.font = "16px sans-serif"; ctx.textAlign = "center";
  ctx.fillText(`LOADING ${loaded}/${total}`, cv.width / 2, y - 14);
}
drawLoading();
function assetDone() {
  loaded++;
  drawLoading();
  if (loaded === total) requestAnimationFrame(loop);
}
// 限流＋重試：一次全發 99 個請求會被 Pages CDN 重置串流（ERR_HTTP2_PROTOCOL_ERROR）
const MAX_PAR = 10;
let inFlight = 0, nextIdx = 0;
function loadOne(a, tries) {
  a.img = new Image();
  a.img.onload = () => { inFlight--; assetDone(); pump(); };
  a.img.onerror = () => {
    if (tries < 3) { setTimeout(() => loadOne(a, tries + 1), 400 * (tries + 1)); return; }
    console.warn("asset failed:", a.file);
    inFlight--; assetDone(); pump();   // 缺檔不卡死載入
  };
  a.img.src = tries ? `${a.file}?r=${tries}` : a.file;
}
function pump() {
  while (inFlight < MAX_PAR && nextIdx < assets.length) { inFlight++; loadOne(assets[nextIdx++], 0); }
}
pump();
let last = 0;
function loop(ts) {
  const rawDt = Math.min(0.033, (ts - last) / 1000 || 0.016);
  last = ts;
  if (menuScreen || dialogue || bagOpen) {       // 主選單 / 對話 / 包包：凍結遊戲
    uiTime += rawDt;
    if (dialogue) dialogue.t += rawDt;
    bgmPlay(menuScreen ? null : "normal"); updateBGM(rawDt);
    draw();
    requestAnimationFrame(loop);
    return;
  }
  if (panel.open) {                   // 存檔點面板：凍結遊戲
    uiTime += rawDt;
    updateBGM(rawDt);
    draw();
    requestAnimationFrame(loop);
    return;
  }
  if (selectScreen) {                 // 開局支援選擇：凍結遊戲，只畫畫面
    uiTime += rawDt;
    draw();
    requestAnimationFrame(loop);
    return;
  }
  if (hitstopT > 0) {                 // 打擊停頓：世界凍結一瞬（UI 照常）
    hitstopT -= rawDt;
    uiTime += rawDt;
    draw();
    requestAnimationFrame(loop);
    return;
  }
  const dt = rawDt * (targeting ? TARGETING_TIMESCALE : 1);   // 瞄準中：子彈時間（Cost 回復同步變慢）
  player.t += dt;
  physics(dt);
  if (player.y > WORLD.h + 200) {           // safety respawn
    player.x = checkpoint.active ? checkpoint.x : 120;
    player.y = checkpoint.active ? checkpoint.y : GROUND_Y;
    player.vy = 0;
  }
  updateCamera(dt);
  updateEnemies(dt);
  updateBoss(dt);
  updateAlly(dt);
  updateEnemyBullets(dt);
  if (MUZZLE[player.state]) {
    fireT -= dt;
    if (fireT <= 0) { spawnShot(); fireT = FIRE_INTERVAL; }
  } else {
    fireT = 0;   // first shot fires immediately on entering a shooting state
  }
  updateEffects(dt);
  bgmPlay(boss.active && boss.deadT <= 0 ? "boss" : "normal");
  updateBGM(rawDt);
  draw();
  requestAnimationFrame(loop);
}
</script>
