const SAVE_CODE_SECRET = "ILOVEBA::MIYAKO::SAVE-CODE::2026";
const SAVE_CODE_AAD = new TextEncoder().encode("ILOVEBA|MYK2|MIYAKO");
function bytesToBase64(bytes) {
  let out = "";
  for (let i = 0; i < bytes.length; i += 0x8000) {
    out += String.fromCharCode(...bytes.subarray(i, i + 0x8000));
  }
  return btoa(out);
}
function base64ToBytes(text) {

  for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

}
async function deriveSaveCodeKey(salt) {
  const material = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(SAVE_CODE_SECRET), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 120000, hash: "SHA-256" },
    material,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

  try {
    if (!crypto || !crypto.subtle) throw new Error("Web Crypto unavailable");
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveSaveCodeKey(salt);
    const plain = new TextEncoder().encode(JSON.stringify(data));
    const encrypted = new Uint8Array(await crypto.subtle.encrypt(
      { name: "AES-GCM", iv, additionalData: SAVE_CODE_AAD, tagLength: 128 },
      key,
      plain
    ));
    const packed = new Uint8Array(1 + salt.length + iv.length + encrypted.length);
    packed[0] = 2;
    packed.set(salt, 1);
    packed.set(iv, 17);
    packed.set(encrypted, 29);
    const code = "MYK2." + bytesToBase64(packed);
    try { navigator.clipboard && await navigator.clipboard.writeText(code); } catch (e) {}
    prompt("加密存檔碼（已嘗試複製到剪貼簿，也可手動全選複製保存）：", code);
  } catch (e) {

async function importSaveCode(s) {
  try {
    const t = s.trim();
    let data;
    if (t.startsWith("MYK2.")) {
      if (!crypto || !crypto.subtle) throw new Error("Web Crypto unavailable");
      const packed = base64ToBytes(t.slice(5));
      if (packed.length < 46 || packed[0] !== 2) throw new Error("Invalid MYK2 payload");
      const salt = packed.slice(1, 17), iv = packed.slice(17, 29), encrypted = packed.slice(29);
      const key = await deriveSaveCodeKey(salt);
      const plain = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv, additionalData: SAVE_CODE_AAD, tagLength: 128 },
        key,
        encrypted
      );
      data = JSON.parse(new TextDecoder().decode(plain));
    } else if (t.startsWith("MYK1.")) {
      data = JSON.parse(decodeURIComponent(escape(atob(t.slice(5)))));
    } else {
      throw new Error("Unknown save-code version");
    }
    JSON.parse(data.save);                       // 驗證內層格式
    saveBlocked = true;                          // 擋 beforeunload 覆蓋剛匯入的存檔
    localStorage.setItem("miyako_save", data.save);

function spawnEnemyShell(x, y, dir) {
  shells.push({
    x, y,
    vx: -dir * (80 + Math.random() * 140),
    vy: -(260 + Math.random() * 160),
    rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 20,
    life: 1.2,
  });
}

function losBlocked(x0, y0, x1, y1) {   // RAYCAST：視線是否被牆擋住（厚實心；薄平台不擋）
  const d = Math.hypot(x1 - x0, y1 - y0), n = Math.max(1, Math.ceil(d / 24));
  for (let i = 1; i < n; i++) {
    const px = x0 + (x1 - x0) * i / n, py = y0 + (y1 - y0) * i / n;
    for (const sd of SOLIDS) {
      if (sd.h <= 30) continue;
      if (px > sd.x && px < sd.x + sd.w && py > sd.y && py < sd.y + sd.h) return true;
    }
  }
  return false;
}
const EGREN_FX = { file: "assets_fx/grenade2.png" };   // 手雷兵投射物（grenade.png 是咲的閃光彈）
const eGrenades = [];
function throwEnemyGrenade(e, K) {
  if (e.state === "death") return;
  const scale = K.drawH / K.fh, dw = K.fw * scale;
  const mx = e.x + e.dir * (K.muzzle.fx - K.anchor) * dw;
  const my = e.y - (K.feet - K.muzzle.fy) * K.drawH;
  const gy = groundYAt(player.x, player.y) || floorYAt(player.y);
  const T = 0.95;                    // 飛行時間：拋物線瞄準玩家當前位置
  eGrenades.push({
    x: mx, y: my,
    vx: (player.x - mx) / T,
    vy: (gy - 8 - my - 0.5 * GREN_G * T * T) / T,
    gy, rot: 0,
  });
}

function fireEnemyShot(e, K) {
  sfxEnemyGun();
  const scale = K.drawH / K.fh, dw = K.fw * scale;
  const mx = e.x + e.dir * (K.muzzle.fx - K.anchor) * dw;
  const my = e.y - (K.feet - K.muzzle.fy) * K.drawH;
  if (K.rocket) {                  // 火箭：慢速、直擊 2 傷、落點爆風（rocketBlast）
    bossBullets.push({ x: mx, y: my, vx: e.dir * K.bulletV, vy: 0, dmg: 2, rocket: true, homeT: 3.0 });
  } else if (K.shotgun) {          // 霰彈：5 顆垂直扇形散射
    for (let k = 0; k < 5; k++) {
      bossBullets.push({
        x: mx, y: my,
        vx: e.dir * (K.bulletV + Math.random() * 80),
        vy: (k - 2) * 42 + (Math.random() - .5) * 18,
      });
    }
    spawnEnemyShell(mx - e.dir * dw * 0.3, my + 2, e.dir);
  } else {
    let vy = 0;
    if ((e.aimT || 0) > 1.2 && player.crouching) {   // 瞄準射擊：壓槍打蹲姿中心
      const dx = Math.max(60, Math.abs(player.x - mx));
      vy = ((player.y - HITBOX_H_CROUCH * 0.5) - my) / (dx / K.bulletV);
      vy = Math.max(-160, Math.min(240, vy));
    }
    bossBullets.push({ x: mx, y: my, vx: e.dir * K.bulletV, vy });
    spawnEnemyShell(mx - e.dir * dw * 0.25, my + 2, e.dir);   // 拋殼口約在槍身中段
  }
  e.flashT = 0.06;
}

function rocketBlast(x, y) {       // 火箭落點爆風：濺射 2 傷（直擊後的無敵幀天然防止重複扣血）
  sfxBoom();
  blasts.push({ x, y: y + 20, t: 0.35 });
  shakeT = Math.max(shakeT, 0.18);
  for (let k = 0; k < 6; k++) {
    impacts.push({ x: x + (Math.random() - .5) * 90, y: y + (Math.random() - .5) * 60, t: 0.12 + Math.random() * 0.12 });
  }
  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  if (player.invulnT <= 0 && player.deathT <= 0 &&
      Math.abs(player.x - x) < 85 && Math.abs(player.y - hh / 2 - y) < 95) {
    hurtPlayer(Math.sign(player.x - x) || 1, 2);
  }
}

const ENEMY_SPAWNS = (MAP?.spawns || BASE_ENEMY_SPAWNS).map(s => ({ ...s }));
const enemies = ENEMY_SPAWNS.map(s => ({
  kind: s.kind, home: s.x, range: s.range,
  sightO: s.sight, atkO: s.atk, sightVO: s.sightV,   // 地圖可覆寫：偵測水平/開火/偵測垂直距離（世界像素，不吃 ENEMY_FIRE_MUL）
  x: s.x, y: s.y,
  w: ENEMY_KINDS[s.kind].hitW || 40, h: ENEMY_KINDS[s.kind].hitH || 130,
  dir: 1, speed: 55,
  hp: ENEMY_KINDS[s.kind].hp, maxHp: ENEMY_KINDS[s.kind].hp,
  flashT: 0, deadT: 0, stunT: 0, burnT: 0,
  state: ENEMY_KINDS[s.kind].grenade ? "idle" : ENEMY_KINDS[s.kind].stationary ? "shoot" : "run", t: 0, fireT: 0,
}));

function enemyFooting(x, y) {   // 該 x 腳下是否有地（頂面貼齊敵人腳線 y 的 SOLID；防滯空走路）
  for (const s of SOLIDS) {
    if (s.elevator || s.mover) continue;   // 電梯/移動平台不算敵人立足點（會開走留人懸空）
    if (x >= s.x && x <= s.x + s.w && Math.abs(s.y - y) < 8) return true;
  }
  return false;
}
function updateEnemies(dt) {
  const vulnerable = player.invulnT <= 0 && player.deathT <= 0;
  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  for (const e of enemies) {
    const K = ENEMY_KINDS[e.kind];
    if (e.state === "death") {               // 死亡動畫 → 倒數重生
      e.t += dt;
      if (animDone(K.anims.death, e.t)) {
        e.deadT = Math.max(0, e.deadT - dt);   // 屍體淡出後保持死亡（休息才重生）
      }
      continue;
    }
    if (e.stunT > 0) {                       // 暈眩：凍結動畫與 AI，不造成碰觸傷害
      if (e.state === "shoot" && K.anims.idle) {   // 盾兵：暈眩放下盾（idle），無敵解除
        e.state = "idle"; e.t = 0;
      }
      e.stunT -= dt;
      e.flashT = Math.max(0, e.flashT - dt);
      continue;
    }
    e.t += dt;
    e.flashT = Math.max(0, e.flashT - dt);
    e.blockT = Math.max(0, (e.blockT || 0) - dt);
    e.telegraphT = 99;   // 攻擊預警倒數（各開火路徑覆寫；99=非備射狀態不發光）

    const dist = player.x - e.x;
    const atk = K.attack;
    // 偵測距離：spawn 覆寫優先（editor 所畫即所得），否則兵種預設 ×1.8 交戰倍率
    const sightD = e.sightO != null ? e.sightO : (K.sightR || K.sight || 480) * ENEMY_FIRE_MUL;
    const engaged = K.sightR
      ? Math.hypot(dist, player.y - e.y) < sightD &&
        !losBlocked(e.x, e.y - 100, player.x, player.y - 40)
      : Math.abs(dist) < sightD &&
        Math.abs(player.y - e.y) < (e.sightVO != null ? e.sightVO : (K.sightV || 60));
    // 開火距離：spawn 覆寫時，進入偵測仍會警戒/進逼，但到此距離內才實際開火
    const inAtk = e.atkO == null ? true :
      (K.sightR ? Math.hypot(dist, player.y - e.y) : Math.abs(dist)) < e.atkO;
    // 瞄準射擊：玩家在射線上持續蹲下 >1.2s → 直線彈敵人壓低槍口（火箭/霰彈/手雷本就反蹲，不參與）
    if (engaged && player.crouching && !K.rocket && !K.shotgun && !K.grenade) {
      e.aimT = (e.aimT || 0) + dt;
    } else {
      e.aimT = Math.max(0, (e.aimT || 0) - dt * 2);
    }
    if (K.grenade) {                          // 手雷兵：定點投擲，圓形偵測（跨樓層/高台都逃不掉）
      e.dir = Math.sign(dist) || e.dir;
      if (e.releaseT > 0) {
        e.releaseT -= dt;
        if (e.releaseT <= 0) throwEnemyGrenade(e, K);
      }
      if (e.state === "shoot" && animDone(K.anims.shoot, e.t)) { e.state = "idle"; e.t = 0; }
      if (engaged && inAtk) {
        e.fireT -= dt;
        e.telegraphT = e.fireT;
        if (e.fireT <= 0) {
          e.state = "shoot"; e.t = 0;
          e.releaseT = 0.3;               // 出手幀（投擲動畫第 4 幀）
          e.fireT = atk.interval;
        }
      } else {
        e.fireT = Math.max(e.fireT, atk.first);
      }
    } else if (K.stationary) {                // 砲台：不移動，交戰時朝玩家定速射擊
      e.dir = Math.sign(dist) || e.dir;
      if (e.state !== "shoot") { e.state = "shoot"; e.t = 0; e.fireT = atk.first; }
      if (engaged && inAtk) {
        e.fireT -= dt;
        e.telegraphT = e.fireT;
        if (e.fireT <= 0) {
          fireEnemyShot(e, K);
          e.fireT = atk.interval;
        }
      } else {
        e.fireT = Math.max(e.fireT, atk.first);
      }
    } else if (engaged) {
      e.dir = Math.sign(dist) || 1;
      const wantPush = atk.pushRange && Math.abs(dist) > (e.atkO != null ? e.atkO : atk.pushRange * ENEMY_FIRE_MUL);
      if (wantPush && enemyFooting(e.x + e.dir * (e.w / 2 + atk.pushSpeed * dt), e.y)) {
        // 進逼：跑向玩家到中距離（atkO 覆寫＝進逼到自訂開火距離）；平台邊緣煞停改站射
        if (e.state !== "run") { e.state = "run"; e.t = 0; }
        e.x += e.dir * atk.pushSpeed * dt;
      } else {                                // 站定開火
        if (e.state !== "shoot") {
          e.state = "shoot"; e.t = 0;
          e.fireT = atk.first; e.burst = atk.count || 1;
        }
        e.fireT -= dt;
        e.telegraphT = e.fireT;
        if (e.fireT <= 0 && inAtk) {
          fireEnemyShot(e, K);
          if (atk.type === "burst") {
            e.burst--;
            if (e.burst > 0) e.fireT = atk.gap;
            else { e.fireT = atk.cooldown; e.burst = atk.count; }
          } else {
            e.fireT = atk.interval;
          }
        }
      }
    } else {                                  // 巡邏（軟折返：追擊後可走回崗位）
      if (e.state !== "run") { e.state = "run"; e.t = 0; }
      const nx = e.x + e.dir * e.speed * dt;
      if (!enemyFooting(nx + e.dir * e.w / 2, e.y)) e.dir = -e.dir;   // 平台邊緣折返（巡邏範圍超出平台也不滯空）
      else e.x = nx;
      if (e.x > e.home + e.range) e.dir = -1;
      if (e.x < e.home - e.range) e.dir = 1;
    }

    // 碰到玩家 → 觸發受傷
    if (vulnerable &&
        Math.abs(player.x - e.x) < (HITBOX_W + e.w) / 2 &&
        player.y > e.y - e.h && player.y - hh < e.y) {
      hurtPlayer(Math.sign(player.x - e.x) || 1);
    }
  }
}

function hurtPlayer(dir, dmg = 1) {
  if (godMode) return;
  if (player.invulnT > 0 || player.deathT > 0) return;   // 無敵幀
  sfxHurt();
  if (supportEquipped(8)) dmg *= 0.7;                     // 風華被動：防禦力 +30%
  if (currentSkin === "mika") dmg *= 0.5;                 // 彌香被動：受傷減半
  if (player.shieldHp > 0) {         // 護盾先吸收（被動盾也吸；全吸收時不硬直不擊退）
    const absorbed = Math.min(player.shieldHp, dmg);
    player.shieldHp -= absorbed;
    dmg -= absorbed;
    playerBlockT = 0.18;
    if (player.shieldHp <= 0) { player.buffT = 0; player.shieldT = 0; }
    if (dmg <= 0) {
      player.invulnT = 0.5;
      hurtFlash = 0.15;
      return;
    }
  }
  player.hp = Math.max(0, player.hp - dmg);
  player.invulnT = 1.0;
  hurtFlash = 0.3;
  shakeT = Math.max(shakeT, 0.22);
  setState("hurt");
  player.vx = dir * 180;
  player.vy = player.onGround ? -250 : player.vy;
  player.onGround = false;
  player.crouching = false;
  if (player.hp <= 0) {
    player.deathT = 1.4;   // 死亡：黑幕淡入→重生→淡出
    stats.deaths++;
    cancelTargeting();
  }
}

function resetEnemies() {           // 篝火式：休息/死亡重生時全部小怪復位
  for (const e of enemies) {

    e.stunT = 0; e.burnT = 0; e.deadT = 0; e.fireT = 0; e.flashT = 0; e.aimT = 0;

// 攻擊預警紅光的「眼睛」位置（dx=面向前偏移×dw、hy=腳上高度×drawH；tools 疊標校正）
const EYE_POS = { default: { dx: 0.04, hy: 0.80 }, shield: { dx: -0.02, hy: 0.78 },
                  sgtrooper: { dx: 0.02, hy: 0.80 }, rocket: { dx: 0, hy: 0.70 }, turret: { dx: 0.12, hy: 0.52 } };
function drawEnemies() {
  for (const e of enemies) {
    const K = ENEMY_KINDS[e.kind];
    const scale = K.drawH / K.fh;
    const dw = K.fw * scale, dh = K.drawH;
    if ((e.aimT || 0) > 0.6 && e.state !== "death" && player.crouching) {   // 瞄準射擊預警線
      const mx = e.x + e.dir * (K.muzzle.fx - K.anchor) * dw;
      const my = e.y - (K.feet - K.muzzle.fy) * K.drawH;
      const locked = e.aimT > 1.2;
      ctx.save();
      ctx.globalAlpha = locked ? 0.55 : 0.25 * ((e.aimT - 0.6) / 0.6);
      ctx.strokeStyle = "#ff4a3c";
      ctx.lineWidth = locked ? 1.5 : 1;
      if (!locked) ctx.setLineDash([5, 6]);
      ctx.beginPath();
      ctx.moveTo(mx, my);
      ctx.lineTo(player.x, player.y - HITBOX_H_CROUCH * 0.5);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
    if (e.state === "death" && animDone(K.anims.death, e.t) && e.deadT < 4.2) continue;  // 淡出完才消失
    // 攻擊預警（終焉莉莉式）：開火前 0.38s「眼睛」亮起紅光，越接近開火越亮（眼位經 sprite 疊標校正）
    if ((e.telegraphT ?? 99) < 0.38 && e.state !== "death" && e.stunT <= 0) {
      const eye = EYE_POS[e.kind] || EYE_POS.default;
      const p = 1 - e.telegraphT / 0.38;
      const ex = e.x + e.dir * eye.dx * dw, ey = e.y - eye.hy * dh;
      const gr = (16 + 8 * p) * (1 + 0.12 * Math.sin(uiTime * 26));
      const rg = ctx.createRadialGradient(ex, ey, 1, ex, ey, gr);
      rg.addColorStop(0, `rgba(255,90,60,${0.75 + 0.25 * p})`);
      rg.addColorStop(0.3, `rgba(255,60,40,${0.35 + 0.3 * p})`);
      rg.addColorStop(1, "rgba(255,60,40,0)");
      ctx.fillStyle = rg;
      ctx.fillRect(ex - gr, ey - gr, gr * 2, gr * 2);
      ctx.fillStyle = `rgba(255,235,220,${0.5 + 0.5 * p})`;   // 眼芯亮點
      ctx.beginPath(); ctx.arc(ex, ey, 2.2 + 1.2 * p, 0, Math.PI * 2); ctx.fill();
    }
    const a = K.anims[e.state] || K.anims.shoot || K.anims.run || K.anims.idle || K.anims.death;
    if (!a) continue;
    const fi = frameIndex(a, e.t);
    ctx.save();
    if (e.dir === -1) {                     // 原生朝右 → 朝左鏡像
      ctx.translate(e.x, 0); ctx.scale(-1, 1); ctx.translate(-e.x, 0);
    }
    if (e.flashT > 0 && e.state !== "death") ctx.globalAlpha = 0.85;
    if (e.state === "death" && animDone(K.anims.death, e.t)) {   // 屍體慢慢變透明（1.2 秒淡出）
      ctx.globalAlpha = Math.max(0, Math.min(1, (e.deadT - 4.2) / 1.2));
    }
    ctx.drawImage(a.img, fi * K.fw, 0, K.fw, K.fh,
      e.x - K.anchor * dw, e.y - K.feet * dh, dw, dh);
    ctx.restore();
    ctx.globalAlpha = 1;
    if (e.burnT > 0 && e.state !== "death") {      // 燃燒特效
      ctx.globalAlpha = 0.9;
      const fs = e.h * 0.85;
      drawFire(e.burnT * 18 + e.home * 0.5, e.x - fs / 2, e.y - fs, fs);
      ctx.globalAlpha = 1;
    }
    if (e.stunT > 0 && e.state !== "death") {      // 暈眩星星
      ctx.fillStyle = "#ffd75e";
      for (let k = 0; k < 3; k++) {
        const a2 = e.stunT * 6 + k * 2.1;
        ctx.fillRect(e.x + Math.cos(a2) * 15 - 2, e.y - e.h - 12 + Math.sin(a2) * 4 - 2, 4, 4);
      }
    }
    if (shieldUp(e)) drawShieldBubble(e.x, e.y, e.h, e.blockT || 0);   // 能量護罩
    if (e.state !== "death" && e.hp < e.maxHp) {   // 血條（受損才顯示，BA 風白底紅條）
      const x0 = e.x - 24, y0 = e.y - e.h - 14;
      ctx.fillStyle = "rgba(255,255,255,.85)";
      ctx.fillRect(x0, y0, 48, 5);
      ctx.fillStyle = "#e8544a";
      ctx.fillRect(x0 + 1, y0 + 1, 46 * Math.max(0, e.hp) / e.maxHp, 3);
      ctx.strokeStyle = "rgba(43,58,85,.55)";
      ctx.strokeRect(x0 - .5, y0 - .5, 49, 6);
    }
  }
}

const SNIPER_LOCK_T = 4.2, SNIPER_FIRE_T = 5, SNIPER_MAX_SHOTS = 3;
const SNIPER_DMG = 3, SNIPER_HIT_R = 46;
const sniperBeams = [];            // 擊發光束 { x0,y0,x1,y1,t }

function sniperPortraitWorld() {   // 肖像固定在螢幕上 → 世界座標跟著攝影機
  return { x: cam.x - VIEW_W / 2 + SNIPER_SX, y: cam.y - 270 + SNIPER_SY };

const ALLY_SPOT_X = 900;            // gunner 固定射擊位（Boss 房左段）

const SHIELD_GAP = 95;             // shield 站位：Boss 正前方偏玩家側的距離
const BLIND_RANGE = 130, BLIND_DUR = 2.4, BLIND_CD = 5.5;
const ALLY_MAX_ACTIVE = 3;
const allies = [];
let allySummonT = 3;               // Boss 開戰後首次召喚倒數；撤離後重新計時
let blindT = 0;                    // 閃光盾致盲：>0 時白幕蓋住世界

function activeAllyKinds() {
  return new Set(allies.map(a => a.kind));
}

let lastSummonKind = null;         // 上一次召喚的種類：隨機抽選不連續重複
function summonAlly(kind) {
  if (allies.length >= ALLY_MAX_ACTIVE) return false;
  let available = ["gunner", "shield", "sniper"].filter(k => !activeAllyKinds().has(k));
  if (!kind) {                     // 隨機召喚：排除上一次的種類（沒得選就等下一輪）
    available = available.filter(k => k !== lastSummonKind);
  }
  if (!available.length) return false;
  const selected = kind && available.includes(kind) ? kind : available[Math.random() * available.length | 0];
  lastSummonKind = selected;
  const K = ALLY_KINDS[selected];
  const spotX = selected === "gunner"
    ? BOSS_ROOM.left + 180 + Math.random() * 1700          // 妮可：房內隨機站位
    : boss.x + (Math.sign(player.x - boss.x) || -1) * SHIELD_GAP;
  const a = {
    kind: selected, mode: "enter", spotX,
    x: spotX, y: F3_Y - 470, facing: 1,                    // 空降：站位正上方畫面外垂降
    state: "run", t: 0, hp: K.hp, maxHp: K.hp, fireT: 0, flashT: 0,
    stunT: 0, blindCd: 1, burnT: 0,
  };
  if (a.kind === "sniper") {
    a.mode = "fight";
    a.x = -9999; a.y = -9999;
    a.aimT = 0; a.shots = 0; a.locked = false;
    allies.push(a);
    return true;
  }
  allies.push(a);
  return true;
}

function removeAlly(a) {
  const i = allies.indexOf(a);
  if (i >= 0) allies.splice(i, 1);
}

function retreatAllies() {
  for (const a of [...allies]) allyRetreat(a);
}

function allyRetreat(a) {
  if (!a) return;
  if (a.kind === "sniper") {
    removeAlly(a);
    allySummonT = Math.min(allySummonT, 7);
    return;
  }
  a.mode = "retreat"; a.state = "run"; a.t = 0; a.facing = -1; a.stunT = 0; a.burnT = 0;
}

function allySpotX(a) {
  if (a.kind === "gunner") return a.spotX || ALLY_SPOT_X;
  return boss.x + (Math.sign(player.x - boss.x) || -1) * SHIELD_GAP;
}

function allyMuzzle(a) {
  const K = ALLY_KINDS.gunner;
  const dw = K.fw * (K.drawH / K.fh);
  return {
    x: a.x + a.facing * (K.muzzle.fx - K.anchor) * dw,
    y: a.y - (K.feet - K.muzzle.fy) * K.drawH,
  };
}

function allyShieldUp(a) {
  if (a) return a.kind === "shield" && a.mode === "fight" && a.stunT <= 0;
  return allies.some(x => x.kind === "shield" && x.mode === "fight" && x.stunT <= 0);
}

function damageAlly(a, dmg, crit) {
  if (!a || a.mode !== "fight" || a.kind === "sniper") return;
  if (allyShieldUp(a)) {
    a.blockT = 0.18;
    impacts.push({ x: a.x - a.facing * 20 + (Math.random() - .5) * 10,
                   y: a.y - ALLY_KINDS.shield.hitH * 0.55 - (Math.random() - .5) * 50, t: 0.1 });
    pushDmgPop(a.x, a.y - ALLY_KINDS[a.kind].hitH - 8, dmg * 0.25, crit);
    a.hp -= dmg * 0.25;
  } else {
    pushDmgPop(a.x, a.y - ALLY_KINDS[a.kind].hitH - 8, dmg, crit);
    a.hp -= dmg;
    a.flashT = 0.08;
  }
  if (a.hp <= 0) allyRetreat(a);
}

function stunAlly(a, sec) {
  if (!a || a.mode !== "fight") return;
  a.stunT = Math.max(a.stunT, sec);
}

function updateAlly(dt) {
  blindT = Math.max(0, blindT - dt);
  for (let i = sniperBeams.length - 1; i >= 0; i--) {
    sniperBeams[i].t -= dt;
    if (sniperBeams[i].t <= 0) sniperBeams.splice(i, 1);
  }
  for (const a of [...allies]) updateOneAlly(a, dt);
}

function updateOneAlly(a, dt) {
  const K = ALLY_KINDS[a.kind];
  a.t += dt;
  a.flashT = Math.max(0, a.flashT - dt);
  a.blockT = Math.max(0, (a.blockT || 0) - dt);
  if (a.kind === "sniper") {
    a.aimT += dt;
    if (!a.locked && a.aimT >= SNIPER_LOCK_T) {
      a.locked = true;
      a.lockX = player.x; a.lockY = player.y - 45;
    }
    if (a.aimT >= SNIPER_FIRE_T) {
      const p = sniperPortraitWorld();
      const dx = a.lockX - p.x, dy = a.lockY - p.y;
      const len = Math.hypot(dx, dy) || 1;
      sniperBeams.push({ x0: p.x, y0: p.y,
                         x1: a.lockX + dx / len * 900, y1: a.lockY + dy / len * 900, t: 0.28 });
      shakeT = Math.max(shakeT, 0.25);
      impacts.push({ x: a.lockX, y: a.lockY, t: 0.15 });
      if (player.invulnT <= 0 && player.deathT <= 0 &&
          Math.abs(player.x - a.lockX) < SNIPER_HIT_R &&
          Math.abs(player.y - 45 - a.lockY) < 90) {
        hurtPlayer(Math.sign(player.x - p.x) || 1, SNIPER_DMG);
      }
      a.shots++; a.locked = false; a.aimT = 0;
      if (a.shots >= SNIPER_MAX_SHOTS) allyRetreat(a);
    }
    return;
  }
  if (a.mode === "enter") {
    a.facing = Math.sign(player.x - a.x) || -1;
    a.y += 760 * dt;                       // 空降垂直落下
    if (a.y >= F3_Y) {
      a.y = F3_Y;
      a.mode = "fight"; a.state = K.fightAnim; a.t = 0; a.fireT = 0.8;
      shakeT = Math.max(shakeT, 0.15);
      for (let k = 0; k < 8; k++) {
        impacts.push({ x: a.x + (Math.random() - .5) * 70, y: F3_Y - Math.random() * 40, t: 0.12 + Math.random() * 0.12 });
      }
    }
  } else if (a.mode === "fight") {
    a.facing = Math.sign(player.x - a.x) || -1;
    if (a.stunT > 0) {
      a.stunT -= dt;
      if (a.kind === "shield") a.state = "dizzy";
    } else if (a.kind === "shield") {
      a.state = "guard";
      a.blindCd -= dt;
      if (a.blindCd <= 0 && Math.abs(player.x - a.x) < BLIND_RANGE &&
          Math.abs(player.y - a.y) < 80 && player.deathT <= 0) {
        blindT = BLIND_DUR; a.blindCd = BLIND_CD;
        shakeT = Math.max(shakeT, 0.25);
        for (let k = 0; k < 8; k++) {
          impacts.push({ x: a.x - a.facing * 25 + (Math.random() - .5) * 40,
                         y: a.y - K.hitH * 0.5 - (Math.random() - .5) * 80, t: 0.15 + Math.random() * 0.1 });
        }
      }
    } else {
      a.fireT -= dt;
      if (a.fireT <= 0) {
        const m = allyMuzzle(a);
        for (let k = 0; k < ALLY_PELLETS; k++) {
          bossBullets.push({
            x: m.x, y: m.y,
            vx: a.facing * (480 + Math.random() * 80),
            vy: (k - (ALLY_PELLETS - 1) / 2) * 42 + (Math.random() - .5) * 18,
          });
        }
        spawnEnemyShell(m.x - a.facing * K.fw * (K.drawH / K.fh) * 0.3, m.y + 2, a.facing);
        a.flashT = 0.07;
        a.fireT = ALLY_FIRE_CD;
      }
    }
  } else {
    a.facing = -1;
    a.state = "run";
    a.x -= 240 * dt;
    if (a.x < BOSS_ROOM.left - 80 || a.x < cam.x - VIEW_W / 2 - 80) removeAlly(a);   // 向左出鏡即移除
  }
  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  if (player.invulnT <= 0 && player.deathT <= 0 &&
      Math.abs(player.x - a.x) < (HITBOX_W + K.hitW) / 2 &&
      player.y > a.y - K.hitH && player.y - hh < a.y) {
    hurtPlayer(Math.sign(player.x - a.x) || 1);
  }
}

function drawSniperPortrait(a) {
  const p = sniperPortraitWorld();
  const k = Math.min(1, a.aimT / SNIPER_FIRE_T);
  const tx = a.locked ? a.lockX : player.x;
  const ty = a.locked ? a.lockY : player.y - 45;
  ctx.strokeStyle = a.locked
    ? `rgba(255,45,35,${0.6 + 0.4 * Math.sin(uiTime * 30) ** 2})`
    : `rgba(255,90,70,${0.25 + 0.35 * k})`;
  ctx.lineWidth = a.locked ? 2 : 1.2;
  ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(tx, ty); ctx.stroke();
  ctx.beginPath(); ctx.arc(tx, ty, 26 - 16 * k, 0, Math.PI * 2); ctx.stroke();
  const R = SNIPER_R;
  ctx.save();
  ctx.beginPath(); ctx.arc(p.x, p.y, R, 0, Math.PI * 2); ctx.clip();
  ctx.drawImage(SNIPER_PORTRAIT.img, p.x - R, p.y - R, R * 2, R * 2);
  ctx.restore();
  ctx.lineWidth = 4;
  ctx.strokeStyle = "rgba(20,26,40,.8)";
  ctx.beginPath(); ctx.arc(p.x, p.y, R + 3, 0, Math.PI * 2); ctx.stroke();
  const cr = Math.round(155 + 100 * k), cg = Math.round(227 - 180 * k);
  ctx.strokeStyle = a.locked && Math.sin(uiTime * 26) > 0 ? "#fff" : `rgb(${cr},${cg},60)`;
  ctx.beginPath(); ctx.arc(p.x, p.y, R + 3, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * k); ctx.stroke();
  ctx.lineWidth = 1;
}

function drawAlly() {
  for (const bm of sniperBeams) {
    const a = Math.min(1, bm.t / 0.2);
    ctx.strokeStyle = `rgba(255,240,220,${a})`;
    ctx.lineWidth = 1 + 4 * a;
    ctx.beginPath(); ctx.moveTo(bm.x0, bm.y0); ctx.lineTo(bm.x1, bm.y1); ctx.stroke();
    ctx.strokeStyle = `rgba(255,80,60,${a * 0.8})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(bm.x0, bm.y0); ctx.lineTo(bm.x1, bm.y1); ctx.stroke();
    ctx.lineWidth = 1;
  }
  for (const ally of allies) {
    if (ally.kind === "sniper") { drawSniperPortrait(ally); continue; }
    const K = ALLY_KINDS[ally.kind];
    const a = K.anims[ally.state];
    const fi = frameIndex(a, ally.t);
    const scale = K.drawH / K.fh;
    const dw = K.fw * scale, dh = K.drawH;
    ctx.save();
    if (ally.facing === -1) {
      ctx.translate(ally.x, 0); ctx.scale(-1, 1); ctx.translate(-ally.x, 0);
    }
    if (ally.flashT > 0) ctx.globalAlpha = 0.85;
    ctx.drawImage(a.img, fi * K.fw, 0, K.fw, K.fh,
      ally.x - K.anchor * dw, ally.y - K.feet * dh, dw, dh);
    ctx.restore();
    ctx.globalAlpha = 1;
    if (allyShieldUp(ally)) drawShieldBubble(ally.x, ally.y, K.hitH, ally.blockT || 0);   // 能量護罩
    if (ally.burnT > 0 && ally.mode === "fight") {      // 燃燒特效
      ctx.globalAlpha = 0.9;
      const fs = K.hitH * 0.85;
      drawFire(ally.burnT * 18 + ally.x * 0.5, ally.x - fs / 2, ally.y - fs, fs);
      ctx.globalAlpha = 1;
    }
    if (ally.mode === "fight" && ally.hp < ally.maxHp) {
      const x0 = ally.x - 24, y0 = ally.y - K.hitH - 14;
      ctx.fillStyle = "rgba(255,255,255,.85)";
      ctx.fillRect(x0, y0, 48, 5);
      ctx.fillStyle = "#e8544a";
      ctx.fillRect(x0 + 1, y0 + 1, 46 * Math.max(0, ally.hp) / ally.maxHp, 3);
      ctx.strokeStyle = "rgba(43,58,85,.55)";
      ctx.strokeRect(x0 - .5, y0 - .5, 49, 6);
    }
  }
}

function bossSetState(s) {
  if (boss.state !== s) { boss.state = s; boss.t = 0; }
}

function bossMuzzle() {
  const ref = BOSS_MUZZLE[boss.state] || BOSS_MUZZLE.shoot;
  const scale = BOSS_DRAW_H / BOSS_FH;
  const dw = BOSS_FW * scale;
  return {
    x: boss.x + boss.facing * (ref.fx - BOSS_ANCHOR) * dw,
    y: boss.y - (BOSS_FEET - ref.fy) * BOSS_DRAW_H,
  };
}

function updateBoss(dt) {
  if (boss.deadT > 0) {
    boss.deadT -= dt;
    if (boss.deadT > 6.6 && Math.random() < 0.35) {   // 死亡演出：1.4 秒連環爆
      blasts.push({ x: boss.x + (Math.random() - .5) * 90, y: boss.y - Math.random() * boss.hitH, t: 0.3 });
      impacts.push({ x: boss.x + (Math.random() - .5) * 110, y: boss.y - Math.random() * boss.hitH, t: 0.12 });
      shakeT = Math.max(shakeT, 0.12);
    }
    if (boss.deadT <= 0) {     // 重生回待命狀態，等玩家再次進房觸發
      if (bossRoundDone) { boss.deadT = 0.0001; return; }   // 本輪已完成：不復活（按「繼續」才開新輪）
      boss.hp = boss.maxHp; boss.hpGhost = boss.maxHp;
      boss.x = BOSS_ROOM.homeX; boss.facing = -1;
      boss.stunT = 0; boss.burnT = 0;
      boss.active = false; bossSetState("shoot");
      bossResetFight();
    }
    return;
  }
  if (!boss.active) {          // 在房內待命，玩家（從右側）越過門線才開戰（落閘）
    if (player.x > BOSS_ROOM.left && player.x < BOSS_ROOM.triggerX && player.y <= F3_Y + 5) {
      boss.active = true; setGate(true); bossSetState("run");   // 需在房內（左牆以右）：西側秘密區不觸發
      showTut("boss");
      shakeT = Math.max(shakeT, 0.25);                             // 落閘震撼
    }
    return;
  }
  const P = BOSS_PHASES[boss.phase];
  if (bossPhase() !== boss.phase) {  // 轉階段：短暫僵直 + 震撼 + 第三階段立即補召喚
    boss.phase = bossPhase();
    boss.phasePauseT = 0.9;
    boss.volley = 0; boss.telT = 0; boss.telKind = null; boss.dashT = 0; boss.jsPending = false;
    costPops.push({ x: boss.x, y: boss.y - boss.hitH - 34, t: 0.9, text: "!!", color: "#e8544a" });
    shakeT = Math.max(shakeT, 0.35);
    for (let k = 0; k < 8; k++) {
      impacts.push({ x: boss.x + (Math.random() - .5) * 90, y: boss.y - Math.random() * boss.hitH, t: 0.15 + Math.random() * 0.12 });
    }
    if (boss.phase === 3) { summonAlly(); allySummonT = BOSS_PHASES[3].summonCd; }
  }
  if (allies.length < ALLY_MAX_ACTIVE) {
    allySummonT -= dt;
    if (allySummonT <= 0) {
      if (summonAlly()) allySummonT = P.summonCd;
      else allySummonT = 1;
    }
  }
  const stunned = boss.stunT > 0;
  if (stunned) {
    boss.stunT -= dt;
    boss.telT = 0; boss.telKind = null; boss.dashT = 0;   // 暈眩打斷預警/衝刺
  } else boss.t += dt;               // 暈眩：凍結動畫
  boss.flashT = Math.max(0, boss.flashT - dt);
  boss.dashCd = Math.max(0, boss.dashCd - dt);
  boss.backCd = Math.max(0, boss.backCd - dt);
  const dist = player.x - boss.x;

  // 物理：重力 + 平台碰撞（單向：只從上方落下站立）
  boss.vy += GRAV * dt;
  const prevY = boss.y;
  boss.y += boss.vy * dt;
  let onGround = false;
  const bhw = boss.hitW / 2;
  for (const s of SOLIDS) {
    if (boss.x + bhw > s.x && boss.x - bhw < s.x + s.w) {
      if (boss.vy >= 0 && prevY <= s.y + 1 && boss.y >= s.y) {
        boss.y = s.y; boss.vy = 0; onGround = true;
      }
    }
  }
  if (boss.y > WORLD.h + 200) { boss.y = F3_Y; boss.vy = 0; }   // 保險

  const airborne = !onGround;
  if (airborne) {
    boss.x += boss.vx * dt;
    if (boss.vy < 0) bossSetState("rise");
    else bossSetState("fall");
    if (boss.jsPending && boss.vy > -180) {          // 跳射：近頂點朝玩家撒 3 發扇形
      boss.jsPending = false;
      const m = bossMuzzle();
      const base = Math.atan2((player.y - 60) - m.y, player.x - m.x);
      for (const off of [-0.22, 0, 0.22]) {
        bossBullets.push({ x: m.x, y: m.y, vx: Math.cos(base + off) * 640, vy: Math.sin(base + off) * 640, dmg: 2 });
      }
      boss.flashT = 0.08;
    }
  } else if (boss.state === "rise" || boss.state === "fall") {
    bossSetState("land");
    boss.vx = 0;
    boss.jsPending = false;
    spawnDust(boss.x, boss.y, 6, 44);
    shakeT = Math.max(shakeT, 0.1);
  } else if (boss.state === "land") {
    if (animDone(BOSS_ANIMS.land, boss.t)) bossSetState("run");
  } else if (stunned) {
    // 暈眩硬直：不移動不開火
  } else if (boss.phasePauseT > 0) {   // 轉階段僵直：站定蓄力
    boss.phasePauseT -= dt;
    boss.facing = Math.sign(dist) || 1;
    bossSetState("shoot");
    boss.volley = 0; boss.fireT = 1;
  } else if (boss.telT > 0) {          // 大招預警：定住 0.45s，頭上「!」
    boss.telT -= dt;
    boss.facing = Math.sign(dist) || 1;
    bossSetState("run");               // 原地踏步蓄勢
    if (boss.telT <= 0) {
      if (boss.telKind === "dash") {
        boss.dashT = 0.5;
        boss.dashDir = Math.sign(dist) || 1;
      } else if (boss.telKind === "jumpshot") {
        boss.vy = -950;
        boss.vx = (Math.sign(dist) || 1) * 140;
        boss.jsPending = true;
        boss.jumpCd = P.jumpCdMin + Math.random() * P.jumpCdRnd;
      }
      boss.telKind = null;
    }
  } else if (boss.dashT > 0) {         // 衝刺突進：高速壓向玩家，結束立刻接彈幕
    boss.dashT -= dt;
    boss.facing = boss.dashDir;
    bossSetState("run");
    boss.t += dt;                      // 跑步動畫雙倍速（衝刺感）
    boss.x += boss.dashDir * 520 * dt;
    if (boss.dashT <= 0) {
      boss.volley = P.volleyMin + (Math.random() * P.volleyRnd | 0);
      boss.fireT = 0.18;
      boss.facing = Math.sign(player.x - boss.x) || 1;
      bossSetState(player.crouching ? "crouch_shoot" : "shoot");
    }
  } else if (boss.state === "shoot" || boss.state === "crouch_shoot") {
    boss.facing = Math.sign(dist) || 1;
    boss.fireT -= dt;
    if (boss.fireT <= 0 && boss.volley > 0) {
      const m = bossMuzzle();
      bossBullets.push({ x: m.x, y: m.y, vx: boss.facing * 700, dmg: 2 });
      if (P.fan && boss.volley === 1) {            // 二階段起：最後一發帶上下扇形
        bossBullets.push({ x: m.x, y: m.y, vx: boss.facing * 660, vy: -150, dmg: 2 });
        bossBullets.push({ x: m.x, y: m.y, vx: boss.facing * 660, vy: 150, dmg: 2 });
      }
      spawnEnemyShell(m.x - boss.facing * BOSS_FW * (BOSS_DRAW_H / BOSS_FH) * 0.25, m.y + 2, boss.facing);
      boss.flashT = 0.06;
      boss.volley--;
      boss.fireT = P.fireCd;
    }
    if (boss.volley <= 0 && boss.fireT <= -0.6) bossSetState("run");
  } else if (allyShieldUp()) {   // 盾兵掩護中：躲到盾後定點射擊，不追擊不跳
    boss.facing = Math.sign(dist) || 1;
    const shield = allies.find(a => allyShieldUp(a));
    const hideX = shield.x - (Math.sign(player.x - shield.x) || 1) * 110;
    if (Math.abs(boss.x - hideX) > 12) {
      bossSetState("run");
      boss.x += Math.sign(hideX - boss.x) * 160 * dt;
    } else {
      boss.volley = P.volleyMin - 1 + (Math.random() * P.volleyRnd | 0);
      boss.fireT = 0.4;
      bossSetState(Math.random() < 0.4 ? "crouch_shoot" : "shoot");
    }
  } else {   // run：追擊
    boss.facing = Math.sign(dist) || 1;
    boss.jumpCd -= dt;
    const playerAbove = player.y < boss.y - 80 && Math.abs(dist) < 420;
    const inRange = Math.abs(dist) <= 430 && Math.abs(player.y - boss.y) < 60;
    boss.aboveT = playerAbove ? boss.aboveT + dt : 0;   // 高台蹲點計時
    if (P.dash && boss.backCd <= 0 && Math.abs(dist) < 70 && Math.abs(player.y - boss.y) < 60) {
      boss.vy = -520;                       // 貼身反跳拉開距離（二階段起）
      boss.vx = -(Math.sign(dist) || 1) * 300;
      boss.backCd = 3;
    } else if (P.dash && boss.aboveT > 2.5) {           // 高台蹲點 → 跳射反制
      boss.telT = 0.45; boss.telKind = "jumpshot"; boss.aboveT = 0;
    } else if (inRange) {                   // 同高度且進射程 → 彈幕（七成機率針對玩家姿勢選高低彈道）
      boss.volley = P.volleyMin + (Math.random() * P.volleyRnd | 0);
      boss.fireT = 0.25;
      const counter = Math.random() < 0.7 ? player.crouching : !player.crouching;
      bossSetState(counter ? "crouch_shoot" : "shoot");
    } else if (P.dash && boss.dashCd <= 0 && Math.abs(dist) > 260 && Math.abs(dist) < 680 &&
               Math.abs(player.y - boss.y) < 60 && Math.random() < 0.5) {
      boss.telT = 0.45; boss.telKind = "dash";          // 中距離 → 衝刺預警
      boss.dashCd = 5;
    } else {
      boss.x += boss.facing * P.speed * dt;
      if (playerAbove || boss.jumpCd <= 0) {   // 玩家在上方 → 跳台；或定期跳躍
        boss.vy = -950;
        boss.vx = boss.facing * (playerAbove ? 120 : 180);
        boss.jumpCd = P.jumpCdMin + Math.random() * P.jumpCdRnd;
      }
    }
  }
  boss.x = Math.max(BOSS_ROOM.left + 60, Math.min(BOSS_ROOM.right - 20, boss.x));   // 戰鬥限制在房內

  // 碰觸傷害
  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  if (player.invulnT <= 0 && player.deathT <= 0 &&
      Math.abs(player.x - boss.x) < (HITBOX_W + boss.hitW) / 2 &&
      player.y > boss.y - boss.hitH && player.y - hh < boss.y) {
    hurtPlayer(Math.sign(player.x - boss.x) || 1, 2);
  }
}

// 敵方子彈（小怪 + Boss 共用 bossBullets）：每幀無條件運算，不依賴 Boss 狀態
function updateEnemyBullets(dt) {
  for (let i = eGrenades.length - 1; i >= 0; i--) {   // 手雷：真實物理，地板彈兩下才爆（rocketBlast）
    const g = eGrenades[i];
    const prevX = g.x, prevY = g.y;
    g.vy += GREN_G * dt;
    g.x += g.vx * dt;
    g.y += g.vy * dt;
    g.rot += (Math.abs(g.vx) > 30 ? 9 : 3) * dt;
    let boom = false;
    for (const sd of SOLIDS) {
      const thin = sd.h <= 30;
      if (g.x > sd.x && g.x < sd.x + sd.w && g.y > sd.y && g.y < sd.y + (thin ? 14 : sd.h)) {
        if (g.vy > 0 && prevY <= sd.y + 1) {          // 從上方砸到地板/平台 → 反彈
          g.y = sd.y; g.vy = -g.vy * 0.45; g.vx *= 0.65;
          g.bounce = (g.bounce || 0) + 1;
          impacts.push({ x: g.x, y: g.y, t: 0.08 });
          if (g.bounce >= 2) boom = true;
        } else if (!thin && g.vy < 0 && prevY >= sd.y + sd.h - 1) {   // 撞天花板
          g.y = sd.y + sd.h; g.vy = 0;
        } else if (!thin) {                            // 撞牆：水平反彈（不穿牆）
          g.x = prevX; g.vx = -g.vx * 0.5;
        }
        break;
      }
    }
    // 飛行中直擊玩家 → 立即引爆（不用等落地彈跳）
    const ghh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
    if (player.invulnT <= 0 && player.deathT <= 0 &&
        Math.abs(g.x - player.x) < HITBOX_W / 2 + 8 &&
        g.y > player.y - ghh - 10 && g.y < player.y + 6) {
      boom = true;
    }
    g.t = (g.t || 0) + dt;
    if (boom || g.t > 5 || g.y > WORLD.h + 100) {      // 直擊/兩彈/5 秒保險引信
      rocketBlast(g.x, g.y - 10);
      eGrenades.splice(i, 1);
    }
  }
  const vulnerable = player.invulnT <= 0 && player.deathT <= 0;
  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  for (let i = bossBullets.length - 1; i >= 0; i--) {
    const b = bossBullets[i];
    if (b.homeT > 0) {                     // 火箭小追蹤：限速轉向，貼近後直飛（防繞圈）
      b.homeT -= dt;
      if (Math.abs(b.x - player.x) < 70) b.homeT = 0;
      else {
        const spd = Math.hypot(b.vx, b.vy || 0);
        const want = Math.atan2(player.y - hh / 2 - b.y, player.x - b.x);
        let cur = Math.atan2(b.vy || 0, b.vx);
        let dv = want - cur;
        while (dv > Math.PI) dv -= 2 * Math.PI;
        while (dv < -Math.PI) dv += 2 * Math.PI;
        const mt = 1.3 * dt;
        cur += Math.max(-mt, Math.min(mt, dv));
        b.vx = Math.cos(cur) * spd; b.vy = Math.sin(cur) * spd;
      }
    }
    b.x += b.vx * dt;
    b.y += (b.vy || 0) * dt;   // 霰彈散射／火箭追蹤用
    let gone = b.x < WORLD.x0 - 20 || b.x > WORLD.w + 20;
    const overlap = Math.abs(b.x - player.x) < HITBOX_W / 2 + 6 &&
                    b.y > player.y - hh - 12 && b.y < player.y;
    if (!gone && overlap && vulnerable) {   // +12 頭部容差：肩射高度的槍口(105-109)仍命中站姿，蹲下(70)可閃
      hurtPlayer(Math.sign(b.vx) || 1, b.dmg || 1);
      gone = true;
    } else if (!gone && overlap && player.dashT > DASH_T - PERFECT_WINDOW) {   // 完美閃避：僅 dash 起始 0.1 秒窗口穿過敵彈 → 子彈時間（不消耗子彈）
      triggerPerfectDodge();
    }
    if (!gone) {
      for (const s of SOLIDS) {
        if (s.h <= 30) continue;   // 單向薄平台不擋子彈
        if (b.x > s.x && b.x < s.x + s.w && b.y > s.y && b.y < s.y + s.h) { gone = true; break; }
      }
    }
    if (gone) {
      if (b.rocket && b.x > WORLD.x0 - 20 && b.x < WORLD.w + 20) rocketBlast(b.x, b.y);
      impacts.push({ x: b.x, y: b.y, t: 0.1 });
      bossBullets.splice(i, 1);
    }
  }
}

function drawBoss() {
  if (boss.deadT > 0 && boss.deadT < 6.6) return;
  if (boss.deadT > 0) ctx.globalAlpha = 0.35 + 0.35 * Math.sin(boss.deadT * 45);   // 死亡閃爍
  const a = BOSS_ANIMS[boss.state];
  const fi = frameIndex(a, boss.t);
  const scale = BOSS_DRAW_H / BOSS_FH;
  const dw = BOSS_FW * scale, dh = BOSS_DRAW_H;
  ctx.save();
  if (boss.facing === -1) {
    ctx.translate(boss.x, 0); ctx.scale(-1, 1); ctx.translate(-boss.x, 0);
  }
  if (boss.flashT > 0) ctx.globalAlpha = 0.9;
  ctx.drawImage(a.img, fi * BOSS_FW, 0, BOSS_FW, BOSS_FH,
    boss.x - BOSS_ANCHOR * dw, boss.y - BOSS_FEET * dh, dw, dh);
  ctx.restore();
  ctx.globalAlpha = 1;
  if (boss.burnT > 0) {                            // 燃燒特效
    ctx.globalAlpha = 0.9;
    const fs = boss.hitH * 0.9;
    drawFire(boss.burnT * 18, boss.x - fs / 2, boss.y - fs, fs);
    ctx.globalAlpha = 1;
  }
  if (boss.stunT > 0) {                            // 暈眩星星
    ctx.fillStyle = "#ffd75e";
    for (let k = 0; k < 3; k++) {
      const a2 = boss.stunT * 6 + k * 2.1;

function wrapText(text, maxW) {
  const out = [];
  let line = "";
  for (const ch of text) {
    if (ch === "\n") { out.push(line); line = ""; continue; }
    if (ctx.measureText(line + ch).width > maxW) { out.push(line); line = ch; }
    else line += ch;
  }
  if (line) out.push(line);

}
function drawDialogue() {

    const c = CARDS[ln.portrait], cr = c.crop;

    ctx.save();

    ctx.drawImage(s.anims.idle.img, 0, 0, 240, s.fh, VIEW_W * 0.14, 540 - 128 - ph + 24, pw, ph);

function useSlot(slot, wx, wy) {

  // 左上角施放橫幅（狙擊停留到擊發完畢）

function targetOnScreen(x, y) {    // 技能鎖定限制：目標必須在鏡頭畫面內
  return Math.abs(x - cam.x) < VIEW_W / 2 + 20 && Math.abs(y - cam.y) < 300;

// 游標選取單體目標；maxDist = 與玩家的最大距離限制；僅畫面內目標可選
function pickTarget(wx, wy, maxDist) {
  let best = null, bd = 70;
  for (const e of enemies) {
    if (e.state === "death") continue;
    if (Math.abs(e.x - player.x) > maxDist) continue;
    if (!targetOnScreen(e.x, e.y - e.h * 0.5)) continue;
    const dx = Math.abs(e.x - wx);
    if (dx < bd && wy > e.y - e.h - 40 && wy < e.y + 30) {
      best = { e, x: e.x, y: e.y, h: e.h, isBoss: false };
      bd = dx;
    }
  }
  if (boss.active && boss.deadT <= 0 && Math.abs(boss.x - player.x) <= maxDist &&
      targetOnScreen(boss.x, boss.y - boss.hitH * 0.5)) {
    const dx = Math.abs(boss.x - wx);
    if (dx < bd && wy > boss.y - boss.hitH - 40 && wy < boss.y + 30) {
      best = { x: boss.x, y: boss.y, h: boss.hitH, isBoss: true };
    }
  }
  for (const a of allies) {   // 場上隊友（槍手/盾兵）也可被鎖定
    if (a.kind === "sniper" || a.mode !== "fight") continue;
    if (Math.abs(a.x - player.x) > maxDist) continue;
    if (!targetOnScreen(a.x, a.y - 60)) continue;
    const K = ALLY_KINDS[a.kind];
    const dx = Math.abs(a.x - wx);
    if (dx < bd && wy > a.y - K.hitH - 40 && wy < a.y + 30) {
      best = { x: a.x, y: a.y, h: K.hitH, isAlly: true, ally: a };
      bd = dx;
    }
  }
  const sniperAlly = allies.find(a => a.kind === "sniper");
  if (sniperAlly) {   // 場外狙擊手：點大頭肖像反狙擊
    const p = sniperPortraitWorld();
    if (Math.hypot(wx - p.x, wy - p.y) < 60) {
      best = { x: p.x, y: p.y + 26, h: 52, isSniper: true, ally: sniperAlly };
    }
  }
  return best;
}

function castCard(i, wx, wy) {
  const c = CARDS[i];
  if (cost < cardCost(c) || player.deathT > 0) return false;
  sfxCard();
  if (c.skill === "heal") {          // 粉髮：附近隨機位置生成血包（觸碰回復 1/3 最大生命）
    cost -= cardCost(c); c.flashT = 0.3;
    const hx = Math.max(40, Math.min(WORLD.w - 40, player.x + (Math.random() * 240 - 120)));
    healPacks.push({ x: hx, y: player.y - 40, vy: 0, t: 20 });
    return true;
  }
  if (c.skill === "buff") {          // 修女：1/2 生命護盾（30 秒）+ 霸體
    cost -= cardCost(c); c.flashT = 0.3;
    player.shieldHp = player.maxHp / 2;
    player.buffT = 30; player.shieldT = 30;
    for (let k = 0; k < 8; k++) {
      impacts.push({ x: player.x + (Math.random() - .5) * 50, y: player.y - Math.random() * 110, t: 0.15 + Math.random() * 0.1 });
    }
    return true;
  }
  if (c.skill === "fullheal") {      // 風華：主廚饗宴（恢復完整血量）
    cost -= cardCost(c); c.flashT = 0.3;
    player.hp = player.maxHp;
    costPops.push({ x: player.x, y: player.y - 145, t: 0.9, text: "全恢復!", color: "#3ecf6f" });
    for (let k = 0; k < 8; k++) {
      impacts.push({ x: player.x + (Math.random() - .5) * 50, y: player.y - Math.random() * 110, t: 0.15 + Math.random() * 0.1 });
    }
    return true;
  }
  if (c.skill === "heal25") {        // 三千留：優雅茶會（恢復 1/4 血量）
    cost -= cardCost(c); c.flashT = 0.3;
    player.hp = Math.min(player.maxHp, player.hp + player.maxHp / 4);
    costPops.push({ x: player.x, y: player.y - 145, t: 0.9, text: "+HP", color: "#3ecf6f" });
    return true;
  }
  if (c.skill === "atk") {           // 日鞠：火力支援（30 秒攻擊力 +20%）
    cost -= cardCost(c); c.flashT = 0.3;
    atkBuffT = 30;
    costPops.push({ x: player.x, y: player.y - 145, t: 0.9, text: "攻擊UP", color: "#e8544a" });
    return true;
  }
  if (c.skill === "crit") {          // 亞子：爆擊指令（10 秒內爆擊率+30%、爆傷+50%）
    cost -= cardCost(c); c.flashT = 0.3;
    akoBuffT = 10;
    for (let k = 0; k < 8; k++) {
      impacts.push({ x: player.x + (Math.random() - .5) * 50, y: player.y - Math.random() * 110, t: 0.15 + Math.random() * 0.1 });
    }
    costPops.push({ x: player.x, y: player.y - 145, t: 0.9, text: "爆擊UP", color: "#ff8a2b" });
    return true;
  }
  if (c.skill === "area") {          // 鋼盔：畫面外拋出閃光彈，旋轉飛行 → 落地才引爆（傷害 + 暈眩 2 秒）
    cost -= cardCost(c); c.flashT = 0.3;
    const sx = wx < cam.x ? cam.x + VIEW_W / 2 + 40 : cam.x - VIEW_W / 2 - 40;
    const gy = groundYAt(wx, wy);   // 落在目標點的平面（高台/跳台也砸得到），不再用玩家樓層
    const sy = Math.min(cam.y - 270 + 60, gy - 220);   // 拋出點保證高於落點

      x: sx, y: sy,
      vx: (wx - sx) / GREN_FLIGHT,
      gy,
      vy: (gy - 8 - sy - 0.5 * GREN_G * GREN_FLIGHT * GREN_FLIGHT) / GREN_FLIGHT,
      rot: 0,

  }
  if (c.skill === "fireline") {      // 眼鏡：直升機空投——飛到目標區上空才開始沿途鋪火（燃燒 20 秒、殘留 5 秒）

      zone: null, t: 0,

  if (c.skill === "stun") {          // 白髮：腳下放麻痺小車，朝滑鼠方向直行（撞牆自毀、撞敵觸發暈眩、平台邊緣會掉落）
    cost -= cardCost(c); c.flashT = 0.3;

    return true;
  }
  // 狙擊：從左上角 cut-in 瞄準 → 擊發（延遲結算），第二次使用雙倍

  snipeShots.push({ e: t.e, ally: t.ally, isBoss: t.isBoss, isSniper: t.isSniper, isAlly: t.isAlly, dmg, t: 0, fired: false,

  return true;
}

function roverStun(target, isBoss) {   // 小車命中：暈眩 + 電花（2026-07-19 大幅加強：一律 3.6 秒）
  if (isBoss) boss.stunT = Math.max(boss.stunT, 3.6); else target.stunT = 3.6;

  }
}

function groundYAt(wx, wy) {   // 目標點下方最近可站表面（含薄跳台；容忍點在表面上方 40px 內）
  let best = Infinity;
  for (const s of SOLIDS) {
    if (wx < s.x || wx > s.x + s.w) continue;
    if (s.y >= wy - 40 && s.y < best) best = s.y;
  }
  return best === Infinity ? floorYAt(wy) : best;
}
function doAreaBlast(wx, gy) {       // 閃光彈落地引爆（gy = 施放樓層地面）
  const r = 90;
  gy = gy || floorYAt(player.y);
  sfxBoom();
  shakeT = Math.max(shakeT, 0.2);
  blasts.push({ x: wx, y: gy, t: 0.35 });
  for (let k = 0; k < 8; k++) {
    impacts.push({ x: wx + (Math.random() - .5) * r * 1.6, y: gy - Math.random() * 80, t: 0.15 + Math.random() * 0.12 });
  }
  for (const e of enemies) {
    if (e.state !== "death" && Math.abs(e.x - wx) < r && Math.abs(e.y - gy) < 120) { damageEnemy(e, 1); e.stunT = 2; }
  }
  if (boss.active && boss.deadT <= 0 && Math.abs(boss.x - wx) < r && Math.abs(boss.y - gy) < 140) { damageBoss(1); boss.stunT = 2; }
  for (const a of allies) {
    if (a.mode === "fight" && a.kind !== "sniper" && Math.abs(a.x - wx) < r && Math.abs(a.y - gy) < 120) {
      stunAlly(a, a.kind === "shield" ? 5 : 2);   // 克制鏈：閃光彈暈盾兵 5 秒（放盾大破窗）
      damageAlly(a, 1);
    }
  }
}

function confirmTargeting() {
  if (!targeting) return;
  const { wx, wy } = mouseWorld();
  if (useSlot(targeting.slot, wx, wy)) cancelTargeting();
}

// 快速施法：瞄準中按攻擊鍵 → 自動以最近目標（小怪/Boss/召喚隊友，否則場外狙擊手肖像）施放
function nearestTargetPos() {
  let best = null, bd = Infinity;
  for (const e of enemies) {
    if (e.state === "death" || !targetOnScreen(e.x, e.y - e.h * 0.5)) continue;
    const d = Math.abs(e.x - player.x);
    if (d < bd) { bd = d; best = { x: e.x, y: e.y - e.h * 0.5 }; }
  }
  if (boss.active && boss.deadT <= 0 && targetOnScreen(boss.x, boss.y - boss.hitH * 0.5)) {
    const d = Math.abs(boss.x - player.x);
    if (d < bd) { bd = d; best = { x: boss.x, y: boss.y - boss.hitH * 0.5 }; }
  }
  for (const a of allies) {
    if (a.kind === "sniper" || a.mode !== "fight") continue;
    if (!targetOnScreen(a.x, a.y - 60)) continue;
    const d = Math.abs(a.x - player.x);
    if (d < bd) { bd = d; best = { x: a.x, y: a.y - ALLY_KINDS[a.kind].hitH * 0.5 }; }
  }
  if (!best) {
    const sn = allies.find(a => a.kind === "sniper");
    if (sn) { const p = sniperPortraitWorld(); return { x: p.x, y: p.y }; }
  }
  return best || { x: player.x + player.facing * 220, y: player.y - 60 };   // 無目標：面向前方
}

function quickCast() {
  if (!targeting) return false;
  const t = nearestTargetPos();
  if (useSlot(targeting.slot, t.x, t.y)) cancelTargeting();
  return true;
}

// BA 式能量護罩：橢圓漸層泡 + 旋轉流光弧線；擋彈時（flash>0）增亮
function drawShieldBubble(x, yFeet, h, flash) {
  const cy = yFeet - h * 0.52;
  const R = h * 0.78;
  const a = 0.30 + 0.06 * Math.sin(uiTime * 3.1) + Math.min(0.55, flash * 3.2);
  ctx.save();
  ctx.translate(x, cy);
  const g = ctx.createRadialGradient(0, 0, R * 0.25, 0, 0, R);
  g.addColorStop(0, "rgba(90,180,255,0)");
  g.addColorStop(0.72, `rgba(90,180,255,${a * 0.30})`);
  g.addColorStop(1, `rgba(150,225,255,${a})`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(0, 0, R * 0.82, R, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.lineWidth = 2;
  for (let k = 0; k < 3; k++) {             // 旋轉流光
    const ang = uiTime * 2.3 + k * Math.PI * 2 / 3;
    ctx.strokeStyle = `rgba(160,225,255,${0.4 + 0.25 * Math.sin(uiTime * 5 + k) + Math.min(0.5, flash * 2.5)})`;
    ctx.beginPath();
    ctx.ellipse(0, 0, R * 0.82, R, 0, ang, ang + 1.15);
    ctx.stroke();
  }
  if (flash > 0) {                          // 擋彈波紋
    ctx.strokeStyle = `rgba(220,245,255,${flash * 4})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.ellipse(0, 0, R * 0.82 * (1.05 - flash), R * (1.05 - flash), 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.lineWidth = 1;
  ctx.restore();
}

// 盾兵舉盾中（shoot 狀態且未被暈眩）＝無敵；暈眩會放下盾（變回 idle）解除無敵
function shieldUp(e) {
  return e.kind === "shield" && e.state === "shoot" && e.stunT <= 0;
}

function damageEnemy(e, dmg, crit) {
  if (e.state === "death") return;
  if (shieldUp(e)) {                 // 舉盾格擋：傷害減半（原全擋）＋護罩波紋火花
    e.blockT = 0.18;
    impacts.push({ x: e.x + (Math.random() - .5) * 20, y: e.y - e.h * 0.5 - Math.random() * 30, t: 0.1 });
    dmg *= 0.5;
  }
  pushDmgPop(e.x, e.y - e.h - 8, dmg, crit);
  e.hp -= dmg;
  e.flashT = 0.08;
  sfxHit();
  if (crit) hitstopT = Math.max(hitstopT, 0.04);
  if (e.hp <= 0) {
    e.state = "death"; e.t = 0; e.deadT = 6;
    hitstopT = Math.max(hitstopT, 0.06);
    sfxKill();
    const cr = CREDIT_VALUE[e.kind] || 10;        // 信用點數（Cost 改由命中累積）
    gainCredits(cr);
    stats.kills++;
    costPops.push({ x: e.x + 20, y: e.y - e.h - 30, t: 0.9, text: "+" + cr + "C", color: "#e8a417" });
    for (let k = 0; k < 6; k++) {
      impacts.push({ x: e.x + (Math.random() - .5) * e.w, y: e.y - Math.random() * e.h, t: 0.12 + Math.random() * 0.1 });
    }
    if (e.kind === "turret") {         // 砲台炸毀：爆風 + 震動
      blasts.push({ x: e.x, y: e.y, t: 0.35 });
      shakeT = Math.max(shakeT, 0.2);
    }
  }
}

function damageBoss(dmg, crit) {
  if (!boss.active || boss.deadT > 0) return;
  pushDmgPop(boss.x, boss.y - boss.hitH - 10, dmg, crit);
  boss.hp -= dmg;
  boss.flashT = 0.08;
  if (crit) hitstopT = Math.max(hitstopT, 0.05);
  if (boss.hp <= 0) {
    boss.deadT = 8;
    hitstopT = Math.max(hitstopT, 0.14);
    shakeT = Math.max(shakeT, 0.5);
    setGate(false);
    bossBullets.length = 0;
    bossRoundDone = true;                          // 本輪完成：Boss 不自動復活，按「繼續」開新輪
    if (dialogueEnabled) clearPanelT = 1.6;        // 死亡演出後彈完成面板（sim 停用對話時一併停用）
    if (!bossCleared) {              // Speedrun：首次通關記錄
      bossCleared = true; bossClearT = speedrunT;
      if (SKINS.mika && !unlocks.skins.includes("mika")) {   // 未花：通關一次解鎖
        unlocks.skins.push("mika");
        pickupToasts.push({ text: "造型解鎖：未花（通關達成！存檔點可更換）", t: 4 });
        saveGame();
      }
      if (mikaUsed) {                // 用過彌香：不列入速通紀錄、不解鎖桃井
        pickupToasts.push({ text: "使用了無敵造型：本次通關不列入紀錄", t: 4 });
      } else {
        if (bestClearT === null || bossClearT < bestClearT) {
          bestClearT = bossClearT;
          try { localStorage.setItem("miyako_best", String(bestClearT)); } catch (e) {}
        }
        if (bossClearT <= 720 && SKINS.momoi && !unlocks.skins.includes("momoi")) {   // 桃井：12 分鐘內通關
          unlocks.skins.push("momoi");
          pickupToasts.push({ text: "造型解鎖：桃井（12分鐘內通關達成！存檔點可更換）", t: 4 });
          saveGame();
        }
      }
    }
    retreatAllies();   // Boss 倒下 → 隊友撤離
    allySummonT = 3; lastSummonKind = null;
    for (let k = 0; k < 12; k++) {
      impacts.push({ x: boss.x + (Math.random() - .5) * 80, y: boss.y - Math.random() * boss.hitH, t: 0.15 + Math.random() * 0.15 });
    }
  }
}

const FIRE_INTERVAL = 1 / 18;   // uniform fire rate across all shooting stances
let fireT = 0;

function gunPoint(ref) {
  const scale = DRAW_H / FRAME_H;
  const dw = FRAME_W * scale * SLIM;
  return {
    x: player.x + player.facing * (ref.fx - ANCHOR_X) * dw,
    y: player.y - (FEET_Y - ref.fy) * DRAW_H,
  };
}

function spawnShot() {
  if (player.ammo <= 0) return;
  if (!infAmmo) player.ammo--;
  stats.shots++;
  sfxGun();
  // 彩蛋：重生點之間連開 999 發解鎖優香（碰到任一存檔點歸零）
  if (!unlocks.skins.includes("yuuka")) {
    yuukaShots++;
    if (yuukaShots === 333) {
      pickupToasts.push({ text: "……你的彈藥消耗是不是有點不對勁？", t: 3.5 });
    } else if (yuukaShots === 666) {
      pickupToasts.push({ text: "住手！那些都是錢！", t: 3.5 });
    } else if (yuukaShots === 999) {
      pickupToasts.push({ text: "在你浪費到四位數之前，我來阻止你", t: 4 });
      unlocks.skins.push("yuuka");
      pickupToasts.push({ text: "造型解鎖：優香（存檔點可更換）", t: 4 });
      saveGame();
    }
  }
  const stance = player.state;
  const m = gunPoint(MUZZLE[stance]);
  bullets.push({ x: m.x, y: m.y, vx: player.facing * 1500 });
  const e = gunPoint(EJECT[stance]);
  shells.push({
    x: e.x, y: e.y,
    vx: -player.facing * (80 + Math.random() * 140),
    vy: -(260 + Math.random() * 160),
    rot: Math.random() * Math.PI, vr: (Math.random() - 0.5) * 20,
    life: 1.2,
  });
  flashT = 0.07; flashSeed = Math.random();
}

function updateEffects(dt) {
  flashT = Math.max(0, flashT - dt);
  hurtFlash = Math.max(0, hurtFlash - dt);
  if (teleT > 0) {                   // 傳送黑幕進行中
    const prevTele = teleT;
    teleT -= dt;
    if (prevTele > 0.45 && teleT <= 0.45 && teleCp) {   // 全黑瞬間搬人
      player.x = teleCp.x; player.y = teleCp.y;
      player.vx = 0; player.vy = 0;
      checkpoint.x = teleCp.x; checkpoint.y = teleCp.y; checkpoint.active = true;
      cam.x = teleCp.x; cam.y = teleCp.y - 140;
      teleCp = null;
    }
  }
  checkAchievements(dt);
  if (!selectScreen && !dialogue && nearCheckpoint()) showTut("panel");   // 首次靠近存檔點 → 補給站教學
  autosaveT -= dt;                   // 週期自動存檔（30s；存進度與最後存檔點，不存位置）
  if (autosaveT <= 0) {
    saveGame();
    autosaveT = 30;
    autosaveFlashT = 1.4;
  }
  for (let i = afterimages.length - 1; i >= 0; i--) {
    const g = afterimages[i]; g.t -= dt;
    if (g.t <= 0) afterimages.splice(i, 1);
  }
  for (let i = dusts.length - 1; i >= 0; i--) {
    const d = dusts[i];
    d.t -= dt;
    if (d.t <= 0) { dusts.splice(i, 1); continue; }
    d.x += d.vx * dt; d.y += d.vy * dt;
    d.vx *= 0.9; d.vy *= 0.9;
    d.r += 6 * dt;                   // 塵土擴散變淡
  }
  if ((player.state === "run" || player.state === "run_shoot") && player.onGround) {
    runDustT -= dt;                  // 跑步揚塵
    if (runDustT <= 0) { spawnDust(player.x - player.facing * 14, player.y, 1, 8); runDustT = 0.22; }
  } else runDustT = 0;
  shakeT = Math.max(0, shakeT - dt);
  uiTime += dt;
  if ((cost | 0) > prevCostInt) costPopT = 0.28;   // Cost 跳格 → 數字彈跳
  prevCostInt = cost | 0;
  costPopT = Math.max(0, costPopT - dt);
  // 血包：落地 → 觸碰回復 1/3 最大生命 → 逾時消失
  for (let i = healPacks.length - 1; i >= 0; i--) {
    const p = healPacks[i];
    p.t -= dt;
    p.vy += GRAV * dt;
    const prevY = p.y;
    p.y += p.vy * dt;
    for (const s of SOLIDS) {
      if (p.x + 6 > s.x && p.x - 6 < s.x + s.w &&
          p.vy >= 0 && prevY <= s.y + 1 && p.y >= s.y) { p.y = s.y; p.vy = 0; }
    }
    let gone = p.t <= 0 || p.y > WORLD.h + 100;
    if (!gone && player.deathT <= 0 &&
        Math.abs(player.x - p.x) < 28 && Math.abs(player.y - p.y) < 60) {
      player.hp = Math.min(player.maxHp, player.hp + Math.round(player.maxHp / 3));
      for (let k = 0; k < 6; k++) {
        impacts.push({ x: p.x + (Math.random() - .5) * 30, y: p.y - Math.random() * 40, t: 0.12 + Math.random() * 0.1 });
      }
      gone = true;
    }
    if (gone) healPacks.splice(i, 1);
  }
  // 聖盾祝福計時
  if (player.buffT > 0) player.buffT = Math.max(0, player.buffT - dt);   // 霸體時效
  if (player.shieldT > 0) {
    player.shieldT -= dt;
    if (player.shieldT <= 0) { player.shieldT = 0; player.shieldHp = 0; }  // 護盾到期
  }
  akoBuffT = Math.max(0, akoBuffT - dt);
  atkBuffT = Math.max(0, atkBuffT - dt);
  playerBlockT = Math.max(0, playerBlockT - dt);
  if (!selectScreen && !bossCleared) speedrunT += dt;   // Speedrun 計時（通關即停）
  if (currentSkin === "mika" && !bossCleared) mikaUsed = true;   // 無敵造型使用標記
  for (const cp of CHECKPOINTS) {
    if (Math.abs(player.x - cp.x) < 26 && Math.abs(player.y - cp.y) < 60) yuukaShots = 0;   // 優香彩蛋：碰存檔點歸零
    if (!cp.active && player.deathT <= 0 &&
        Math.abs(player.x - cp.x) < 26 && Math.abs(player.y - cp.y) < 60) {
      cp.active = true;
      checkpoint.x = cp.x; checkpoint.y = cp.y; checkpoint.active = true;
      saveGame();                                  // 記錄開啟數與最後位置
      costPops.push({ x: cp.x, y: cp.y - 150, t: 0.9, text: "存檔完成", color: "#2ab6d9" });
      for (let k = 0; k < 6; k++) {
        impacts.push({ x: cp.x + (Math.random() - .5) * 40, y: cp.y - Math.random() * 130, t: 0.15 + Math.random() * 0.1 });
      }
    }
  }
  // 支援被動（30 秒循環；只有開局選中的支援生效）
  for (const key of ["heal", "buff", "crit"]) {
    passiveT[key] -= dt;
    if (passiveT[key] <= 0) {
      passiveT[key] = 30;
      if (!ownedSupport(key)) continue;
      if (player.deathT > 0) continue;
      if (key === "heal") {          // 芹奈：回復 1/4 最大生命
        if (player.hp < player.maxHp) {
          player.hp = Math.min(player.maxHp, player.hp + player.maxHp / 4);
          costPops.push({ x: player.x, y: player.y - 145, t: 0.9, text: "+HP", color: "#3ecf6f" });
          skillCut = { c: CARDS[{ heal: 4, buff: 5, crit: 6 }[key]], t: 0, dur: 1.2, passive: true };   // 被動演出
        }
      } else if (key === "buff") {   // 瑪麗：+1/3 護盾（30 秒）
        addPlayerShield(player.maxHp / 3, 30);
        skillCut = { c: CARDS[{ heal: 4, buff: 5, crit: 6 }[key]], t: 0, dur: 1.2, passive: true };
      } else {                       // 亞子：+1/5 護盾（15 秒）
        addPlayerShield(player.maxHp / 5, 15);
        skillCut = { c: CARDS[{ heal: 4, buff: 5, crit: 6 }[key]], t: 0, dur: 1.2, passive: true };
      }
    }
  }
  // Cost 回復 + 卡片閃光/滑入動畫衰減
  for (const c of CARDS) {
    c.flashT = Math.max(0, c.flashT - dt);
    c.dealT = Math.max(0, c.dealT - dt);
  }
  if (skillCut) {
    skillCut.t += dt;
    if (skillCut.t > skillCut.dur) skillCut = null;
  }
  // 狙擊：瞄準（追蹤目標）→ 擊發結算
  for (let i = snipeShots.length - 1; i >= 0; i--) {
    const s = snipeShots[i];
    s.t += dt;
    if (s.isSniper) {
      if (s.ally && allies.includes(s.ally)) {
        const p = sniperPortraitWorld();
        s.x = p.x; s.y = p.y;        // 肖像跟著攝影機，瞄準框跟著肖像
      }
    } else if (s.isAlly) {
      if (s.ally && allies.includes(s.ally) && s.ally.mode === "fight") {
        s.x = s.ally.x; s.y = s.ally.y - ALLY_KINDS[s.ally.kind].hitH * 0.55;
      }
    } else if (s.isBoss) {
      if (boss.active && boss.deadT <= 0) { s.x = boss.x; s.y = boss.y - boss.hitH * 0.55; }
    } else if (s.e.state !== "death") {
      s.x = s.e.x; s.y = s.e.y - s.e.h * 0.55;
    }
    if (!s.fired && s.t >= SNIPE_AIM) {
      s.fired = true;
      shakeT = SHAKE_DUR;            // 擊發震動
      if (s.isSniper) {              // 反狙擊成功：中斷場外狙擊手
        if (s.ally && allies.includes(s.ally)) allyRetreat(s.ally);
      } else if (s.isAlly) {
        if (s.ally && allies.includes(s.ally)) damageAlly(s.ally, s.dmg);
      } else if (s.isBoss) damageBoss(s.dmg); else damageEnemy(s.e, s.dmg);
      for (let k = 0; k < 6; k++) {
        impacts.push({ x: s.x + (Math.random() - .5) * 26, y: s.y + (Math.random() - .5) * 30, t: 0.12 + Math.random() * 0.1 });
      }
    }
    if (s.t > SNIPE_AIM + 0.3) snipeShots.splice(i, 1);
  }
  // 麻痺小車：沿表面直行（平台邊緣掉落續行）→ 撞實心障礙自毀（無效果）/ 撞同層敵人觸發暈眩
  for (let i = rovers.length - 1; i >= 0; i--) {
    const rv = rovers[i];
    rv.t += dt;
    rv.x += rv.dir * ROVER_SPEED * dt;
    // 重力 + 單向平台著地
    rv.vy += GRAV * dt;
    const prevY = rv.y;
    rv.y += rv.vy * dt;
    for (const s of SOLIDS) {
      if (rv.x + 8 > s.x && rv.x - 8 < s.x + s.w) {
        if (rv.vy >= 0 && prevY <= s.y + 1 && rv.y >= s.y) { rv.y = s.y; rv.vy = 0; }
      }
    }
    let gone = rv.x < WORLD.x0 - 20 || rv.x > WORLD.w + 20 || rv.y > WORLD.h + 100;
    if (!gone) {
      for (const s of SOLIDS) {              // 實心障礙側撞（薄平台不算；要同高度）
        if (s.h > 30 && rv.y > s.y + 2 && rv.y - 14 < s.y + s.h &&
            rv.x + 12 > s.x && rv.x - 12 < s.x + s.w) {
          impacts.push({ x: rv.x, y: rv.y - 10, t: 0.12 });
          gone = true;
          break;
        }
      }
    }
    if (!gone) {
      for (const e of enemies) {             // 同層才命中（腳底高度差 < 50）
        if (e.state !== "death" && Math.abs(rv.x - e.x) < e.w / 2 + 14 &&
            Math.abs(rv.y - e.y) < 50) {
          roverStun(e, false);
          gone = true;
          break;
        }
      }
      if (!gone && boss.active && boss.deadT <= 0 &&
          Math.abs(rv.x - boss.x) < boss.hitW / 2 + 14 && Math.abs(rv.y - boss.y) < 60) {
        roverStun(null, true);
        gone = true;
      }
      for (const a of allies) {
        if (gone || a.kind === "sniper" || a.mode !== "fight") continue;
        if (Math.abs(rv.x - a.x) < ALLY_KINDS[a.kind].hitW / 2 + 14 &&
            Math.abs(rv.y - a.y) < 50) {
          stunAlly(a, 1);               // 小車也能暈召喚隊友（盾兵放盾）
          for (let k = 0; k < 6; k++) {
            impacts.push({ x: a.x + (Math.random() - .5) * 30, y: a.y - Math.random() * 100, t: 0.12 + Math.random() * 0.1 });
          }
          gone = true;
        }
      }
    }
    if (gone) rovers.splice(i, 1);
  }
  // 閃光彈：拋物線旋轉飛行 → 落地引爆
  for (let i = grenades.length - 1; i >= 0; i--) {
    const g = grenades[i];
    g.vy += GREN_G * dt;
    g.x += g.vx * dt;
    g.y += g.vy * dt;
    g.rot += 11 * dt;
    if (g.vy > 0 && g.y >= (g.gy || F1_Y) - 8) {
      doAreaBlast(g.x, g.gy);
      grenades.splice(i, 1);
    }
  }
  // 空投直升機：左→右飛越，到目標區上空開始沿途鋪火
  for (let i = helis.length - 1; i >= 0; i--) {
    const h = helis[i];
    h.t += dt;
    h.x += HELI_SPEED * dt;
    if (h.drops === undefined && h.x >= h.x0) h.drops = 0;   // 進入區域：開始投彈
    if (h.drops !== undefined && h.drops < 5 &&
        h.x >= h.x0 + h.drops * (h.x1 - h.x0) / 4.001) {      // 等距 5 顆
      fireMissiles.push({
        x: h.x, y: cam.y - 270 + 80,
        vx: 70, vy: 500,
        gy: h.gy || F1_Y,
      });
      h.drops++;
    }
    if (h.x > cam.x + VIEW_W / 2 + HELI_FX.w + 60) helis.splice(i, 1);
  }
  // 燃燒飛彈：俯衝 → 觸地爆炸（傷害+點燃）＋殘留火焰區
  for (let i = fireMissiles.length - 1; i >= 0; i--) {
    const ms = fireMissiles[i];
    ms.vy += 1100 * dt;
    ms.x += ms.vx * dt;
    ms.y += ms.vy * dt;
    if (ms.y >= ms.gy - 6) {
      blasts.push({ x: ms.x, y: ms.gy, t: 0.35 });
      shakeT = Math.max(shakeT, 0.12);
      for (const e of enemies) {
        if (e.state !== "death" && Math.abs(e.x - ms.x) < 80 && Math.abs(e.y - ms.gy) < 110) { damageEnemy(e, 1.5); e.burnT = 20; }
      }
      if (boss.active && boss.deadT <= 0 && Math.abs(boss.x - ms.x) < 80 && Math.abs(boss.y - ms.gy) < 140) { damageBoss(1); boss.burnT = 20; }
      for (const a of allies) {
        if (a.kind !== "sniper" && a.mode === "fight" && Math.abs(a.x - ms.x) < 80 && Math.abs(a.y - ms.gy) < 110) { damageAlly(a, a.kind === "gunner" ? 2 : 1); a.burnT = 20; }   // 克制鏈：鋼鐵雨對妮可×2
      }
      flameZones.push({ x0: ms.x - 45, x1: ms.x + 45, t: 5, gy: ms.gy });
      fireMissiles.splice(i, 1);
    }
  }
  // 火焰殘留區：站在裡面的目標重新點燃
  for (let i = flameZones.length - 1; i >= 0; i--) {
    const z = flameZones[i];
    z.t -= dt;
    for (const e of enemies) {
      if (e.state !== "death" && e.x > z.x0 && e.x < z.x1 &&
          Math.abs(e.y - z.gy) < 100) e.burnT = 20;
    }
    if (boss.active && boss.deadT <= 0 && boss.x > z.x0 && boss.x < z.x1 &&
        Math.abs(boss.y - z.gy) < 40) boss.burnT = 20;
    for (const a of allies) {
      if (a.kind !== "sniper" && a.mode === "fight" && a.x > z.x0 && a.x < z.x1 &&
          Math.abs(a.y - z.gy) < 100) a.burnT = 20;
    }
    if (z.t <= 0) flameZones.splice(i, 1);
  }
  // 燃燒結算：每秒 3% 最大生命（舉盾中不掉血，燃燒時間照走）
  for (const e of enemies) {
    if (e.state === "death") { e.burnT = 0; continue; }
    if (e.burnT > 0) {
      e.burnT -= dt;
      if (!shieldUp(e)) {
        e.hp -= e.maxHp * 0.03 * dt;
        if (e.hp <= 0) damageEnemy(e, 0);
      }
    }
  }
  if (boss.burnT > 0 && boss.active && boss.deadT <= 0) {
    boss.burnT -= dt;
    boss.hp -= boss.maxHp * 0.03 * dt;
    if (boss.hp <= 0) damageBoss(0);
  }
  for (const a of allies) {
    if (a.burnT > 0 && a.mode === "fight") {
      a.burnT -= dt;
      if (!allyShieldUp(a)) {
        a.hp -= a.maxHp * 0.03 * dt;
        if (a.hp <= 0) allyRetreat(a);
      }
    }
  }
  for (let i = tracers.length - 1; i >= 0; i--) {
    tracers[i].t -= dt;
    if (tracers[i].t <= 0) tracers.splice(i, 1);
  }
  for (let i = blasts.length - 1; i >= 0; i--) {
    blasts[i].t -= dt;
    if (blasts[i].t <= 0) blasts.splice(i, 1);
  }
  // 血條白影：受擊後延遲追上實際血量
  if (player.hpGhost < player.hp) player.hpGhost = player.hp;
  else player.hpGhost += (player.hp - player.hpGhost) * (1 - Math.exp(-dt * 3.5));
  if (boss.hpGhost < boss.hp) boss.hpGhost = boss.hp;
  else boss.hpGhost += (boss.hp - boss.hpGhost) * (1 - Math.exp(-dt * 3.5));
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (b.x0 === undefined) b.x0 = b.x;   // 記錄出膛位置
    b.x += b.vx * dt;
    let hit = b.x < WORLD.x0 - 20 || b.x > WORLD.w + 20 ||
              Math.abs(b.x - b.x0) > BULLET_RANGE;   // 超射程消散
    // 打中小怪
    for (const e of enemies) {
      if (e.state === "death") continue;
      if (Math.abs(b.x - e.x) < e.w / 2 && b.y > e.y - e.h && b.y < e.y) {
        const r = rollPlayerDmg();
        damageEnemy(e, r.dmg, r.crit);
        gainCostOnHit();
        hit = true;
        break;
      }
    }
    // 打中 Boss（待命中無敵，開戰後才吃傷害）
    if (!hit && boss.active && boss.deadT <= 0 &&
        Math.abs(b.x - boss.x) < boss.hitW / 2 + 6 &&
        b.y > boss.y - boss.hitH && b.y < boss.y) {
      const r = rollPlayerDmg();
      damageBoss(r.dmg, r.crit);
      gainCostOnHit();
      hit = true;
    }
    // 打中召喚隊友（盾兵會整發擋下，後面的 Boss 打不到）
    if (!hit) {
      for (const a of allies) {
        if (a.kind === "sniper" || a.mode !== "fight") continue;
        if (Math.abs(b.x - a.x) < ALLY_KINDS[a.kind].hitW / 2 + 6 &&
            b.y > a.y - ALLY_KINDS[a.kind].hitH && b.y < a.y) {
          const r = rollPlayerDmg();
          damageAlly(a, r.dmg, r.crit);
          gainCostOnHit();
          hit = true;
          break;
        }
      }
    }
    if (!hit) {
      for (const s of SOLIDS) {
        if (s.h <= 30) continue;   // 單向薄平台不擋子彈
        if (b.x > s.x && b.x < s.x + s.w && b.y > s.y && b.y < s.y + s.h) {
          if (s.breakable) damageBreakable(s, 1, b.x, b.y);
          hit = true;
          break;
        }
      }
    }
    if (hit) {
      impacts.push({ x: b.x, y: b.y, t: 0.1 });
      bullets.splice(i, 1);
    }
  }
  for (let i = shells.length - 1; i >= 0; i--) {
    const s = shells[i];
    s.vy += GRAV * 0.8 * dt;
    s.x += s.vx * dt; s.y += s.vy * dt;
    s.rot += s.vr * dt;
    for (const sol of SOLIDS) {
      if (s.vy > 0 && s.x > sol.x && s.x < sol.x + sol.w &&
          s.y > sol.y && s.y - s.vy * dt <= sol.y + 2) {
        s.y = sol.y; s.vy *= -0.45; s.vx *= 0.6; s.vr *= 0.5;
        break;
      }
    }
    s.life -= dt;
    if (s.life <= 0) shells.splice(i, 1);
  }
  for (let i = impacts.length - 1; i >= 0; i--) {
    impacts[i].t -= dt;
    if (impacts[i].t <= 0) impacts.splice(i, 1);
  }
  for (let i = costPops.length - 1; i >= 0; i--) {
    costPops[i].t -= dt;
    if (costPops[i].t <= 0) costPops.splice(i, 1);
  }
  for (let i = dmgPops.length - 1; i >= 0; i--) {
    dmgPops[i].t -= dt;
    if (dmgPops[i].t <= 0) dmgPops.splice(i, 1);
  }
}

function physics(dt) {
  player.invulnT = Math.max(0, player.invulnT - dt);
  if (player.deathT > 0) {                  // 死亡流程：黑幕最深處重生
    const prev = player.deathT;
    player.deathT -= dt;
    if (prev > 0.7 && player.deathT <= 0.7) respawnPlayer();
  }
  updateElevators(dt);
  updateMovers(dt);
  updateItems(dt);
  updateGates();
  updateSpecialObjects(dt);
  const left = kd("left") || vpad.joyDx < -0.35;
  const right = kd("right") || vpad.joyDx > 0.35;
  const jumpKey = kd("jump") || vpad.jump;
  const crouchKey = kd("crouch") || vpad.joyDy > 0.5;
  const fireKey = kd("shoot") || vpad.fire;
  const dashKey = kd("dash") || vpad.dash;
  player.dashCd = Math.max(0, player.dashCd - dt);
  if (player.dashT > 0) player.dashT -= dt;
  if (player.onGround) player.airDashUsed = false;   // 落地重置空中衝刺

  if (keys.KeyH && !(player.state === "hurt" && !animDone(ANIMS.hurt, player.t))) {
    hurtPlayer(-player.facing);
  }
  const hurting = (player.state === "hurt" && !animDone(ANIMS.hurt, player.t)) || player.deathT > 0;
  if (dashKey && player.dashT <= 0 && player.dashCd <= 0 && !hurting && player.deathT <= 0 &&
      (player.onGround || !player.airDashUsed)) {   // 衝刺觸發（閃避無敵，空中限一次）
    player.dashT = DASH_T; player.dashCd = DASH_CD;
    player.dashDir = player.facing;
    if (!player.onGround) player.airDashUsed = true;
    player.invulnT = Math.max(player.invulnT, DASH_T + 0.05);
    spawnDust(player.x, player.y, 6, 30);
    shakeT = Math.max(shakeT, 0.08);
    dashLastAfterX = player.x; dashAfterCount = 0;   // 拖尾起點
    sfxDash();
  }

  // reload: R to reload manually, auto when firing on empty; blocks shooting
  if (player.reloadT > 0) {
    player.reloadT -= dt;
    if (player.reloadT <= 0) { player.reloadT = 0; player.ammo = MAG_SIZE; }
  }
  if (!hurting && player.reloadT <= 0 &&
      (((kd("reload") || vpad.reload) && player.ammo < MAG_SIZE) || (fireKey && player.ammo <= 0))) {
    player.reloadT = RELOAD_TIME;
    sfxReload();
  }
  const reloading = player.reloadT > 0;

  player.crouching = crouchKey && player.onGround && !hurting;
  const shooting = fireKey && player.onGround && !hurting && !reloading && player.ammo > 0;
  const moveInput = left || right;

  if (player.crouching || (shooting && !moveInput)) {
    player.vx = 0;                     // planted while crouching or standing fire
    if (right && !left) player.facing = 1;
    if (left && !right) player.facing = -1;
  } else if (!hurting) {
    player.vx = (right ? MOVE : 0) - (left ? MOVE : 0);
    if (right && !left) player.facing = 1;
    if (left && !right) player.facing = -1;
  } else {
    player.vx *= Math.pow(0.02, dt);
  }

  player.jumpBuf = jumpKey ? BUFFER : Math.max(0, player.jumpBuf - dt);
  player.coyote = player.onGround ? COYOTE : Math.max(0, player.coyote - dt);
  if (!hurting && !player.crouching && player.jumpBuf > 0 && player.coyote > 0) {
    player.vy = -JUMP_V;
    player.coyote = 0; player.jumpBuf = 0;
    player.onGround = false;
    setState("rise");
    spawnDust(player.x, player.y, 4, 26);
    sfxJump();
  }

  if (player.dashT > 0) {              // 衝刺中：高速平移、抵銷重力、留殘影
    player.vx = player.dashDir * DASH_SPEED;
    player.vy = 0;
    // 沙德威斯坦拖尾：沿移動路徑等距(13px)灌出密集殘影，補滿高速產生的空隙
    const SPACING = 20, dm0 = DASH_META[currentSkin], cnt = dm0 ? dm0.count : 5;
    let guard = 0;
    while (Math.abs(player.x - dashLastAfterX) >= SPACING && guard++ < 40) {
      dashLastAfterX += Math.sign(player.x - dashLastAfterX) * SPACING;
      afterimages.push({ x: dashLastAfterX, y: player.y, facing: player.dashDir,
                         skin: currentSkin, fi: (dashAfterCount++) % cnt, t: 0.34, t0: 0.34 });
    }
  }
  player.vy += GRAV * dt;

  const hh = player.crouching ? HITBOX_H_CROUCH : HITBOX_H;
  const hw = HITBOX_W / 2;
  player.x += player.vx * dt;
  for (const s of SOLIDS) {
    if (s.h <= 30) continue;
    if (player.y > s.y && player.y - hh < s.y + s.h) {
      if (player.x + hw > s.x && player.x - hw < s.x + s.w) {
        player.x = player.vx > 0 ? s.x - hw : s.x + s.w + hw;
      }
    }
  }
  player.x = Math.max(WORLD.x0 + hw, Math.min(WORLD.w - hw, player.x));

  const prevY = player.y;
  player.y += player.vy * dt;
  const wasOnGround = player.onGround;
  player.onGround = false;
  for (const s of SOLIDS) {
    if (player.x + hw > s.x && player.x - hw < s.x + s.w) {
      if (player.vy >= 0 && prevY <= s.y + 1 && player.y >= s.y) {
        player.y = s.y; player.vy = 0; player.onGround = true;
      } else if (s.h > 30 && player.vy < 0 && prevY - hh >= s.y + s.h && player.y - hh < s.y + s.h) {
        player.y = s.y + s.h + hh; player.vy = 0;
      }
    }
  }

  // ---- state machine ----
  if (hurting) return;
  if (player.dashT > 0) { setState("dash"); return; }
  if (player.state === "hurt") setState(player.onGround ? "idle" : "fall");

  if (!player.onGround) {
    if (player.vy < 0) { if (player.state !== "rise") setState("rise"); }
    else if (player.state !== "fall") setState("fall");
  } else if (player.crouching) {
    setState(shooting ? "crouch_shoot" : "crouch_idle");
  } else if (shooting) {
    setState(moveInput ? "run_shoot" : "shoot");
  } else {
    if (!wasOnGround) { setState(moveInput ? "run" : "land"); spawnDust(player.x, player.y, 5, 30); sfxLand(); }
    else if (player.state === "land") {
      if (moveInput) setState("run");
      else if (animDone(ANIMS.land, player.t)) setState("idle");
    }
    else setState(moveInput ? "run" : "idle");
  }
}
