// 以視差係數 f 平鋪一條水平層，bottomY = 該層底邊的世界 y（f=1 時）
function drawStrip(img, f, bottomY, s) {
  const camL = cam.x - VIEW_W / 2, camT = cam.y - 270;
  const w = img.width * s, h = img.height * s;
  const y = bottomY - h - CAM_T0 * (1 - f) - camT * f;
  const phase = ((camL * f) % w + w) % w;
  for (let x = -phase - w; x < VIEW_W + w; x += w) {
    ctx.drawImage(img, Math.round(x), Math.round(y), Math.round(w), Math.round(h));
  }
}

function tileRow(img, x0, y0, wTotal, s, srcH) {
  // 沿 x 平鋪一個圖塊列（世界座標內），srcH 可截取來源上半部
  const sh = srcH || img.height;
  const w = img.width * s, h = sh * s;
  ctx.save();
  ctx.beginPath();
  ctx.rect(x0, y0, wTotal, h);
  ctx.clip();
  for (let x = x0; x < x0 + wTotal; x += w) {
    ctx.drawImage(img, 0, 0, img.width, sh, Math.round(x), Math.round(y0), Math.round(w), Math.round(h));
  }
  ctx.restore();
}

function draw() {
  ctx.setTransform(RES, 0, 0, RES, 0, 0);   // 邏輯座標 VIEW_W×540 → 實際解析度
  ctx.clearRect(0, 0, VIEW_W, 540);
  const camL = Math.round(cam.x - VIEW_W / 2), camT = Math.round(cam.y - 270);

  ctx.fillStyle = "#2f2f36";
  ctx.fillRect(0, 0, VIEW_W, 540);

  ctx.save();
  let jx = 0, jy = 0;
  if (shakeT > 0) {                 // 震動只作用世界層，HUD 不動
    const k = shakeT / SHAKE_DUR;
    jx = (Math.random() - .5) * 14 * k;
    jy = (Math.random() - .5) * 9 * k;
  }
  ctx.translate(-camL + jx, -camT + jy);

  // graybox 地形
  for (const s of SOLIDS) {
    if (s.deco || s.hidden) continue;
    ctx.fillStyle = (s === bossGate || s.gate) ? "#b4483c" : s.h <= 30 ? "#9a9aa4" : "#8a8a92";  // 閘門紅色
    ctx.fillRect(s.x, s.y, s.w, s.h);
    ctx.strokeStyle = "#3c3c42";
    ctx.strokeRect(s.x + .5, s.y + .5, s.w - 1, s.h - 1);
  }
  // 電梯（琥珀平台 + 紅三角 + 井道虛線）
  for (const el of ELEVATORS) {
    ctx.setLineDash([6, 8]);
    ctx.strokeStyle = "rgba(200,200,210,.35)";
    ctx.beginPath();
    ctx.moveTo(el.x + 4, el.top - 60); ctx.lineTo(el.x + 4, el.bottom);
    ctx.moveTo(el.x + el.w - 4, el.top - 60); ctx.lineTo(el.x + el.w - 4, el.bottom);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = "#c9a13b";
    ctx.fillRect(el.x, el.y, el.w, 14);
    ctx.strokeStyle = "#3c3c42";
    ctx.strokeRect(el.x + .5, el.y + .5, el.w - 1, 13);
    ctx.fillStyle = "#e8544a";                       // 紅三角（地圖記號同款）
    ctx.beginPath();
    ctx.moveTo(el.x + el.w / 2, el.y - 22);
    ctx.lineTo(el.x + el.w / 2 - 12, el.y - 4);
    ctx.lineTo(el.x + el.w / 2 + 12, el.y - 4);
    ctx.closePath();
    ctx.fill();
  }
  // 存檔點柱（未啟用灰 / 啟用後青色脈動）
  for (const cp of CHECKPOINTS) {
    const on = cp.active;
    ctx.fillStyle = on ? "#1d4e66" : "#55555e";
    ctx.fillRect(cp.x - 5, cp.y - 118, 10, 118);
    ctx.fillStyle = on ? "#59d5f2" : "#83838d";
    ctx.beginPath();
    ctx.arc(cp.x, cp.y - 128, on ? 9 + Math.sin(uiTime * 5) * 1.5 : 8, 0, Math.PI * 2);
    ctx.fill();
    if (on) {
      ctx.strokeStyle = `rgba(89,213,242,${0.35 + 0.25 * Math.sin(uiTime * 5)})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cp.x, cp.y - 128, 15, 0, Math.PI * 2);
      ctx.stroke();
      ctx.lineWidth = 1;
    }
  }
  drawEnemies();
  drawAlly();
  drawBoss();

  const a = ANIMS[player.state];
  let fi = frameIndex(a, player.t);
  if ((player.state === "run" || player.state === "run_shoot") &&
      player.vx !== 0 && Math.sign(player.vx) !== player.facing) {
    fi = a.count - 1 - fi;               // 倒退走（面向與移動相反）：動畫倒放
  }
  const scale = DRAW_H / FRAME_H;
  const dw = FRAME_W * scale, dh = DRAW_H;
  ctx.save();
  if (player.facing === -1) {
    ctx.translate(player.x, 0); ctx.scale(-1, 1); ctx.translate(-player.x, 0);
  }
  if (player.invulnT > 0 && player.deathT <= 0) {          // 無敵幀閃爍
    ctx.globalAlpha = ((player.invulnT * 12) | 0) % 2 ? 0.35 : 0.9;
  }
  ctx.drawImage(a.img, fi * FRAME_W, 0, FRAME_W, FRAME_H,
    player.x - ANCHOR_X * dw, player.y - FEET_Y * dh, dw, dh);
  ctx.restore();
  // 護盾能量護罩（與敵方盾兵同款泡泡）
  if (player.shieldHp > 0) drawShieldBubble(player.x, player.y, 128, playerBlockT);
  // reload progress ring above the head
  if (player.reloadT > 0) {
    const frac = 1 - player.reloadT / RELOAD_TIME;
    const rx = player.x, ry = player.y - DRAW_H - 14;
    ctx.lineWidth = 4;
    ctx.strokeStyle = "rgba(255,255,255,.45)";
    ctx.beginPath();
    ctx.arc(rx, ry, 11, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = UI_YELLOW;
    ctx.beginPath();
    ctx.arc(rx, ry, 11, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
  }
  drawEffects();
  if (targeting) drawTargetingWorld();
  ctx.restore();   // end camera transform

  // 子彈時間：藍色暗角 + 上下黑邊
  if (targeting) {
    ctx.fillStyle = "rgba(25,50,100,.16)";
    ctx.fillRect(0, 0, VIEW_W, 540);
    ctx.fillStyle = "rgba(8,10,16,.55)";
    ctx.fillRect(0, 0, VIEW_W, 26);
    ctx.fillRect(0, 514, VIEW_W, 26);
    ctx.textAlign = "center";
    ctx.font = `bold 14px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(`${CARDS[hand[targeting.slot]].name} — 左鍵確認 · J/射擊鍵 快速施放 · 右鍵取消`, VIEW_W / 2, 532);
    ctx.textAlign = "left";
  }

  // 受傷紅閃（世界層之上、HUD 之下）
  if (hurtFlash > 0) {
    ctx.fillStyle = `rgba(255,50,40,${(hurtFlash / 0.3) * 0.25})`;
    ctx.fillRect(0, 0, VIEW_W, 540);
  }
  // 閃光盾致盲：先全白再漸退（HUD 之下，血條/卡片仍可見）
  if (blindT > 0) {
    const a = blindT > BLIND_DUR - 0.5 ? 1 : Math.min(1, blindT / (BLIND_DUR - 0.5));
    ctx.fillStyle = `rgba(255,255,255,${a * 0.96})`;
    ctx.fillRect(0, 0, VIEW_W, 540);
  }
  // 低血量警示：四邊紅色暈影脈動
  if (player.hp / player.maxHp <= 0.25 && player.deathT <= 0) {
    const pulse = 0.5 + 0.42 * Math.sin(uiTime * 6);
    const d = 72, col = a => `rgba(255,38,28,${a})`;
    let g = ctx.createLinearGradient(0, 0, 0, d);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(0, 0, VIEW_W, d);
    g = ctx.createLinearGradient(0, 540, 0, 540 - d);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(0, 540 - d, VIEW_W, d);
    g = ctx.createLinearGradient(0, 0, d, 0);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(0, 0, d, 540);
    g = ctx.createLinearGradient(VIEW_W, 0, VIEW_W - d, 0);
    g.addColorStop(0, col(0.55 * pulse)); g.addColorStop(1, col(0));
    ctx.fillStyle = g; ctx.fillRect(VIEW_W - d, 0, d, 540);
  }
  drawHUD();
  drawSkillCut();
  // 死亡黑幕（蓋過一切）
  if (player.deathT > 0) {
    const a = player.deathT > 0.7 ? (1.4 - player.deathT) / 0.7 : player.deathT / 0.7;
    ctx.fillStyle = `rgba(8,8,12,${Math.min(1, a)})`;
    ctx.fillRect(0, 0, VIEW_W, 540);
  }
  drawMinimap();
  if (vpad.on && !selectScreen) drawVpad();
  if (selectScreen) drawSelectScreen();
  dbg.textContent = `state=${player.state} frame=${fi} hp=${player.hp} ammo=${player.ammo} ground=${player.onGround} cam=${Math.round(cam.x)},${Math.round(cam.y)}`;
}

// ---- 手機虛擬控制繪製（浮動搖桿 + 右側按鈕圈）----
function drawVpad() {
  ctx.save();
  // 搖桿：觸摸中畫在起點，否則畫半透明提示圈
  const jx = vpad.joyId !== null ? vpad.joyBaseX : 118;
  const jy = vpad.joyId !== null ? vpad.joyBaseY : 430;
  const activeJoy = vpad.joyId !== null;
  ctx.globalAlpha = activeJoy ? 0.55 : 0.22;
  ctx.lineWidth = 3;
  ctx.strokeStyle = "#fff";
  ctx.beginPath(); ctx.arc(jx, jy, 52, 0, Math.PI * 2); ctx.stroke();
  ctx.fillStyle = "rgba(255,255,255,.25)";
  ctx.beginPath(); ctx.arc(jx + vpad.joyDx * 34, jy + vpad.joyDy * 34, 26, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = "rgba(255,255,255,.8)";
  ctx.beginPath(); ctx.arc(jx + vpad.joyDx * 34, jy + vpad.joyDy * 34, 26, 0, Math.PI * 2); ctx.stroke();
  // 按鈕圈
  for (const k in VBTN) {
    const b = VBTN[k];
    const pressed = vpad[k];
    ctx.globalAlpha = pressed ? 0.85 : 0.3;
    ctx.fillStyle = pressed ? "rgba(53,195,240,.5)" : "rgba(255,255,255,.18)";
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = pressed ? UI_BLUE : "#fff";
    ctx.lineWidth = pressed ? 3 : 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.stroke();
    ctx.textAlign = "center";
    ctx.font = `italic 900 ${b.r > 36 ? 16 : 13}px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(b.label, b.x, b.y + 5);
  }
  ctx.textAlign = "left";
  ctx.lineWidth = 1;
  ctx.globalAlpha = 1;
  ctx.restore();
}

// ---- 開局支援選擇畫面（BA 風：白色斜切卡 + 深藍名牌）----
function drawSelectScreen() {
  ctx.save();
  ctx.fillStyle = "rgba(16,26,44,.62)";
  ctx.fillRect(0, 0, VIEW_W, 540);
  // 卡片/按鈕座標已由 layoutUI 依視寬置中，直接以絕對座標繪製
  // 標題名牌
  ctx.shadowColor = "rgba(20,40,80,.4)";
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 3;
  slantPath(VIEW_W / 2 - 150, 40, 300, 46, 12);
  ctx.fillStyle = UI_NAVY;
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  slantPath(VIEW_W / 2 - 150, 40, 300, 46, 12);
  ctx.strokeStyle = UI_BLUE;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.lineWidth = 1;
  ctx.textAlign = "center";
  ctx.font = `italic 900 22px ${UI_FONT}`;
  ctx.fillStyle = "#fff";
  ctx.fillText("選擇支援學生", VIEW_W / 2, 71);
  const DESCS = {
    heal: ["主動：血包回復 1/3 生命", "被動：每30秒回復 1/4 生命"],
    buff: ["主動：1/2 護盾+霸體(30秒)", "被動：每30秒獲得 1/3 護盾"],
    crit: ["主動：爆擊率+30% 爆傷+50%", "被動：每30秒+1/5護盾(15秒)"],
  };
  for (let i = 0; i < 3; i++) {
    const o = SELECT_OPTS[i], c = CARDS[o.card];
    const hover = mouse.sx > o.x && mouse.sx < o.x + o.w && mouse.sy > o.y && mouse.sy < o.y + o.h;
    const focus = selectFocus === i;
    const oy = o.y - (focus ? 16 : hover ? 5 : 0);   // 聚焦彈起
    ctx.shadowColor = focus ? "rgba(53,195,240,.9)" : "rgba(20,40,80,.35)";
    ctx.shadowBlur = focus ? 18 : 10;
    ctx.shadowOffsetY = focus ? 0 : 3;
    slantPath(o.x, oy, o.w, o.h, 12);
    ctx.fillStyle = "rgba(250,252,255,.96)";
    ctx.fill();
    ctx.shadowColor = "transparent";
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    slantPath(o.x, oy, o.w, o.h, 12);
    ctx.strokeStyle = focus ? (Math.sin(uiTime * 8) > 0 ? "#fff" : UI_BLUE) : hover ? UI_BLUE : "rgba(120,150,190,.4)";
    ctx.lineWidth = focus ? 4 : hover ? 3 : 1;
    ctx.stroke();
    ctx.lineWidth = 1;
    // 肖像（藍漸層底）
    ctx.save();
    slantPath(o.x + 14, oy + 14, o.w - 28, 168, 8);
    ctx.clip();
    const g = ctx.createLinearGradient(0, oy, 0, oy + 190);
    g.addColorStop(0, "#a9d5ff");
    g.addColorStop(1, "#eef6ff");
    ctx.fillStyle = g;
    ctx.fillRect(o.x, oy, o.w, 200);
    if (c.img) {
      ctx.drawImage(c.img, c.crop.sx, c.crop.sy, c.crop.sw, c.crop.sh,
        o.x + 14, oy + 8, o.w - 28, (o.w - 28) * 1.25);
    }
    ctx.restore();
    // Cost 徽章
    ctx.beginPath();
    ctx.arc(o.x + 24, oy + 24, 14, 0, Math.PI * 2);
    ctx.fillStyle = UI_NAVY;
    ctx.fill();
    ctx.strokeStyle = UI_YELLOW;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.font = `italic 900 16px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(String(c.cost), o.x + 24, oy + 30);
    // 名牌
    slantPath(o.x + 12, oy + 192, o.w - 24, 32, 8);
    ctx.fillStyle = UI_NAVY;
    ctx.fill();
    ctx.font = `italic 900 17px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(c.name, o.x + o.w / 2, oy + 215);
    // 說明
    ctx.font = `bold 12.5px ${UI_FONT}`;
    ctx.fillStyle = UI_NAVY;
    const lines = DESCS[c.skill];
    for (let li = 0; li < lines.length; li++) {
      ctx.fillText(lines[li], o.x + o.w / 2, oy + 246 + li * 20);
    }
    // 按鍵小方牌
    slantPath(o.x + o.w / 2 - 12, oy + o.h - 20, 24, 18, 4);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.strokeStyle = "rgba(43,58,85,.5)";
    ctx.stroke();
    ctx.font = `bold 12px ${UI_FONT}`;
    ctx.fillStyle = UI_NAVY;
    ctx.fillText(String(i + 1), o.x + o.w / 2, oy + o.h - 6);
  }
  // 確認按鈕（先點卡片彈起，再按此定案）
  const b = CONFIRM_BTN;
  const canConfirm = selectFocus !== null;
  const bHover = canConfirm && mouse.sx > b.x && mouse.sx < b.x + b.w && mouse.sy > b.y && mouse.sy < b.y + b.h;
  ctx.shadowColor = canConfirm ? "rgba(53,195,240,.7)" : "rgba(20,40,80,.3)";
  ctx.shadowBlur = canConfirm ? (bHover ? 16 : 10) : 5;
  ctx.shadowOffsetY = 2;
  slantPath(b.x, b.y, b.w, b.h, 9);
  ctx.fillStyle = canConfirm ? UI_BLUE : "rgba(140,152,170,.9)";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  slantPath(b.x, b.y, b.w, b.h, 9);
  ctx.strokeStyle = bHover ? "#fff" : "rgba(255,255,255,.5)";
  ctx.lineWidth = bHover ? 3 : 1.5;
  ctx.stroke();
  ctx.lineWidth = 1;
  ctx.font = `italic 900 17px ${UI_FONT}`;
  ctx.fillStyle = "#fff";
  ctx.fillText(canConfirm ? "確認選擇（Enter）" : "請先選擇一位學生", b.x + b.w / 2, b.y + 28);
  ctx.textAlign = "left";
  ctx.restore();
}

// ---- BA 風 UI：白色斜切面板 + 深藍字 + 天藍飾條 + 膠囊進度條 ----
const UI_NAVY = "#2b3a55", UI_BLUE = "#2ba7f0", UI_RED = "#e8544a", UI_YELLOW = "#ffcc37";
const UI_FONT = "'Segoe UI', 'Noto Sans TC', sans-serif";

function slantPath(x, y, w, h, s = 8) {   // 平行四邊形（右斜切）
  ctx.beginPath();
  ctx.moveTo(x + s, y);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w - s, y + h);
  ctx.lineTo(x, y + h);
  ctx.closePath();
}

function capsulePath(x, y, w, h) {        // 圓角膠囊
  const r = h / 2;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function capsuleBar(x, y, w, h, fills) {  // fills: [[比例, 顏色], ...] 由底到面
  capsulePath(x, y, w, h);
  ctx.fillStyle = "#dfe6ee";
  ctx.fill();
  for (const [frac, col] of fills) {
    if (frac <= 0) continue;
    capsulePath(x, y, Math.max(h, w * Math.min(1, frac)), h);
    ctx.fillStyle = col;
    ctx.fill();
  }
  capsulePath(x, y, w, h);
  ctx.strokeStyle = "rgba(110,140,180,.45)";
  ctx.stroke();
}

function uiPanel(x, y, w, h, s) {         // 白色斜切面板 + 陰影 + 天藍頂飾條
  ctx.shadowColor = "rgba(20,40,80,.25)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  slantPath(x, y, w, h, s);
  ctx.fillStyle = "rgba(250,252,255,.92)";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  slantPath(x, y, w, h, s);
  ctx.strokeStyle = "rgba(120,150,190,.35)";
  ctx.stroke();
  ctx.save();
  slantPath(x, y, w, h, s);
  ctx.clip();
  ctx.fillStyle = UI_BLUE;                // 頂緣飾條
  ctx.fillRect(x, y, w + s, 4);
  ctx.restore();
}

// 技能施放橫幅（BA 式 cut-in：頭像 + 斜切名牌，滑入 → 停留 → 滑出）
function drawSkillCut() {
  if (!skillCut) return;
  const t = skillCut.t, outT = skillCut.dur - 0.25;
  let dx = 0;
  if (t < 0.15) { const k = 1 - t / 0.15; dx = -340 * k * k; }          // ease-out 滑入
  else if (t > outT) { const k = (t - outT) / 0.25; dx = -360 * k * k; } // 加速滑出
  const x = 16 + dx, y = 96;
  ctx.save();
  ctx.shadowColor = "rgba(20,40,80,.3)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  // 名牌橫幅（白色斜切 + 天藍頂帶）
  slantPath(x + 54, y + 12, 214, 38, 9);
  ctx.fillStyle = "rgba(250,252,255,.96)";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  ctx.save();
  slantPath(x + 54, y + 12, 214, 38, 9);
  ctx.clip();
  ctx.fillStyle = "rgba(53,195,240,.25)";      // 上半淡藍帶
  ctx.fillRect(x + 54, y + 12, 224, 14);
  ctx.fillStyle = UI_BLUE;
  ctx.fillRect(x + 54, y + 12, 224, 3);
  ctx.restore();
  slantPath(x + 54, y + 12, 214, 38, 9);
  ctx.strokeStyle = "rgba(120,150,190,.45)";
  ctx.stroke();
  ctx.font = `italic 900 17px ${UI_FONT}`;
  ctx.fillStyle = UI_NAVY;
  ctx.fillText(skillCut.c.name, x + 84, y + 40);
  if (skillCut.passive) {            // 被動觸發：金色「被動」小徽章
    slantPath(x + 218, y + 4, 52, 18, 5);
    ctx.fillStyle = UI_YELLOW;
    ctx.fill();
    ctx.font = `italic 900 12px ${UI_FONT}`;
    ctx.fillStyle = UI_NAVY;
    ctx.textAlign = "center";
    ctx.fillText("被動", x + 244, y + 18);
    ctx.textAlign = "left";
  }
  // 頭像框（藍漸層底）
  ctx.shadowColor = "rgba(20,40,80,.3)";
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;
  slantPath(x, y, 64, 64, 7);
  ctx.fillStyle = "#fff";
  ctx.fill();
  ctx.shadowColor = "transparent";
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
  ctx.save();
  slantPath(x + 2.5, y + 2.5, 59, 59, 6);
  ctx.clip();
  const g = ctx.createLinearGradient(0, y, 0, y + 64);
  g.addColorStop(0, "#8ecbff");
  g.addColorStop(1, "#e6f3ff");
  ctx.fillStyle = g;
  ctx.fillRect(x - 6, y, 76, 64);
  if (skillCut.c.img) ctx.drawImage(skillCut.c.img, x - 6, y + 2, 76, 95);
  ctx.restore();
  slantPath(x, y, 64, 64, 7);
  ctx.strokeStyle = UI_BLUE;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.lineWidth = 1;
  ctx.restore();
}

// 瞄準預覽（世界座標層，於相機 transform 內呼叫）
function drawTargetingWorld() {
  const { wx, wy } = mouseWorld();
  const c = CARDS[hand[targeting.slot]];
  if (c.skill === "area") {                 // 區域圈
    ctx.strokeStyle = "#35c3f0";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(wx, floorYAt(player.y), 90, 18, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = "rgba(53,195,240,.18)";
    ctx.fill();
    ctx.lineWidth = 1;
  } else if (c.skill === "fireline") {      // 地面火線帶
    const dir = Math.sign(wx - player.x) || player.facing;
    const a = player.x + dir * 20, b = player.x + dir * 380;
    const x0 = Math.min(a, b), x1 = Math.max(a, b);
    ctx.fillStyle = "rgba(255,120,40,.22)";
    const _gy = floorYAt(player.y);
    ctx.fillRect(x0, _gy - 26, x1 - x0, 26);
    ctx.strokeStyle = "rgba(255,140,50,.85)";
    ctx.strokeRect(x0 + .5, _gy - 26.5, x1 - x0 - 1, 26);
  } else if (c.skill === "stun") {          // 小車：從腳下沿當前表面的行進方向箭頭
    const dir = Math.sign(wx - player.x) || player.facing;
    const gy = player.y - 10;
    ctx.strokeStyle = "#35c3f0";
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(player.x + dir * 24, gy);
    ctx.lineTo(player.x + dir * 170, gy);
    ctx.stroke();
    ctx.setLineDash([]);
    for (let q = 0; q < 3; q++) {           // 箭頭符號
      const ax = player.x + dir * (185 + q * 14);
      ctx.beginPath();
      ctx.moveTo(ax - dir * 8, gy - 8);
      ctx.lineTo(ax, gy);
      ctx.lineTo(ax - dir * 8, gy + 8);
      ctx.stroke();
    }
    ctx.lineWidth = 1;
  } else {                                  // 狙擊：目標四角框
    const t = pickTarget(wx, wy, Infinity);
    if (t) {
      const hw = 30, y0 = t.y - t.h - 8, y1 = t.y + 6, L = 10;
      ctx.strokeStyle = "#ffcc37";
      ctx.lineWidth = 3;
      for (const [cx, cy, dx, dy] of [[t.x - hw, y0, 1, 1], [t.x + hw, y0, -1, 1], [t.x - hw, y1, 1, -1], [t.x + hw, y1, -1, -1]]) {
        ctx.beginPath();
        ctx.moveTo(cx + dx * L, cy);
        ctx.lineTo(cx, cy);
        ctx.lineTo(cx, cy + dy * L);
        ctx.stroke();
      }
      ctx.lineWidth = 1;
    } else {                                // 無有效目標：灰色十字
      ctx.strokeStyle = "rgba(255,255,255,.45)";
      ctx.beginPath();
      ctx.moveTo(wx - 10, wy); ctx.lineTo(wx + 10, wy);
      ctx.moveTo(wx, wy - 10); ctx.lineTo(wx, wy + 10);
      ctx.stroke();
    }
  }
}

// ---- 探索小地圖（左上；M 切換；離屏預渲染地形）----
let minimapCv = null, minimapOn = true;
const MM_SC = 64;   // 1 小地圖 px = 64 世界 px
function buildMinimap() {
  if (!document.createElement) return;
  minimapCv = document.createElement("canvas");
  minimapCv.width = Math.ceil(WORLD.w / MM_SC);
  minimapCv.height = Math.ceil(WORLD.h / MM_SC);
  const g = minimapCv.getContext("2d");
  g.fillStyle = "rgba(16,24,40,.9)";
  g.fillRect(0, 0, minimapCv.width, minimapCv.height);
  g.fillStyle = "#7f8aa0";
  for (const s of SOLIDS) {
    g.fillRect(s.x / MM_SC, s.y / MM_SC, Math.max(1, s.w / MM_SC), Math.max(1, s.h / MM_SC));
  }
  g.fillStyle = "#c9a13b";                 // 電梯
  for (const el of ELEVATORS) g.fillRect(el.x / MM_SC - 1, el.top / MM_SC, 3, (el.bottom - el.top) / MM_SC);
}

function drawMinimap() {
  if (!minimapCv || !minimapOn || selectScreen) return;
  const mw = minimapCv.width, mh = minimapCv.height;
  const x0 = 14, y0 = 86;
  ctx.globalAlpha = 0.88;
  ctx.drawImage(minimapCv, x0, y0);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = "rgba(120,150,190,.5)";
  ctx.strokeRect(x0 - .5, y0 - .5, mw + 1, mh + 1);
  for (const cp of CHECKPOINTS) {          // 存檔點
    ctx.fillStyle = cp.active ? "#59d5f2" : "#8a93a8";
    ctx.fillRect(x0 + cp.x / MM_SC - 1, y0 + cp.y / MM_SC - 2, 3, 3);
  }
  ctx.fillStyle = "#e8544a";               // Boss
  ctx.fillRect(x0 + BOSS_ROOM.homeX / MM_SC - 2, y0 + L4_Y / MM_SC - 3, 4, 4);
  ctx.fillStyle = "#fff";                  // 玩家（脈動）
  const pr = 1.5 + Math.sin(uiTime * 6) * 0.8;
  ctx.beginPath();
  ctx.arc(x0 + player.x / MM_SC, y0 + player.y / MM_SC - 1, pr, 0, Math.PI * 2);
  ctx.fill();
}

let weaponShadow = null;
function getWeaponShadow(img) {     // 武器剪影投影（離屏一次性上色）
  if (weaponShadow) return weaponShadow;
  if (!document.createElement) return img;   // 無頭測試環境沒有 createElement
  const c = document.createElement("canvas");
  c.width = img.width; c.height = img.height;
  const g = c.getContext("2d");
  g.drawImage(img, 0, 0);
  g.globalCompositeOperation = "source-in";
  g.fillStyle = "rgba(43,58,85,.35)";
  g.fillRect(0, 0, c.width, c.height);
  weaponShadow = c;
  return c;
}

function drawHUD() {
  ctx.save();
  // ---- 玩家面板（左上：武器名牌 + 彈藥 + 血條）----
  uiPanel(14, 12, 262, 64, 12);
  slantPath(24, 22, 106, 32, 7);          // 武器展示芯片：淡藍底 + 細框（透明武器圖直接疊上）
  ctx.fillStyle = "rgba(43,167,240,.10)";
  ctx.fill();
  slantPath(24, 22, 106, 32, 7);
  ctx.strokeStyle = "rgba(43,167,240,.4)";
  ctx.stroke();
  const wi = TILES.weapon_icon.img;
  const ww = 92, wh = Math.round(ww * wi.height / wi.width);   // 等比例（原繪製把圖壓扁了）
  const wix = 24 + (106 - ww) / 2 + 2, wiy = 22 + (32 - wh) / 2;
  ctx.globalAlpha = player.reloadT > 0 ? 0.45 : 1;
  ctx.drawImage(getWeaponShadow(wi), wix + 1.5, wiy + 2.5, ww, wh);   // 投影
  ctx.drawImage(wi, wix, wiy, ww, wh);
  ctx.globalAlpha = 1;
  if (player.reloadT > 0) {               // 換彈：黃色進度膠囊
    const frac = 1 - player.reloadT / RELOAD_TIME;
    ctx.font = `bold 13px ${UI_FONT}`;
    ctx.fillStyle = UI_NAVY;
    ctx.fillText("換彈中", 142, 34);
    capsuleBar(142, 40, 118, 9, [[frac, UI_YELLOW]]);
  } else {                                // 斜體粗數字
    ctx.font = `italic 900 28px ${UI_FONT}`;
    ctx.fillStyle = player.ammo === 0 ? UI_RED : UI_NAVY;
    ctx.textAlign = "right";
    ctx.fillText(String(player.ammo), 216, 48);
    ctx.textAlign = "left";
    ctx.font = `italic bold 14px ${UI_FONT}`;
    ctx.fillStyle = "rgba(43,58,85,.45)";
    ctx.fillText(`/ ${MAG_SIZE}`, 221, 48);
  }
  // 血條（膠囊 + 受擊殘影）
  const pct = player.hp / player.maxHp;
  capsuleBar(24, 60, 238, 11, [
    [player.hpGhost / player.maxHp, "rgba(255,170,90,.9)"],
    [pct, pct > 0.5 ? "#4fd688" : pct > 0.25 ? UI_YELLOW : UI_RED],
  ]);
  if (player.shieldHp > 0) {   // 護盾條（血條下方青色細條；被動盾也顯示）
    capsuleBar(24, 74, 238, 6, [[Math.min(1, player.shieldHp / (player.maxHp / 2)), "#59d5f2"]]);
  }
  // Speedrun 計時器（右上角；通關後定格金色 + 最佳紀錄）
  ctx.textAlign = "right";
  ctx.font = `italic 900 16px ${UI_FONT}`;
  ctx.strokeStyle = "rgba(255,255,255,.85)";
  ctx.lineWidth = 3;
  const tShow = bossCleared ? bossClearT : speedrunT;
  ctx.strokeText(fmtTime(tShow), VIEW_W - 14, 26);
  ctx.fillStyle = bossCleared ? UI_YELLOW : UI_NAVY;
  ctx.fillText(fmtTime(tShow), VIEW_W - 14, 26);
  ctx.lineWidth = 1;
  if (bestClearT !== null) {
    ctx.font = `bold 10px ${UI_FONT}`;
    ctx.fillStyle = "rgba(43,58,85,.75)";
    ctx.fillText(`BEST ${fmtTime(bestClearT)}`, VIEW_W - 14, 40);
  }
  ctx.textAlign = "left";
  if (bossCleared) {           // 通關橫幅（頂部中央，Boss 血條位置空出後顯示）
    if (!boss.active || boss.deadT > 0) {
      ctx.textAlign = "center";
      ctx.font = `italic 900 20px ${UI_FONT}`;
      ctx.strokeStyle = "rgba(255,255,255,.9)";
      ctx.lineWidth = 4;
      const msg = `通關時間 ${fmtTime(bossClearT)}` + (bossClearT === bestClearT ? "　新紀錄!" : "");
      ctx.strokeText(msg, VIEW_W / 2, 40);
      ctx.fillStyle = "#c98a1b";
      ctx.fillText(msg, VIEW_W / 2, 40);
      ctx.lineWidth = 1;
      ctx.textAlign = "left";
    }
  }
  if (akoBuffT > 0) {          // 亞子爆擊 buff 指示
    ctx.font = `italic 900 11px ${UI_FONT}`;
    ctx.strokeStyle = "rgba(255,255,255,.85)";
    ctx.lineWidth = 3;
    ctx.strokeText(`爆擊UP ${Math.ceil(akoBuffT)}s`, 284, 40);
    ctx.fillStyle = "#ff8a2b";
    ctx.fillText(`爆擊UP ${Math.ceil(akoBuffT)}s`, 284, 40);
    ctx.lineWidth = 1;
  }

  // ---- Boss 血條（頂部中央：深藍名牌 + 白面板 + 紅膠囊條）----
  if (boss.active && boss.deadT <= 0) {
    ctx.save();
    ctx.translate((VIEW_W - 960) / 2, 0);   // 以 960 基準座標整組置中
    uiPanel(330, 14, 320, 34, 10);
    ctx.shadowColor = "rgba(20,40,80,.3)";
    ctx.shadowBlur = 6;
    ctx.shadowOffsetY = 2;
    slantPath(312, 10, 86, 30, 9);        // 名牌壓在面板左緣
    ctx.fillStyle = UI_NAVY;
    ctx.fill();
    ctx.shadowColor = "transparent";
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    ctx.font = `italic 900 16px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText("BOSS", 328, 31);
    capsuleBar(412, 25, 224, 12, [
      [boss.hpGhost / boss.maxHp, "rgba(255,170,90,.9)"],
      [boss.hp / boss.maxHp, UI_RED],
    ]);
    ctx.restore();
  }

  // ---- Cost 卡片系統（右下：三卡槽輪換）----
  const CW = CARD_UI.w, CH = CARD_UI.h, GAP = CARD_UI.gap;
  const baseX = CARD_UI.x, baseY = CARD_UI.y;
  for (let i = 0; i < HAND_SIZE; i++) {
    const c = CARDS[hand[i]];
    const sel = targeting && targeting.slot === i;
    const deal = c.dealT > 0 ? c.dealT / 0.25 : 0;                 // 新卡滑入
    const x = baseX + i * (CW + GAP);
    const afford = cost >= c.cost;
    const hover = !targeting && mouse.sx >= x && mouse.sx <= x + CW &&
                  mouse.sy >= baseY - 10 && mouse.sy <= baseY + CH;
    const floatY = Math.sin(uiTime * 2.1 + i * 1.9) * 2.2;         // 待機浮動
    const y = baseY + floatY - (sel ? 9 : hover && afford ? 5 : 0) + deal * 16;
    if (deal > 0) ctx.globalAlpha = 1 - deal * 0.7;
    if (afford && (sel || hover)) {                                // 可用+互動：青色光暈
      ctx.shadowColor = "rgba(53,195,240,.85)";
      ctx.shadowBlur = sel ? 14 : 10;
      ctx.shadowOffsetY = 0;
    } else if (afford) {                                           // 可用：脈動微光
      ctx.shadowColor = `rgba(53,195,240,${0.35 + 0.25 * Math.sin(uiTime * 3 + i)})`;
      ctx.shadowBlur = 8;
      ctx.shadowOffsetY = 0;
    } else {
      ctx.shadowColor = "rgba(20,40,80,.35)";
      ctx.shadowBlur = 6;
      ctx.shadowOffsetY = 2;
    }
    slantPath(x, y, CW, CH, 6);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.shadowColor = "transparent";
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    ctx.save();
    slantPath(x + 3, y + 3, CW - 6, CH - 6, 5);
    ctx.clip();
    const g = ctx.createLinearGradient(0, y, 0, y + CH);
    g.addColorStop(0, "#cfe8ff");
    g.addColorStop(1, "#eef6ff");
    ctx.fillStyle = g;
    ctx.fillRect(x - 4, y, CW + 14, CH);
    if (c.img) ctx.drawImage(c.img, c.crop.sx, c.crop.sy, c.crop.sw, c.crop.sh, x - 6, y + 2, CW + 12, (CW + 12) * 1.25);
    if (!afford) { ctx.fillStyle = "rgba(35,45,65,.55)"; ctx.fillRect(x - 4, y, CW + 14, CH); }
    if (c.flashT > 0) { ctx.fillStyle = `rgba(255,255,255,${c.flashT / 0.3})`; ctx.fillRect(x - 4, y, CW + 14, CH); }
    ctx.restore();
    slantPath(x, y, CW, CH, 6);
    if (sel) {                       // 選中：青白脈動粗框
      ctx.strokeStyle = `rgba(${Math.sin(uiTime * 8) > 0 ? "255,255,255" : "53,195,240"},.95)`;
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.lineWidth = 1;
    } else if (hover && afford) {    // 懸停：亮藍框
      ctx.strokeStyle = UI_BLUE;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.lineWidth = 1;
    } else {
      ctx.strokeStyle = afford ? "rgba(120,150,190,.55)" : "rgba(80,95,120,.55)";
      ctx.stroke();
    }
    // 狙擊蓄力 ×2 徽章
    if (c.skill === "snipe" && snipeCharge) {
      ctx.textAlign = "center";
      ctx.font = `italic 900 13px ${UI_FONT}`;
      ctx.fillStyle = UI_RED;
      ctx.fillText("×2", x + CW - 12, y + CH - 8);
      ctx.textAlign = "left";
    }
    // Cost 數字徽章（左上；可用時金環呼吸）
    const badgeR = 11 + (afford ? 0.8 * Math.sin(uiTime * 3 + i) : 0);
    ctx.beginPath();
    ctx.arc(x + 9, y + 10, badgeR, 0, Math.PI * 2);
    ctx.fillStyle = afford ? UI_NAVY : "#8a94a8";
    ctx.fill();
    ctx.strokeStyle = afford ? UI_YELLOW : "#fff";
    ctx.lineWidth = afford ? 2.5 : 2;
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.textAlign = "center";
    ctx.font = `italic 900 14px ${UI_FONT}`;
    ctx.fillStyle = "#fff";
    ctx.fillText(String(c.cost), x + 9, y + 15);
    // 按鍵提示（BA 式：卡底突出的白色小方牌）
    slantPath(x + CW / 2 - 9, y + CH - 8, 18, 14, 3);
    ctx.fillStyle = "#fff";
    ctx.fill();
    ctx.strokeStyle = "rgba(43,58,85,.5)";
    ctx.stroke();
    ctx.font = `italic 900 11px ${UI_FONT}`;
    ctx.fillStyle = UI_NAVY;
    ctx.fillText(String(i + 1), x + CW / 2 + 1, y + CH + 3);
    ctx.textAlign = "left";
    ctx.globalAlpha = 1;
  }
  // COST 條（BA 式：藍 COST 標籤 + 深藍數字牌 + 亮青漸層分格、空格深色、前緣脈動）
  const barY = baseY + CH + 16;
  slantPath(baseX, barY - 6, 52, 13, 5);
  ctx.fillStyle = UI_BLUE;
  ctx.fill();
  ctx.textAlign = "center";
  ctx.font = `italic 900 10px ${UI_FONT}`;
  ctx.fillStyle = "#fff";
  ctx.fillText("COST", baseX + 27, barY + 4);
  slantPath(baseX + 2, barY + 9, 44, 24, 5);
  ctx.fillStyle = UI_NAVY;
  ctx.fill();
  slantPath(baseX + 2, barY + 9, 44, 24, 5);
  ctx.strokeStyle = "rgba(140,200,255,.5)";
  ctx.stroke();
  ctx.font = `italic 900 19px ${UI_FONT}`;
  ctx.fillStyle = "#fff";
  ctx.fillText(String(cost | 0), baseX + 25, barY + 27);
  ctx.textAlign = "left";
  const segX = baseX + 56, segTotal = CW * HAND_SIZE + GAP * (HAND_SIZE - 1) - 56;
  const segW = (segTotal - 2 * 9) / 10;
  const segY = barY + 14, segH = 14;
  for (let i = 0; i < 10; i++) {
    const sx = segX + i * (segW + 2);
    const frac = Math.min(1, Math.max(0, cost - i));
    slantPath(sx, segY, segW, segH, 4);
    ctx.fillStyle = "#141c2b";
    ctx.fill();
    if (frac > 0) {
      ctx.save();
      slantPath(sx, segY, segW, segH, 4);
      ctx.clip();
      const gg = ctx.createLinearGradient(segX, 0, segX + segTotal, 0);
      gg.addColorStop(0, "#2b8fd8");
      gg.addColorStop(1, "#8ef0ff");
      ctx.fillStyle = gg;
      ctx.fillRect(sx, segY, (segW + 4) * frac, segH);
      if (frac < 1) {                     // 正在累積的格：前緣白色脈動
        ctx.fillStyle = `rgba(255,255,255,${0.35 + 0.35 * Math.sin(uiTime * 7)})`;
        ctx.fillRect(sx + (segW + 4) * frac - 3, segY, 3, segH);
      }
      ctx.restore();
    }
    slantPath(sx, segY, segW, segH, 4);
    ctx.strokeStyle = "rgba(90,130,180,.35)";
    ctx.stroke();
  }
  ctx.restore();
}

function drawEffects() {
  for (const p of dmgPops) {         // 傷害數字（BA 式）
    const k = p.t / 0.8;
    const rise = (1 - k) * 22;
    ctx.globalAlpha = Math.min(1, k * 3);
    ctx.textAlign = "center";
    if (p.crit) {                    // 爆擊：紅色尖刺星芒 + 白字，出現瞬間放大
      const pop = 1 + Math.max(0, k - 0.82) * 2.2;
      const r = 19 * pop;
      ctx.beginPath();
      for (let q = 0; q < 16; q++) {
        const ang = q * Math.PI / 8 + 0.2;
        const rr = q % 2 === 0 ? r : r * 0.6;
        if (q === 0) ctx.moveTo(p.x + Math.cos(ang) * rr, p.y - rise + Math.sin(ang) * rr * 0.82);
        else ctx.lineTo(p.x + Math.cos(ang) * rr, p.y - rise + Math.sin(ang) * rr * 0.82);
      }
      ctx.closePath();
      ctx.fillStyle = "#e8442a";
      ctx.fill();
      ctx.strokeStyle = "#8e1f12";
      ctx.stroke();
      ctx.font = `italic 900 ${Math.round(15 * pop)}px ${UI_FONT}`;
      ctx.fillStyle = "#fff";
      ctx.fillText(p.val, p.x, p.y - rise + 5);
    } else {                         // 普通：白字藍描邊
      ctx.font = `italic 900 13px ${UI_FONT}`;
      ctx.strokeStyle = UI_NAVY;
      ctx.lineWidth = 3;
      ctx.strokeText(p.val, p.x, p.y - rise);
      ctx.fillStyle = "#fff";
      ctx.fillText(p.val, p.x, p.y - rise);
      ctx.lineWidth = 1;
    }
    ctx.textAlign = "left";
    ctx.globalAlpha = 1;
  }
  for (const p of costPops) {        // 浮字（+1 Cost／爆擊／回血／護盾，上升淡出）
    const k = p.t / 0.9;
    ctx.globalAlpha = Math.min(1, k * 2.5);
    ctx.textAlign = "center";
    ctx.font = `italic 900 15px ${UI_FONT}`;
    ctx.strokeStyle = "rgba(255,255,255,.9)";
    ctx.lineWidth = 3;
    ctx.strokeText(p.text, p.x, p.y - (1 - k) * 26);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y - (1 - k) * 26);
    ctx.lineWidth = 1;
    ctx.textAlign = "left";
    ctx.globalAlpha = 1;
  }
  for (const s of shells) {
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.globalAlpha = Math.min(1, s.life * 3);
    ctx.fillStyle = "#c9a227";
    ctx.fillRect(-4, -1.5, 8, 3);
    ctx.fillStyle = "#8a6d1c";
    ctx.fillRect(2, -1.5, 2, 3);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  for (const b of bullets) {
    const dir = Math.sign(b.vx);
    ctx.fillStyle = "#ffd75e";
    ctx.fillRect(b.x - dir * 14, b.y - 1.5, dir * 12, 3);
    ctx.fillStyle = "#fff6c8";
    ctx.fillRect(b.x - dir * 4, b.y - 2, dir * 4, 4);
  }
  if (flashT > 0 && MUZZLE[player.state]) {
    const m = gunPoint(MUZZLE[player.state]);
    const k = flashT / 0.07;
    const r = (10 + flashSeed * 6) * (0.6 + 0.4 * k);
    ctx.save();
    ctx.translate(m.x + player.facing * 4, m.y);
    ctx.rotate(flashSeed * 0.6 - 0.3);
    for (const [col, f] of [["#ff9d2e", 1], ["#ffd75e", 0.65], ["#ffffff", 0.32]]) {
      ctx.fillStyle = col;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const ang = i * Math.PI / 4;
        const rad = (i % 2 ? 0.42 : 1) * r * f;
        ctx[i ? "lineTo" : "moveTo"](Math.cos(ang) * rad, Math.sin(ang) * rad);
      }
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
  for (const p of impacts) {
    const k = p.t / 0.1;
    ctx.fillStyle = `rgba(255, 220, 130, ${k})`;
    const r = 3 + (1 - k) * 4;
    ctx.fillRect(p.x - r, p.y - 1, r * 2, 2);
    ctx.fillRect(p.x - 1, p.y - r, 2, r * 2);
  }
  // 火焰殘留區（地面燃燒）：稀疏大朵 + 尺寸隨機錯落
  for (const z of flameZones) {
    ctx.globalAlpha = Math.min(1, z.t);   // 最後 1 秒淡出
    for (let x = z.x0 + 24; x < z.x1; x += 15) {   // 間距 < 火寬 → 相鄰略重疊，加法混合疊出亮心
      const h = Math.abs(Math.sin(x * 12.9898) * 43758.5453) % 1;       // 依位置的隨機 hash（每朵固定）
      const s = 52 + 62 * h + 7 * Math.sin((5 - z.t) * 6 + x);          // 52~114 隨機 + 呼吸起伏
      drawFire((5 - z.t) * 18 + x * 0.37, x - s / 2, z.gy - s + 8, s);
    }
    ctx.globalAlpha = 1;
  }
  // 血包（白盒紅十字，落地後微浮，快消失時閃爍）
  for (const p of healPacks) {
    if (p.t < 3 && ((p.t * 6) | 0) % 2) continue;
    const bob = p.vy === 0 ? Math.sin(uiTime * 4 + p.x) * 2 : 0;
    const py = p.y - 10 + bob;
    ctx.fillStyle = "#fff";
    ctx.fillRect(p.x - 10, py - 8, 20, 16);
    ctx.strokeStyle = "rgba(43,58,85,.7)";
    ctx.strokeRect(p.x - 10.5, py - 8.5, 21, 17);
    ctx.fillStyle = "#e8544a";
    ctx.fillRect(p.x - 2, py - 6, 4, 12);
    ctx.fillRect(p.x - 6, py - 2, 12, 4);
  }
  // 麻痺小車（貼地行駛 + 微顫）
  for (const rv of rovers) {
    const rw = 30, rh = rw * ROVER_FX.h / ROVER_FX.w;
    ctx.save();
    if (rv.dir === -1) {
      ctx.translate(rv.x, 0); ctx.scale(-1, 1); ctx.translate(-rv.x, 0);
    }
    ctx.drawImage(ROVER_FX.img, rv.x - rw / 2, rv.y - rh + Math.sin(rv.t * 40) * 0.8, rw, rh);
    ctx.restore();
  }
  // 閃光彈（旋轉飛行）
  for (const g of grenades) {
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.rotate(g.rot);
    ctx.drawImage(GREN_FX.img, -8, -16, 16, 16 * GREN_FX.h / GREN_FX.w);
    ctx.restore();
  }
  // 空投直升機（貼畫面上緣、露出下方 1/4，微幅浮沉）
  for (const h of helis) {
    const hw = 700, hh = hw * HELI_FX.h / HELI_FX.w;
    const yTop = cam.y - 270 + Math.sin(h.t * 2.4) * 9 + Math.sin(h.t * 5.7) * 3;   // 慢波浮沉 + 快波微顫
    ctx.drawImage(HELI_FX.img, h.x - hw / 2, yTop - hh * 0.75, hw, hh);
  }
  // 狙擊：左上角瞄準雷射 → 擊發光束
  for (const s of snipeShots) {
    const ox = cam.x - VIEW_W / 2 + 48, oy = cam.y - 270 + 128;   // cut-in 頭像的世界座標
    if (!s.fired) {
      const k = s.t / SNIPE_AIM;
      // 紅色瞄準雷射（微幅閃爍）
      ctx.strokeStyle = `rgba(255,70,60,${0.3 + 0.4 * Math.sin(s.t * 42) ** 2})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      // 收縮鎖定準星
      const r = 30 - 20 * k;
      ctx.strokeStyle = `rgba(255,70,60,${0.5 + 0.5 * k})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
      ctx.stroke();
      for (let q = 0; q < 4; q++) {                        // 旋轉刻度
        const a = s.t * 5 + q * Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(s.x + Math.cos(a) * r, s.y + Math.sin(a) * r);
        ctx.lineTo(s.x + Math.cos(a) * (r + 7), s.y + Math.sin(a) * (r + 7));
        ctx.stroke();
      }
      ctx.lineWidth = 1;
    } else {
      const k = 1 - (s.t - SNIPE_AIM) / 0.3;               // 擊發光束淡出
      ctx.strokeStyle = `rgba(160,235,255,${k * 0.9})`;
      ctx.lineWidth = 6;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      ctx.strokeStyle = `rgba(255,255,255,${k})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      ctx.lineTo(s.x, s.y);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.fillStyle = `rgba(210,245,255,${k})`;            // 槍口光
      ctx.beginPath();
      ctx.arc(ox, oy, 10 * k + 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // 狙擊曳光線
  for (const t of tracers) {
    const k = t.t / 0.18;
    ctx.strokeStyle = `rgba(120,220,255,${k})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(t.x1, t.y);
    ctx.lineTo(t.x2, t.y);
    ctx.stroke();
    ctx.strokeStyle = `rgba(255,255,255,${k})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(t.x1, t.y);
    ctx.lineTo(t.x2, t.y);
    ctx.stroke();
  }
  // 炮擊爆風圈
  for (const bl of blasts) {
    const k = bl.t / 0.35;
    const r = 20 + (1 - k) * 70;
    ctx.strokeStyle = `rgba(255,160,70,${k})`;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(bl.x, bl.y - 20, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.lineWidth = 1;
    ctx.fillStyle = `rgba(255,220,150,${k * 0.35})`;
    ctx.beginPath();
    ctx.arc(bl.x, bl.y - 20, r * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (const n of TILE_NAMES) TILES[n] = { file: `assets_miyako/tiles/${n}.png` };
let loaded = 0;
const assets = [...Object.values(ANIMS), ...Object.values(TILES), ...Object.values(BOSS_ANIMS),
  ...Object.values(ALLY_KINDS).flatMap(k => Object.values(k.anims)), SNIPER_PORTRAIT,
  ...Object.values(ENEMY_KINDS).flatMap(k => Object.values(k.anims)), ...CARDS, FIRE_FX, HELI_FX, GREN_FX, ROVER_FX];
const total = assets.length;
for (const a of assets) {
  a.img = new Image();
  a.img.onload = () => { if (++loaded === total) requestAnimationFrame(loop); };
  a.img.src = a.file;
}
let last = 0;
function loop(ts) {
  const rawDt = Math.min(0.033, (ts - last) / 1000 || 0.016);
  last = ts;
  if (selectScreen) {                 // 開局支援選擇：凍結遊戲，只畫畫面
    uiTime += rawDt;
    draw();
    requestAnimationFrame(loop);
    return;
  }
  const dt = rawDt * (targeting ? TARGETING_TIMESCALE : 1);   // 瞄準中：子彈時間（Cost 回復同步變慢）
  player.t += dt;
  physics(dt);
  if (player.y > WORLD.h + 200) {           // safety respawn
    player.x = checkpoint.active ? checkpoint.x : 120;
    player.y = checkpoint.active ? checkpoint.y : GROUND_Y;
    player.vy = 0;
  }
  updateCamera(dt);
  updateEnemies(dt);
  updateBoss(dt);
  updateAlly(dt);
  updateEnemyBullets(dt);
  if (MUZZLE[player.state]) {
    fireT -= dt;
    if (fireT <= 0) { spawnShot(); fireT = FIRE_INTERVAL; }
  } else {
    fireT = 0;   // first shot fires immediately on entering a shooting state
  }
  updateEffects(dt);
  draw();
  requestAnimationFrame(loop);
}
</script>
